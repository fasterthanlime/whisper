name: bee
options:
  bundleIdPrefix: fasterthanlime
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.3"
  defaultConfig: Release

settings:
  base:
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    GCC_C_LANGUAGE_STANDARD: gnu17
    DEVELOPMENT_TEAM: B2N6FSRTPV
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  vox:
    path: ../../vox

targets:
  bee:
    type: application
    platform: macOS
    sources:
      - path: bee
        excludes:
          - bee-Bridging-Header.h
      - path: shared
      - path: vox-shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fasterthanlime.bee
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_ATSApplicationFontsPath: Fonts
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Bee needs microphone access for voice-to-text dictation."
        SWIFT_VERSION: "6.0"
        SWIFT_OBJC_BRIDGING_HEADER: bee/bee-Bridging-Header.h
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: nonisolated
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        HEADER_SEARCH_PATHS: "$(PROJECT_DIR)/../rust/bee-ffi/include"
        LIBRARY_SEARCH_PATHS: "$(PROJECT_DIR)/../target/release"
        OTHER_LDFLAGS:
          - "-lbee_ffi"
          - "-lc++"
          - "-framework"
          - Metal
          - "-framework"
          - MetalPerformanceShaders
          - "-framework"
          - Accelerate
          - "-framework"
          - Security
          - "-framework"
          - SystemConfiguration
        CODE_SIGN_ENTITLEMENTS: bee/bee.entitlements
        PROVISIONING_PROFILE_SPECIFIER: Bee Development
    entitlements:
      path: bee/bee.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.audio-input: true
        com.apple.security.application-groups:
          - B2N6FSRTPV.group.fasterthanlime.bee
        com.apple.security.temporary-exception.files.home-relative-path.read-write:
          - /Library/Input Methods/beeInput.app/
    dependencies:
      - target: beeInput
        embed: false
        link: false
      - package: vox
        product: VoxRuntime
      - framework: ../target/release/libbee_ffi.dylib
        embed: true
        link: false

  beeInput:
    type: application
    platform: macOS
    sources:
      - path: bee-input
      - path: shared
      - path: vox-shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fasterthanlime.inputmethod.bee
        PRODUCT_NAME: beeInput
        INFOPLIST_FILE: bee-input/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        SWIFT_APPROACHABLE_CONCURRENCY: YES
        SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
        SWIFT_UPCOMING_FEATURE_MEMBER_IMPORT_VISIBILITY: YES
        LIBRARY_SEARCH_PATHS: "$(PROJECT_DIR)/../target/release"
        ENABLE_APP_SANDBOX: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: bee-input/beeInput.entitlements
        PROVISIONING_PROFILE_SPECIFIER: Bee Input Method Development
    entitlements:
      path: bee-input/beeInput.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - B2N6FSRTPV.group.fasterthanlime.bee
    dependencies:
      - sdk: InputMethodKit.framework
      - package: vox
        product: VoxRuntime

  beeBroker:
    type: tool
    platform: macOS
    sources:
      - path: bee-broker
      - path: shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fasterthanlime.bee.broker
        PRODUCT_NAME: beeBroker
        SWIFT_VERSION: "5.0"
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
