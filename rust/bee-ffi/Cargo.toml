[package]
name = "bee-ffi"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["staticlib"]

[dependencies]
qwen3-asr-mlx = { path = "../qwen3-asr-mlx-rs" }
mlx-rs = { version = "0.25", features = ["safetensors", "metal", "accelerate"] }
tokenizers = { version = "0.22", features = ["onig"] }
log = "0.4"
env_logger = "0.11"
dirs = "6"
serde_json = "1"
