        // ==================== APP ====================
        // ==================== ALGORITHM TESTS PAGE ====================
        function AlgorithmTestsPage() {
            const [data, setData] = useState(null);
            const [expanded, setExpanded] = useState(null);
            useEffect(() => { api('/api/algorithm-tests').then(setData); }, []);

            if (!data) return <div className="container"><p>Loading tests...</p></div>;

            return (
                <div className="container">
                    <h2>Algorithm Tests
                        <span style={{marginLeft:12,fontSize:16,fontWeight:400,color: data.all_pass ? 'var(--success)' : 'var(--error)'}}>
                            {data.passed}/{data.total} passed
                        </span>
                    </h2>
                    {data.tests.map((t, i) => {
                        const isExpanded = expanded === i;
                        const ex = t.extraction;
                        const al = t.alignments;
                        const allItems = [...(al.original||[]),...(al.qwen||[]),...(al.parakeet||[])];
                        const maxTime = allItems.length ? Math.max(...allItems.map(a=>a.e)) : 1;
                        const pct = v => (v/maxTime*100).toFixed(2)+'%';
                        const ti = t.trim_info;
                        const tl = ti?.trimmed_left || 0;
                        const tr = ti?.trimmed_right || 0;
                        const consRange = ex.cons_range;
                        const classify = (items) => {
                            if (!consRange) return {kept: new Set(), trimmed: new Set()};
                            const inRange = [];
                            for (let j=0;j<items.length;j++) if (items[j].e>consRange[0]&&items[j].s<consRange[1]) inRange.push(j);
                            const kept = new Set(), trimmed = new Set();
                            for (let j=0;j<inRange.length;j++) {
                                if (j < tl || j >= inRange.length - tr) trimmed.add(inRange[j]);
                                else kept.add(inRange[j]);
                            }
                            return {kept, trimmed};
                        };
                        const renderTL = (label, items, color) => {
                            if (!items || !items.length) return null;
                            const {kept, trimmed} = classify(items);
                            return (
                            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                                <span style={{fontSize:9,color:'var(--text-muted)',width:55,textAlign:'right',flexShrink:0,fontWeight:600}}>{label}</span>
                                <div style={{position:'relative',flex:1,height:22,background:'rgba(255,255,255,0.03)',borderRadius:3,overflow:'hidden'}}>
                                    {items.map((a,j) => {
                                        const isKept = kept.has(j);
                                        const isTrimmed = trimmed.has(j);
                                        return (<div key={j} title={`${a.w} (${a.s.toFixed(3)}s\u2013${a.e.toFixed(3)}s)${isTrimmed?' [trimmed]':''}`} style={{
                                            position:'absolute',left:pct(a.s),width:pct(Math.max(a.e-a.s,0.02)),top:2,bottom:2,borderRadius:2,
                                            background: isKept ? color : isTrimmed ? color.replace(/[\d.]+\)$/,'0.2)') : 'rgba(255,255,255,0.08)',
                                            border:`1px solid ${isKept ? color : isTrimmed ? color.replace(/[\d.]+\)$/,'0.3)') : 'rgba(255,255,255,0.12)'}`,
                                            display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',
                                        }}><span style={{fontSize:8,color: isKept?'#fff':isTrimmed?'rgba(255,255,255,0.4)':'var(--text-muted)',whiteSpace:'nowrap',padding:'0 2px',
                                            textDecoration:isTrimmed?'line-through':'none'}}>{a.w}</span></div>);
                                    })}
                                    {/* Term range indicator */}
                                    {t.term_range && <div style={{position:'absolute',left:pct(t.term_range[0]),width:pct(t.term_range[1]-t.term_range[0]),top:0,bottom:0,border:'1px dashed rgba(255,255,255,0.3)',borderRadius:2,pointerEvents:'none'}} />}
                                </div>
                            </div>);
                        };

                        return (
                            <div key={i} style={{marginBottom:2,borderBottom:'1px solid var(--border)'}}>
                                <div onClick={() => setExpanded(isExpanded ? null : i)}
                                    style={{display:'flex',alignItems:'center',gap:10,padding:'8px 4px',cursor:'pointer',userSelect:'none'}}>
                                    <span style={{fontSize:16,fontWeight:700,color: t.pass ? 'var(--success)' : 'var(--error)'}}>{t.pass ? '\u2713' : '\u2717'}</span>
                                    <span style={{fontWeight:600,fontSize:13}}>{t.name}</span>
                                    <span style={{color:'var(--text-muted)',fontSize:11,flex:1}}>{t.desc}</span>
                                    <span style={{fontFamily:'monospace',fontSize:12}}>
                                        <span style={{color:'rgba(88,166,255,0.8)'}}>{ex.original || '\u2014'}</span>
                                        {' \u2192 '}
                                        <span style={{color:'rgba(210,153,34,0.9)'}}>{ex.qwen || '\u2014'}</span>
                                    </span>
                                    <span style={{fontSize:11,color: ex.clean ? 'var(--success)' : 'var(--warning)'}}>{ex.clean ? 'clean' : 'noisy'}</span>
                                </div>
                                {isExpanded && (
                                    <div style={{padding:'4px 4px 12px 30px',fontSize:12,lineHeight:1.6}}>
                                        <div style={{marginBottom:4,color:'var(--text-muted)'}}>
                                            <b>Term:</b> {t.term} | <b>Range:</b> {t.term_range[0].toFixed(3)}s \u2013 {t.term_range[1].toFixed(3)}s
                                            {' | '}<b>Cons:</b> {consRange[0].toFixed(3)}s \u2013 {consRange[1].toFixed(3)}s
                                        </div>
                                        <div style={{marginTop:6}}>
                                            {renderTL('Original', al.original, 'rgba(88,166,255,0.6)')}
                                            {renderTL('Qwen', al.qwen, 'rgba(210,153,34,0.7)')}
                                            {renderTL('Parakeet', al.parakeet, 'rgba(163,113,247,0.7)')}
                                            <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--text-muted)',marginTop:1,paddingLeft:61}}>
                                                <span>0s</span><span>{maxTime.toFixed(1)}s</span>
                                            </div>
                                        </div>
                                        {!t.pass && (
                                            <div style={{marginTop:8,padding:6,background:'rgba(255,50,50,0.1)',borderRadius:4,fontSize:11}}>
                                                <b>Expected:</b> orig="{t.expected.original}" qwen="{t.expected.qwen}" clean={t.expected.clean ? 'true' : 'false'}
                                                <br/><b>Got:</b> orig="{ex.original}" qwen="{ex.qwen}" clean={ex.clean ? 'true' : 'false'}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        );
                    })}
                </div>
            );
        }

        // ==================== CONFUSIONS REVIEW (full-screen) ====================
        function ConfusionsReview() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [busy, setBusy] = useState(null);
            const [playing, setPlaying] = useState(false);
            const sourceRef = useRef(null);
            const audioBufRef = useRef(null);

            const playSegment = (buf, start, end) => {
                if (sourceRef.current) try { sourceRef.current.stop(); } catch(e) {}
                const source = audioCtx.createBufferSource();
                source.buffer = buf;
                source.connect(audioCtx.destination);
                source.onended = () => { if (sourceRef.current === source) setPlaying(false); };
                if (start != null && end != null && end > start) {
                    source.start(0, start, end - start);
                } else {
                    source.start(0);
                }
                sourceRef.current = source;
                setPlaying(true);
            };

            const stopAudio = () => {
                if (sourceRef.current) try { sourceRef.current.stop(); } catch(e) {}
                setPlaying(false);
            };

            const loadNext = async () => {
                setLoading(true);
                stopAudio();
                try {
                    const d = await api('/api/confusions/next');
                    setData(d);
                    if (d.item?.audio_b64) {
                        const buf = await decodeAudioB64(d.item.audio_b64);
                        audioBufRef.current = buf;
                        // Auto-play the segment around the confusion
                        const ct = d.item.cons_time;
                        if (ct && ct.length === 2) {
                            playSegment(buf, Math.max(0, ct[0] - 0.5), ct[1] + 0.5);
                        } else {
                            playSegment(buf, null, null);
                        }
                    } else {
                        audioBufRef.current = null;
                    }
                } catch(e) { console.error(e); }
                setLoading(false);
            };

            const act = async (action) => {
                if (busy || !data?.item) return;
                stopAudio();
                setBusy(action);
                try {
                    const id = data.item.id;
                    if (action === 'approve') {
                        await api('/api/pipeline/approve-corpus-pair', {method:'POST', body: JSON.stringify({id})});
                    } else if (action === 'reject') {
                        await api('/api/pipeline/reject-corpus-pair', {method:'POST', body: JSON.stringify({id})});
                    } else if (action === 'alt') {
                        await api('/api/pipeline/alt-spelling', {method:'POST', body: JSON.stringify({term: data.item.term, alt_spelling: data.item.qwen})});
                    }
                    await loadNext();
                } catch(e) { console.error(e); }
                setBusy(null);
            };

            const replay = () => {
                if (!audioBufRef.current) return;
                const ct = data?.item?.cons_time;
                if (ct && ct.length === 2) {
                    playSegment(audioBufRef.current, ct[0], ct[1]);
                } else {
                    playSegment(audioBufRef.current, null, null);
                }
            };

            const playFull = () => {
                if (!audioBufRef.current) return;
                playSegment(audioBufRef.current, null, null);
            };

            useEffect(() => { loadNext(); }, []);

            // Poll for new confusions when queue is empty
            useEffect(() => {
                if (loading || data?.item) return;
                const id = setInterval(async () => {
                    try {
                        const d = await api('/api/confusions/next');
                        if (d.item) {
                            setData(d);
                            if (d.item.audio_b64) {
                                const buf = await decodeAudioB64(d.item.audio_b64);
                                audioBufRef.current = buf;
                                const ct = d.item.cons_time;
                                if (ct && ct.length === 2) {
                                    playSegment(buf, Math.max(0, ct[0] - 0.5), ct[1] + 0.5);
                                } else {
                                    playSegment(buf, null, null);
                                }
                            }
                        } else {
                            setData(d); // update progress counts
                        }
                    } catch(e) {}
                }, 2000);
                return () => clearInterval(id);
            }, [loading, data?.item]);

            // Keyboard shortcuts
            useEffect(() => {
                const handler = (e) => {
                    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                    if (e.key === 'o' || e.key === 'ArrowRight') { e.preventDefault(); act('approve'); }
                    else if (e.key === 'n' || e.key === 'ArrowLeft') { e.preventDefault(); act('reject'); }
                    else if (e.key === 'a') { e.preventDefault(); if (data?.can_mark_alt) act('alt'); }
                    else if (e.key === ' ') { e.preventDefault(); if (playing) stopAudio(); else replay(); }
                    else if (e.key === 'f') { e.preventDefault(); playFull(); }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            });

            const item = data?.item;
            const progress = data?.progress;

            return (
                <div className="review-fullscreen">
                    <div className="review-topbar">
                        <a href="#/confusions" style={{color:'var(--text-muted)',textDecoration:'none',fontSize:14}}>{'\u2190'} Back</a>
                        <div style={{flex:1}} />
                        {progress && <span style={{color:'var(--text-muted)',fontSize:13}}>
                            {progress.reviewed} reviewed / {progress.remaining} remaining
                        </span>}
                    </div>
                    <div className="review-body">
                        {loading ? <div style={{color:'var(--text-muted)'}}>Loading...</div>
                        : !item ? <div style={{textAlign:'center'}}>
                            <div style={{fontSize:18,color:'var(--text-muted)',marginBottom:8}}>Waiting for confusions...</div>
                            <div style={{width:24,height:24,border:'2px solid var(--border)',borderTopColor:'var(--text-muted)',borderRadius:'50%',animation:'spin 1s linear infinite',margin:'0 auto'}} />
                        </div>
                        : <div className="review-card" style={{maxWidth:700,width:'100%'}}>
                            <div style={{textAlign:'center',marginBottom:24}}>
                                <div style={{fontSize:13,color:'var(--text-muted)',marginBottom:8}}>
                                    term: <b style={{color:'var(--text)'}}>{item.term}</b>
                                    <span style={{marginLeft:12,fontSize:11,color:'var(--text-muted)'}}>({'\u00d7'}{item.hit_count})</span>
                                </div>
                                <div style={{fontSize:24,fontFamily:'monospace',marginBottom:4}}>
                                    <span style={{color:'rgba(88,166,255,0.9)'}}>{item.original}</span>
                                    <span style={{color:'var(--text-muted)',margin:'0 12px'}}>{'\u2192'}</span>
                                    <span style={{color:'rgba(210,153,34,0.9)'}}>{item.qwen}</span>
                                </div>
                                <div style={{fontSize:12,color:'var(--text-muted)',marginTop:8}}>{item.sentence}</div>
                            </div>
                            <div style={{display:'flex',justifyContent:'center',gap:8,marginBottom:16}}>
                                <button onClick={replay} style={{background:'none',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',cursor:'pointer',padding:'4px 12px',fontSize:12}}>
                                    {playing ? '\u23F8' : '\u25B6'} segment
                                </button>
                                <button onClick={playFull} style={{background:'none',border:'1px solid var(--border)',borderRadius:4,color:'var(--text-muted)',cursor:'pointer',padding:'4px 12px',fontSize:12}}>
                                    {'\u25B6'} full
                                </button>
                            </div>
                            {busy && <div style={{textAlign:'center',color:'var(--text-muted)',fontSize:13,marginBottom:8}}>{busy}...</div>}
                        </div>}
                    </div>
                    {item && !loading && <div className="review-actions">
                        <button onClick={() => act('reject')} style={{background:'rgba(255,100,100,0.15)',border:'1px solid rgba(255,100,100,0.4)',borderRadius:8,color:'rgba(255,100,100,0.9)',cursor:'pointer',padding:'12px 32px',fontSize:16,fontWeight:600}}>
                            {'\u2715'} Reject <span style={{fontSize:11,fontWeight:400,opacity:0.6}}>(N)</span>
                        </button>
                        {data?.can_mark_alt && <button onClick={() => act('alt')} style={{background:'rgba(100,200,255,0.1)',border:'1px solid rgba(100,200,255,0.3)',borderRadius:8,color:'rgba(100,200,255,0.9)',cursor:'pointer',padding:'12px 24px',fontSize:16,fontWeight:600}}>
                            Alt <span style={{fontSize:11,fontWeight:400,opacity:0.6}}>(A)</span>
                        </button>}
                        <button onClick={() => act('approve')} style={{background:'rgba(100,200,100,0.15)',border:'1px solid rgba(100,200,100,0.4)',borderRadius:8,color:'rgba(100,200,100,0.9)',cursor:'pointer',padding:'12px 32px',fontSize:16,fontWeight:600}}>
                            {'\u2713'} Approve <span style={{fontSize:11,fontWeight:400,opacity:0.6}}>(O)</span>
                        </button>
                    </div>}
                </div>
            );
        }

        function SettingsPage() {
            const [settings, setSettings] = useState(null);
            const [templateTarget, setTemplateTarget] = useState('200');
            const [confusionTarget, setConfusionTarget] = useState('8');
            const [saving, setSaving] = useState(false);

            const load = async () => {
                const data = await api('/api/settings');
                setSettings(data);
                setTemplateTarget(String(data.background_template_target_per_term ?? 200));
                setConfusionTarget(String(data.background_confusion_target_per_term ?? 8));
            };

            useEffect(() => { load(); }, []);

            const save = async () => {
                setSaving(true);
                try {
                    const data = await api('/api/settings', {
                        method: 'POST',
                        body: JSON.stringify({
                            background_template_target_per_term: parseInt(templateTarget, 10) || 200,
                            background_confusion_target_per_term: parseInt(confusionTarget, 10) || 8,
                        }),
                    });
                    setSettings(data);
                    setTemplateTarget(String(data.background_template_target_per_term ?? 200));
                    setConfusionTarget(String(data.background_confusion_target_per_term ?? 8));
                } catch (e) {
                    alert(`Save failed: ${e.message}`);
                }
                setSaving(false);
            };

            const inputStyle = {
                width: 140,
                padding: '8px 10px',
                background: 'var(--bg)',
                border: '1px solid var(--border)',
                borderRadius: 6,
                color: 'var(--text)',
                fontFamily: 'Jost,sans-serif',
                fontSize: 14,
            };

            return (
                <div className="page">
                    <h2>Settings</h2>
                    <div className="card" style={{maxWidth: 760, marginBottom: 16}}>
                        <h3 style={{marginTop: 0}}>Secondary Tools</h3>
                        <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
                            <a href="#/vocab" className="btn btn-sm">Vocabulary</a>
                            <a href="#/author" className="btn btn-sm">Author</a>
                            <a href="#/confusions" className="btn btn-sm">Confusions</a>
                            <a href="#/tests" className="btn btn-sm">Algorithm Tests</a>
                            <a href="#/jobs" className="btn btn-sm">Jobs</a>
                        </div>
                        <div style={{marginTop: 10, color:'var(--text-muted)', fontSize:13}}>
                            These are still available, but they are no longer top-level workflow tabs.
                        </div>
                    </div>
                    <div className="card" style={{maxWidth: 760}}>
                        <h3 style={{marginTop: 0}}>Background Maintenance</h3>
                        <div style={{display:'grid',gridTemplateColumns:'220px 160px 1fr',gap:12,alignItems:'center'}}>
                            <div>Template target per term</div>
                            <input type="number" min="1" max="1000" value={templateTarget} onChange={e => setTemplateTarget(e.target.value)} style={inputStyle} />
                            <div style={{color:'var(--text-muted)',fontSize:13}}>Background hydration keeps filling reviewed terms until they reach this many total template sentences.</div>

                            <div>Confusion scans per term</div>
                            <input type="number" min="1" max="1000" value={confusionTarget} onChange={e => setConfusionTarget(e.target.value)} style={inputStyle} />
                            <div style={{color:'var(--text-muted)',fontSize:13}}>Background confusion scan keeps sampling reviewed terms until each term has this many total scan passes.</div>
                        </div>
                        <div style={{marginTop: 16, display:'flex', gap:12, alignItems:'center'}}>
                            <button className="btn" onClick={save} disabled={saving || !settings}>{saving ? 'Saving…' : 'Save'} </button>
                            {settings && <span style={{color:'var(--text-muted)',fontSize:13}}>
                                Current: {settings.background_template_target_per_term} templates/term, {settings.background_confusion_target_per_term} scans/term
                            </span>}
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const hash = useHash();
            let page;
            if (hash === '#/review/active') page = <SentenceReview mode="vocab" />;
            else if (hash.startsWith('#/vocab/scan')) page = <ScanResultsPage />;
            else if (hash.startsWith('#/vocab')) page = <VocabPage />;
            else if (hash.startsWith('#/review')) page = <ReviewPage />;
            else if (hash.startsWith('#/author')) page = <AuthorPage />;
            else if (hash === '#/confusions/review') page = <ConfusionsReview />;
            else if (hash.startsWith('#/corpus')) page = <CorpusPage />;
            else if (hash.startsWith('#/confusions')) page = <CorpusPage />;
            else if (hash.startsWith('#/pipeline/scan')) page = <ScanResultsPage />;
            else if (hash.startsWith('#/train')) page = <PipelinePage />;
            else if (hash.startsWith('#/pipeline')) page = <PipelinePage />;
            else if (hash.startsWith('#/eval')) page = <EvalPage />;
            else if (hash.startsWith('#/settings')) page = <SettingsPage />;
            else if (hash.startsWith('#/tests')) page = <AlgorithmTestsPage />;
            else if (hash.startsWith('#/jobs')) page = <JobsPage />;
            else page = <CorpusPage />;
            return (<><Nav />{page}</>);
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
