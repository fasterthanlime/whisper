<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>hark ml</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2358a6ff'/><path d='M6 16h3l2-8 3 16 3-12 2 8 3-10 2 6h2' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --danger: #f85149;
            --danger-bg: rgba(248, 81, 73, 0.15);
            --success: #3fb950;
            --success-bg: rgba(63, 185, 80, 0.15);
            --warning: #d29922;
            --warning-bg: rgba(210, 153, 34, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
        }

        nav {
            display: flex;
            gap: 20px;
            padding: 12px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        nav .logo {
            font-weight: 700;
            font-size: 16px;
            color: var(--accent);
            margin-right: 8px;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            padding: 4px 0;
        }

        nav a:hover,
        nav a.active {
            color: var(--text);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 26px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-card .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn:hover {
            border-color: var(--text-muted);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 600;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .btn-success {
            background: var(--success);
            color: #000;
            border-color: var(--success);
            font-weight: 600;
        }

        .btn-danger {
            color: var(--danger);
            border-color: var(--danger);
        }

        .btn-sm {
            padding: 3px 8px;
            font-size: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 6px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-pending {
            background: var(--warning-bg);
            color: var(--warning);
        }

        .badge-approved {
            background: var(--success-bg);
            color: var(--success);
        }

        .badge-rejected {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .badge-needs_resynth {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent);
        }

        .badge-running {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent);
        }

        .badge-completed {
            background: var(--success-bg);
            color: var(--success);
        }

        .badge-failed {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 7px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .empty-state h3 {
            color: var(--text);
            margin-bottom: 8px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .search-bar input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            outline: none;
        }

        .search-bar input:focus {
            border-color: var(--accent);
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        /* Aligned sentence — every token is a .word span */
        .sentence-display {
            font-size: 20px;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.3em 0.3em;
            align-items: baseline;
        }

        .sentence-display .word {
            display: inline-block;
            text-align: center;
        }

        .sentence-display .word .spoken-alt {
            display: block;
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
            line-height: 1.2;
        }

        .sentence-display .word.unknown {
            outline: 1px solid var(--warning);
            outline-offset: 2px;
            border-radius: 3px;
            cursor: pointer;
        }

        .sentence-display .word.resolved {
            outline: 1px solid var(--success);
            outline-offset: 2px;
            border-radius: 3px;
        }

        .sentence-display .word-active {
            outline: 2px solid rgba(88, 166, 255, 0.6);
            outline-offset: 2px;
            border-radius: 3px;
            color: #fff;
        }

        .unknown-num-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1em;
            height: 1em;
            border-radius: 50%;
            background: var(--warning);
            color: var(--bg);
            font-size: 80%;
            font-weight: 700;
            line-height: 1;
            vertical-align: super;
            margin-left: 2px;
        }

        /* Full-screen review */
        .review-fullscreen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .review-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .review-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            gap: 32px;
            overflow-y: auto;
        }

        .review-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
        }

        .transcript-grid-scroll::-webkit-scrollbar {
            height: 4px;
        }

        .transcript-grid-scroll::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .review-actions {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-shrink: 0;
            padding: 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .review-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 12px 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-family: 'Jost', sans-serif;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.15s;
            min-width: 100px;
        }

        .review-action-btn:hover {
            border-color: var(--text-muted);
        }

        .review-action-btn.approve {
            border-color: var(--success);
            color: var(--success);
        }

        .review-action-btn.approve:hover {
            background: var(--success-bg);
        }

        .review-action-btn.reject {
            border-color: var(--danger);
            color: var(--danger);
        }

        .review-action-btn.reject:hover {
            background: var(--danger-bg);
        }

        .review-action-btn.replay {
            border-color: var(--accent);
            color: var(--accent);
        }

        .review-action-btn.replay:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        .review-action-btn kbd {
            font-family: 'Jost', sans-serif;
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg);
            padding: 1px 6px;
            border-radius: 3px;
            border: 1px solid var(--border);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar .fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s;
        }

        /* Waveform */
        .waveform-container {
            width: 100%;
            position: relative;
            cursor: pointer;
        }

        .waveform-canvas {
            width: 100%;
            height: 80px;
            display: block;
            border-radius: 6px;
        }

        .play-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            color: var(--accent);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .play-btn:hover {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.1);
        }

        .play-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .error-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--danger-bg);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            z-index: 200;
            max-width: 600px;
            text-align: center;
        }

        .vocab-overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
        }

        .vocab-editor {
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 24px 32px;
            min-width: 400px;
            max-width: 500px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .vocab-editor .term {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .vocab-editor .status {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
            min-height: 1.5em;
        }

        .vocab-editor .spoken-display {
            font-size: 18px;
            margin-bottom: 12px;
            min-height: 1.5em;
            color: var(--accent);
            font-weight: 500;
        }

        .vocab-editor .row {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }

        .vocab-editor input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Jost', sans-serif;
            font-size: 15px;
            outline: none;
            text-align: center;
        }

        .vocab-editor input:focus {
            border-color: var(--accent);
        }

        .vocab-editor .actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }

        .record-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--danger);
            background: none;
            color: var(--danger);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .record-btn:hover {
            background: var(--danger-bg);
        }

        .record-btn.active {
            background: var(--danger);
            color: #fff;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        /* ==================== PIPELINE ==================== */
        .pipeline-wrap {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
        }

        .pipeline-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .pipeline-header h2 {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 4px;
        }

        .pipeline-header .subtitle {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .pipeline-stages {
            display: flex;
            flex-direction: column;
            gap: 0;
            position: relative;
        }

        .pipeline-connector {
            width: 2px;
            height: 24px;
            margin: 0 auto;
            position: relative;
            overflow: visible;
        }

        .pipeline-connector::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
            background: linear-gradient(to bottom, rgba(88, 166, 255, 0.4), rgba(88, 166, 255, 0.1));
        }

        .pipeline-connector.active::before {
            background: linear-gradient(to bottom, rgba(88, 166, 255, 0.8), rgba(88, 166, 255, 0.3));
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.3);
        }

        .stage-card {
            position: relative;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px 24px;
            background: var(--surface);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .stage-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            transition: all 0.3s ease;
        }

        .stage-card.ready::before {
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            box-shadow: 0 0 12px rgba(88, 166, 255, 0.2);
        }

        .stage-card.complete::before {
            background: linear-gradient(90deg, transparent, var(--success), transparent);
            box-shadow: 0 0 12px rgba(63, 185, 80, 0.2);
        }

        .stage-card.running::before {
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: pipeline-scan 2s ease-in-out infinite;
        }

        .stage-card.dimmed {
            opacity: 0.4;
        }

        @keyframes pipeline-scan {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
                box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
            }
        }

        .stage-top {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 8px;
        }

        .stage-icon {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(88, 166, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.15);
        }

        .stage-card.complete .stage-icon {
            background: rgba(63, 185, 80, 0.08);
            border-color: rgba(63, 185, 80, 0.15);
        }

        .stage-icon svg {
            width: 20px;
            height: 20px;
        }

        .stage-title {
            flex: 1;
        }

        .stage-title h3 {
            font-size: 15px;
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .stage-title .stage-num {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .stage-status-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .stage-status-badge.idle {
            background: rgba(139, 148, 158, 0.1);
            color: var(--text-muted);
        }

        .stage-status-badge.ready {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        .stage-status-badge.done {
            background: rgba(63, 185, 80, 0.1);
            color: var(--success);
            border: 1px solid rgba(63, 185, 80, 0.2);
        }

        .stage-status-badge.active {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent);
            border: 1px solid rgba(88, 166, 255, 0.3);
            animation: pipeline-pulse 1.5s ease-in-out infinite;
        }

        @keyframes pipeline-pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .stage-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .stage-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .stage-controls label {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .stage-controls input,
        .stage-controls select {
            padding: 5px 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Jost', sans-serif;
            font-size: 13px;
            transition: border-color 0.2s;
        }

        .stage-controls input:focus,
        .stage-controls select:focus {
            border-color: var(--accent);
            outline: none;
        }

        .stage-launch-btn {
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid var(--accent);
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Jost', sans-serif;
        }

        .stage-launch-btn:hover:not(:disabled) {
            background: rgba(88, 166, 255, 0.2);
            box-shadow: 0 0 12px rgba(88, 166, 255, 0.15);
        }

        .stage-launch-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        dialog::backdrop {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
        }
        dialog {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            box-shadow: 0 12px 48px rgba(0,0,0,0.6);
        }
        dialog[open] {
            display: flex;
            flex-direction: column;
        }
        .corpus-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
        .corpus-table th { padding: 8px 10px; font-weight: 600; text-align: left; border-bottom: 2px solid var(--border); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); }
        .corpus-table td { padding: 6px 10px; }
        .corpus-table .term-cell { font-weight: 600; vertical-align: top; border-right: 2px solid var(--border); background: rgba(255,255,255,0.02); white-space: nowrap; }
        .corpus-table .group-row td { border-top: 1px solid var(--border); }
        .corpus-table .sub-row td { border-top: 1px solid rgba(255,255,255,0.03); }
        .count-badge { display: inline-block; min-width: 18px; text-align: center; padding: 1px 5px; border-radius: 8px; font-size: 10px; font-weight: 600; margin-left: 4px; }
        .count-badge.correct { background: rgba(63,185,80,0.15); color: var(--success); }
        .count-badge.wrong { background: rgba(248,81,73,0.15); color: var(--error); }
        .corpus-total { padding: 8px 10px; font-size: 12px; color: var(--text-muted); border-top: 2px solid var(--border); }
        .stage-log {
            margin-top: 12px;
            max-height: 220px;
            overflow: auto;
            font-size: 11px;
            font-family: 'SF Mono', 'Menlo', monospace;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(88, 166, 255, 0.1);
            border-radius: 4px;
            white-space: pre-wrap;
            color: rgba(88, 166, 255, 0.7);
            line-height: 1.6;
        }

        .pipeline-error {
            padding: 10px 14px;
            background: rgba(248, 81, 73, 0.08);
            border: 1px solid rgba(248, 81, 73, 0.2);
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            color: var(--danger);
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const {useState, useEffect, useCallback, useRef, useMemo} = React;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Canonical word extraction — must match the Rust side (tts::extract_words)
        function canonicalWord(w) {
            return w.replace(/^[^a-zA-Z0-9]+/, '').replace(/[^a-zA-Z0-9]+$/, '').toLowerCase();
        }

        function api(path, opts = {}) {
            return fetch(path, {headers: {'Content-Type': 'application/json'}, ...opts})
                .then(r => {if (!r.ok) throw new Error(`${r.status} ${r.statusText}`); const ct = r.headers.get('content-type') || ''; return ct.includes('json') ? r.json() : r.text();});
        }

        function useHash() {
            const [hash, setHash] = useState(window.location.hash || '#/');
            useEffect(() => {const h = () => setHash(window.location.hash || '#/'); window.addEventListener('hashchange', h); return () => window.removeEventListener('hashchange', h);}, []);
            return hash;
        }

        // ==================== TTS ====================
        let _ttsAbort = null;
        async function fetchTtsBuffer(text, backend) {
            // Abort any previous in-flight TTS request
            if (_ttsAbort) { _ttsAbort.abort(); }
            const controller = new AbortController();
            _ttsAbort = controller;
            const body = {text};
            if (backend) body.backend = backend;
            const res = await fetch('/api/tts/preview', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
                signal: controller.signal,
            });
            if (!res.ok) throw new Error(`TTS ${res.status}: ${await res.text()}`);
            const arrayBuf = await res.arrayBuffer();
            const audioBuf = await audioCtx.decodeAudioData(arrayBuf);
            return audioBuf;
        }

        // TTS + forced alignment in one shot. Returns { audioBuf, alignment }.
        // alignment is [{word, start, end}, ...] with times in seconds.
        async function fetchTtsAligned(spokenText, backend, alignText) {
            const body = {text: spokenText, align_text: alignText};
            if (backend) body.backend = backend;
            const res = await fetch('/api/tts/preview', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            });
            if (!res.ok) throw new Error(`TTS ${res.status}: ${await res.text()}`);
            const data = await res.json();
            const binaryStr = atob(data.audio_b64);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
            const audioBuf = await audioCtx.decodeAudioData(bytes.buffer);
            return {audioBuf, alignment: data.alignment};
        }

        let _currentSource = null;
        function stopPlayback() {
            if (_currentSource) { try { _currentSource.stop(); } catch {} _currentSource = null; }
        }
        function playBuffer(audioBuf, onEnd) {
            stopPlayback();
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuf;
            source.connect(audioCtx.destination);
            source.onended = () => { _currentSource = null; if (onEnd) onEnd(); };
            source.start();
            _currentSource = source;
            return source;
        }

        // ==================== WAVEFORM ====================
        function Waveform({audioBuffer, playing, alignment, onActiveWord, onWordClick, playOffset}) {
            const canvasRef = useRef(null);
            const animRef = useRef(null);
            const startTimeRef = useRef(null);
            const lastActiveRef = useRef(null);

            useEffect(() => {
                if (!audioBuffer || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);

                const data = audioBuffer.getChannelData(0);
                const w = rect.width;
                const h = rect.height;
                const step = Math.max(1, Math.floor(data.length / w));
                const dur = audioBuffer.duration;

                const draw = (playbackPos) => {
                    ctx.clearRect(0, 0, w, h);

                    // Draw word region backgrounds from alignment
                    if (alignment && alignment.length > 0) {
                        for (let i = 0; i < alignment.length; i++) {
                            const a = alignment[i];
                            const x0 = (a.start / dur) * w;
                            const x1 = (a.end / dur) * w;
                            // Alternating subtle tint for word regions
                            const isActive = playbackPos != null && playbackPos >= a.start && playbackPos < a.end;
                            if (isActive) {
                                ctx.fillStyle = 'rgba(88, 166, 255, 0.12)';
                                ctx.fillRect(x0, 0, x1 - x0, h);
                            }
                        }
                    }

                    // Draw waveform
                    const mid = h / 2;
                    for (let x = 0; x < w; x++) {
                        const start = x * step;
                        let min = 0, max = 0;
                        for (let j = 0; j < step && start + j < data.length; j++) {
                            const v = data[start + j];
                            if (v < min) min = v;
                            if (v > max) max = v;
                        }
                        const topY = mid + min * mid * 0.9;
                        const botY = mid + max * mid * 0.9;

                        const samplePos = playbackPos != null ? (playbackPos / dur) * w : -1;
                        if (x < samplePos) {
                            ctx.fillStyle = 'rgba(88, 166, 255, 0.7)';
                        } else {
                            ctx.fillStyle = 'rgba(88, 166, 255, 0.25)';
                        }
                        ctx.fillRect(x, topY, 1, botY - topY || 1);
                    }

                    // Draw word boundary lines and labels
                    if (alignment && alignment.length > 0) {
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                        ctx.lineWidth = 1;
                        for (const a of alignment) {
                            const bx = (a.start / dur) * w;
                            ctx.beginPath();
                            ctx.moveTo(bx, 0);
                            ctx.lineTo(bx, h);
                            ctx.stroke();
                        }

                        // Word labels at bottom
                        ctx.font = '12px Jost, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                        for (const a of alignment) {
                            const cx = ((a.start + a.end) / 2 / dur) * w;
                            const regionW = ((a.end - a.start) / dur) * w;
                            if (regionW > 15) { // only draw if there's room
                                ctx.fillText(a.word, cx, h - 3);
                            }
                        }
                    }

                    // Playback cursor
                    if (playbackPos != null && playbackPos >= 0) {
                        const cx = (playbackPos / dur) * w;
                        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(cx, 0);
                        ctx.lineTo(cx, h);
                        ctx.stroke();
                    }

                    // Notify active word (by index into alignment array, not by word text)
                    if (onActiveWord && alignment) {
                        let active = null;
                        if (playbackPos != null) {
                            for (let ai = 0; ai < alignment.length; ai++) {
                                const a = alignment[ai];
                                if (playbackPos >= a.start && playbackPos < a.end) {active = ai; break;}
                            }
                        }
                        if (active !== lastActiveRef.current) {
                            lastActiveRef.current = active;
                            onActiveWord(active);
                        }
                    }
                };

                if (playing) {
                    startTimeRef.current = audioCtx.currentTime;
                    const offset = playOffset || 0;
                    const animate = () => {
                        const elapsed = offset + (audioCtx.currentTime - startTimeRef.current);
                        if (elapsed <= dur) {
                            draw(elapsed);
                            animRef.current = requestAnimationFrame(animate);
                        } else {
                            draw(null);
                        }
                    };
                    animate();
                } else {
                    draw(null);
                }

                return () => {
                    if (animRef.current) cancelAnimationFrame(animRef.current);
                    lastActiveRef.current = null;
                    if (onActiveWord) onActiveWord(null);
                };
            }, [audioBuffer, playing, alignment, playOffset]);

            // Click on waveform to play a specific word
            const handleClick = (e) => {
                if (!alignment || !audioBuffer || !onWordClick) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const t = (x / rect.width) * audioBuffer.duration;
                for (const a of alignment) {
                    if (t >= a.start && t < a.end) {
                        onWordClick(a);
                        return;
                    }
                }
            };

            return (
                <div className="waveform-container">
                    <canvas ref={canvasRef} className="waveform-canvas" onClick={handleClick}
                        style={{cursor: alignment ? 'pointer' : 'default'}} />
                </div>
            );
        }

        // ==================== ALIGNED SENTENCE ====================
        // Shows the written form as flowing text. Where the spoken form differs,
        // the written word(s) get a pill border with the spoken alternative below.
        // Clicking any word opens a vocab override editor.
        function AlignedSentence({text, spoken, onWordClick, unknownWords, resolvedWords, activeWordIndex, alignment}) {
            const segments = useMemo(() => diffSegments(text, spoken), [text, spoken]);
            const unknownSet = useMemo(() => {
                const s = new Set();
                if (unknownWords) unknownWords.forEach(w => s.add(canonicalWord(w)));
                return s;
            }, [unknownWords]);
            // Map from canonical unknown word → 1-based number, ordered by appearance in text (left-to-right)
            const unknownNum = useMemo(() => {
                const m = new Map();
                if (!unknownWords || unknownWords.length === 0) return m;
                let n = 1;
                // Walk through text words left-to-right, assign numbers to unknown ones
                for (const w of text.split(/\s+/)) {
                    const clean = canonicalWord(w);
                    if (clean && unknownSet.has(clean) && !m.has(clean)) {
                        m.set(clean, n++);
                    }
                }
                return m;
            }, [unknownWords, text, unknownSet]);
            const resolvedSet = useMemo(() => {
                const s = new Set();
                if (resolvedWords) resolvedWords.forEach(w => s.add(canonicalWord(w)));
                return s;
            }, [resolvedWords]);

            // Map alignment index → written word index for active highlighting
            const activeWrittenIdx = useMemo(() => {
                if (activeWordIndex == null || !alignment || !alignment.length) return -1;
                const activeAlignWord = canonicalWord(alignment[activeWordIndex]?.word || '');
                if (!activeAlignWord) return -1;
                // Walk written words and alignment words in parallel to find the matching position
                const writtenWords = text.split(/\s+/).map(w => canonicalWord(w));
                let alignIdx = 0;
                for (let wi = 0; wi < writtenWords.length && alignIdx < alignment.length; wi++) {
                    if (canonicalWord(alignment[alignIdx]?.word || '') === writtenWords[wi]) {
                        if (alignIdx === activeWordIndex) return wi;
                        alignIdx++;
                    }
                }
                return -1;
            }, [activeWordIndex, alignment, text]);

            // Track written word index during render
            let writtenWordCounter = -1;

            const wordClass = (word) => {
                writtenWordCounter++;
                const clean = canonicalWord(word);
                let cls = '';
                if (resolvedSet.has(clean)) cls = 'resolved';
                else if (unknownSet.has(clean)) cls = 'unknown';
                if (writtenWordCounter === activeWrittenIdx) cls += ' word-active';
                return cls;
            };

            const numBadgeBelow = (word) => {
                const n = unknownNum.get(canonicalWord(word));
                if (!n || n > 9) return null;
                return <span className="unknown-num-badge">{n}</span>;
            };

            // Flatten all segments into a flat list of whitespace-delimited tokens
            const allWords = useMemo(() => {
                const words = [];
                for (const seg of segments) {
                    if (seg.same) {
                        for (const w of seg.written.split(/\s+/)) {
                            if (w) words.push({text: w, spokenAlt: null});
                        }
                    } else {
                        // Diff segment: the written form may be multiple words
                        words.push({text: seg.written, spokenAlt: seg.spoken});
                    }
                }
                return words;
            }, [segments]);

            return (
                <div className="sentence-display">
                    {allWords.map((w, j) => {
                        const cls = wordClass(w.text);
                        const badge = numBadgeBelow(w.text);
                        return <span key={j} className={`word ${cls}`}
                            onClick={() => onWordClick && onWordClick(w.text)}
                            style={{cursor: onWordClick ? 'pointer' : 'default'}}>
                            {w.text}
                            {w.spokenAlt && <span className="spoken-alt">{w.spokenAlt}</span>}
                            {badge}
                        </span>;
                    })}
                </div>
            );
        }

        // Diff the written and spoken forms into segments.
        // Each segment is either { same: true, written } or { same: false, written, spoken }.
        function diffSegments(written, spoken) {
            if (written === spoken) {
                return [{same: true, written}];
            }

            const wWords = written.split(/\s+/);
            const sWords = spoken.split(/\s+/);

            // LCS to find matching words (case-insensitive)
            const m = wWords.length, n = sWords.length;
            const dp = Array.from({length: m + 1}, () => new Uint16Array(n + 1));
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (wWords[i - 1].toLowerCase() === sWords[j - 1].toLowerCase()) {
                        dp[i][j] = dp[i - 1][j - 1] + 1;
                    } else {
                        dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                    }
                }
            }

            // Backtrack to find which words match
            const wMatched = new Array(m).fill(false);
            const sMatched = new Array(n).fill(false);
            let i = m, j = n;
            while (i > 0 && j > 0) {
                if (wWords[i - 1].toLowerCase() === sWords[j - 1].toLowerCase()) {
                    wMatched[i - 1] = true;
                    sMatched[j - 1] = true;
                    i--; j--;
                } else if (dp[i - 1][j] >= dp[i][j - 1]) {
                    i--;
                } else {
                    j--;
                }
            }

            // Build segments: walk both arrays, grouping matched (same) and unmatched (diff)
            const segments = [];
            let wi = 0, si = 0;
            while (wi < m || si < n) {
                // Collect a run of matched words
                let sameRun = [];
                while (wi < m && wMatched[wi] && si < n && sMatched[si]) {
                    sameRun.push(wWords[wi]);
                    wi++; si++;
                }
                if (sameRun.length > 0) {
                    segments.push({same: true, written: sameRun.join(' ')});
                }

                // Collect a run of unmatched words from both sides
                let wRun = [], sRun = [];
                while (wi < m && !wMatched[wi]) {wRun.push(wWords[wi]); wi++;}
                while (si < n && !sMatched[si]) {sRun.push(sWords[si]); si++;}
                if (wRun.length > 0 || sRun.length > 0) {
                    segments.push({
                        same: false,
                        written: wRun.join(' ') || '\u2014',
                        spoken: sRun.join(' ') || '\u2014',
                    });
                }
            }
            return segments;
        }

        // ==================== UNIFIED TRANSCRIPT GRID ====================
        // 3-way word alignment: original, Qwen, Parakeet in a CSS grid.
        // Matching words dimmed, diffs highlighted in model color.
        // Scrolls horizontally, syncs with playback.

        function cleanWord(w) {return w.replace(/[^a-zA-Z0-9']/g, '').toLowerCase();}

        function editDist(a, b) {
            if (a === b) return 0;
            const m = a.length, n = b.length;
            if (m === 0) return n;
            if (n === 0) return m;
            const dp = Array.from({length: m + 1}, (_, i) => {
                const row = new Uint8Array(n + 1); row[0] = i; return row;
            });
            for (let j = 1; j <= n; j++) dp[0][j] = j;
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1]
                        : 1 + Math.min(dp[i - 1][j - 1], dp[i - 1][j], dp[i][j - 1]);
            return dp[m][n];
        }

        function wordsMatch(a, b) {
            const ca = cleanWord(a), cb = cleanWord(b);
            if (ca === cb) return true;
            if (!ca || !cb) return false;
            const maxLen = Math.max(ca.length, cb.length);
            const threshold = Math.min(2, Math.ceil(maxLen * 0.3));
            return editDist(ca, cb) <= threshold;
        }

        // Pre-process: merge adjacent ASR words that together match a reference word
        function mergeAdjacentWords(refWords, asrWords) {
            const refSet = new Set(refWords.map(w => cleanWord(w)));
            const merged = [];
            let i = 0;
            while (i < asrWords.length) {
                // Try merging current + next
                if (i + 1 < asrWords.length) {
                    const combined = cleanWord(asrWords[i]) + cleanWord(asrWords[i + 1]);
                    if (refSet.has(combined) || [...refSet].some(r => wordsMatch(combined, r))) {
                        merged.push(asrWords[i] + asrWords[i + 1]);
                        i += 2;
                        continue;
                    }
                }
                merged.push(asrWords[i]);
                i++;
            }
            return merged;
        }

        function lcsAlign(refWords, asrWords) {
            // Pre-merge split ASR words that together match a ref word (e.g. "front end" → "frontend")
            asrWords = mergeAdjacentWords(refWords, asrWords);
            const m = refWords.length, n = asrWords.length;
            const dp = Array.from({length: m + 1}, () => new Uint16Array(n + 1));
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    dp[i][j] = wordsMatch(refWords[i - 1], asrWords[j - 1])
                        ? dp[i - 1][j - 1] + 1
                        : Math.max(dp[i - 1][j], dp[i][j - 1]);
            const cols = [];
            let i = m, j = n;
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && wordsMatch(refWords[i - 1], asrWords[j - 1])) {
                    cols.push({ref: i - 1, asr: j - 1, match: true}); i--; j--;
                } else if (i > 0 && (j === 0 || dp[i - 1][j] >= dp[i][j - 1])) {
                    cols.push({ref: i - 1, asr: null, match: false}); i--;
                } else {
                    cols.push({ref: null, asr: j - 1, match: false}); j--;
                }
            }
            cols.reverse();
            return cols;
        }

        function mergeAlignments(refWords, qCols, pCols) {
            // Build unified columns: each column has {ref, qwen, parakeet} (word index or null)
            // Walk both alignments in parallel, merging on shared ref positions
            const unified = [];
            let qi = 0, pi = 0;
            while (qi < qCols.length || pi < pCols.length) {
                const qc = qi < qCols.length ? qCols[qi] : null;
                const pc = pi < pCols.length ? pCols[pi] : null;
                if (qc && pc && qc.ref != null && pc.ref != null && qc.ref === pc.ref) {
                    unified.push({ref: qc.ref, qwen: qc.asr, parakeet: pc.asr, qMatch: qc.match, pMatch: pc.match});
                    qi++; pi++;
                } else if (qc && pc && qc.ref != null && pc.ref != null) {
                    if (qc.ref < pc.ref) {
                        unified.push({ref: qc.ref, qwen: qc.asr, parakeet: null, qMatch: qc.match, pMatch: false});
                        qi++;
                    } else {
                        unified.push({ref: pc.ref, qwen: null, parakeet: pc.asr, qMatch: false, pMatch: pc.match});
                        pi++;
                    }
                } else if (qc && qc.ref == null) {
                    unified.push({ref: null, qwen: qc.asr, parakeet: null, qMatch: false, pMatch: false});
                    qi++;
                } else if (pc && pc.ref == null) {
                    unified.push({ref: null, qwen: null, parakeet: pc.asr, qMatch: false, pMatch: false});
                    pi++;
                } else if (qc) {
                    unified.push({ref: qc.ref, qwen: qc.asr, parakeet: null, qMatch: qc.match, pMatch: false});
                    qi++;
                } else {
                    unified.push({ref: pc.ref, qwen: null, parakeet: pc.asr, qMatch: false, pMatch: pc.match});
                    pi++;
                }
            }
            return unified;
        }

        function TranscriptGrid({original, asr, humanAsr, activeWordIndex, alignment, writtenAlignment, unknownWords, onWordClick}) {
            const scrollRef = useRef(null);
            const qColor = '#58a6ff';
            const pColor = '#7ee787';
            const dimStyle = {opacity: 0.2};

            // Unknown word set + left-to-right numbering
            const unknownSet = useMemo(() => new Set((unknownWords || []).map(w => cleanWord(w))), [unknownWords]);
            const unknownNum = useMemo(() => {
                const m = new Map();
                if (!unknownWords?.length) return m;
                let n = 1;
                for (const w of original.split(/\s+/)) {
                    const c = cleanWord(w);
                    if (c && unknownSet.has(c) && !m.has(c)) m.set(c, n++);
                }
                return m;
            }, [unknownWords, original, unknownSet]);

            // Get all four alignments (timed word lists)
            // When human recording exists, all alignments are against the human audio
            const spokenAlign = humanAsr?.alignment || alignment || [];
            const refAlign = humanAsr?.written_alignment || writtenAlignment || alignment || [];
            const qAlign = humanAsr?.qwen_alignment || asr?.qwen_alignment || [];
            const pAlign = humanAsr?.parakeet_alignment || asr?.parakeet_alignment || [];

            // Build time-based groups: collect all boundaries, find overlapping words
            const groups = useMemo(() => {
                if (!refAlign.length) return [];

                // Collect all time boundaries
                const boundaries = new Set();
                for (const list of [spokenAlign, refAlign, qAlign, pAlign]) {
                    for (const w of list) {
                        boundaries.add(w.start);
                        boundaries.add(w.end);
                    }
                }
                const times = [...boundaries].sort((a, b) => a - b);

                // For each time slot, find the word with the tightest fit.
                // This ensures dropped words (tiny 50ms slots) win over real words
                // that happen to overlap at boundaries.
                const findWordAt = (list, t) => {
                    let best = null, bestDur = Infinity;
                    for (const w of list) {
                        if (t >= w.start && t < w.end) {
                            const dur = w.end - w.start;
                            if (dur < bestDur) { best = w; bestDur = dur; }
                        }
                    }
                    if (best) return best;
                    // Tolerance-based fallback
                    for (const w of list) {
                        if (t >= w.start - 0.01 && t < w.end + 0.01) {
                            const dur = w.end - w.start;
                            if (dur < bestDur) { best = w; bestDur = dur; }
                        }
                    }
                    return best;
                };

                // Walk time slots and build columns (each column = a unique combination change)
                const cols = [];
                let lastSpoken = null, lastRef = null, lastQ = null, lastP = null;
                for (let i = 0; i < times.length - 1; i++) {
                    const t = (times[i] + times[i + 1]) / 2;
                    const spoken = findWordAt(spokenAlign, t);
                    const ref = findWordAt(refAlign, t);
                    const q = findWordAt(qAlign, t);
                    const p = findWordAt(pAlign, t);
                    if (!spoken && !ref && !q && !p) continue;
                    if (spoken === lastSpoken && ref === lastRef && q === lastQ && p === lastP) continue;
                    cols.push({spoken, ref, q, p, start: times[i]});
                    lastSpoken = spoken; lastRef = ref; lastQ = q; lastP = p;
                }
                return cols;
            }, [spokenAlign, refAlign, qAlign, pAlign]);

            // Compute per-row spans: for each row, find runs of same word object
            const rowSpans = useMemo(() => {
                const computeSpans = (getWord) => {
                    const spans = []; // [{word, colStart, colSpan, wordObj}]
                    let i = 0;
                    while (i < groups.length) {
                        const obj = getWord(groups[i]);
                        let span = 1;
                        while (i + span < groups.length && getWord(groups[i + span]) === obj) span++;
                        spans.push({wordObj: obj, word: obj?.word || null, colStart: i, colSpan: span});
                        i += span;
                    }
                    return spans;
                };
                return {
                    spoken: computeSpans(g => g.spoken),
                    ref: computeSpans(g => g.ref),
                    q: computeSpans(g => g.q),
                    p: computeSpans(g => g.p),
                };
            }, [groups]);

            // Map alignment index → column RANGE for active word tracking.
            // activeWordIndex is an index into spokenAlign (from the Waveform),
            // so we find that spoken word's column range, then extend to cover all
            // rows that overlap with those columns.
            const activeColRange = useMemo(() => {
                if (activeWordIndex == null || !spokenAlign[activeWordIndex]) return null;
                const activeObj = spokenAlign[activeWordIndex];
                // Find the spoken row span that contains this word
                for (const span of rowSpans.spoken) {
                    if (span.wordObj === activeObj) {
                        return {start: span.colStart, end: span.colStart + span.colSpan};
                    }
                }
                return null;
            }, [activeWordIndex, spokenAlign, rowSpans.spoken]);

            const activeColIdx = activeColRange ? activeColRange.start : -1; // for scroll target

            const isSpanActive = (s) => {
                if (!activeColRange) return false;
                // Check if span overlaps with active range
                const spanEnd = s.colStart + s.colSpan;
                return s.colStart < activeColRange.end && spanEnd > activeColRange.start;
            };
            const activeBg = 'rgba(88,166,255,0.15)';

            // Auto-scroll to active column
            useEffect(() => {
                if (activeColIdx < 0 || !scrollRef.current) return;
                const cell = scrollRef.current.querySelector(`[data-col="${activeColIdx}"]`);
                if (cell) cell.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
            }, [activeColIdx]);

            if (!groups.length) return null;

            return (
                <div style={{fontFamily: 'Jost, sans-serif', fontSize: 17, display: 'flex', alignItems: 'center', flexDirection: 'column'}}>
                    {/* Legend on top */}
                    <div style={{display: 'flex', gap: 16, marginBottom: 4, fontSize: 11}}>
                        <span style={{color: '#d2a8ff'}}>Spoken</span>
                        <span style={{color: 'var(--text-muted)'}}>Original</span>
                        <span style={{color: qColor}}>Qwen</span>
                        <span style={{color: pColor}}>Parakeet</span>
                    </div>
                    {/* Scrolling grid */}
                    <div ref={scrollRef} style={{overflowX: 'auto', paddingBottom: 4}} className="transcript-grid-scroll">
                        <div style={{
                            display: 'inline-grid',
                            gridTemplateColumns: `repeat(${groups.length}, max-content)`,
                            gridTemplateRows: 'auto auto auto auto',
                            gap: '1px 0',
                            padding: '.5em .2em',
                            whiteSpace: 'nowrap',
                        }}>
                            {/* Row 1: Spoken (vocab overrides) — always show, dim if same as written */}
                            {rowSpans.spoken.map((s, i) => {
                                const isLast = s.colStart + s.colSpan >= groups.length;
                                if (!s.word) return <div key={`s${i}`} style={{gridRow: 1, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em'}} />;
                                let sameAsRef = false;
                                for (let c = s.colStart; c < s.colStart + s.colSpan; c++) {
                                    const r = groups[c]?.ref;
                                    if (r && cleanWord(s.word) === cleanWord(r.word)) {sameAsRef = true; break;}
                                }
                                return <div key={`s${i}`} style={{gridRow: 1, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em', padding: '0 4px', borderRight: !isLast ? '1px solid rgba(48,54,61,0.4)' : undefined, background: isSpanActive(s) ? activeBg : undefined, borderRadius: isSpanActive(s) ? 3 : undefined}}>
                                    <span style={{color: '#d2a8ff', opacity: sameAsRef ? 0.2 : 1}}>{s.word}</span>
                                </div>;
                            })}
                            {/* Row 2: Original (written text) */}
                            {rowSpans.ref.map((s, i) => {
                                if (!s.word) return <div key={`r${i}`} style={{gridRow: 2, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em'}} />;
                                const isActive = isSpanActive(s);
                                const c = cleanWord(s.word);
                                const isUnknown = unknownSet.has(c);
                                const num = unknownNum.get(c);
                                // Check if this unknown word has an override (spoken differs from written)
                                let hasOverride = false;
                                if (isUnknown) {
                                    for (let ci = s.colStart; ci < s.colStart + s.colSpan; ci++) {
                                        const sp = groups[ci]?.spoken;
                                        const rf = groups[ci]?.ref;
                                        if (sp && rf && cleanWord(sp.word) !== cleanWord(rf.word)) { hasOverride = true; break; }
                                    }
                                }
                                const outlineColor = hasOverride ? 'var(--success)' : 'var(--warning)';
                                const style = {
                                    ...(isActive ? {color: '#fff'} : {}),
                                    ...(isUnknown ? {outline: `1px solid ${outlineColor}`, outlineOffset: '1px', borderRadius: '3px', cursor: 'pointer'} : {}),
                                };
                                const isLast = s.colStart + s.colSpan >= groups.length;
                                return <div key={`r${i}`} data-col={s.colStart} style={{gridRow: 2, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em', padding: '0 4px', borderRight: !isLast ? '1px solid rgba(48,54,61,0.4)' : undefined, background: isActive ? activeBg : undefined, borderRadius: isActive ? 3 : undefined}}>
                                    <span style={style} onClick={isUnknown && onWordClick ? () => onWordClick(s.word) : undefined}>
                                        {s.word}{num && num <= 9 ? <span className="unknown-num-badge" style={{marginLeft: 2, verticalAlign: 'super'}}>{num}</span> : null}
                                    </span>
                                </div>;
                            })}
                            {/* Row 3: Qwen */}
                            {rowSpans.q.map((s, i) => {
                                const isLast = s.colStart + s.colSpan >= groups.length;
                                if (!s.word) return <div key={`q${i}`} style={{gridRow: 3, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em'}} />;
                                let isMatch = false;
                                for (let c = s.colStart; c < s.colStart + s.colSpan; c++) {
                                    const r = groups[c]?.ref;
                                    if (r && cleanWord(s.word) === cleanWord(r.word)) {isMatch = true; break;}
                                }
                                return <div key={`q${i}`} style={{gridRow: 3, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em', padding: '0 4px', borderRight: !isLast ? '1px solid rgba(48,54,61,0.4)' : undefined, background: isSpanActive(s) ? activeBg : undefined, borderRadius: isSpanActive(s) ? 3 : undefined}}>
                                    <span style={{color: qColor, opacity: isMatch ? 0.2 : 1}}>{s.word}</span>
                                </div>;
                            })}
                            {/* Row 4: Parakeet */}
                            {rowSpans.p.map((s, i) => {
                                const isLast = s.colStart + s.colSpan >= groups.length;
                                if (!s.word) return <div key={`p${i}`} style={{gridRow: 4, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em'}} />;
                                let isMatch = false;
                                for (let c = s.colStart; c < s.colStart + s.colSpan; c++) {
                                    const r = groups[c]?.ref;
                                    if (r && cleanWord(s.word) === cleanWord(r.word)) {isMatch = true; break;}
                                }
                                return <div key={`p${i}`} style={{gridRow: 4, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em', padding: '0 4px', borderRight: !isLast ? '1px solid rgba(48,54,61,0.4)' : undefined, background: isSpanActive(s) ? activeBg : undefined, borderRadius: isSpanActive(s) ? 3 : undefined}}>
                                    <span style={{color: pColor, opacity: isMatch ? 0.2 : 1}}>{s.word}</span>
                                </div>;
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        // ==================== VOCAB ====================
        function VocabPage() {
            const [vocab, setVocab] = useState([]);
            const [search, setSearch] = useState('');
            const [filter, setFilter] = useState('overrides'); // 'all' | 'overrides'
            const [sort, setSort] = useState('recent'); // 'alpha' | 'recent'
            const [loading, setLoading] = useState(true);
            const [page, setPage] = useState(0);
            const pageSize = 50;
            const [editingId, setEditingId] = useState(null);
            const [editValue, setEditValue] = useState('');
            const [newTerm, setNewTerm] = useState('');
            const [newOverride, setNewOverride] = useState('');
            const [newPreviewed, setNewPreviewed] = useState(false);
            const [newTermExists, setNewTermExists] = useState(false);
            const newTermRef = useRef(null);
            const [curating, setCurating] = useState(false);
            const [curateLog, setCurateLog] = useState('');
            const curateRef = useRef(null);
            const curatePollRef = useRef(null);

            const load = useCallback(() => {
                const p = new URLSearchParams();
                if (search) p.set('search', search);
                if (filter === 'overrides') p.set('has_override', 'true');
                if (sort === 'recent') p.set('sort', 'recent');
                p.set('limit', String(pageSize));
                p.set('offset', String(page * pageSize));
                api(`/api/vocab?${p}`).then(setVocab).finally(() => setLoading(false));
            }, [search, filter, sort, page]);
            useEffect(() => {load();}, [load]);
            // Reset page when filter/search changes
            useEffect(() => { setPage(0); }, [search, filter, sort]);

            const startEdit = (row) => {setEditingId(row.id); setEditValue(row.spoken_override || row.spoken_auto);};
            const saveEdit = async (id) => {
                await api(`/api/vocab/${id}`, {method: 'POST', body: JSON.stringify({spoken_override: editValue})});
                setEditingId(null); load();
            };
            const toggleReviewed = async (row) => {
                await api(`/api/vocab/${row.id}`, {method: 'POST', body: JSON.stringify({reviewed: !row.reviewed})});
                load();
            };
            const previewNewTerm = () => {
                const text = newOverride.trim() || newTerm.trim();
                if (!text) return;
                fetchTtsBuffer(text).then(buf => playBuffer(buf)).catch(() => { });
                setNewPreviewed(true);
            };
            const addTerm = async () => {
                if (!newTerm.trim()) return;
                if (!newPreviewed) {previewNewTerm(); return;}
                await api('/api/vocab', {method: 'POST', body: JSON.stringify({term: newTerm.trim(), spoken_override: newOverride.trim() || undefined})});
                setNewTerm(''); setNewOverride(''); setNewPreviewed(false); setNewTermExists(false); load();
                setTimeout(() => newTermRef.current?.focus(), 50);
            };

            const startCurate = async () => {
                setCurating(true); setCurateLog('');
                try {
                    const res = await api('/api/jobs/curate', {method: 'POST', body: JSON.stringify({batch_size: 100})});
                    if (res.job_id) {
                        const poll = async () => {
                            const job = await api(`/api/jobs/${res.job_id}`);
                            setCurateLog(job.log);
                            if (curateRef.current) curateRef.current.scrollTop = curateRef.current.scrollHeight;
                            load(); // refresh vocab list as GPT curates
                            if (job.status !== 'running') {
                                setCurating(false);
                                clearInterval(curatePollRef.current);
                                load();
                            }
                        };
                        poll();
                        curatePollRef.current = setInterval(poll, 2000);
                    }
                } catch (e) { setCurating(false); alert(e.message); }
            };

            return (
                <div className="container">
                    <div style={{display: 'flex', alignItems: 'baseline', gap: 12, marginBottom: 8}}>
                        <h2 style={{margin: 0}}>Vocabulary</h2>
                        <span style={{fontSize: 13, color: 'var(--text-muted)'}}>{vocab.length > 0 ? `${page * pageSize + 1}\u2013${page * pageSize + vocab.length}` : '0'} of {filter === 'overrides' ? 'overrides' : 'all'}</span>
                    </div>
                    <div style={{display: 'flex', gap: 8, marginBottom: 12, flexWrap: 'wrap', alignItems: 'center'}}>
                        <a href="#/vocab/scan" className="btn btn-sm">Scan Results</a>
                        <button className="btn btn-sm" onClick={startCurate} disabled={curating}>
                            {curating ? 'Curating...' : 'LLM Curate'}
                        </button>
                        <span style={{fontSize: 12, color: 'var(--text-muted)'}}>Remove junk vocab + suggest pronunciations via GPT</span>
                    </div>
                    {curateLog && (
                        <pre ref={curateRef} style={{marginBottom: 12, maxHeight: 200, overflow: 'auto', fontSize: 11, padding: 8, background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 4, whiteSpace: 'pre-wrap', color: 'var(--text-muted)'}}>{curateLog}</pre>
                    )}
                    <div className="search-bar" style={{display: 'flex', gap: 8, alignItems: 'center'}}>
                        <input placeholder="Search terms..." value={search} onChange={e => setSearch(e.target.value)} style={{flex: 1}} />
                        <button className={`btn btn-sm ${filter === 'overrides' ? 'btn-primary' : ''}`} onClick={() => setFilter(f => f === 'overrides' ? 'all' : 'overrides')}>
                            {filter === 'overrides' ? 'With overrides' : 'All'}
                        </button>
                        <button className={`btn btn-sm ${sort === 'recent' ? 'btn-primary' : ''}`} onClick={() => setSort(s => s === 'recent' ? 'alpha' : 'recent')}>
                            {sort === 'recent' ? 'Recent first' : 'A\u2013Z'}
                        </button>
                    </div>
                    <div className="search-bar" style={{display: 'flex', gap: 8, alignItems: 'center', marginTop: 8}}>
                        <input ref={newTermRef} placeholder="New term..." value={newTerm} onChange={e => {
                                setNewTerm(e.target.value); setNewPreviewed(false);
                                const v = e.target.value.trim();
                                if (v) { api(`/api/vocab?search=${encodeURIComponent(v)}&limit=1`).then(list => {
                                    setNewTermExists(list.some(r => r.term.toLowerCase() === v.toLowerCase()));
                                }).catch(() => {}); } else { setNewTermExists(false); }
                            }}
                            onKeyDown={e => {
                                if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); addTerm(); }
                                else if (e.key === 'Enter') { e.preventDefault(); previewNewTerm(); }
                            }} />
                        <input placeholder="Override (optional)" value={newOverride} onChange={e => {setNewOverride(e.target.value); setNewPreviewed(false);}}
                            onKeyDown={e => {
                                if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); addTerm(); }
                                else if (e.key === 'Enter') { e.preventDefault(); previewNewTerm(); }
                            }} />
                        <button className="btn btn-sm btn-primary" onClick={addTerm} disabled={!newTerm.trim()}>{newPreviewed ? <>Save ({'\u2318\u23CE'})</> : <>Preview ({'\u23CE'})</>}</button>
                        {newTermExists && <span style={{fontSize:11,color:'var(--warning)'}}>already exists</span>}
                    </div>
                    {loading ? <p>Loading...</p> : vocab.length === 0 ? (
                        <div className="empty-state"><h3>No results</h3></div>
                    ) : (
                        <div className="card" style={{padding: 0, overflow: 'hidden'}}>
                            <table>
                                <thead><tr><th>Term</th><th>Auto</th><th>Override</th><th style={{width: 36}}></th></tr></thead>
                                <tbody>
                                    {vocab.map(row => (
                                        <tr key={row.id}>
                                            <td style={{fontWeight: 600}}>{row.term}</td>
                                            <td style={{color: 'var(--text-muted)'}}>{row.spoken_auto}</td>
                                            <td>
                                                {editingId === row.id ? (
                                                    <div style={{display: 'flex', gap: 4}}>
                                                        <input style={{flex: 1, padding: '3px 6px', fontSize: 13, background: 'var(--bg)', border: '1px solid var(--accent)', borderRadius: 3, color: 'var(--text)', outline: 'none', fontFamily: 'Jost,sans-serif'}}
                                                            value={editValue} onChange={e => setEditValue(e.target.value)} autoFocus
                                                            onKeyDown={e => {if (e.key === 'Enter') saveEdit(row.id); if (e.key === 'Escape') setEditingId(null);}} />
                                                        <button className="btn btn-sm btn-primary" onClick={() => saveEdit(row.id)}>OK</button>
                                                    </div>
                                                ) : (
                                                    <span style={{cursor: 'pointer', color: row.spoken_override ? 'var(--accent)' : 'var(--text-muted)', fontStyle: row.spoken_override ? 'normal' : 'italic'}}
                                                        onClick={() => startEdit(row)}>
                                                        {row.spoken_override || 'click to set'}
                                                    </span>
                                                )}
                                            </td>
                                            <td><PlayBtn text={row.spoken_override || row.spoken_auto} small /></td>
                                            <td><button onClick={async () => {
                                                if (confirm(`Delete "${row.term}"?`)) {
                                                    await api(`/api/vocab/${row.id}/delete`, {method:'POST'});
                                                    load();
                                                }
                                            }} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:13,padding:2}} title="Delete">&times;</button></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    )}
                    <div style={{display: 'flex', gap: 8, alignItems: 'center', justifyContent: 'center', marginTop: 16}}>
                        <button className="btn btn-sm" onClick={() => setPage(p => Math.max(0, p - 1))} disabled={page === 0}>&larr; Prev</button>
                        <span style={{fontSize: 13, color: 'var(--text-muted)'}}>Page {page + 1}</span>
                        <button className="btn btn-sm" onClick={() => setPage(p => p + 1)} disabled={vocab.length < pageSize}>Next &rarr;</button>
                    </div>
                </div>
            );
        }

                            <div style={{fontSize: 12, color: 'var(--text-muted)', marginTop: 4}}>
                                {reviewed} reviewed of {reviewed + unreviewed} ({Math.round(reviewed / (reviewed + unreviewed) * 100)}%)
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==================== HELPERS ====================
        async function decodeAudioB64(b64) {
            const binaryStr = atob(b64);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
            return audioCtx.decodeAudioData(bytes.buffer);
        }

        function audioBufferToWav(buffer) {
            const sampleRate = buffer.sampleRate, samples = buffer.getChannelData(0);
            const dataLen = samples.length * 2, buf = new ArrayBuffer(44 + dataLen), v = new DataView(buf);
            const ws = (o, s) => {for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i));};
            ws(0, 'RIFF'); v.setUint32(4, 36 + dataLen, true); ws(8, 'WAVE'); ws(12, 'fmt ');
            v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
            v.setUint32(24, sampleRate, true); v.setUint32(28, sampleRate * 2, true);
            v.setUint16(32, 2, true); v.setUint16(34, 16, true); ws(36, 'data'); v.setUint32(40, dataLen, true);
            for (let i = 0; i < samples.length; i++) {
                const s = Math.max(-1, Math.min(1, samples[i]));
                v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            return buf;
        }

        // ==================== FULL-SCREEN SENTENCE REVIEW ====================
        function SentenceReview({mode = 'sentence'}) {
            const isVocab = mode === 'vocab';
            const apiBase = isVocab ? '/api/review/vocab' : '/api/review/current';
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
