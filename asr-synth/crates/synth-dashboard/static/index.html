<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>hark ml</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2358a6ff'/><path d='M6 16h3l2-8 3 16 3-12 2 8 3-10 2 6h2' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @font-face {
            font-family: 'Manuale IPA Web';
            src: url('/fonts/ManualeIPA-Regular.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --danger: #f85149;
            --danger-bg: rgba(248, 81, 73, 0.15);
            --success: #3fb950;
            --success-bg: rgba(63, 185, 80, 0.15);
            --warning: #d29922;
            --warning-bg: rgba(210, 153, 34, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
        }

        nav {
            display: flex;
            gap: 20px;
            padding: 12px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        nav .logo {
            font-weight: 700;
            font-size: 16px;
            color: var(--accent);
            margin-right: 8px;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
            padding: 4px 0;
        }

        nav a:hover,
        nav a.active {
            color: var(--text);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .card h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 26px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-card .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 16px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn:hover {
            border-color: var(--text-muted);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
            font-weight: 600;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .btn-success {
            background: var(--success);
            color: #000;
            border-color: var(--success);
            font-weight: 600;
        }

        .btn-danger {
            color: var(--danger);
            border-color: var(--danger);
        }

        .btn-sm {
            padding: 3px 8px;
            font-size: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 6px 10px;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .badge-pending {
            background: var(--warning-bg);
            color: var(--warning);
        }

        .badge-approved {
            background: var(--success-bg);
            color: var(--success);
        }

        .badge-rejected {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .badge-needs_resynth {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent);
        }

        .badge-running {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent);
        }

        .badge-completed {
            background: var(--success-bg);
            color: var(--success);
        }

        .badge-failed {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 7px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .form-row {
            display: flex;
            gap: 12px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .empty-state h3 {
            color: var(--text);
            margin-bottom: 8px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .search-bar input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Jost', sans-serif;
            font-size: 14px;
            outline: none;
        }

        .search-bar input:focus {
            border-color: var(--accent);
        }

        .alt-spelling-row {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            align-items: center;
            max-width: 440px;
        }

        .alt-spelling-input {
            flex: 1;
            min-width: 0;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Jost', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
        }

        .alt-spelling-input::placeholder {
            color: var(--text-muted);
        }

        .alt-spelling-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.12);
        }

        .alt-spelling-add {
            min-width: 64px;
            justify-content: center;
            font-weight: 600;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        /* Aligned sentence — every token is a .word span */
        .sentence-display {
            font-size: 20px;
            text-align: center;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.3em 0.3em;
            align-items: baseline;
        }

        .sentence-display .word {
            display: inline-block;
            text-align: center;
        }

        .sentence-display .word .spoken-alt {
            display: block;
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
            line-height: 1.2;
        }

        .sentence-display .word.unknown {
            outline: 1px solid var(--warning);
            outline-offset: 2px;
            border-radius: 3px;
            cursor: pointer;
        }

        .sentence-display .word.resolved {
            outline: 1px solid var(--success);
            outline-offset: 2px;
            border-radius: 3px;
        }

        .sentence-display .word-active {
            outline: 2px solid rgba(88, 166, 255, 0.6);
            outline-offset: 2px;
            border-radius: 3px;
            color: #fff;
        }

        .unknown-num-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1em;
            height: 1em;
            border-radius: 50%;
            background: var(--warning);
            color: var(--bg);
            font-size: 80%;
            font-weight: 700;
            line-height: 1;
            vertical-align: super;
            margin-left: 2px;
        }

        /* Full-screen review */
        .review-fullscreen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .review-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .review-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            gap: 32px;
            overflow-y: auto;
        }

        .review-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
        }

        .transcript-grid-scroll::-webkit-scrollbar {
            height: 4px;
        }

        .transcript-grid-scroll::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .review-actions {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-shrink: 0;
            padding: 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .review-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 12px 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-family: 'Jost', sans-serif;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.15s;
            min-width: 100px;
        }

        .review-action-btn:hover {
            border-color: var(--text-muted);
        }

        .review-action-btn.approve {
            border-color: var(--success);
            color: var(--success);
        }

        .review-action-btn.approve:hover {
            background: var(--success-bg);
        }

        .review-action-btn.reject {
            border-color: var(--danger);
            color: var(--danger);
        }

        .review-action-btn.reject:hover {
            background: var(--danger-bg);
        }

        .review-action-btn.replay {
            border-color: var(--accent);
            color: var(--accent);
        }

        .review-action-btn.replay:hover {
            background: rgba(88, 166, 255, 0.1);
        }

        .review-action-btn kbd {
            font-family: 'Jost', sans-serif;
            font-size: 11px;
            color: var(--text-muted);
            background: var(--bg);
            padding: 1px 6px;
            border-radius: 3px;
            border: 1px solid var(--border);
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-bar .fill {
            height: 100%;
            background: var(--accent);
            border-radius: 2px;
            transition: width 0.3s;
        }

        /* Waveform */
        .waveform-container {
            width: 100%;
            position: relative;
            cursor: pointer;
        }

        .waveform-canvas {
            width: 100%;
            height: 80px;
            display: block;
            border-radius: 6px;
        }

        .play-btn {
            background: none;
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 28px;
            height: 28px;
            color: var(--accent);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .play-btn:hover {
            border-color: var(--accent);
            background: rgba(88, 166, 255, 0.1);
        }

        .play-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .error-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--danger-bg);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            z-index: 200;
            max-width: 600px;
            text-align: center;
        }

        .vocab-overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.5);
        }

        .vocab-editor {
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 12px;
            padding: 24px 32px;
            min-width: 400px;
            max-width: 500px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .vocab-editor .term {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .vocab-editor .status {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 12px;
            min-height: 1.5em;
        }

        .vocab-editor .spoken-display {
            font-size: 18px;
            margin-bottom: 12px;
            min-height: 1.5em;
            color: var(--accent);
            font-weight: 500;
        }

        .vocab-editor .row {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }

        .vocab-editor input {
            flex: 1;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Jost', sans-serif;
            font-size: 15px;
            outline: none;
            text-align: center;
        }

        .vocab-editor input:focus {
            border-color: var(--accent);
        }

        .vocab-editor .actions {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 16px;
        }

        .record-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--danger);
            background: none;
            color: var(--danger);
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .record-btn:hover {
            background: var(--danger-bg);
        }

        .record-btn.active {
            background: var(--danger);
            color: #fff;
            animation: pulse 1s infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        /* ==================== PIPELINE ==================== */
        .pipeline-wrap {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px;
        }

        .pipeline-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .pipeline-header h2 {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 4px;
        }

        .pipeline-header .subtitle {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .pipeline-stages {
            display: flex;
            flex-direction: column;
            gap: 0;
            position: relative;
        }

        .pipeline-connector {
            width: 2px;
            height: 24px;
            margin: 0 auto;
            position: relative;
            overflow: visible;
        }

        .pipeline-connector::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 2px;
            height: 100%;
            transform: translateX(-50%);
            background: linear-gradient(to bottom, rgba(88, 166, 255, 0.4), rgba(88, 166, 255, 0.1));
        }

        .pipeline-connector.active::before {
            background: linear-gradient(to bottom, rgba(88, 166, 255, 0.8), rgba(88, 166, 255, 0.3));
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.3);
        }

        .stage-card {
            position: relative;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px 24px;
            background: var(--surface);
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .stage-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            transition: all 0.3s ease;
        }

        .stage-card.ready::before {
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            box-shadow: 0 0 12px rgba(88, 166, 255, 0.2);
        }

        .stage-card.complete::before {
            background: linear-gradient(90deg, transparent, var(--success), transparent);
            box-shadow: 0 0 12px rgba(63, 185, 80, 0.2);
        }

        .stage-card.running::before {
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: pipeline-scan 2s ease-in-out infinite;
        }

        .stage-card.dimmed {
            opacity: 0.4;
        }

        @keyframes pipeline-scan {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
                box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
            }
        }

        .stage-top {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 8px;
        }

        .stage-icon {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(88, 166, 255, 0.08);
            border: 1px solid rgba(88, 166, 255, 0.15);
        }

        .stage-card.complete .stage-icon {
            background: rgba(63, 185, 80, 0.08);
            border-color: rgba(63, 185, 80, 0.15);
        }

        .stage-icon svg {
            width: 20px;
            height: 20px;
        }

        .stage-title {
            flex: 1;
        }

        .stage-title h3 {
            font-size: 15px;
            font-weight: 600;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .stage-title .stage-num {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .stage-status-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .stage-status-badge.idle {
            background: rgba(139, 148, 158, 0.1);
            color: var(--text-muted);
        }

        .stage-status-badge.ready {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        .stage-status-badge.done {
            background: rgba(63, 185, 80, 0.1);
            color: var(--success);
            border: 1px solid rgba(63, 185, 80, 0.2);
        }

        .stage-status-badge.active {
            background: rgba(88, 166, 255, 0.15);
            color: var(--accent);
            border: 1px solid rgba(88, 166, 255, 0.3);
            animation: pipeline-pulse 1.5s ease-in-out infinite;
        }

        @keyframes pipeline-pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.6;
            }
        }

        .stage-desc {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .stage-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .stage-controls label {
            font-size: 11px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .stage-controls input,
        .stage-controls select {
            padding: 5px 8px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-family: 'Jost', sans-serif;
            font-size: 13px;
            transition: border-color 0.2s;
        }

        .stage-controls input:focus,
        .stage-controls select:focus {
            border-color: var(--accent);
            outline: none;
        }

        .stage-launch-btn {
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid var(--accent);
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Jost', sans-serif;
        }

<body>
    <div id="root"></div>
    <script type="text/babel">
        const {useState, useEffect, useCallback, useRef, useMemo} = React;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Canonical word extraction — must match the Rust side (tts::extract_words)
        function canonicalWord(w) {
            return w.replace(/^[^a-zA-Z0-9]+/, '').replace(/[^a-zA-Z0-9]+$/, '').toLowerCase();
        }

        function api(path, opts = {}) {
            return fetch(path, {headers: {'Content-Type': 'application/json'}, ...opts})
                .then(r => {if (!r.ok) throw new Error(`${r.status} ${r.statusText}`); const ct = r.headers.get('content-type') || ''; return ct.includes('json') ? r.json() : r.text();});
        }

        function parseJsonSafe(raw, fallback = null) {
            if (!raw) return fallback;
            try {
                return JSON.parse(raw);
            } catch (_) {
                return fallback;
            }
        }

        function formatPhoneSec(sec) {
            if (typeof sec !== 'number' || !Number.isFinite(sec)) return '0.000';
            return sec.toFixed(3);
        }

        function GroupedPhoneLane({label, raw}) {
            const groups = useMemo(() => {
                const parsed = parseJsonSafe(raw, []);
                return Array.isArray(parsed) ? parsed : [];
            }, [raw]);
            return (
                <div style={{display:'grid',gap:6}}>
                    <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1}}>{label}</div>
                    {groups.length === 0 ? (
                        <div style={{fontSize:12,color:'var(--text-muted)'}}>No grouped phones yet.</div>
                    ) : (
                        <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                            {groups.map((group, idx) => (
                                <div key={`${label}-${idx}`} style={{display:'grid',gap:2,padding:'6px 8px',border:'1px solid var(--border)',borderRadius:8,background:'rgba(255,255,255,0.03)',minWidth:96}}>
                                    <div style={{fontSize:11,color:'var(--text-muted)'}}>
                                        {group.word || group.t || `#${idx + 1}`}
                                    </div>
                                    <div style={{fontFamily:'monospace',fontSize:13,color:'var(--accent)',lineHeight:1.35}}>
                                        {group.w || group.t || '—'}
                                    </div>
                                    <div style={{fontSize:10,color:'var(--text-muted)'}}>
                                        own {formatPhoneSec(group.own_s)}–{formatPhoneSec(group.own_e)}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function TimedPhoneTraceSummary({raw}) {
            const trace = useMemo(() => parseJsonSafe(raw, null), [raw]);
            if (!trace) return <div style={{fontSize:12,color:'var(--text-muted)'}}>No raw timed phone trace.</div>;
            const timing = trace.timing_ms || {};
            return (
                <div style={{display:'grid',gap:6}}>
                    <div style={{display:'flex',flexWrap:'wrap',gap:8,fontSize:11,color:'var(--text-muted)'}}>
                        <span>inventory {trace.inventory_lang || 'unknown'}</span>
                        <span>frames {trace.output_frames ?? '—'}</span>
                        <span>seconds {typeof trace.original_seconds === 'number' ? trace.original_seconds.toFixed(2) : '—'}</span>
                        <span>total {typeof timing.total === 'number' ? `${timing.total.toFixed(1)}ms` : '—'}</span>
                    </div>
                    <div style={{fontFamily:'monospace',fontSize:12,color:'var(--accent)',lineHeight:1.5,wordBreak:'break-word'}}>
                        {trace.phones || '—'}
                    </div>
                </div>
            );
        }

        function useHash() {
            const [hash, setHash] = useState(window.location.hash || '#/');
            useEffect(() => {const h = () => setHash(window.location.hash || '#/'); window.addEventListener('hashchange', h); return () => window.removeEventListener('hashchange', h);}, []);
            return hash;
        }

        // ==================== TTS ====================
        let _ttsAbort = null;
        async function fetchTtsBuffer(text, backend) {
            // Abort any previous in-flight TTS request
            if (_ttsAbort) { _ttsAbort.abort(); }
            const controller = new AbortController();
            _ttsAbort = controller;
            const body = {text};
            if (backend) body.backend = backend;
            const res = await fetch('/api/tts/preview', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
                signal: controller.signal,
            });
            if (!res.ok) throw new Error(`TTS ${res.status}: ${await res.text()}`);
            const arrayBuf = await res.arrayBuffer();
            const audioBuf = await audioCtx.decodeAudioData(arrayBuf);
            return audioBuf;
        }

        async function fetchTtsPhonemeBuffer(phonemes, backend='kokoro') {
            if (_ttsAbort) { _ttsAbort.abort(); }
            const controller = new AbortController();
            _ttsAbort = controller;
            const res = await fetch('/api/tts/preview-phonemes', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phonemes, backend}),
                signal: controller.signal,
            });
            if (!res.ok) throw new Error(`TTS ${res.status}: ${await res.text()}`);
            const arrayBuf = await res.arrayBuffer();
            const audioBuf = await audioCtx.decodeAudioData(arrayBuf);
            return audioBuf;
        }

        async function fetchKokoroPhonemeText(phonemes) {
            const res = await fetch('/api/tts/convert-kokoro-phonemes', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({phonemes}),
            });
            if (!res.ok) throw new Error(`Kokoro convert ${res.status}: ${await res.text()}`);
            return res.json();
        }

        // TTS + forced alignment in one shot. Returns { audioBuf, alignment }.
        // alignment is [{word, start, end}, ...] with times in seconds.
        async function fetchTtsAligned(spokenText, backend, alignText) {
            const body = {text: spokenText, align_text: alignText};
            if (backend) body.backend = backend;
            const res = await fetch('/api/tts/preview', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            });
            if (!res.ok) throw new Error(`TTS ${res.status}: ${await res.text()}`);
            const data = await res.json();
            const binaryStr = atob(data.audio_b64);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
            const audioBuf = await audioCtx.decodeAudioData(bytes.buffer);
            return {audioBuf, alignment: data.alignment};
        }

        let _currentSource = null;
        let _remoteAudio = null;
        function stopPlayback() {
            if (_currentSource) { try { _currentSource.stop(); } catch {} _currentSource = null; }
            if (_remoteAudio) {
                try { _remoteAudio.pause(); } catch {}
                _remoteAudio = null;
            }
        }
        function playBuffer(audioBuf, onEnd) {
            stopPlayback();
            const source = audioCtx.createBufferSource();
            source.buffer = audioBuf;
            source.connect(audioCtx.destination);
            source.onended = () => { _currentSource = null; if (onEnd) onEnd(); };
            source.start();
            _currentSource = source;
            return source;
        }

        const IPA_LIBRARY = {

            'ə': {desc:'mid central vowel; the schwa from "about"', slug:'Mid-central_vowel'},

            'ɽ': {desc:'retroflex flap', slug:'Retroflex_flap'},
            'ɸ': {desc:'voiceless bilabial fricative', slug:'Voiceless_bilabial_fricative'},
            'β': {desc:'voiced bilabial fricative', slug:'Voiced_bilabial_fricative'},
            'f': {desc:'voiceless labiodental fricative; the f sound from "fine"', slug:'Voiceless_labiodental_fricative'},

            'z': {desc:'voiced alveolar fricative; the z sound from "zoo"', slug:'Voiced_alveolar_fricative'},
            'ʃ': {desc:'voiceless postalveolar fricative; the sh sound from "shoe"', slug:'Voiceless_postalveolar_fricative'},

            'ɬ': {desc:'voiceless alveolar lateral fricative', slug:'Voiceless_alveolar_lateral_fricative'},
            'ɮ': {desc:'voiced alveolar lateral fricative', slug:'Voiced_alveolar_lateral_fricative'},

            'j': {desc:'palatal approximant; the y sound from "yes"', slug:'Palatal_approximant'},
            'ɰ': {desc:'velar approximant', slug:'Velar_approximant'},
            'l': {desc:'alveolar lateral approximant; the l sound from "light"', slug:'Alveolar_lateral_approximant'},
            'ɭ': {desc:'retroflex lateral approximant', slug:'Retroflex_lateral_approximant'},
            'ʎ': {desc:'palatal lateral approximant', slug:'Palatal_lateral_approximant'},
            'ʟ': {desc:'velar lateral approximant', slug:'Velar_lateral_approximant'},
            'tʃ': {desc:'the ch sound from "church"'},
            'dʒ': {desc:'the j sound from "judge"'},
            'aɪ': {desc:'the eye sound from "price"'},
            'aʊ': {desc:'the ow sound from "mouth"'},
            'eɪ': {desc:'the ay sound from "face"'},
            'oʊ': {desc:'the oh sound from "goat"'},
            'ɔɪ': {desc:'the oy sound from "choice"'},
            'ɚ': {desc:'r-colored schwa; the weak er sound from American "butter"'},
            'ɝ': {desc:'stressed r-colored vowel; the er sound from "nurse"'},

            'ˈ': {desc:'primary stress: this syllable is stressed'},
            'ˌ': {desc:'secondary stress: a lighter stress mark'},
        };

        const IPA_KEYBOARD_GROUPS = [
            {
                title: 'Vowels',
                rows: [
                    ['i','ɪ','e','ɛ','æ','a','ɑ','ɒ'],
                    ['ə','ɜ','ɐ','ʌ','ɔ','o','ʊ','u'],
                    ['ɨ','ʉ','ɯ','ø','œ'],
                ],
            },
            {
                title: 'Consonants',
                rows: [
                    ['p','b','t','d','k','g'],
                    ['f','v','θ','ð','s','z','ʃ','ʒ','h'],
                    ['m','n','ŋ','l','ɹ','r','j','w'],
                    ['tʃ','dʒ','ʔ','ɾ','x','ç','ʁ'],
                ],
            },
            {
                title: 'Stress & Length',
                rows: [
                    ['ˈ','ˌ','ː'],
                ],
            },
        ];

        const IPA_FONT_STACK = "'Manuale IPA Web', 'Manuale IPA', 'Charis SIL', 'Gentium Plus', serif";

        function ipaInfo(token) {
            if (!token) return null;
            if (IPA_LIBRARY[token]) return IPA_LIBRARY[token];
            const stripped = token.replace(/[ˈˌː]/g, '');
            if (IPA_LIBRARY[stripped]) return IPA_LIBRARY[stripped];
            return null;
        }

        function ipaDescription(token) {
            const info = ipaInfo(token);
            return info ? info.desc : `No guide entry yet for ${token}`;
        }

        function ipaAudioUrl(token) {
            const info = ipaInfo(token);
            return info?.slug ? `https://www.ipachart.com/mp3/${info.slug}.mp3` : null;
        }

        async function playIpaReference(token) {
            const url = ipaAudioUrl(token);
            if (!url) return false;
            stopPlayback();
            const audio = new Audio(url);
            _remoteAudio = audio;
            await audio.play();
            return true;
        }

        function tokenizeIpa(text) {
            return String(text || '')
                .replace(/▁/g, ' ')
                .trim()
                .split(/\s+/)
                .filter(token => token && token !== '_' && token !== '▁');
        }

        async function decodeIpaFromWav(wavBytes) {
            const res = await fetch('/api/ipa/decode', {
                method: 'POST',
                headers: {'Content-Type': 'audio/wav'},
                body: wavBytes,
            });
            if (!res.ok) throw new Error(`IPA decode ${res.status}: ${await res.text()}`);
            return res.json();
        }

        async function suggestIpaFromTts(text, backend='openai') {
            const res = await fetch('/api/ipa/suggest-tts', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text, backend}),
            });
            if (!res.ok) throw new Error(`IPA suggest ${res.status}: ${await res.text()}`);
            return res.json();
        }

        async function suggestIpaFromEspeak(text, lang='en') {
            const res = await fetch('/api/ipa/suggest-espeak', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({text, backend: lang}),
            });
            if (!res.ok) throw new Error(`IPA suggest ${res.status}: ${await res.text()}`);
            return res.json();
        }

        async function decodeBase64WavToAudioBuffer(audioB64) {
            const binaryStr = atob(audioB64);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
            return await audioCtx.decodeAudioData(bytes.buffer);
        }

        function IpaTokenGloss({text}) {
            const tokens = useMemo(() => tokenizeIpa(text), [text]);
            const [selected, setSelected] = useState(tokens[0] || null);
            const [audioError, setAudioError] = useState(null);
            useEffect(() => { setSelected(tokens[0] || null); }, [text]);
            if (!tokens.length) {
                return <div style={{fontSize:12,color:'var(--text-muted)'}}>No IPA yet.</div>;
            }
            return (
                <div style={{display:'grid',gap:6}}>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                        {tokens.map((token, idx) => (
                            <button
                                type="button"
                                key={`${token}-${idx}`}
                                className="btn btn-sm"
                                title={ipaDescription(token)}
                                onClick={async () => {
                                    setSelected(token);
                                    setAudioError(null);
                                    if (!ipaAudioUrl(token)) return;
                                    try {
                                        await playIpaReference(token);
                                    } catch (e) {
                                        setAudioError(e.message || 'Failed to play IPA sample');
                                    }
                                }}
                                style={{
                                    fontFamily: IPA_FONT_STACK,
                                    color:selected === token ? 'var(--bg)' : 'var(--accent)',
                                    background:selected === token ? 'var(--accent)' : 'rgba(255,255,255,0.03)',
                                    borderColor:'var(--border)',
                                    fontSize: 20,
                                    lineHeight: 1.05,
                                }}
                            >
                                {token}
                            </button>
                        ))}
                    </div>
                    <div style={{fontSize:12,color:'var(--text-muted)'}}>
                        {selected ? `${selected}: ${ipaDescription(selected)}` : 'Click a phoneme for help.'}
                    </div>
                    {audioError && <div className="pipeline-error">{audioError}</div>}
                </div>
            );
        }

        function KokoroPhonemeCompare({ipaText}) {
            const [kokoroText, setKokoroText] = useState('');
            const [error, setError] = useState(null);
            const trimmed = String(ipaText || '').trim();

            useEffect(() => {
                let cancelled = false;
                if (!trimmed) {
                    setKokoroText('');
                    setError(null);
                    return;
                }
                fetchKokoroPhonemeText(trimmed)
                    .then(data => {
                        if (cancelled) return;
                        setKokoroText(String(data.kokoro || ''));
                        setError(null);
                    })
                    .catch(e => {
                        if (cancelled) return;
                        setKokoroText('');
                        setError(e.message || 'failed to convert');
                    });
                return () => { cancelled = true; };
            }, [trimmed]);

            if (!trimmed) return null;
            if (error) {
                return <div style={{fontSize:12,color:'var(--error)'}}>Kokoro phonemes: {error}</div>;
            }
            if (!kokoroText) return null;
            return (
                <div style={{fontSize:12,color:'var(--text-muted)',display:'flex',gap:8,alignItems:'baseline',flexWrap:'wrap'}}>
                    <span style={{textTransform:'uppercase',letterSpacing:'0.04em'}}>Kokoro phonemes</span>
                    <span style={{fontFamily: IPA_FONT_STACK, color:'var(--accent)', fontSize:18, lineHeight:1.05}}>{kokoroText}</span>
                </div>
            );
        }

        function IpaSuggestionReadout({ipaText, rawText=null, normalizedLabel='Normalized IPA', rawLabel='Raw IPA'}) {
            const trimmed = String(ipaText || '').trim();
            if (!trimmed) return null;
            const raw = String(rawText || '').trim();
            const showRaw = raw && raw !== trimmed;
            return (
                <div style={{display:'grid',gap:8}}>
                    <div style={{display:'grid',gap:4}}>
                        <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em'}}>
                            {showRaw ? normalizedLabel : 'IPA'}
                        </div>
                        <div style={{
                            fontFamily: IPA_FONT_STACK,
                            color:'var(--accent)',
                            fontSize:28,
                            lineHeight:1.08,
                            letterSpacing:'0.01em',
                            wordBreak:'break-word',
                        }}>
                            {trimmed}
                        </div>
                    </div>
                    {showRaw && (
                        <div style={{display:'grid',gap:4}}>
                            <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em'}}>
                                {rawLabel}
                            </div>
                            <div style={{
                                fontFamily: IPA_FONT_STACK,
                                color:'var(--text-muted)',
                                fontSize:22,
                                lineHeight:1.08,
                                wordBreak:'break-word',
                            }}>
                                {raw}
                            </div>
                        </div>
                    )}
                    <details style={{fontSize:12,color:'var(--text-muted)'}}>
                        <summary style={{cursor:'pointer',userSelect:'none'}}>Inspect tokens and Kokoro mapping</summary>
                        <div style={{display:'grid',gap:8,marginTop:8}}>
                            <KokoroPhonemeCompare ipaText={trimmed} />
                            <IpaTokenGloss text={trimmed} />
                        </div>
                    </details>
                </div>
            );
        }

        function IpaWorkbench({value, onChange, previewText, placeholder='reviewed IPA', onUseVersion=null}) {
            const [recording, setRecording] = useState(false);
            const [busy, setBusy] = useState(false);
            const [playing, setPlaying] = useState(false);
            const [playingKey, setPlayingKey] = useState(null);
            const [inputFocused, setInputFocused] = useState(false);
            const [decodedZipa, setDecodedZipa] = useState('');
            const [decodedZipaNs700k, setDecodedZipaNs700k] = useState('');
            const [decodedZipaRaw, setDecodedZipaRaw] = useState('');
            const [decodedZipaNs700kRaw, setDecodedZipaNs700kRaw] = useState('');
            const [decodedTtsZipa, setDecodedTtsZipa] = useState('');
            const [decodedTtsZipaNs700k, setDecodedTtsZipaNs700k] = useState('');
            const [decodedTtsZipaRaw, setDecodedTtsZipaRaw] = useState('');
            const [decodedTtsZipaNs700kRaw, setDecodedTtsZipaNs700kRaw] = useState('');
            const [decodedPocketZipa, setDecodedPocketZipa] = useState('');
            const [decodedPocketZipaNs700k, setDecodedPocketZipaNs700k] = useState('');
            const [decodedPocketZipaRaw, setDecodedPocketZipaRaw] = useState('');
            const [decodedPocketZipaNs700kRaw, setDecodedPocketZipaNs700kRaw] = useState('');
            const [decodedEspeakIpa, setDecodedEspeakIpa] = useState('');
            const [zipaElapsedMs, setZipaElapsedMs] = useState(null);
            const [zipaNs700kElapsedMs, setZipaNs700kElapsedMs] = useState(null);
            const [ttsElapsedMs, setTtsElapsedMs] = useState(null);
            const [ttsZipaElapsedMs, setTtsZipaElapsedMs] = useState(null);
            const [ttsZipaNs700kElapsedMs, setTtsZipaNs700kElapsedMs] = useState(null);
            const [pocketElapsedMs, setPocketElapsedMs] = useState(null);
            const [pocketZipaElapsedMs, setPocketZipaElapsedMs] = useState(null);
            const [pocketZipaNs700kElapsedMs, setPocketZipaNs700kElapsedMs] = useState(null);
            const [espeakElapsedMs, setEspeakElapsedMs] = useState(null);
            const [ttsSuggestedAudioB64, setTtsSuggestedAudioB64] = useState(null);
            const [pocketSuggestedAudioB64, setPocketSuggestedAudioB64] = useState(null);
            const [decodeError, setDecodeError] = useState(null);
            const [zipaTrace, setZipaTrace] = useState(null);
            const [zipaNs700kTrace, setZipaNs700kTrace] = useState(null);
            const [ttsZipaTrace, setTtsZipaTrace] = useState(null);
            const [ttsZipaNs700kTrace, setTtsZipaNs700kTrace] = useState(null);
            const [pocketZipaTrace, setPocketZipaTrace] = useState(null);
            const [pocketZipaNs700kTrace, setPocketZipaNs700kTrace] = useState(null);
            const [keyboardHover, setKeyboardHover] = useState(null);
            const recorderRef = useRef(null);
            const inputRef = useRef(null);
            const workbenchRef = useRef(null);
            const previewTimeoutRef = useRef(null);
            const autoPreviewTickRef = useRef(0);
            const [autoPreviewTick, setAutoPreviewTick] = useState(0);
            const ipaInputStyle = {
                padding:'8px 10px',
                background:'var(--bg)',
                border:'1px solid var(--border)',
                borderRadius:8,
                color:'var(--text)',
                fontFamily: IPA_FONT_STACK,
                fontSize:24,
                lineHeight: 1.1,
            };
            const playButtonStyle = {
                minWidth: 116,
                justifyContent:'center',
                gap:8,
                opacity: playing ? 0.72 : 1,
            };
            const spinnerStyle = {
                width:12,
                height:12,
                border:'2px solid currentColor',
                borderTopColor:'transparent',
                borderRadius:'50%',
                animation:'spin 0.8s linear infinite',
                flex:'0 0 auto',
            };

            const stopRecording = async (options = {}) => {
                if (recorderRef.current && recorderRef.current.state !== 'inactive') {
                    const recorder = recorderRef.current;
                    recorderRef.current = null;
                    await recorder.stop(options);
                }
                setRecording(false);
            };

            const queueAutoPreview = () => {
                autoPreviewTickRef.current += 1;
                setAutoPreviewTick(autoPreviewTickRef.current);
            };

            const keepInputFocus = (e) => {
                e.preventDefault();
                if (inputRef.current) {
                    inputRef.current.focus();
                }
                setInputFocused(true);
            };

            const stopCurrentPreview = () => {
                stopPlayback();
                setPlaying(false);
                setPlayingKey(null);
            };

            const startPreview = async (key, runner) => {
                if (playing && playingKey === key) {
                    stopCurrentPreview();
                    return;
                }
                try {
                    stopPlayback();
                    setPlaying(true);
                    setPlayingKey(key);
                    const buf = await runner();
                    if (!buf) {
                        setPlaying(false);
                        setPlayingKey(null);
                        return;
                    }
                    playBuffer(buf, () => {
                        setPlaying(false);
                        setPlayingKey(current => current === key ? null : current);
                    });
                } catch (e) {
                    const message = String(e?.message || e || '');
                    if (!(e?.name === 'AbortError' || message.includes('signal is aborted'))) {
                        setDecodeError(e.message || String(e));
                    }
                    setPlaying(false);
                    setPlayingKey(null);
                }
            };

            const renderPlayButton = (key, label, title, onPlay, disabled=false) => {
                const active = playing && playingKey === key;
                return (
                    <button
                        type="button"
                        className="btn btn-sm"
                        disabled={disabled || (playing && !active)}
                        onClick={() => active ? stopCurrentPreview() : onPlay()}
                        title={title}
                        style={playButtonStyle}
                    >
                        <span style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:12}}>
                            {active ? <span style={spinnerStyle} /> : <span style={{fontSize:11,lineHeight:1}}>▶</span>}
                        </span>
                        <span>{label}</span>
                    </button>
                );
            };

            const startRecording = async () => {
                try {
                    setDecodeError(null);
                    const recorder = await startMonoWavRecording(async ({wavBytes}) => {
                        try {
                            setBusy(true);
                            const data = await decodeIpaFromWav(wavBytes);
                            setDecodedZipa(data.zipa?.phones || data.phones || '');
                            setDecodedZipaNs700k(data.zipa_300k?.phones || '');
                            setDecodedZipaRaw(data.zipa?.raw_phones || '');
                            setDecodedZipaNs700kRaw(data.zipa_300k?.raw_phones || '');
                            setZipaElapsedMs(Number.isFinite(data.zipa?.elapsed_ms) ? data.zipa.elapsed_ms : null);
                            setZipaNs700kElapsedMs(Number.isFinite(data.zipa_300k?.elapsed_ms) ? data.zipa_300k.elapsed_ms : null);
                            setZipaTrace(data.zipa?.trace || null);
                            setZipaNs700kTrace(data.zipa_300k?.trace || null);
                        } catch (e) {
                            setDecodeError(e.message);
                        } finally {
                            setBusy(false);
                            setRecording(false);
                        }
                    });
                    recorderRef.current = recorder;
                    setRecording(true);
                } catch (e) {
                    setDecodeError('Microphone access denied');
                }
            };

            const suggestFromTts = async () => {
                const text = String(previewText || '').trim();
                if (!text) {
                    setDecodeError('No spoken text available for OpenAI+ZIPA suggestion');
                    return;
                }
                try {
                    setBusy(true);
                    setDecodeError(null);
                    const data = await suggestIpaFromTts(text, 'openai');
                    setDecodedTtsZipa(data.zipa?.phones || '');
                    setDecodedTtsZipaNs700k(data.zipa_300k?.phones || '');
                    setDecodedTtsZipaRaw(data.zipa?.raw_phones || '');
                    setDecodedTtsZipaNs700kRaw(data.zipa_300k?.raw_phones || '');
                    setTtsElapsedMs(Number.isFinite(data.tts_elapsed_ms) ? data.tts_elapsed_ms : null);
                    setTtsZipaElapsedMs(Number.isFinite(data.zipa?.elapsed_ms) ? data.zipa.elapsed_ms : null);
                    setTtsZipaNs700kElapsedMs(Number.isFinite(data.zipa_300k?.elapsed_ms) ? data.zipa_300k.elapsed_ms : null);
                    setTtsSuggestedAudioB64(data.tts_audio_b64 || null);
                    setTtsZipaTrace(data.zipa?.trace || null);
                    setTtsZipaNs700kTrace(data.zipa_300k?.trace || null);
                    const suggested = String(data.zipa?.phones || data.zipa_300k?.phones || '').trim();
                    if (suggested) {
                        previewKokoro(suggested);
                    }
                } catch (e) {
                    setDecodeError(e.message);
                } finally {
                    setBusy(false);
                }
            };

            const suggestFromPocketTts = async () => {
                const text = String(previewText || '').trim();
                if (!text) {
                    setDecodeError('No spoken text available for Pocket+ZIPA suggestion');
                    return;
                }
                try {
                    setBusy(true);
                    setDecodeError(null);
                    const data = await suggestIpaFromTts(text, 'pocket-hq');
                    setDecodedPocketZipa(data.zipa?.phones || '');
                    setDecodedPocketZipaNs700k(data.zipa_300k?.phones || '');
                    setDecodedPocketZipaRaw(data.zipa?.raw_phones || '');
                    setDecodedPocketZipaNs700kRaw(data.zipa_300k?.raw_phones || '');
                    setPocketElapsedMs(Number.isFinite(data.tts_elapsed_ms) ? data.tts_elapsed_ms : null);
                    setPocketZipaElapsedMs(Number.isFinite(data.zipa?.elapsed_ms) ? data.zipa.elapsed_ms : null);
                    setPocketZipaNs700kElapsedMs(Number.isFinite(data.zipa_300k?.elapsed_ms) ? data.zipa_300k.elapsed_ms : null);
                    setPocketSuggestedAudioB64(data.tts_audio_b64 || null);
                    setPocketZipaTrace(data.zipa?.trace || null);
                    setPocketZipaNs700kTrace(data.zipa_300k?.trace || null);
                    const suggested = String(data.zipa?.phones || data.zipa_300k?.phones || '').trim();
                    if (suggested) {
                        previewKokoro(suggested);
                    }
                } catch (e) {
                    setDecodeError(e.message);
                } finally {
                    setBusy(false);
                }
            };

            const suggestFromEspeak = async () => {
                const text = String(previewText || '').trim();
                if (!text) {
                    setDecodeError('No spoken text available for eSpeak suggestion');
                    return;
                }
                try {
                    setBusy(true);
                    setDecodeError(null);
                    const data = await suggestIpaFromEspeak(text, 'en');
                    setDecodedEspeakIpa(String(data.ipa || '').trim());
                    setEspeakElapsedMs(Number.isFinite(data.elapsed_ms) ? data.elapsed_ms : null);
                    const suggested = String(data.ipa || '').trim();
                    if (suggested) {
                        previewKokoro(suggested);
                    }
                } catch (e) {
                    setDecodeError(e.message);
                } finally {
                    setBusy(false);
                }
            };

            useEffect(() => () => {
                if (previewTimeoutRef.current) clearTimeout(previewTimeoutRef.current);
            }, []);

            const previewKokoro = async (phonemeOverride = null) => {
                const phonemes = String(phonemeOverride ?? value ?? '').trim();
                if (!phonemes) return;
                return startPreview(`kokoro:${phonemes}`, () => fetchTtsPhonemeBuffer(phonemes, 'kokoro'));
            };

            const previewEspeak = async (phonemeOverride = null) => {
                const phonemes = String(phonemeOverride ?? value ?? '').trim();
                if (!phonemes) return;
                return startPreview(`espeak:${phonemes}`, () => fetchTtsPhonemeBuffer(phonemes, 'espeak-ng'));
            };

            const previewSuggestedTts = async () => {
                if (!ttsSuggestedAudioB64) return;
                return startPreview('tts:openai', async () => await decodeBase64WavToAudioBuffer(ttsSuggestedAudioB64));
            };

            const previewSuggestedPocket = async () => {
                if (!pocketSuggestedAudioB64) return;
                return startPreview('tts:pocket', async () => await decodeBase64WavToAudioBuffer(pocketSuggestedAudioB64));
            };

            const reviewedIpa = String(value || '').trim();

            useEffect(() => {
                if (!inputFocused) return;
                if (!reviewedIpa) return;
                if (!autoPreviewTick) return;
                if (previewTimeoutRef.current) clearTimeout(previewTimeoutRef.current);
                previewTimeoutRef.current = setTimeout(() => {
                    previewKokoro(reviewedIpa);
                }, 220);
                return () => {
                    if (previewTimeoutRef.current) clearTimeout(previewTimeoutRef.current);
                };
            }, [reviewedIpa, inputFocused, autoPreviewTick]);

            const setCursor = (pos) => {
                requestAnimationFrame(() => {
                    const input = inputRef.current;
                    if (!input) return;
                    input.focus();
                    input.setSelectionRange(pos, pos);
                });
            };

            const insertTextAtCursor = (text) => {
                const input = inputRef.current;
                const current = String(value || '');
                if (!input) {
                    onChange(`${current}${text}`);
                    return;
                }
                const start = input.selectionStart ?? current.length;
                const end = input.selectionEnd ?? start;
                const next = `${current.slice(0, start)}${text}${current.slice(end)}`;
                onChange(next);
                setCursor(start + text.length);
                queueAutoPreview();
            };

            const insertToken = (token) => {
                const input = inputRef.current;
                const current = String(value || '');
                const start = input?.selectionStart ?? current.length;
                const end = input?.selectionEnd ?? start;
                const before = current.slice(0, start);
                const after = current.slice(end);
                const prefix = before.length > 0 && !before.endsWith(' ') ? ' ' : '';
                const suffix = after.length > 0 && !after.startsWith(' ') ? ' ' : '';
                const next = `${before}${prefix}${token}${suffix}${after}`;
                onChange(next);
                setCursor(before.length + prefix.length + token.length);
                queueAutoPreview();
            };

            const useVersion = async (phonemes) => {
                onChange(phonemes);
            };

            const backspaceToken = () => {
                const input = inputRef.current;
                const current = String(value || '');
                if (!input) {
                    const tokens = tokenizeIpa(value);
                    if (!tokens.length) return;
                    onChange(tokens.slice(0, -1).join(' '));
                    return;
                }
                const start = input.selectionStart ?? current.length;
                const end = input.selectionEnd ?? start;
                if (start !== end) {
                    const next = `${current.slice(0, start)}${current.slice(end)}`;
                    onChange(next);
                    setCursor(start);
                    queueAutoPreview();
                    return;
                }
                if (start === 0) return;
                let cutStart = start;
                while (cutStart > 0 && current[cutStart - 1] === ' ') cutStart -= 1;
                while (cutStart > 0 && current[cutStart - 1] !== ' ') cutStart -= 1;
                const next = `${current.slice(0, cutStart)}${current.slice(start)}`;
                onChange(next);
                setCursor(cutStart);
                queueAutoPreview();
            };

            return (
                <div ref={workbenchRef} style={{display:'grid',gap:10}}>
                    <div style={{position:'relative'}}>
                        <div style={{display:'grid',gridTemplateColumns:'minmax(0,1fr) auto auto',gap:8,alignItems:'center'}}>
                            <input
                                ref={inputRef}
                                value={value}
                                onChange={e => {
                                    onChange(e.target.value);
                                    queueAutoPreview();
                                }}
                                onFocus={() => setInputFocused(true)}
                                onBlur={e => {
                                    const next = e.relatedTarget;
                                    if (next && workbenchRef.current && workbenchRef.current.contains(next)) {
                                        return;
                                    }
                                    setInputFocused(false);
                                }}
                                placeholder={placeholder}
                                style={{...ipaInputStyle, minWidth:0}}
                            />
                            {renderPlayButton('reviewed:kokoro', 'Play', 'Play the current reviewed IPA through Kokoro', () => previewKokoro(reviewedIpa), !reviewedIpa)}
                        </div>
                        {inputFocused && (
                            <div style={{
                                position:'absolute',
                                left:0,
                                top:'calc(100% + 8px)',
                                zIndex:40,
                                width:'min(760px, 100%)',
                                maxWidth:'calc(100vw - 64px)',
                                display:'grid',
                                gap:6,
                                padding:12,
                                border:'1px solid var(--border)',
                                borderRadius:12,
                                background:'rgba(20,24,32,0.98)',
                                boxShadow:'0 18px 40px rgba(0,0,0,0.35)',
                                backdropFilter:'blur(8px)',
                            }}>
                                <div style={{display:'grid',gridTemplateColumns:'minmax(0,1fr) minmax(0,1fr)',gap:12,alignItems:'start'}}>
                                    {IPA_KEYBOARD_GROUPS.map(group => (
                                        <div key={group.title} style={{display:'grid',gap:6}}>
                                            <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em'}}>
                                                {group.title}
                                            </div>
                                            {group.rows.map((row, rowIdx) => (
                                                <div key={`${group.title}-${rowIdx}`} style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                                                    {row.map(token => (
                                                        <button
                                                            key={token}
                                                            type="button"
                                                            className="btn btn-sm"
                                                            title={ipaDescription(token)}
                                                            aria-label={`${token}: ${ipaDescription(token)}`}
                                                            onMouseDown={keepInputFocus}
                                                            onClick={() => insertToken(token)}
                                                            onMouseEnter={() => setKeyboardHover(token)}
                                                            onMouseLeave={() => setKeyboardHover(current => current === token ? null : current)}
                                                            style={{fontFamily: IPA_FONT_STACK, color:'var(--accent)', fontSize: 18, lineHeight: 1.05}}
                                                        >
                                                            {token}
                                                        </button>
                                                    ))}
                                                </div>
                                            ))}
                                        </div>
                                    ))}
                                </div>
                                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                                    <button type="button" className="btn btn-sm" onMouseDown={keepInputFocus} onClick={() => insertTextAtCursor(' ')} title="Insert a token separator">
                                        Space
                                    </button>
                                    <button type="button" className="btn btn-sm" onMouseDown={keepInputFocus} onClick={backspaceToken} title="Remove the token before the cursor">
                                        Backspace
                                    </button>
                                    <button type="button" className="btn btn-sm" onMouseDown={keepInputFocus} onClick={() => { onChange(''); queueAutoPreview(); }} title="Clear the reviewed IPA field">
                                        Clear
                                    </button>
                                </div>
                                {keyboardHover && (
                                    <div style={{fontSize:12,color:'var(--text-muted)'}}>
                                        {keyboardHover}: {ipaDescription(keyboardHover)}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                    <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                        <button
                            type="button"
                            className={`btn btn-sm ${recording ? 'btn-primary' : ''}`}
                            disabled={busy}
                            onClick={recording ? stopRecording : startRecording}
                            title="Record your pronunciation and decode it with both phone decoders"
                        >
                            {busy ? 'Decoding...' : recording ? 'Stop' : 'Record'}
                        </button>
                        <button
                            type="button"
                            className="btn btn-sm"
                            disabled={busy || !String(previewText || '').trim()}
                            onClick={suggestFromTts}
                            title="Synthesize the spoken text with OpenAI TTS, run ZIPA on it, and offer that IPA when you cannot record"
                        >
                            Suggest via OpenAI+ZIPA
                        </button>
                        <button
                            type="button"
                            className="btn btn-sm"
                            disabled={busy || !String(previewText || '').trim()}
                            onClick={suggestFromPocketTts}
                            title="Synthesize the spoken text with pocket-tts, run ZIPA on it, and offer that IPA as another silent suggestion"
                        >
                            Suggest via Pocket+ZIPA
                        </button>
                        <button
                            type="button"
                            className="btn btn-sm"
                            disabled={busy || !String(previewText || '').trim()}
                            onClick={suggestFromEspeak}
                            title="Use eSpeak-ng text-to-IPA directly for a text-only IPA suggestion"
                        >
                            Suggest via eSpeak
                        </button>
                    </div>
                    {decodeError && <div className="pipeline-error">{decodeError}</div>}
                    {(decodedZipa || decodedZipaNs700k || decodedTtsZipa || decodedTtsZipaNs700k || decodedPocketZipa || decodedPocketZipaNs700k || decodedEspeakIpa) && (
                        <div style={{display:'grid',gap:10}}>
                            {decodedEspeakIpa && (
                                <div style={{display:'grid',gap:6}}>
                                    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,flexWrap:'wrap'}}>
                                        <div style={{display:'flex',alignItems:'baseline',gap:8,flexWrap:'wrap'}}>
                                            <div style={{fontSize:12,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em'}}>eSpeak</div>
                                            {espeakElapsedMs != null && (
                                                <div style={{fontSize:12,color:'var(--text-muted)'}}>{espeakElapsedMs}ms</div>
                                            )}
                                        </div>
                                        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                                            {renderPlayButton('espeak-suggest:kokoro', 'Play', 'Play the eSpeak IPA through Kokoro', () => previewKokoro(decodedEspeakIpa), !decodedEspeakIpa)}
                                            <button
                                                type="button"
                                                className="btn btn-sm"
                                                onClick={() => useVersion(decodedEspeakIpa)}
                                                title="Copy the eSpeak IPA into the reviewed field"

        function scrollToCorpusSection(id) {
