            const [error, setError] = useState(null);
            const [busy, setBusy] = useState(null); // null or string describing what's happening
            const [editingText, setEditingText] = useState(null); // non-null = editing sentence text
            const [audioBuf, setAudioBuf] = useState(null);
            const [activeWord, setActiveWord] = useState(null);
            const [playing, setPlaying] = useState(false);
            const sourceRef = useRef(null);
            const playStartTimeRef = useRef(null); // audioCtx.currentTime when playback started
            const playOffsetRef = useRef(0);       // offset into buffer (seconds) where we started

            const [editingWord, setEditingWord] = useState(null);
            const [editSpoken, setEditSpoken] = useState('');
            const editManualRef = useRef(false); // true when user typed in the input field
            const [editPreviewed, setEditPreviewed] = useState(false); // true after first Enter (TTS preview)
            const [previewBuf, setPreviewBuf] = useState(null);
            const [previewPlaying, setPreviewPlaying] = useState(false);
            const previewSourceRef = useRef(null);

            const [recording, setRecording] = useState(false);     // recording for vocab word
            const [sentenceRec, setSentenceRec] = useState(false); // recording the full sentence
            const [recordedBuf, setRecordedBuf] = useState(null);
            const [transcribing, setTranscribing] = useState(false);
            const [humanAsr, setHumanAsr] = useState(null); // {qwen, parakeet} from human recording
            const mediaRecorderRef = useRef(null);

            // Play audio buffer from a given offset (seconds)
            const playFrom = (buf, offset) => {
                if (sourceRef.current) try {sourceRef.current.stop();} catch (e) { }
                const source = audioCtx.createBufferSource();
                source.buffer = buf;
                source.connect(audioCtx.destination);
                source.onended = () => {
                    // Only mark as not-playing if this source is still the current one
                    if (sourceRef.current === source) {
                        setPlaying(false);
                        playOffsetRef.current = 0; // finished — reset to start
                        playStartTimeRef.current = null;
                    }
                };
                source.start(0, offset);
                sourceRef.current = source;
                playStartTimeRef.current = audioCtx.currentTime;
                playOffsetRef.current = offset;
                setPlaying(true);
            };

            // --- Load and apply review data from server ---
            const loadReview = async () => {
                setLoading(true);
                try {
                    const d = await api(`${apiBase}${isVocab ? '/current' : ''}`);
                    setData(d);
                    if (d.audio_b64) {
                        const buf = await decodeAudioB64(d.audio_b64);
                        setAudioBuf(buf);
                        playFrom(buf, 0);
                    } else {setAudioBuf(null);}
                } catch (e) {setError(e.message);}
                setLoading(false); setEditingWord(null); setActiveWord(null);
            };

            const applyReviewData = async (d) => {
                stopAudio(true); setData(d); setEditingWord(null); setActiveWord(null); setHumanAsr(null);
                if (d.audio_b64) {
                    const buf = await decodeAudioB64(d.audio_b64);
                    setAudioBuf(buf);
                    playFrom(buf, 0);
                } else {setAudioBuf(null);}
            };

            useEffect(() => {loadReview();}, []);

            const stopAudio = (resetPosition) => {
                if (playing && playStartTimeRef.current != null && !resetPosition) {
                    // Save current position for resume
                    playOffsetRef.current += audioCtx.currentTime - playStartTimeRef.current;
                }
                if (resetPosition) playOffsetRef.current = 0;
                if (sourceRef.current) try {sourceRef.current.stop();} catch (e) { }
                sourceRef.current = null;
                playStartTimeRef.current = null;
                setPlaying(false);
            };

            const stopPreview = () => {
                if (previewSourceRef.current) try {previewSourceRef.current.stop();} catch (e) { }
                setPreviewPlaying(false);
            };

            const togglePlayback = () => {
                if (!audioBuf) return;
                if (playing) {
                    // Pause
                    stopAudio(false);
                } else {
                    // Resume from saved position (or replay from start if at end)
                    const offset = playOffsetRef.current;
                    if (offset >= audioBuf.duration || offset <= 0) {
                        playFrom(audioBuf, 0); // replay from start
                    } else {
                        playFrom(audioBuf, offset); // resume
                    }
                }
            };

            // --- Actions: all server-side ---
            const act = async (action) => {
                if (busy) return;
                stopAudio();
                setBusy('Loading next...');
                try {
                    const body = isVocab ? JSON.stringify({id: data?.sentence?.id}) : undefined;
                    await api(`${apiBase}/${action}`, {method: 'POST', body});
                    const d = await api(`${apiBase}${isVocab ? '/current' : ''}`);
                    await applyReviewData(d);
                } catch (e) {setError(e.message); setTimeout(() => setError(null), 5000);}
                setBusy(null);
            };

            const switchBackend = async (backend) => {
                if (busy) return;
                setBusy(`Switching to ${backend}...`);
                stopAudio();
                try {
                    const d = await api(`${apiBase}/backend`, {
                        method: 'POST', body: JSON.stringify({backend}),
                    });
                    await applyReviewData(d);
                } catch (e) {setError(e.message); setTimeout(() => setError(null), 5000);}
                setBusy(null);
            };

            // --- Vocab editor ---
            const onWordClick = (word) => {
                const term = canonicalWord(word);
                if (term.length < 2) return;
                const original = word.replace(/^[^a-zA-Z0-9]+/, '').replace(/[^a-zA-Z0-9]+$/, '');
                setEditingWord(original);
                // In vocab mode, use the current spoken form (which includes any existing override)
                // In sentence mode, start from the lowercased word
                const currentSpoken = isVocab && sentence?.spoken ? sentence.spoken : original.toLowerCase();
                setEditSpoken(currentSpoken);
                setEditPreviewed(false);
                setPreviewBuf(null); setRecordedBuf(null);
                editManualRef.current = false;
                // Auto-start recording
                setTimeout(() => startRecording(), 50);
            };

            const saveVocabOverride = async () => {
                if (!editingWord) return;
                setBusy('Saving pronunciation...');
                stopAudio();
                try {
                    const d = await api(`${apiBase}/pronunciation`, {
                        method: 'POST', body: JSON.stringify({word: editingWord, spoken: editSpoken}),
                    });
                    await applyReviewData(d);
                } catch (e) {setError(`Save failed: ${e.message}`); setTimeout(() => setError(null), 5000);}
                setBusy(null);
            };

            const saveEditedText = async () => {
                if (editingText == null) return;
                setBusy('Updating sentence...');
                try {
                    const d = await api(`${apiBase}/text`, {
                        method: 'POST', body: JSON.stringify({text: editingText}),
                    });
                    setEditingText(null);
                    await applyReviewData(d);
                } catch (e) {setError(`Save failed: ${e.message}`); setTimeout(() => setError(null), 5000);}
                setBusy(null);
            };

            const previewVocabWord = () => {
                if (!editSpoken) return;
                stopPreview();
                fetchTtsBuffer(editSpoken, data?.backend).then(buf => {
                    setPreviewBuf(buf); setPreviewPlaying(true);
                    previewSourceRef.current = playBuffer(buf, () => setPreviewPlaying(false));
                }).catch(() => { });
            };

            // --- Recording ---
            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
                    const mediaRecorder = new MediaRecorder(stream, {mimeType: 'audio/webm'});
                    const chunks = [];
                    mediaRecorder.ondataavailable = (e) => {if (e.data.size > 0) chunks.push(e.data);};
                    mediaRecorder.onstop = async () => {
                        stream.getTracks().forEach(t => t.stop());
                        const blob = new Blob(chunks, {type: 'audio/webm'});
                        const arrayBuf = await blob.arrayBuffer();
                        try {
                            const decoded = await audioCtx.decodeAudioData(arrayBuf);
                            setRecordedBuf(decoded);
                            // Send to server ASR
                            setTranscribing(true);
                            const wavBytes = audioBufferToWav(decoded);
                            const res = await fetch('/api/asr/transcribe', {
                                method: 'POST',
                                headers: {'Content-Type': 'audio/wav'},
                                body: wavBytes,
                            });
                            if (res.ok) {
                                const {text} = await res.json();
                                if (text && !editManualRef.current) {
                                    setEditSpoken(text.trim().toLowerCase());
                                    // Auto-preview via TTS and mark as previewed so next Enter saves
                                    try {
                                        const buf = await fetchTtsBuffer(text.trim().toLowerCase(), data?.backend);
                                        stopPreview();
                                        setPreviewBuf(buf);
                                        setPreviewPlaying(true);
                                        previewSourceRef.current = playBuffer(buf, () => setPreviewPlaying(false));
                                        setEditPreviewed(true);
                                    } catch (e) { /* TTS preview failed, not critical */}
                                } else if (text && editManualRef.current) {
                                    // User typed something manually — don't overwrite, just mark ready to preview
                                    setEditPreviewed(false);
                                }
                            }
                            setTranscribing(false);
                        } catch (e) {
                            console.error('decode/transcribe error:', e);
                            setTranscribing(false);
                        }
                    };
                    mediaRecorderRef.current = mediaRecorder;
                    mediaRecorder.start();
                    setRecording(true);
                    setRecordedBuf(null);
                } catch (e) {
                    setError('Microphone access denied');
                    setTimeout(() => setError(null), 3000);
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                    mediaRecorderRef.current.stop();
                }
                setRecording(false);
                setSentenceRec(false);
            };

            // Record yourself saying the sentence → run both ASR models on your voice
            const startSentenceRecording = async () => {
                stopAudio(true);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
                    const mediaRecorder = new MediaRecorder(stream, {mimeType: 'audio/webm'});
                    const chunks = [];
                    mediaRecorder.ondataavailable = (e) => {if (e.data.size > 0) chunks.push(e.data);};
                    mediaRecorder.onstop = async () => {
                        stream.getTracks().forEach(t => t.stop());
                        setSentenceRec(false);
                        const blob = new Blob(chunks, {type: 'audio/webm'});
                        const arrayBuf = await blob.arrayBuffer();
                        try {
                            const decoded = await audioCtx.decodeAudioData(arrayBuf);
                            setTranscribing(true);
                            const wavBytes = audioBufferToWav(decoded);
                            const res = await fetch('/api/review/current/asr', {
                                method: 'POST', headers: {'Content-Type': 'audio/wav'}, body: wavBytes,
                            });
                            if (res.ok) {
                                const asr = await res.json();
                                setHumanAsr(asr);
                                // Switch to human audio for playback
                                if (asr.audio_b64) {
                                    const buf = await decodeAudioB64(asr.audio_b64);
                                    setAudioBuf(buf);
                                    playFrom(buf, 0);
                                }
                            }
                            setTranscribing(false);
                        } catch (e) {console.error(e); setTranscribing(false);}
                    };
                    mediaRecorderRef.current = mediaRecorder;
                    mediaRecorder.start();
                    setSentenceRec(true);
                } catch (e) {
                    setError('Microphone access denied');
                    setTimeout(() => setError(null), 3000);
                }
            };

            const toggleSentenceRecording = () => {
                if (sentenceRec) {stopRecording();}
                else {startSentenceRecording();}
            };

            // --- Derived state from server data ---
            const sentence = data?.sentence;
            const unknownWords = sentence?.unknown_words || [];
            const alignment = humanAsr?.alignment || data?.alignment || null;
            const backends = data?.backends || [];
            const activeBackend = data?.backend || 'pocket-hq';
            const progress = data?.progress || {};

            const orderedUnknowns = useMemo(() => {
                if (!unknownWords.length || !sentence) return [];
                const unknownSet = new Set(unknownWords.map(w => canonicalWord(w)));
                const ordered = [], seen = new Set();
                for (const w of sentence.text.split(/\s+/)) {
                    const clean = canonicalWord(w);
                    if (clean && unknownSet.has(clean) && !seen.has(clean)) {
                        seen.add(clean); ordered.push(w);
                    }
                }
                return ordered;
            }, [unknownWords, sentence]);

            // --- Keyboard ---
            useEffect(() => {
                const handler = (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    if (busy && e.key !== 'r' && e.key !== 'R') return;
                    if (e.key === 'ArrowRight' || e.key === 'o') {e.preventDefault(); act('approve');}
                    else if (e.key === 'ArrowLeft' || e.key === 'n') {e.preventDefault(); act('reject');}
                    else if (e.key === ' ') {e.preventDefault(); togglePlayback();}
                    else if ((e.key === 'r' || e.key === 'R') && !e.metaKey && !e.ctrlKey && !e.altKey) {e.preventDefault(); toggleSentenceRecording();}
                    else if ((e.key === 's' || e.key === 'S') && !e.metaKey && !e.ctrlKey && !e.altKey && !editingWord) {e.preventDefault(); switchBackend('pocket-hq');}
                    else if ((e.key === 'e' || e.key === 'E') && !e.metaKey && !e.ctrlKey && !e.altKey && !editingText && !editingWord) {
                        e.preventDefault(); setEditingText(sentence?.text || '');
                    }
                    else if (e.key >= '1' && e.key <= '9') {
                        const i = parseInt(e.key) - 1;
                        if (orderedUnknowns[i]) {
                            e.preventDefault();
                            if (recording && editingWord) {
                                // Already recording for a word — stop recording
                                stopRecording();
                            } else {
                                onWordClick(orderedUnknowns[i]);
                            }
                        }
                    }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, [data, audioBuf, playing, busy, sentenceRec, recording, editingText, editingWord, orderedUnknowns]);

            if (loading) return <div className="review-fullscreen"><div className="review-body"><p>Loading...</p></div></div>;

            if (!sentence) return (
                <div className="review-fullscreen">
                    <div className="review-body">
                        <div className="empty-state">
                            <h3>All done!</h3>
                            <p>No pending sentences to review.</p>
                            <a href="#/review" className="btn" style={{marginTop: 16}}>Back</a>
                        </div>
                    </div>
                </div>
            );

            const pct = progress.total > 0 ? (progress.reviewed / progress.total * 100) : 0;

            return (
                <div className="review-fullscreen">
                    <div className="review-topbar">
                        <div style={{display: 'flex', alignItems: 'center', gap: 16}}>
                            <a href="#/review" className="btn btn-sm">&larr; Exit</a>
                            <span style={{color: 'var(--text-muted)', fontSize: 14}}>{(progress.reviewed || 0) + 1} / {progress.total || 0}</span>
                        </div>
                        <div style={{flex: 1, maxWidth: 400, margin: '0 24px'}}>
                            <div className="progress-bar"><div className="fill" style={{width: `${pct}%`}}></div></div>
                        </div>
                        <span className="badge badge-pending">{progress.remaining || 0} remaining</span>
                        <div style={{display: 'flex', gap: 4, marginLeft: 16}}>
                            {backends.map(b => (
                                <button key={b}
                                    className={`btn btn-sm ${b === activeBackend ? 'btn-primary' : ''}`}
                                    onClick={() => switchBackend(b)}
                                    style={{minWidth: 60, fontSize: 12, padding: '2px 8px'}}>
                                    {b}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="review-body">
                        <div className="review-card">
                            <div style={{marginBottom: 24}}>
                                {editingText != null ? (
                                    <div style={{textAlign: 'center'}}>
                                        <input value={editingText} onChange={e => setEditingText(e.target.value)} autoFocus
                                            style={{width: '100%', maxWidth: 700, padding: '8px 12px', fontSize: 18, background: 'var(--bg)', border: '1px solid var(--accent)', borderRadius: 6, color: 'var(--text)', fontFamily: 'Jost,sans-serif', textAlign: 'center', outline: 'none'}}
                                            onKeyDown={e => {
                                                if (e.key === 'Enter') {e.preventDefault(); saveEditedText();}
                                                if (e.key === 'Escape') setEditingText(null);
                                            }} />
                                        <div style={{fontSize: 11, color: 'var(--text-muted)', marginTop: 4}}>Enter to save, Escape to cancel</div>
                                    </div>
                                ) : (
                                    <TranscriptGrid
                                        original={sentence.text}
                                        asr={data?.asr}
                                        humanAsr={humanAsr}
                                        activeWordIndex={activeWord}
                                        alignment={alignment}
                                        writtenAlignment={data?.written_alignment}
                                        unknownWords={unknownWords}
                                        onWordClick={onWordClick} />
                                )}
                                {sentenceRec && (
                                    <div style={{marginTop: 12, padding: '12px 16px', background: 'rgba(255,0,0,0.05)', border: '1px solid var(--danger)', borderRadius: 8, textAlign: 'center'}}>
                                        <div style={{fontSize: 18, lineHeight: 1.6, marginBottom: 8}}>{sentence.text}</div>
                                        <div style={{fontSize: 12, color: 'var(--danger)'}}>Recording... press R to stop</div>
                                    </div>
                                )}
                                {transcribing && <div style={{fontSize: 12, color: 'var(--accent)', marginTop: 4}}>Transcribing...</div>}
                            </div>

                            {audioBuf && <Waveform audioBuffer={audioBuf} playing={playing} alignment={alignment} onActiveWord={setActiveWord} playOffset={playOffsetRef.current} />}
                            {!audioBuf && <div style={{height: 80, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-muted)'}}>Loading audio...</div>}
                        </div>
                    </div>

                    <div className="review-actions">
                        <button className="review-action-btn reject" onClick={() => act('reject')} disabled={!!busy}>
                            Reject<kbd>n</kbd>
                        </button>
                        <button className="review-action-btn replay" onClick={togglePlayback}>
                            {playing ? 'Pause' : 'Play'}<kbd>space</kbd>
                        </button>
                        <button className="review-action-btn approve" onClick={() => act('approve')} disabled={!!busy}>
                            Approve<kbd>o</kbd>
                        </button>
                    </div>

                    {busy && <div style={{
                        position: 'fixed', top: 60, left: '50%', transform: 'translateX(-50%)',
                        background: 'var(--accent)', color: 'var(--bg)', padding: '6px 16px', borderRadius: 6, fontSize: 13, fontWeight: 600, zIndex: 300
                    }}>
                        {busy}
                    </div>}
                    {error && <div className="error-toast">{error}</div>}

                    {editingWord && (
                        <div className="vocab-overlay" onClick={e => {if (e.target === e.currentTarget) {stopPreview(); stopRecording(); setEditingWord(null);} }}>
                            <div className="vocab-editor">
                                <div className="term">{editingWord}</div>
                                <div className="status">
                                    {recording ? <span style={{color: 'var(--danger)'}}>Recording... press Enter to stop</span>
                                        : transcribing ? <span style={{color: 'var(--accent)'}}>Transcribing...</span>
                                            : editPreviewed ? 'Press Enter to save, Escape to cancel'
                                                : editSpoken ? 'Press Enter to preview'
                                                    : 'Say the pronunciation or type it'}
                                </div>
                                <div className="spoken-display">{editSpoken || '\u00A0'}</div>
                                <div className="row">
                                    <input value={editSpoken} onChange={e => {setEditSpoken(e.target.value); setEditPreviewed(false); setPreviewBuf(null); editManualRef.current = true;}} autoFocus
                                        placeholder="pronunciation"
                                        onKeyDown={e => {
                                            if (e.key === 'Enter') {
                                                e.preventDefault();
                                                if (recording && !editManualRef.current) {stopRecording();}
                                                else {
                                                    if (recording) stopRecording(); // stop in background, don't wait
                                                    if (editPreviewed) {saveVocabOverride();}
                                                    else {previewVocabWord(); setEditPreviewed(true);}
                                                }
                                            }
                                            if (e.key === 'Escape') {stopPreview(); stopRecording(); setEditingWord(null);}
                                        }} />
                                    <button className={`record-btn ${recording ? 'active' : ''}`}
                                        onClick={recording ? stopRecording : startRecording}
                                        title={recording ? 'Stop recording' : 'Record pronunciation'}>
                                        {recording ? '\u25A0' : '\u25CF'}
                                    </button>
                                </div>
                                <div className="actions">
                                    <button className="btn btn-sm" onClick={() => {previewVocabWord(); setEditPreviewed(true);}}>Preview</button>
                                    <button className="btn btn-sm btn-primary" onClick={saveVocabOverride} disabled={!editSpoken}>Save</button>
                                    <button className="btn btn-sm" onClick={() => {stopPreview(); stopRecording(); setEditingWord(null);}}>Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==================== AUTHOR PAGE ====================

        function AuthorPage() {
            const [term, setTerm] = useState(null);
            const [sentence, setSentence] = useState('');
            const [sentenceCount, setSentenceCount] = useState(0);
            const [stats, setStats] = useState(null);
            const [error, setError] = useState(null);
            const [saving, setSaving] = useState(false);
            const [sentences, setSentences] = useState(null);
            const [editingId, setEditingId] = useState(null);
            const [editValue, setEditValue] = useState('');
            const [sentenceFilter, setSentenceFilter] = useState('');
            const [spellIssues, setSpellIssues] = useState(null);
            const [spellLoading, setSpellLoading] = useState(false);
            const [suggestions, setSuggestions] = useState(null);
            const [suggestLoading, setSuggestLoading] = useState(false);
            const [suggestIdx, setSuggestIdx] = useState(0);
            const suggestPronRef = useRef(null);
            const [sentSuggestions, setSentSuggestions] = useState(null);
            const [sentSuggestLoading, setSentSuggestLoading] = useState(false);
            const [sentSuggestIdx, setSentSuggestIdx] = useState(0);
            const sentSuggestRef = useRef(null);
            const inputRef = useRef(null);

            const loadNext = () => {
                api('/api/author/next').then(r => {
                    if (r.done) { setTerm(null); }
                    else { setTerm(r); setSentenceCount(r.sentence_count); }
                    setSentence('');
                    setTimeout(() => inputRef.current?.focus(), 50);
                }).catch(e => setError(e.message));
            };

            const loadStats = () => api('/api/author/stats').then(setStats).catch(() => {});

            useEffect(() => { loadNext(); loadStats(); }, []);

            const submit = async () => {
                if (!sentence.trim() || !term) return;
                setSaving(true); setError(null);
                try {
                    const res = await api('/api/author/submit', {method: 'POST', body: JSON.stringify({term: term.term, sentence: sentence.trim()})});
                    if (res.error) { setError(res.error); setSaving(false); return; }
                    setSentence('');
                    setSentenceCount(c => c + 1);
                    loadStats();
                    // 50% chance to move to next term (so you write multiple per term)
                    if (Math.random() < 0.5 || sentenceCount >= 4) {
                        loadNext();
                    } else {
                        setTimeout(() => inputRef.current?.focus(), 50);
                    }
                } catch (e) { setError(e.message); }
                setSaving(false);
            };

            const skip = () => loadNext();

            return (
                <div className="container">
                    <h2>Author Sentences</h2>

                    {stats && (
                        <div className="stats-grid" style={{marginBottom:16}}>
                            <div className="stat-card"><div className="value" style={{color:'var(--success)'}}>{stats.total_sentences}</div><div className="label">Sentences</div></div>
                            <div className="stat-card"><div className="value">{stats.terms?.length || 0}</div><div className="label">Terms Covered</div></div>
                            <div className="stat-card"><div className="value">{stats.vocab_count || 0}</div><div className="label">Vocab Total</div></div>
                        </div>
                    )}

                    <div style={{display:'flex',gap:8,marginBottom:12}}>
                        <button className="btn btn-sm" disabled={spellLoading} onClick={async () => {
                            setSpellLoading(true); setSpellIssues(null);
                            try { const r = await api('/api/author/spellcheck', {method:'POST'}); setSpellIssues(r.issues); }
                            catch (e) { setError(e.message); }
                            setSpellLoading(false);
                        }}>{spellLoading ? 'Checking...' : 'Spellcheck'}</button>
                        <button className="btn btn-sm" disabled={suggestLoading} onClick={async () => {
                            setSuggestLoading(true); setSuggestions(null);
                            try { const r = await api('/api/author/suggest-vocab', {method:'POST'}); setSuggestions(r.suggestions || []); }
                            catch (e) { setError(e.message); }
                            setSuggestLoading(false);
                        }}>{suggestLoading ? 'Thinking...' : 'Suggest Vocab'}</button>
                        <button className="btn btn-sm" disabled={sentSuggestLoading} onClick={async () => {
                            setSentSuggestLoading(true); setSentSuggestions(null); setSentSuggestIdx(0);
                            try { const r = await api('/api/author/suggest-sentences', {method:'POST'}); setSentSuggestions(r.suggestions || []); }
                            catch (e) { setError(e.message); }
                            setSentSuggestLoading(false);
                            setTimeout(() => sentSuggestRef.current?.focus(), 100);
                        }}>{sentSuggestLoading ? 'Thinking...' : 'Suggest Sentences'}</button>
                    </div>

                    {spellIssues && (
                        <div className="card" style={{marginBottom:12}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                                <h3 style={{margin:0}}>Spellcheck Results</h3>
                                <button onClick={() => setSpellIssues(null)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer'}}>&times;</button>
                            </div>
                            {(Array.isArray(spellIssues) ? spellIssues : spellIssues?.issues || []).length === 0
                                ? <div style={{color:'var(--success)',fontSize:13}}>No issues found!</div>
                                : (Array.isArray(spellIssues) ? spellIssues : spellIssues?.issues || []).map((issue, i) => (
                                    <div key={i} style={{padding:'4px 0',borderBottom:'1px solid rgba(255,255,255,0.04)',fontSize:12,display:'flex',gap:8,alignItems:'center'}}>
                                        <span style={{color:'var(--text-muted)',minWidth:30}}>#{issue.id}</span>
                                        <span style={{color:'var(--error)',textDecoration:'line-through'}}>{issue.original}</span>
                                        <span style={{color:'var(--text-muted)'}}>&rarr;</span>
                                        <span style={{color:'var(--success)',fontWeight:600}}>{issue.suggestion}</span>
                                        <span style={{color:'var(--text-muted)',fontSize:11}}>{issue.reason}</span>
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    {suggestions && (() => {
                        const s = suggestions[suggestIdx];
                        if (!s) return (
                            <div className="card" style={{marginBottom:12,textAlign:'center',padding:24}}>
                                <div style={{color:'var(--success)',fontSize:16,marginBottom:8}}>All {suggestions.length === 0 ? 'suggestions' : suggestions.length + ' suggestions'} reviewed!</div>
                                <button className="btn btn-sm" onClick={() => setSuggestions(null)}>Close</button>
                            </div>
                        );
                        const pron = s._override ?? s.pronunciation;
                        const spokenSentence = s.sentence ? (() => {
                            const idx = s.sentence.toLowerCase().indexOf(s.term.toLowerCase());
                            if (idx >= 0) return s.sentence.slice(0, idx) + pron + s.sentence.slice(idx + s.term.length);
                            return s.sentence;
                        })() : pron;
                        const doAdd = async () => {
                            stopPlayback();
                            await api('/api/vocab', {method:'POST', body: JSON.stringify({term: s.term, spoken_override: pron, description: s.description})});
                            setSuggestions(prev => { const n = prev.filter((_, j) => j !== suggestIdx); return n; });
                            setSuggestIdx(i => Math.min(i, suggestions.length - 2));
                            loadStats();
                            setTimeout(() => suggestPronRef.current?.focus(), 50);
                        };
                        const doSkip = () => {
                            stopPlayback();
                            api('/api/author/reject-suggestion', {method:'POST', body: JSON.stringify({term: s.term})}).catch(() => {});
                            setSuggestions(prev => prev.filter((_, j) => j !== suggestIdx));
                            setSuggestIdx(i => Math.min(i, suggestions.length - 2));
                            setTimeout(() => suggestPronRef.current?.focus(), 50);
                        };
                        const doPlay = () => {
                            stopPlayback();
                            const currentPron = suggestPronRef.current?.value ?? pron;
                            const currentSpoken = s.sentence ? (() => {
                                const idx = s.sentence.toLowerCase().indexOf(s.term.toLowerCase());
                                if (idx >= 0) return s.sentence.slice(0, idx) + currentPron + s.sentence.slice(idx + s.term.length);
                                return s.sentence;
                            })() : currentPron;
                            fetchTtsBuffer(currentSpoken).then(buf => playBuffer(buf)).catch(() => {});
                        };
                        return (
                        <div className="card" style={{marginBottom:12}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                                <h3 style={{margin:0}}>Suggested Vocab</h3>
                                <span style={{fontSize:12,color:'var(--text-muted)'}}>{suggestIdx + 1} / {suggestions.length}</span>
                                <div style={{flex:1}} />
                                <button onClick={() => setSuggestions(null)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:16}}>&times;</button>
                            </div>
                            <div style={{textAlign:'center',marginBottom:12}}>
                                <div style={{fontSize:28,fontWeight:700,fontFamily:'monospace',color:'var(--text)'}}>{s.term}</div>
                                {s.description && <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>{s.description}</div>}
                                {s.sentence && <div style={{marginTop:6,color:'var(--text-muted)',fontSize:13,fontStyle:'italic'}}>"{s.sentence}"</div>}
                            </div>
                            <div style={{display:'flex',gap:8,alignItems:'center',justifyContent:'center',marginBottom:12}}>
                                <label style={{fontSize:11,color:'var(--text-muted)'}}>Pronunciation:</label>
                                <input ref={suggestPronRef} value={pron}
                                    onChange={e => setSuggestions(prev => prev.map((x, j) => j === suggestIdx ? {...x, _override: e.target.value} : x))}
                                    onKeyDown={e => {
                                        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); doAdd(); }
                                        else if (e.key === 'Enter') { e.preventDefault(); doPlay(); }
                                        else if (e.key === 'Escape') { e.preventDefault(); doSkip(); }
                                    }}
                                    autoFocus
                                    style={{padding:'6px 10px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--accent)',fontSize:15,fontFamily:'Jost,sans-serif',width:200,textAlign:'center'}} />
                                <button onClick={doPlay} style={{background:'none',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',cursor:'pointer',padding:'4px 10px',fontSize:13}}>&#9654;</button>
                            </div>
                            <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                                <button className="btn btn-primary" onClick={doAdd}>Add ({'\u2318\u23CE'})</button>
                                <button className="btn" onClick={doSkip}>Skip (Esc)</button>
                                <span style={{fontSize:10,color:'var(--text-muted)',marginLeft:8}}>Enter = play</span>
                            </div>
                        </div>
                        );
                    })()}

                    {sentSuggestions && (() => {
                        const s = sentSuggestions[sentSuggestIdx];
                        if (!s) return (
                            <div className="card" style={{marginBottom:12,textAlign:'center',padding:24}}>
                                <div style={{color:'var(--success)',fontSize:16,marginBottom:8}}>All sentence suggestions reviewed!</div>
                                <button className="btn btn-sm" onClick={() => setSentSuggestions(null)}>Close</button>
                            </div>
                        );
                        // Build spoken version by replacing term with its override
                        const vocab = stats?.terms || [];
                        const spokenSentence = (() => {
                            // Look up the pronunciation for this term
                            // We need to fetch it — for now just use the sentence as-is for TTS
                            // The TTS will handle it based on the term's spoken form
                            return s._edited ?? s.sentence;
                        })();
                        const doAccept = async () => {
                            stopPlayback();
                            const sent = s._edited ?? s.sentence;
                            await api('/api/author/submit', {method:'POST', body: JSON.stringify({term: s.term, sentence: sent})});
                            setSentSuggestions(prev => prev.filter((_, j) => j !== sentSuggestIdx));
                            setSentSuggestIdx(i => Math.min(i, sentSuggestions.length - 2));
                            loadStats();
                            setTimeout(() => sentSuggestRef.current?.focus(), 50);
                        };
                        const doSkipSent = () => {
                            stopPlayback();
                            setSentSuggestions(prev => prev.filter((_, j) => j !== sentSuggestIdx));
                            setSentSuggestIdx(i => Math.min(i, sentSuggestions.length - 2));
                            setTimeout(() => sentSuggestRef.current?.focus(), 50);
                        };
                        const doPlaySent = () => {
                            const text = s._edited ?? s.sentence;
                            fetchTtsBuffer(text).then(buf => playBuffer(buf)).catch(() => {});
                        };
                        return (
                        <div className="card" style={{marginBottom:12}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                                <h3 style={{margin:0}}>Suggested Sentences</h3>
                                <span style={{fontSize:12,color:'var(--text-muted)'}}>{sentSuggestIdx + 1} / {sentSuggestions.length}</span>
                                <div style={{flex:1}} />
                                <button onClick={() => setSentSuggestions(null)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:16}}>&times;</button>
                            </div>
                            <div style={{textAlign:'center',marginBottom:8}}>
                                <span style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1}}>Term:</span>
                                <span style={{fontSize:18,fontWeight:700,fontFamily:'monospace',color:'var(--accent)',marginLeft:8}}>{s.term}</span>
                            </div>
                            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12}}>
                                <input ref={sentSuggestRef} value={s._edited ?? s.sentence}
                                    onChange={e => setSentSuggestions(prev => prev.map((x, j) => j === sentSuggestIdx ? {...x, _edited: e.target.value} : x))}
                                    onKeyDown={e => {
                                        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); doAccept(); }
                                        else if (e.key === 'Enter') { e.preventDefault(); doPlaySent(); }
                                        else if (e.key === 'Escape') { e.preventDefault(); doSkipSent(); }
                                    }}
                                    autoFocus
                                    style={{flex:1,padding:'8px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontSize:14,fontFamily:'Jost,sans-serif'}} />
                                <button onClick={doPlaySent} style={{background:'none',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',cursor:'pointer',padding:'4px 10px',fontSize:13}}>&#9654;</button>
                            </div>
                            <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                                <button className="btn btn-primary" onClick={doAccept}>Accept ({'\u2318\u23CE'})</button>
                                <button className="btn" onClick={doSkipSent}>Skip (Esc)</button>
                                <span style={{fontSize:10,color:'var(--text-muted)',marginLeft:8}}>Enter = play</span>
                            </div>
                        </div>
                        );
                    })()}

                    {error && <div className="pipeline-error" style={{marginBottom:12}}>{error}</div>}

                    {!term ? (
                        <div className="card" style={{textAlign:'center',padding:32}}>
                            <p style={{color:'var(--text-muted)',fontSize:16}}>No vocab terms available. Add terms with overrides on the Vocab tab first.</p>
                        </div>
                    ) : (
                        <div className="card">
                            <div style={{textAlign:'center',marginBottom:16}}>
                                <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>Write a sentence using</div>
                                <div style={{fontSize:32,fontWeight:700,fontFamily:'monospace',color:'var(--accent)'}}>{term.term}</div>
                                {term.spoken !== term.term && <div style={{fontSize:13,color:'var(--text-muted)',marginTop:4}}>pronounced "{term.spoken}"</div>}
                                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:8}}>{sentenceCount} sentence{sentenceCount !== 1 ? 's' : ''} so far</div>
                            </div>
                            <div style={{display:'flex',gap:8}}>
                                <input ref={inputRef} type="text" value={sentence} onChange={e => setSentence(e.target.value)}
                                    placeholder={`Type a sentence containing "${term.term}"...`}
                                    onKeyDown={e => {
                                        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey) && sentence.trim()) { e.preventDefault(); submit(); }
                                    }}
                                    style={{flex:1,padding:'10px 14px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontFamily:'Jost,sans-serif',fontSize:15}} />
                                <button className="btn btn-primary" onClick={submit} disabled={saving || !sentence.trim()}>Save ({'\u2318\u23CE'})</button>
                                <button className="btn" onClick={skip} style={{color:'var(--text-muted)'}}>Skip</button>
                            </div>
                        </div>
                    )}

                    {stats?.terms?.length > 0 && (
                        <div style={{marginTop:24}}>
                            <h3>Coverage</h3>
                            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                                {stats.terms.map(([term, count]) => (
                                    <span key={term} style={{fontSize:12,padding:'2px 8px',borderRadius:10,cursor:'pointer',
                                        background: count >= 3 ? 'rgba(126,231,135,0.15)' : count >= 1 ? 'rgba(88,166,255,0.15)' : 'rgba(255,255,255,0.05)',
                                        color: count >= 3 ? 'var(--success)' : count >= 1 ? 'var(--accent)' : 'var(--text-muted)',
                                        border: `1px solid ${count >= 3 ? 'rgba(126,231,135,0.3)' : count >= 1 ? 'rgba(88,166,255,0.3)' : 'var(--border)'}`,
                                    }} onClick={() => { setSentenceFilter(term); if (!sentences) api('/api/author/sentences').then(setSentences); }}>{term} <b>{count}</b></span>
                                ))}
                            </div>
                        </div>
                    )}

                    <div style={{marginTop:24}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                            <h3 style={{margin:0}}>Sentences</h3>
                            {!sentences && <button className="btn btn-sm" onClick={() => api('/api/author/sentences').then(setSentences)}>Show</button>}
                            {sentences && <>
                                <span style={{fontSize:12,color:'var(--text-muted)'}}>{sentences.length} total</span>
                                <input type="text" placeholder="Filter by term..." value={sentenceFilter} onChange={e => setSentenceFilter(e.target.value)}
                                    style={{marginLeft:8,padding:'3px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontSize:12,fontFamily:'Jost,sans-serif'}} />
                            </>}
                        </div>
                        {sentences && (() => {
                            const f = sentenceFilter.toLowerCase();
                            const filtered = f ? sentences.filter(s => s.term.toLowerCase().includes(f) || s.sentence.toLowerCase().includes(f)) : sentences;
                            return (
                                <div style={{maxHeight:400,overflow:'auto',border:'1px solid var(--border)',borderRadius:8,background:'var(--bg)'}}>
                                    {filtered.map(s => (
                                        <div key={s.id} style={{padding:'6px 10px',borderBottom:'1px solid rgba(255,255,255,0.04)',fontSize:12,display:'flex',alignItems:'center',gap:8}}>
                                            <span style={{color:'var(--accent)',fontWeight:600,minWidth:80,fontFamily:'monospace'}}>{s.term}</span>
                                            {editingId === s.id ? (
                                                <input value={editValue} onChange={e => setEditValue(e.target.value)} autoFocus
                                                    onKeyDown={async e => {
                                                        if (e.key === 'Enter') {
                                                            await api(`/api/author/sentences/${s.id}`, {method:'POST', body: JSON.stringify({sentence: editValue})});
                                                            setEditingId(null); api('/api/author/sentences').then(setSentences); loadStats();
                                                        }
                                                        if (e.key === 'Escape') setEditingId(null);
                                                    }}
                                                    style={{flex:1,padding:'2px 6px',background:'var(--card-bg)',border:'1px solid var(--accent)',borderRadius:3,color:'var(--text)',fontSize:12,fontFamily:'Jost,sans-serif'}} />
                                            ) : (
                                                <span style={{flex:1,cursor:'pointer'}} onClick={() => { setEditingId(s.id); setEditValue(s.sentence); }}>{s.sentence}</span>
                                            )}
                                            <button onClick={async () => {
                                                await api(`/api/author/sentences/${s.id}/delete`, {method:'POST'});
                                                api('/api/author/sentences').then(setSentences); loadStats();
                                            }} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:13,padding:2}} title="Delete">&times;</button>
                                        </div>
                                    ))}
                                    {filtered.length === 0 && <div style={{padding:16,textAlign:'center',color:'var(--text-muted)'}}>No sentences{f ? ' matching filter' : ''}</div>}
                                </div>
                            );
                        })()}
                    </div>
                </div>
            );
        }

        // ==================== SHARED: Alignment Timeline ====================

        function AlignmentView({data}) {
            if (!data) return null;
            const ex = data.extraction || {};
            const al = data.alignments || {};
            const spokenItems = al.spoken || [];
            const origItems = al.original || [];
            const qwenItems = al.qwen || [];
            const paraItems = al.parakeet || [];
            const allItems = [...spokenItems, ...origItems, ...qwenItems, ...paraItems];
            const maxTime = allItems.length ? Math.max(...allItems.map(a => a.e)) : 1;
            const pct = t => (t / maxTime * 100).toFixed(2) + '%';

            const [playbackTime, setPlaybackTime] = useState(-1);
            const audioRef = useRef(null);
            const animRef = useRef(null);

            const rangeIndices = (items, range) => {
                if (!range || range.length < 2) return new Set();
                const [lo, hi] = range;
                const indices = new Set();
                for (let i = 0; i < items.length; i++) {
                    if (items[i].e > lo && items[i].s < hi) indices.add(i);
                }
                return indices;
            };
            const consRange = ex.cons_range;
            const origIdx = rangeIndices(origItems, consRange);
            const qwenIdx = rangeIndices(qwenItems, consRange);
            const paraIdx = rangeIndices(paraItems, consRange);

            // Build trimmed-word index sets from trim_info
            const ti = data.trim_info;
            const trimmedIndices = (preWords, items) => {
                if (!ti || !preWords || !preWords.length) return new Set();
                const s = new Set();
                // Match pre-trim words to timeline items by position within the consensus range
                const inRange = [];
                for (let i = 0; i < items.length; i++) {
                    if (consRange && items[i].e > consRange[0] && items[i].s < consRange[1]) inRange.push(i);
                }
                // trimmed_left from start, trimmed_right from end
                for (let i = 0; i < (ti.trimmed_left || 0) && i < inRange.length; i++) s.add(inRange[i]);
                for (let i = 0; i < (ti.trimmed_right || 0) && i < inRange.length; i++) s.add(inRange[inRange.length - 1 - i]);
                return s;
            };
            const origTrimmed = trimmedIndices(ti?.pre_orig, origItems);
            const qwenTrimmed = trimmedIndices(ti?.pre_qwen, qwenItems);
            const paraTrimmed = trimmedIndices(ti?.pre_para, paraItems);

            const renderTimeline = (label, items, color, highlighted, trimmed) => items.length > 0 && (
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                    <span style={{fontSize:9,color:'var(--text-muted)',width:55,textAlign:'right',flexShrink:0,fontWeight:600}}>{label}</span>
                    <div style={{position:'relative',flex:1,height:22,background:'rgba(255,255,255,0.03)',borderRadius:3,overflow:'hidden'}}>
                        {items.map((a, j) => {
                            const hl = highlighted.has(j);
                            const tr = trimmed.has(j);
                            const playing = playbackTime >= 0 && playbackTime >= a.s && playbackTime < a.e;
                            return (<div key={j} title={`${a.w} (${a.s}s\u2013${a.e}s)${tr ? ' [trimmed]' : ''}`} style={{
                                position:'absolute', left:pct(a.s), width:pct(Math.max(a.e - a.s, 0.02)), top:2, bottom:2, borderRadius:2,
                                background: playing ? '#fff3' : tr ? 'rgba(255,100,100,0.15)' : hl ? color : 'rgba(255,255,255,0.08)',
                                border:`1px solid ${playing ? '#fff8' : tr ? 'rgba(255,100,100,0.4)' : hl ? color : 'rgba(255,255,255,0.12)'}`,
                                display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden',
                                transition: 'background 0.05s',
                            }}><span style={{fontSize:8, color: playing ? '#fff' : tr ? 'rgba(255,100,100,0.6)' : hl ? '#fff' : 'var(--text-muted)', whiteSpace:'nowrap', padding:'0 2px',
                                fontWeight: playing ? 700 : 400, textDecoration: tr ? 'line-through' : 'none'}}>{a.w}</span></div>);
                        })}
                        {playbackTime >= 0 && <div style={{position:'absolute',left:pct(playbackTime),top:0,bottom:0,width:1,background:'#fff',zIndex:10,pointerEvents:'none'}} />}
                    </div>
                </div>
            );

            const playWav = () => {
                if (!data.wav_b64) return;
                if (audioRef.current) { audioRef.current.pause(); }
                const bin = atob(data.wav_b64);
                const buf = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
                const blob = new Blob([buf], {type: 'audio/wav'});
                const url = URL.createObjectURL(blob);
                const a = new Audio(url);
                audioRef.current = a;
                const tick = () => {
                    if (!a.paused) {
                        setPlaybackTime(a.currentTime);
                        animRef.current = requestAnimationFrame(tick);
                    }
                };
                a.onplay = () => { animRef.current = requestAnimationFrame(tick); };
                a.onended = () => { setPlaybackTime(-1); URL.revokeObjectURL(url); cancelAnimationFrame(animRef.current); };
                a.onpause = () => { cancelAnimationFrame(animRef.current); };
                a.play();
            };

            const origMatch = ex.original?.toLowerCase().replace(/[.,!?]/g,'').trim();
            const qwenMatch = ex.qwen?.toLowerCase().replace(/[.,!?]/g,'').trim() === origMatch;
            const paraMatch = ex.parakeet?.toLowerCase().replace(/[.,!?]/g,'').trim() === origMatch;

            return (
                <div style={{fontSize:12,lineHeight:1.6}}>
                    <div style={{display:'flex',gap:16,padding:'6px 10px',background:'rgba(0,0,0,0.2)',borderRadius:4,fontFamily:'monospace',fontSize:13,marginBottom:6,alignItems:'center'}}>
                        <div><span style={{color:'rgba(88,166,255,0.7)',fontWeight:600}}>{ex.original||'—'}</span><span style={{color:'var(--text-muted)',fontSize:10,marginLeft:4}}>orig</span></div>
                        <div style={{color:'var(--text-muted)'}}>&rarr;</div>
                        <div><span style={{color:qwenMatch?'var(--success)':'var(--error)',fontWeight:600}}>{ex.qwen||'—'}</span><span style={{color:'var(--text-muted)',fontSize:10,marginLeft:4}}>Q</span></div>
                        <div><span style={{color:paraMatch?'var(--success)':'var(--error)',fontWeight:600}}>{ex.parakeet||'—'}</span><span style={{color:'var(--text-muted)',fontSize:10,marginLeft:4}}>P</span></div>
                        {ex.clean === false && <span style={{color:'var(--warning)',fontSize:11}}>noisy</span>}
                        {ex.clean === true && <span style={{color:'var(--success)',fontSize:11}}>clean</span>}
                        <div style={{flex:1}} />
                        {data.wav_b64 && <button onClick={playWav} style={{background:'none',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',cursor:'pointer',padding:'2px 10px',fontSize:11}}>&#9654;</button>}
                    </div>
                    <div style={{marginBottom:4}}>
                        {renderTimeline('Spoken', spokenItems, 'rgba(126,231,135,0.5)', new Set(), new Set())}
                        {renderTimeline('Original', origItems, 'rgba(88,166,255,0.6)', origIdx, origTrimmed)}
                        {renderTimeline('Qwen', qwenItems, 'rgba(210,153,34,0.7)', qwenIdx, qwenTrimmed)}
                        {renderTimeline('Parakeet', paraItems, 'rgba(163,113,247,0.7)', paraIdx, paraTrimmed)}
                        <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--text-muted)',marginTop:1,paddingLeft:61}}>
                            <span>0s</span><span>{maxTime.toFixed(1)}s</span>
                        </div>
                    </div>
                    <div style={{fontSize:10,color:'var(--text-muted)',lineHeight:1.6}}>
                        {data.sentence && <div><b>Written:</b> {data.sentence}</div>}
                        {data.spoken_sentence && data.spoken_sentence !== data.sentence && <div><b>Spoken:</b> {data.spoken_sentence}</div>}
                        {ex.cons_range && <div>
                            Consensus: {ex.cons_range[0]?.toFixed(3)}s – {ex.cons_range[1]?.toFixed(3)}s
                            {data.term_range && <span> | Term: {data.term_range[0]?.toFixed(3)}s – {data.term_range[1]?.toFixed(3)}s</span>}
                            {data.term_found === false && <span style={{color:'var(--error)',fontWeight:700,marginLeft:8}}>TERM NOT FOUND</span>}
                            {data.term_found === true && <span style={{color:'var(--success)',marginLeft:8}}>found</span>}
                            {data.attempts > 1 && <span style={{marginLeft:8}}>({data.attempts} attempts)</span>}
                        </div>}
                    </div>
                </div>
            );
        }

        // ==================== CORPUS PAGE ====================
        function CorpusPage() {
            const [status, setStatus] = useState(null);
            const [runningJob, setRunningJob] = useState(null);
            const [jobLog, setJobLog] = useState('');
            const [error, setError] = useState(null);
            const [corpusData, setCorpusData] = useState(null);
            const [corpusFilter, setCorpusFilter] = useState('');
            const [expandedTerm, setExpandedTerm] = useState(null);
            const [showNoisy, setShowNoisy] = useState(false);
            const dialogRef = useRef(null);
            const [backend, setBackend] = useState('pocket-hq');
            const [corpusRounds, setCorpusRounds] = useState(100);
            const [corpusEndless, setCorpusEndless] = useState(false);
            const [dualAsr, setDualAsr] = useState(false);
            const [liveStats, setLiveStats] = useState(null);
            const [testTerm, setTestTerm] = useState('');
            const [testSuggestions, setTestSuggestions] = useState([]);
            const [testBackend, setTestBackend] = useState('pocket-hq');
            const [testResult, setTestResult] = useState(null);
            const [testLoading, setTestLoading] = useState(false);
            const pollRef = useRef(null);
            const logRef = useRef(null);

            const load = () => api('/api/pipeline/status').then(s => {
                setStatus(s);
                if (s.running_job && !runningJob) setRunningJob(s.running_job);
            });
            useEffect(() => { load(); }, []);
            useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [jobLog]);
            useEffect(() => {
                if (!runningJob) { setLiveStats(null); return; }
                const poll = async () => {
                    const job = await api(`/api/jobs/${runningJob.id}`);
                    setJobLog(job.log);
                    if (job.result) try { setLiveStats(JSON.parse(job.result)); } catch {}
                    if (job.status !== 'running') { setRunningJob(null); setLiveStats(null); load(); }
                };
                poll(); pollRef.current = setInterval(poll, 2000);
                return () => clearInterval(pollRef.current);
            }, [runningJob?.id]);

            const startJob = async (type, config) => {
                setError(null);
                try {
                    const res = await api(`/api/jobs/${type}`, {method: 'POST', body: JSON.stringify(config)});
                    if (res.job_id) setRunningJob({id: res.job_id, job_type: type});
                    else if (res.error) setError(res.error);
                } catch (e) { setError(e.message); }
            };
            const [stopping, setStopping] = useState(false);
            const stopJob = async () => {
                setStopping(true);
                try { await api('/api/jobs/stop', {method: 'POST'}); } catch (e) {}
            };

            // Reset stopping when job finishes
            useEffect(() => { if (!runningJob) setStopping(false); }, [runningJob]);

            if (!status) return <div className="container"><p>Loading...</p></div>;
            const isRunning = !!runningJob;
            const rt = runningJob?.job_type;

            const corpusRunning = rt === 'corpus';
            const canGenerate = !isRunning && (status.approved_count > 0 || (status.vocab_reviewed || 0) > 0);
            const inputStyle = {padding:'4px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontFamily:'Jost,sans-serif',fontSize:13};

            return (
                <div className="container">
                    <h2>Corpus</h2>
                    {error && <div className="pipeline-error" style={{marginBottom:12}}>{error}</div>}

                    <div className="card" style={{marginBottom: 16}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                            <h3 style={{margin:0,flex:1}}>Generate Corpus {corpusRunning && <span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',background:'var(--success)',marginLeft:8,animation:'pulse 1s ease-in-out infinite'}} />}</h3>
                            {(status.corpus_exists || liveStats?.new_mistakes > 0) && <>
                                <a href="#" style={{color:'var(--success)',fontSize:13,fontWeight:600}} onClick={async e => {
                                    e.preventDefault();
                                    const d = await api('/api/pipeline/corpus?mistakes=1&limit=100');
                                    setCorpusData(d.pairs); setCorpusFilter(''); setExpandedTerm(null);
                                    dialogRef.current?.showModal();
                                }}>{liveStats?.new_mistakes ?? status.corpus_lines} mistakes</a>
                                <a href="#" style={{color:'var(--text-muted)',fontSize:11}} onClick={async e => {
                                    e.preventDefault();
                                    if (confirm('Delete all corpus pairs?')) { await api('/api/pipeline/reset-corpus', {method:'POST'}); load(); }
                                }}>reset</a>
                            </>}
                        </div>

                        <div className="stats-grid" style={{marginBottom:12}}>
                            <div className="stat-card"><div className="value">{status.corpus_lines ?? 0}</div><div className="label">Unique Pairs</div></div>
                            <div className="stat-card"><div className="value">{status.vocab_reviewed || 0}</div><div className="label">Terms</div></div>
                            {liveStats && <div className="stat-card"><div className="value">{liveStats.rounds || 0}</div><div className="label">Rounds</div></div>}
                            {liveStats && <div className="stat-card"><div className="value" style={{color:'var(--error)'}}>{liveStats.new_mistakes || 0}</div><div className="label">New</div></div>}
                            {liveStats && <div className="stat-card"><div className="value">{liveStats.dup_mistakes || 0}</div><div className="label">Dup</div></div>}
                            {liveStats && <div className="stat-card"><div className="value" style={{color:'var(--success)'}}>{liveStats.correct || 0}</div><div className="label">Correct</div></div>}
                            {liveStats?.rounds_per_sec > 0 && <div className="stat-card"><div className="value">{liveStats.rounds_per_sec}</div><div className="label">rounds/s</div></div>}
                            {liveStats?.avg_tts_ms > 0 && <div className="stat-card"><div className="value" style={{fontSize:16}}>TTS {liveStats.avg_tts_ms}ms / ASR {liveStats.avg_asr_ms}ms</div><div className="label">Avg per round</div></div>}
                        </div>

                        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                            <label style={{fontSize:12,color:'var(--text-muted)'}}>TTS</label>
                            <select value={backend} onChange={e => setBackend(e.target.value)} disabled={corpusRunning} style={inputStyle}>
                                {(status.backends||[]).map(b => <option key={b} value={b}>{b}</option>)}
                            </select>
                            <label style={{fontSize:12,color:'var(--text-muted)',marginLeft:8}}>Rounds</label>
                            <input type="number" value={corpusRounds} onChange={e => setCorpusRounds(+e.target.value || 100)} disabled={corpusRunning || corpusEndless}
                                style={{...inputStyle,width:60}} />
                            <label style={{fontSize:11,color:'var(--text-muted)',marginLeft:4,display:'flex',alignItems:'center',gap:3,cursor:'pointer'}}>
                                <input type="checkbox" checked={corpusEndless} onChange={e => setCorpusEndless(e.target.checked)} disabled={corpusRunning} /> endless
                            </label>
                            <label style={{fontSize:11,color:'var(--text-muted)',marginLeft:8,display:'flex',alignItems:'center',gap:3,cursor:'pointer'}}>
                                <input type="checkbox" checked={dualAsr} onChange={e => setDualAsr(e.target.checked)} disabled={corpusRunning} /> dual ASR
                            </label>
                            <div style={{flex:1}} />
                            {corpusRunning
                                ? <button className="btn btn-sm" style={{borderColor:'var(--warning)',color:'var(--warning)',background:'rgba(210,153,34,0.1)'}}
                                    onClick={stopJob} disabled={stopping}>{stopping ? 'Stopping...' : 'Stop'}</button>
                                : <button className="btn btn-primary btn-sm" disabled={!canGenerate}
                                    onClick={() => startJob('corpus', {tts_backend: backend, rounds: corpusEndless ? 0 : corpusRounds, dual_asr: dualAsr})}>Generate</button>
                            }
                        </div>

                        {jobLog && corpusRunning && (() => {
                            const lines = jobLog.split('\n');
                            const mistakes = lines.filter(l => l.startsWith('NEW|')).slice(-10).map(l => {
                                const parts = l.split('|');
                                return {id: parseInt(parts[1]), term: parts[2], orig: parts[3], qwen: parts[4]};
                            });
                            const progress = lines.filter(l => l.match(/^\[/)).slice(-1)[0] || '';
                            const openMistake = async (m) => {
                                const d = await api(`/api/pipeline/corpus?mistakes=1&limit=100`);
                                setCorpusData(d.pairs); setCorpusFilter(''); setExpandedTerm(m.id);
                                dialogRef.current?.showModal();
                            };
                            return (<div style={{marginTop:10}}>
                                {progress && <div style={{fontSize:11,color:'var(--text-muted)',marginBottom:4,fontFamily:'monospace'}}>{progress}</div>}
                                {mistakes.length > 0 && <div style={{background:'rgba(0,0,0,0.3)',borderRadius:4,padding:6,maxHeight:140,overflowY:'auto'}} ref={logRef}>
                                    <div style={{fontSize:10,color:'var(--text-muted)',marginBottom:4}}>New unique mistakes:</div>
                                    {mistakes.map((m, i) => (
                                        <div key={i} onClick={() => openMistake(m)} style={{fontSize:12,fontFamily:'monospace',lineHeight:1.5,display:'flex',gap:8,cursor:'pointer',borderRadius:3,padding:'1px 4px'}}
                                            onMouseEnter={e => e.currentTarget.style.background='rgba(255,255,255,0.05)'}
                                            onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                                            <span style={{color:'var(--text-muted)',minWidth:60}}>{m.term}</span>
                                            <span style={{color:'rgba(88,166,255,0.8)'}}>{m.orig}</span>
                                            <span style={{color:'var(--text-muted)'}}>{'\u2192'}</span>
                                            <span style={{color:'rgba(210,153,34,0.9)'}}>{m.qwen}</span>
                                        </div>
                                    ))}
                                </div>}
                            </div>);
                        })()}
                    </div>

                    <div className="card" style={{marginBottom: 16}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                            <h3 style={{margin:0,flex:1}}>Test Term</h3>
                        </div>
                        <div style={{display:'flex',gap:8,alignItems:'center'}}>
                            <div style={{flex:1,position:'relative'}}>
                                <input type="text" value={testTerm} placeholder="Type a vocab term..."
                                    onChange={e => {
                                        const v = e.target.value;
                                        setTestTerm(v);
                                        if (v.trim().length >= 1) {
                                            api(`/api/vocab?search=${encodeURIComponent(v.trim())}&limit=8`).then(list => {
                                                setTestSuggestions(list.map(r => r.term));
                                            }).catch(() => {});
                                        } else { setTestSuggestions([]); }
                                    }}
                                    onKeyDown={e => {
                                        if (e.key === 'Enter' && testTerm.trim()) {
                                            setTestSuggestions([]);
                                            setTestLoading(true); setTestResult(null);
                                            api('/api/test-term', {method:'POST', body: JSON.stringify({term: testTerm.trim(), tts_backend: testBackend, dual_asr: dualAsr})})
                                                .then(r => { setTestResult(r); setTestLoading(false); })
                                                .catch(e => { setError(e.message); setTestLoading(false); });
                                        }
                                        if (e.key === 'Escape') setTestSuggestions([]);
                                    }}
                                    onBlur={() => setTimeout(() => setTestSuggestions([]), 150)}
                                    style={{...inputStyle,width:'100%'}} />
                                {testSuggestions.length > 0 && (
                                    <div style={{position:'absolute',top:'100%',left:0,right:0,zIndex:10,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,marginTop:2,maxHeight:200,overflow:'auto',boxShadow:'0 4px 12px rgba(0,0,0,0.4)'}}>
                                        {testSuggestions.map(s => (
                                            <div key={s} onMouseDown={e => {
                                                    e.preventDefault();
                                                    setTestTerm(s); setTestSuggestions([]);
                                                    setTestLoading(true); setTestResult(null);
                                                    api('/api/test-term', {method:'POST', body: JSON.stringify({term: s, tts_backend: testBackend, dual_asr: dualAsr})})
                                                        .then(r => { setTestResult(r); setTestLoading(false); })
                                                        .catch(err => { setError(err.message); setTestLoading(false); });
                                                }}
                                                style={{padding:'6px 10px',cursor:'pointer',fontSize:13,fontFamily:'monospace',background:'var(--bg)'}}
                                                onMouseEnter={e => e.target.style.background='var(--card-bg)'}
                                                onMouseLeave={e => e.target.style.background='var(--bg)'}>
                                                {s}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <select value={testBackend} onChange={e => setTestBackend(e.target.value)} style={inputStyle}>
                                {(status.backends||[]).map(b => <option key={b} value={b}>{b}</option>)}
                            </select>
                            <button className="btn btn-sm btn-primary" disabled={testLoading || !testTerm.trim()} onClick={() => {
                                setTestLoading(true); setTestResult(null);
                                api('/api/test-term', {method:'POST', body: JSON.stringify({term: testTerm.trim(), tts_backend: testBackend, dual_asr: dualAsr})})
                                    .then(r => { setTestResult(r); setTestLoading(false); })
