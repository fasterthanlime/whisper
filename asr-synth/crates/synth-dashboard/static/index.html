                                    <button className="btn btn-sm" onClick={() => {previewVocabWord(); setEditPreviewed(true);}}>Preview</button>
                                    <button className="btn btn-sm btn-primary" onClick={saveVocabOverride} disabled={!editSpoken}>Save</button>
                                    <button className="btn btn-sm" onClick={() => {stopPreview(); stopRecording(); setEditingWord(null);}}>Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==================== AUTHOR PAGE ====================

        function AuthorPage() {
            const [term, setTerm] = useState(null);
            const [sentence, setSentence] = useState('');
            const [authorMode, setAuthorMode] = useState('term');
            const [counterSurface, setCounterSurface] = useState('');
            const [sentenceCount, setSentenceCount] = useState(0);
            const [stats, setStats] = useState(null);
            const [error, setError] = useState(null);
            const [saving, setSaving] = useState(false);
            const [authorTerms, setAuthorTerms] = useState([]);
            const [termPicker, setTermPicker] = useState('');
            const [termLocked, setTermLocked] = useState(false);
            const [sentences, setSentences] = useState(null);
            const [editingId, setEditingId] = useState(null);
            const [editValue, setEditValue] = useState('');
            const [sentenceFilter, setSentenceFilter] = useState('');
            const [spellIssues, setSpellIssues] = useState(null);
            const [spellLoading, setSpellLoading] = useState(false);
            const [suggestions, setSuggestions] = useState(null);
            const [suggestLoading, setSuggestLoading] = useState(false);
            const [suggestIdx, setSuggestIdx] = useState(0);
            const suggestPronRef = useRef(null);
            const [sentSuggestions, setSentSuggestions] = useState(null);
            const [sentSuggestLoading, setSentSuggestLoading] = useState(false);
            const [sentSuggestIdx, setSentSuggestIdx] = useState(0);
            const sentSuggestRef = useRef(null);
            const inputRef = useRef(null);
            const [recordingSentence, setRecordingSentence] = useState(null);
            const [recordings, setRecordings] = useState([]);
            const [recordingPhonesOpen, setRecordingPhonesOpen] = useState({});
            const [recordingPhonesById, setRecordingPhonesById] = useState({});
            const [recordingPhonesLoading, setRecordingPhonesLoading] = useState({});
            const [recordingPhonesError, setRecordingPhonesError] = useState({});
            const [recording, setRecording] = useState(false);
            const [recordingBusy, setRecordingBusy] = useState(false);
            const [recordingError, setRecordingError] = useState(null);
            const [rapidFireOpen, setRapidFireOpen] = useState(false);
            const [rapidFireSentence, setRapidFireSentence] = useState(null);
            const [rapidFireError, setRapidFireError] = useState(null);
            const [rapidFireBusy, setRapidFireBusy] = useState(false);
            const [rapidFirePool, setRapidFirePool] = useState(null);
            const [rapidFireTitle, setRapidFireTitle] = useState('Rapid fire');
            const [rapidFireHint, setRapidFireHint] = useState('Zero-take sentences are prioritized first, then selection becomes random across the whole set.');
            const [counterexampleReview, setCounterexampleReview] = useState(null);
            const [counterexampleReviewBusy, setCounterexampleReviewBusy] = useState(false);
            const [counterexampleReviewError, setCounterexampleReviewError] = useState(null);
            const [counterexampleSpeakBusy, setCounterexampleSpeakBusy] = useState(false);
            const [counterexampleSpeakRecording, setCounterexampleSpeakRecording] = useState(false);
            const [counterexampleSpeakError, setCounterexampleSpeakError] = useState(null);
            const [counterexampleDraft, setCounterexampleDraft] = useState(null);
            const [counterexampleSavedCount, setCounterexampleSavedCount] = useState(0);
            const recordingRecorderRef = useRef(null);
            const rapidFireRecorderRef = useRef(null);
            const rapidFireAutostartRef = useRef(false);
            const counterexampleRecorderRef = useRef(null);

            const spellIssueList = Array.isArray(spellIssues) ? spellIssues : (spellIssues?.issues || []);

            const sentenceForSpellIssue = (issue) => {
                if (!sentences) return '';
                const row = sentences.find(s => s.id === issue.id);
                return row?.sentence || '';
            };

            const applySpellSuggestion = (fullSentence, issue) => {
                if (!fullSentence || !issue?.original || !issue?.suggestion) return fullSentence || '';
                const escaped = issue.original.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const re = new RegExp(`\\b${escaped}\\b`);
                if (re.test(fullSentence)) return fullSentence.replace(re, issue.suggestion);
                const idx = fullSentence.toLowerCase().indexOf(issue.original.toLowerCase());
                if (idx < 0) return fullSentence;
                return fullSentence.slice(0, idx) + issue.suggestion + fullSentence.slice(idx + issue.original.length);
            };

            const renderSpellPreview = (issue) => {
                const fullSentence = sentenceForSpellIssue(issue);
                if (!fullSentence) return null;
                const updated = applySpellSuggestion(fullSentence, issue);
                if (updated === fullSentence) {
                    return <div style={{fontSize:12,color:'var(--text-muted)'}}>{fullSentence}</div>;
                }
                const originalIdx = fullSentence.toLowerCase().indexOf(issue.original.toLowerCase());
                const updatedIdx = updated.toLowerCase().indexOf(issue.suggestion.toLowerCase());
                return (
                    <div style={{display:'grid',gap:4,marginTop:4}}>
                        <div style={{fontSize:12,color:'var(--text-muted)',lineHeight:1.5}}>
                            {originalIdx >= 0 ? (<>
                                {fullSentence.slice(0, originalIdx)}
                                <span style={{background:'rgba(248,81,73,0.18)',color:'var(--error)',textDecoration:'line-through',padding:'0 2px',borderRadius:3}}>{fullSentence.slice(originalIdx, originalIdx + issue.original.length)}</span>
                                {fullSentence.slice(originalIdx + issue.original.length)}
                            </>) : fullSentence}
                        </div>
                        <div style={{fontSize:12,color:'var(--text)',lineHeight:1.5}}>
                            {updatedIdx >= 0 ? (<>
                                {updated.slice(0, updatedIdx)}
                                <span style={{background:'rgba(63,185,80,0.18)',color:'var(--success)',fontWeight:600,padding:'0 2px',borderRadius:3}}>{updated.slice(updatedIdx, updatedIdx + issue.suggestion.length)}</span>
                                {updated.slice(updatedIdx + issue.suggestion.length)}
                            </>) : updated}
                        </div>
                    </div>
                );
            };

            const acceptSpellIssue = async (issue) => {
                const fullSentence = sentenceForSpellIssue(issue);
                const updated = applySpellSuggestion(fullSentence, issue).trim();
                if (!fullSentence || !updated || updated === fullSentence) return;
                await api(`/api/author/sentences/${issue.id}`, {
                    method:'POST',
                    body: JSON.stringify({sentence: updated}),
                });
                setSentences(prev => prev ? prev.map(s => s.id === issue.id ? {...s, sentence: updated} : s) : prev);
                setSpellIssues(prev => {
                    const arr = Array.isArray(prev) ? prev : (prev?.issues || []);
                    const next = arr.filter((x, i) => !(x.id === issue.id && x.original === issue.original && x.suggestion === issue.suggestion && i === arr.indexOf(issue)));
                    return Array.isArray(prev) ? next : {...prev, issues: next};
                });
            };

            const authoredCountForTerm = (termName, nextStats = stats) => {
                const rows = nextStats?.terms || [];
                const found = rows.find(([t]) => t.toLowerCase() === termName.toLowerCase());
                return found ? found[1] : 0;
            };

            const termFromVocabRow = (row, nextStats = stats) => ({
                term: row.term,
                spoken: row.spoken_override || row.spoken_auto || row.term,
                sentence_count: authoredCountForTerm(row.term, nextStats),
            });

            const loadAuthorTerms = async (nextStats = stats) => {
                const rows = await api('/api/vocab?reviewed=true&limit=5000');
                setAuthorTerms(rows);
                return rows;
            };

            const focusTermByName = async (name, nextStats = stats, existingRows = authorTerms) => {
                const trimmed = name.trim();
                if (!trimmed) return false;
                const rows = existingRows.length > 0 ? existingRows : await loadAuthorTerms(nextStats);
                const match = rows.find(r => r.term.toLowerCase() === trimmed.toLowerCase());
                if (!match) {
                    setError(`Unknown term: ${trimmed}`);
                    return false;
                }
                setTerm(termFromVocabRow(match, nextStats));
                setSentenceCount(authoredCountForTerm(match.term, nextStats));
                setSentence('');
                setCounterSurface('');
                setTimeout(() => inputRef.current?.focus(), 50);
                return true;
            };

            const loadNext = async () => {
                if (termLocked && termPicker.trim()) {
                    await focusTermByName(termPicker, stats);
                    return;
                }
                api('/api/author/next').then(r => {
                    if (r.done) { setTerm(null); }
                    else { setTerm(r); setSentenceCount(r.sentence_count); }
                    setSentence('');
                    setAuthorMode('term');
                    setCounterSurface('');
                    setTermPicker(r.term || '');
                    setTimeout(() => inputRef.current?.focus(), 50);
                }).catch(e => setError(e.message));
            };

            const loadStats = () => api('/api/author/stats').then(s => {
                setStats(s);
                return s;
            }).catch(() => {});

            const loadSentences = async () => {
                const rows = await api('/api/author/sentences');
                setSentences(rows);
                return rows;
            };

            const loadCounterexampleReview = async () => {
                try {
                    const res = await api('/api/author/counterexample-surfaces/next');
                    setCounterexampleReview(res.item || null);
                    setCounterexampleReviewError(null);
                    setCounterexampleSpeakError(null);
                    setCounterexampleDraft(null);
                    setCounterexampleSavedCount(0);
                    return res.item || null;
                } catch (e) {
                    setCounterexampleReview(null);
                    setCounterexampleReviewError(e.message);
                    setCounterexampleSavedCount(0);
                    return null;
                }
            };

            const pickRapidFireSentence = (rows, currentId = null) => {
                if (!rows || rows.length === 0) return null;
                const zeroTake = rows.filter(s => (s.recording_count || 0) === 0 && s.id !== currentId);
                const pool = zeroTake.length > 0
                    ? zeroTake
                    : rows.filter(s => s.id !== currentId);
                const candidates = pool.length > 0 ? pool : rows;
                return candidates[Math.floor(Math.random() * candidates.length)];
            };

            const loadRecordings = async (row) => {
                const res = await api(`/api/author/sentences/${row.id}/recordings`);
                setRecordings(res.recordings || []);
            };

            const openRecordings = async (row) => {
                setRecordingSentence(row);
                setRecordingError(null);
                setRecordings([]);
                setRecordingPhonesOpen({});
                setRecordingPhonesById({});
                setRecordingPhonesLoading({});
                setRecordingPhonesError({});
                try {
                    await loadRecordings(row);
                } catch (e) {
                    setRecordingError(e.message);
                }
            };

            const closeRecordings = () => {
                stopSentenceRecording();
                setRecordingSentence(null);
                setRecordings([]);
                setRecordingPhonesOpen({});
                setRecordingPhonesById({});
                setRecordingPhonesLoading({});
                setRecordingPhonesError({});
                setRecordingError(null);
            };

            const loadRecordingPhones = async (recordingId) => {
                setRecordingPhonesLoading(prev => ({...prev, [recordingId]: true}));
                setRecordingPhonesError(prev => ({...prev, [recordingId]: null}));
                try {
                    const res = await api(`/api/author/recordings/${recordingId}/phones`);
                    setRecordingPhonesById(prev => ({...prev, [recordingId]: res.trace || null}));
                } catch (e) {
                    setRecordingPhonesError(prev => ({...prev, [recordingId]: e.message}));
                } finally {
                    setRecordingPhonesLoading(prev => ({...prev, [recordingId]: false}));
                }
            };

            const toggleRecordingPhones = async (recordingId) => {
                const nextOpen = !recordingPhonesOpen[recordingId];
                setRecordingPhonesOpen(prev => ({...prev, [recordingId]: nextOpen}));
                if (nextOpen && !(recordingId in recordingPhonesById) && !recordingPhonesLoading[recordingId]) {
                    await loadRecordingPhones(recordingId);
                }
            };

            const closeRapidFire = async () => {
                rapidFireAutostartRef.current = false;
                if (recording) {
                    await finishRapidFireRecording({discard: true});
                }
                if (rapidFireRecorderRef.current) {
                    await rapidFireRecorderRef.current.shutdown();
                    rapidFireRecorderRef.current = null;
                }
                setRapidFireOpen(false);
                setRapidFireSentence(null);
                setRapidFireError(null);
                setRapidFireBusy(false);
                setRapidFirePool(null);
                setRapidFireTitle('Rapid fire');
                setRapidFireHint('Zero-take sentences are prioritized first, then selection becomes random across the whole set.');
            };

            const stopCounterexampleRecording = async (options = {}) => {
                const recorder = counterexampleRecorderRef.current;
                if (!recorder) {
                    setCounterexampleSpeakRecording(false);
                    return;
                }
                counterexampleRecorderRef.current = null;
                const result = await recorder.stop(options);
                setCounterexampleSpeakRecording(false);
                return result;
            };

            const stopSentenceRecording = async (options = {}) => {
                if (options.autoRestartRapidFire) rapidFireAutostartRef.current = true;
                if (options.discard) rapidFireAutostartRef.current = false;
                if (recordingRecorderRef.current && recordingRecorderRef.current.state !== 'inactive') {
                    const recorder = recordingRecorderRef.current;
                    recordingRecorderRef.current = null;
                    await recorder.stop(options);
                }
                setRecording(false);
            };

            const uploadSentenceTake = async (row, wavBytes) => {
                const res = await fetch(`/api/author/sentences/${row.id}/recordings`, {
                    method: 'POST',
                    headers: {'Content-Type': 'audio/wav'},
                    body: wavBytes,
                });
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(text || 'failed to save recording');
                }
                return res.json();
            };

            const saveSentenceTake = async (row, onSaved) => {
                if (!row) return;
                try {
                    const recorder = await startMonoWavRecording(async ({wavBytes}) => {
                        try {
                            setRecordingBusy(true);
                            const data = await uploadSentenceTake(row, wavBytes);
                            await onSaved?.(data);
                            loadSentences().catch(() => {});
                            loadStats();
                            setRecordingError(null);
                        } catch (e) {
                            if (row.id === recordingSentence?.id) setRecordingError(e.message);
                            else setRapidFireError(e.message);
                        } finally {
                            setRecording(false);
                            setRecordingBusy(false);
                        }
                    });
                    recordingRecorderRef.current = recorder;
                    setRecording(true);
                } catch (e) {
                    if (row.id === recordingSentence?.id) setRecordingError('Microphone access denied');
                    else setRapidFireError('Microphone access denied');
                }
            };

            const startSentenceRecording = async () => {
                if (!recordingSentence) return;
                await saveSentenceTake(recordingSentence, data => {
                    setRecordings(data.recordings || []);
                });
            };

            const startRapidFireRecording = async () => {
                if (!rapidFireSentence) return;
                try {
                    let recorder = rapidFireRecorderRef.current;
                    if (!recorder) {
                        setRapidFireBusy(true);
                        recorder = await createWarmMonoRecorder();
                        rapidFireRecorderRef.current = recorder;
                        setRapidFireBusy(false);
                    }
                    recorder.start();
                    setRecording(true);
                    setRapidFireError(null);
                } catch (e) {
                    setRapidFireBusy(false);
                    setRapidFireError('Microphone access denied');
                }
            };

            const finishRapidFireRecording = async (options = {}) => {
                const recorder = rapidFireRecorderRef.current;
                if (!recorder || recorder.state !== 'recording') {
                    setRecording(false);
                    return;
                }
                if (options.autoRestartRapidFire) rapidFireAutostartRef.current = true;
                if (options.discard) rapidFireAutostartRef.current = false;
                setRecording(false);
                const segment = await recorder.stop({discard: options.discard});
                if (!segment || !rapidFireSentence) return;
                setRapidFireBusy(true);
                try {
                    await uploadSentenceTake(rapidFireSentence, segment.wavBytes);
                    setRapidFireError(null);
                    const rows = await loadSentences();
                    const refreshed = rows.find(s => s.id === rapidFireSentence.id) || rapidFireSentence;
                    const nextPool = rapidFirePool && rapidFirePool.length > 0
                        ? rows.filter(s => rapidFirePool.some(p => p.id === s.id))
                        : rows;
                    setRapidFirePool(nextPool);
                    setRapidFireSentence(pickRapidFireSentence(nextPool, refreshed.id));
                    loadStats();
                } catch (e) {
                    rapidFireAutostartRef.current = false;
                    setRapidFireError(e.message);
                } finally {
                    setRapidFireBusy(false);
                }
            };

            const openRapidFireForRows = async (rows, options = {}) => {
                closeRecordings();
                rapidFireAutostartRef.current = false;
                setRapidFireOpen(true);
                setRapidFireError(null);
                setRapidFireBusy(true);
                setRapidFireTitle(options.title || 'Rapid fire');
                setRapidFireHint(options.hint || 'Zero-take sentences are prioritized first, then selection becomes random across the whole set.');
                try {
                    const allRows = rows && rows.length > 0 ? rows : (sentences || await loadSentences());
                    setRapidFirePool(allRows);
                    setRapidFireSentence(pickRapidFireSentence(allRows));
                    if (!rapidFireRecorderRef.current) {
                        rapidFireRecorderRef.current = await createWarmMonoRecorder();
                    }
                } catch (e) {
                    setRapidFireError(e.message);
                } finally {
                    setRapidFireBusy(false);
                }
            };

            const openRapidFire = async () => {
                await openRapidFireForRows(null);
            };

            const decideCounterexampleReview = async (decision) => {
                if (!counterexampleReview || counterexampleReviewBusy) return;
                setCounterexampleReviewBusy(true);
                setCounterexampleReviewError(null);
                setCounterexampleSpeakError(null);
                setCounterexampleDraft(null);
                try {
                    await api('/api/author/counterexample-surfaces/decision', {
                        method: 'POST',
                        body: JSON.stringify({
                            surface_form: counterexampleReview.surface_form,
                            decision,
                        }),
                    });
                    if (decision !== 'keep') {
                        await loadCounterexampleReview();
                    }
                } catch (e) {
                    setCounterexampleReviewError(e.message);
                } finally {
                    setCounterexampleReviewBusy(false);
                }
            };

            const startCounterexampleRecording = async () => {
                if (!counterexampleReview || counterexampleSpeakBusy || counterexampleSpeakRecording) return;
                setCounterexampleSpeakError(null);
                setCounterexampleDraft(null);
                try {
                    const recorder = await startMonoWavRecording(async ({wavBytes}) => {
                        try {
                            setCounterexampleSpeakBusy(true);
                            const params = new URLSearchParams({
                                surface_form: counterexampleReview.surface_form,
                            });
                            const res = await fetch(`/api/author/counterexample-surfaces/transcribe?${params.toString()}`, {
                                method: 'POST',
                                headers: {'Content-Type': 'audio/wav'},
                                body: wavBytes,
                            });
                            const data = await res.json();
                            if (!res.ok) {
                                throw new Error(data?.error || 'failed to transcribe take');
                            }
                            setCounterexampleDraft({
                                wavBytes,
                                sentence: data.qwen_clean || '',
                                containsSurface: !!data.contains_surface,
                            });
                        } catch (e) {
                            setCounterexampleSpeakError(e.message);
                        } finally {
                            setCounterexampleSpeakBusy(false);
                            setCounterexampleSpeakRecording(false);
                        }
                    });
                    counterexampleRecorderRef.current = recorder;
                    setCounterexampleSpeakRecording(true);
                } catch (e) {
                    setCounterexampleSpeakError('Microphone access denied');
                }
            };

            const confirmCounterexampleDraft = async () => {
                if (!counterexampleReview || !counterexampleDraft || counterexampleSpeakBusy) return;
                if (!counterexampleDraft.containsSurface) {
                    setCounterexampleSpeakError(`ASR did not keep "${counterexampleReview.surface_form}" in the sentence.`);
                    return;
                }
                setCounterexampleSpeakBusy(true);
                setCounterexampleSpeakError(null);
                try {
                    const submit = await api('/api/author/submit', {
                        method: 'POST',
                        body: JSON.stringify({
                            term: (counterexampleReview.terms && counterexampleReview.terms[0]) || '',
                            terms: counterexampleReview.terms || [],
                            sentence: counterexampleDraft.sentence,
                            kind: 'counterexample',
                            surface_form: counterexampleReview.surface_form,
                        }),
                    });
                    if (submit.error) throw new Error(submit.error);
                    for (const id of (submit.ids || [submit.id]).filter(Boolean)) {
                        await uploadSentenceTake({id}, counterexampleDraft.wavBytes);
                    }
                    await api('/api/author/counterexample-surfaces/decision', {
                        method: 'POST',
                        body: JSON.stringify({
                            surface_form: counterexampleReview.surface_form,
                            decision: 'keep',
                        }),
                    });
                    await loadSentences();
                    await loadStats();
                    setCounterexampleDraft(null);
                    setCounterexampleSavedCount(n => n + 1);
                    setCounterexampleSpeakError(null);
                } catch (e) {
                    setCounterexampleSpeakError(e.message);
                } finally {
                    setCounterexampleSpeakBusy(false);
                }
            };

            useEffect(() => {
                if (!rapidFireOpen) return;
                const onKeyDown = (e) => {
                    if (e.repeat) return;
                    if (e.key === ' ' || e.code === 'Space') {
                        e.preventDefault();
                        e.stopPropagation();
                        if (recording) {
                            finishRapidFireRecording({autoRestartRapidFire: true});
                        } else if (!recordingBusy && !rapidFireBusy && rapidFireSentence) {
                            startRapidFireRecording();
                        }
                    } else if ((e.key === 'r' || e.key === 'R') && recording) {
                        e.preventDefault();
                        e.stopPropagation();
                        finishRapidFireRecording({discard: true}).then(() => startRapidFireRecording());
                    } else if (e.key === 'Escape') {
                        e.preventDefault();
                        e.stopPropagation();
                        closeRapidFire();
                    }
                };
                window.addEventListener('keydown', onKeyDown, true);
                return () => window.removeEventListener('keydown', onKeyDown, true);
            }, [rapidFireOpen, recording, recordingBusy, rapidFireBusy, rapidFireSentence?.id]);

            useEffect(() => {
                if (!rapidFireOpen || !rapidFireAutostartRef.current) return;
                if (recording || recordingBusy || rapidFireBusy || !rapidFireSentence) return;
                rapidFireAutostartRef.current = false;
                startRapidFireRecording();
            }, [rapidFireOpen, recording, recordingBusy, rapidFireBusy, rapidFireSentence?.id]);

            const deleteRecording = async (recordingRow) => {
                if (!confirm(`Delete take #${recordingRow.take_no}?`)) return;
                await api(`/api/author/recordings/${recordingRow.id}`, {method: 'POST'});
                if (recordingSentence) await loadRecordings(recordingSentence);
                api('/api/author/sentences').then(setSentences).catch(() => {});
                loadStats();
            };

            useEffect(() => {
                (async () => {
                    const nextStats = await loadStats();
                    await loadAuthorTerms(nextStats);
                    await loadNext();
                    await loadCounterexampleReview();
                })();
            }, []);

            const submit = async () => {
                if (!sentence.trim() || !term) return;
                setSaving(true); setError(null);
                try {
                    const payload = {
                        term: term.term,
                        sentence: sentence.trim(),
                        kind: authorMode,
                        surface_form: authorMode === 'counterexample' ? counterSurface.trim() : null,
                    };
                    const res = await api('/api/author/submit', {method: 'POST', body: JSON.stringify(payload)});
                    if (res.error) { setError(res.error); setSaving(false); return; }
                    setSentence('');
                    if (authorMode === 'counterexample') setCounterSurface('');
                    if (authorMode === 'term') setSentenceCount(c => c + 1);
                    const nextStats = await loadStats();
                    // 50% chance to move to next term (so you write multiple per term)
                    if (termLocked) {
                        await focusTermByName(termPicker || term.term, nextStats);
                    } else if (Math.random() < 0.5 || sentenceCount >= 4) {
                        await loadNext();
                    } else {
                        setTimeout(() => inputRef.current?.focus(), 50);
                    }
                } catch (e) { setError(e.message); }
                setSaving(false);
            };

            const skip = async () => {
                if (termLocked && termPicker.trim()) {
                    setSentence('');
                    setCounterSurface('');
                    setTimeout(() => inputRef.current?.focus(), 50);
                    return;
                }
                await loadNext();
            };

            return (
                <div className="container">
                    <h2>Author Sentences</h2>

                    {stats && (
                        <div className="stats-grid" style={{marginBottom:16}}>
                            <div className="stat-card"><div className="value" style={{color:'var(--success)'}}>{stats.total_sentences}</div><div className="label">Sentences</div></div>
                            <div className="stat-card"><div className="value" style={{color:'var(--accent)'}}>{stats.counterexample_total || 0}</div><div className="label">Counterexamples</div></div>
                            <div className="stat-card"><div className="value">{stats.terms?.length || 0}</div><div className="label">Terms Covered</div></div>
                            <div className="stat-card"><div className="value">{stats.vocab_count || 0}</div><div className="label">Vocab Total</div></div>
                            <div className="stat-card"><div className="value" style={{color:'var(--accent)'}}>{stats.recordings_total || 0}</div><div className="label">Recordings</div></div>
                        </div>
                    )}

                    <div className="card" style={{marginBottom:12}}>
                        <div style={{display:'flex',alignItems:'end',gap:8,flexWrap:'wrap'}}>
                            <div style={{display:'grid',gap:6,flex:'1 1 320px'}}>
                                <label style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1}}>Focus term</label>
                                <input
                                    list="author-term-options"
                                    value={termPicker}
                                    onChange={e => setTermPicker(e.target.value)}
                                    placeholder="Pick a term to stay on, e.g. reqwest"
                                    style={{padding:'8px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontFamily:'Jost,sans-serif',fontSize:14}}
                                />
                                <datalist id="author-term-options">
                                    {authorTerms.map(row => <option key={row.term} value={row.term} />)}
                                </datalist>
                            </div>
                            <button className={`btn btn-sm ${termLocked ? 'btn-primary' : ''}`} onClick={async () => {
                                const ok = await focusTermByName(termPicker || term?.term || '', stats);
                                if (ok) setTermLocked(true);
                            }}>Lock to term</button>
                            <button className="btn btn-sm" onClick={() => {
                                setTermLocked(false);
                                setError(null);
                                loadNext();
                            }}>Random queue</button>
                        </div>
                        <div style={{marginTop:8,fontSize:12,color:'var(--text-muted)'}}>
                            {termLocked
                                ? `Locked to ${termPicker || term?.term || 'selected term'}. Save/skip will stay on this term.`
                                : 'Unlocked. The page will keep pulling random terms that need more coverage.'}
                        </div>
                    </div>

                    <div style={{display:'flex',gap:8,marginBottom:12}}>
                        <button className="btn btn-sm" disabled={spellLoading} onClick={async () => {
                            setSpellLoading(true); setSpellIssues(null);
                            try {
                                if (!sentences) await loadSentences();
                                const r = await api('/api/author/spellcheck', {method:'POST'});
                                setSpellIssues(r.issues);
                            }
                            catch (e) { setError(e.message); }
                            setSpellLoading(false);
                        }}>{spellLoading ? 'Checking...' : 'Spellcheck'}</button>
                        <button className="btn btn-sm" disabled={suggestLoading} onClick={async () => {
                            setSuggestLoading(true); setSuggestions(null);
                            try { const r = await api('/api/author/suggest-vocab', {method:'POST'}); setSuggestions(r.suggestions || []); }
                            catch (e) { setError(e.message); }
                            setSuggestLoading(false);
                        }}>{suggestLoading ? 'Thinking...' : 'Suggest Vocab'}</button>
                        <button className="btn btn-sm" disabled={sentSuggestLoading} onClick={async () => {
                            setSentSuggestLoading(true); setSentSuggestions(null); setSentSuggestIdx(0);
                            try { const r = await api('/api/author/suggest-sentences', {method:'POST'}); setSentSuggestions(r.suggestions || []); }
                            catch (e) { setError(e.message); }
                            setSentSuggestLoading(false);
                            setTimeout(() => sentSuggestRef.current?.focus(), 100);
                        }}>{sentSuggestLoading ? 'Thinking...' : 'Suggest Sentences'}</button>
                        <button className="btn btn-sm btn-primary" onClick={openRapidFire}>Rapid fire</button>
                    </div>

                    {spellIssues && (
                        <div className="card" style={{marginBottom:12}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                                <h3 style={{margin:0}}>Spellcheck Results</h3>
                                <span style={{fontSize:12,color:'var(--text-muted)'}}>{spellIssueList.length} issue{spellIssueList.length === 1 ? '' : 's'}</span>
                                <button onClick={() => setSpellIssues(null)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer'}}>&times;</button>
                            </div>
                            {spellIssueList.length === 0
                                ? <div style={{color:'var(--success)',fontSize:13}}>No issues found!</div>
                                : spellIssueList.map((issue, i) => (
                                    <div key={`${issue.id}-${issue.original}-${issue.suggestion}-${i}`} style={{padding:'8px 0',borderBottom:'1px solid rgba(255,255,255,0.04)',fontSize:12}}>
                                        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                                            <span style={{color:'var(--text-muted)',minWidth:30}}>#{issue.id}</span>
                                            <span style={{color:'var(--error)',textDecoration:'line-through'}}>{issue.original}</span>
                                            <span style={{color:'var(--text-muted)'}}>&rarr;</span>
                                            <span style={{color:'var(--success)',fontWeight:600}}>{issue.suggestion}</span>
                                            <span style={{color:'var(--text-muted)',fontSize:11,flex:1}}>{issue.reason}</span>
                                            <button className="btn btn-sm btn-primary" onClick={() => acceptSpellIssue(issue)}>Accept</button>
                                        </div>
                                        {renderSpellPreview(issue)}
                                    </div>
                                ))
                            }
                        </div>
                    )}

                    {suggestions && (() => {
                        const s = suggestions[suggestIdx];
                        if (!s) return (
                            <div className="card" style={{marginBottom:12,textAlign:'center',padding:24}}>
                                <div style={{color:'var(--success)',fontSize:16,marginBottom:8}}>All {suggestions.length === 0 ? 'suggestions' : suggestions.length + ' suggestions'} reviewed!</div>
                                <button className="btn btn-sm" onClick={() => setSuggestions(null)}>Close</button>
                            </div>
                        );
                        const pron = s._override ?? s.pronunciation;
                        const spokenSentence = s.sentence ? (() => {
                            const idx = s.sentence.toLowerCase().indexOf(s.term.toLowerCase());
                            if (idx >= 0) return s.sentence.slice(0, idx) + pron + s.sentence.slice(idx + s.term.length);
                            return s.sentence;
                        })() : pron;
                        const doAdd = async () => {
                            stopPlayback();
                            await api('/api/vocab', {method:'POST', body: JSON.stringify({term: s.term, spoken_override: pron, description: s.description})});
                            setSuggestions(prev => { const n = prev.filter((_, j) => j !== suggestIdx); return n; });
                            setSuggestIdx(i => Math.min(i, suggestions.length - 2));
                            loadStats();
                            setTimeout(() => suggestPronRef.current?.focus(), 50);
                        };
                        const doSkip = () => {
                            stopPlayback();
                            api('/api/author/reject-suggestion', {method:'POST', body: JSON.stringify({term: s.term})}).catch(() => {});
                            setSuggestions(prev => prev.filter((_, j) => j !== suggestIdx));
                            setSuggestIdx(i => Math.min(i, suggestions.length - 2));
                            setTimeout(() => suggestPronRef.current?.focus(), 50);
                        };
                        const doPlay = () => {
                            stopPlayback();
                            const currentPron = suggestPronRef.current?.value ?? pron;
                            const currentSpoken = s.sentence ? (() => {
                                const idx = s.sentence.toLowerCase().indexOf(s.term.toLowerCase());
                                if (idx >= 0) return s.sentence.slice(0, idx) + currentPron + s.sentence.slice(idx + s.term.length);
                                return s.sentence;
                            })() : currentPron;
                            fetchTtsBuffer(currentSpoken).then(buf => playBuffer(buf)).catch(() => {});
                        };
                        return (
                        <div className="card" style={{marginBottom:12}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                                <h3 style={{margin:0}}>Suggested Vocab</h3>
                                <span style={{fontSize:12,color:'var(--text-muted)'}}>{suggestIdx + 1} / {suggestions.length}</span>
                                <div style={{flex:1}} />
                                <button onClick={() => setSuggestions(null)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:16}}>&times;</button>
                            </div>
                            <div style={{textAlign:'center',marginBottom:12}}>
                                <div style={{fontSize:28,fontWeight:700,fontFamily:'monospace',color:'var(--text)'}}>{s.term}</div>
                                {s.description && <div style={{fontSize:12,color:'var(--text-muted)',marginTop:4}}>{s.description}</div>}
                                {s.sentence && <div style={{marginTop:6,color:'var(--text-muted)',fontSize:13,fontStyle:'italic'}}>"{s.sentence}"</div>}
                            </div>
                            <div style={{display:'flex',gap:8,alignItems:'center',justifyContent:'center',marginBottom:12}}>
                                <label style={{fontSize:11,color:'var(--text-muted)'}}>Pronunciation:</label>
                                <input ref={suggestPronRef} value={pron}
                                    onChange={e => setSuggestions(prev => prev.map((x, j) => j === suggestIdx ? {...x, _override: e.target.value} : x))}
                                    onKeyDown={e => {
                                        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); doAdd(); }
                                        else if (e.key === 'Enter') { e.preventDefault(); doPlay(); }
                                        else if (e.key === 'Escape') { e.preventDefault(); doSkip(); }
                                    }}
                                    autoFocus
                                    style={{padding:'6px 10px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--accent)',fontSize:15,fontFamily:'Jost,sans-serif',width:200,textAlign:'center'}} />
                                <button onClick={doPlay} style={{background:'none',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',cursor:'pointer',padding:'4px 10px',fontSize:13}}>&#9654;</button>
                            </div>
                            <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                                <button className="btn btn-primary" onClick={doAdd}>Add ({'\u2318\u23CE'})</button>
                                <button className="btn" onClick={doSkip}>Skip (Esc)</button>
                                <span style={{fontSize:10,color:'var(--text-muted)',marginLeft:8}}>Enter = play</span>
                            </div>
                        </div>
                        );
                    })()}

                    {sentSuggestions && (() => {
                        const s = sentSuggestions[sentSuggestIdx];
                        if (!s) return (
                            <div className="card" style={{marginBottom:12,textAlign:'center',padding:24}}>
                                <div style={{color:'var(--success)',fontSize:16,marginBottom:8}}>All sentence suggestions reviewed!</div>
                                <button className="btn btn-sm" onClick={() => setSentSuggestions(null)}>Close</button>
                            </div>
                        );
                        // Build spoken version by replacing term with its override
                        const vocab = stats?.terms || [];
                        const spokenSentence = (() => {
                            // Look up the pronunciation for this term
                            // We need to fetch it — for now just use the sentence as-is for TTS
                            // The TTS will handle it based on the term's spoken form
                            return s._edited ?? s.sentence;
                        })();
                        const doAccept = async () => {
                            stopPlayback();
                            const sent = s._edited ?? s.sentence;
                            await api('/api/author/submit', {method:'POST', body: JSON.stringify({term: s.term, sentence: sent})});
                            setSentSuggestions(prev => prev.filter((_, j) => j !== sentSuggestIdx));
                            setSentSuggestIdx(i => Math.min(i, sentSuggestions.length - 2));
                            loadStats();
                            setTimeout(() => sentSuggestRef.current?.focus(), 50);
                        };
                        const doSkipSent = () => {
                            stopPlayback();
                            setSentSuggestions(prev => prev.filter((_, j) => j !== sentSuggestIdx));
                            setSentSuggestIdx(i => Math.min(i, sentSuggestions.length - 2));
                            setTimeout(() => sentSuggestRef.current?.focus(), 50);
                        };
                        const doPlaySent = () => {
                            const text = s._edited ?? s.sentence;
                            fetchTtsBuffer(text).then(buf => playBuffer(buf)).catch(() => {});
                        };
                        return (
                        <div className="card" style={{marginBottom:12}}>
                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                                <h3 style={{margin:0}}>Suggested Sentences</h3>
                                <span style={{fontSize:12,color:'var(--text-muted)'}}>{sentSuggestIdx + 1} / {sentSuggestions.length}</span>
                                <div style={{flex:1}} />
                                <button onClick={() => setSentSuggestions(null)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:16}}>&times;</button>
                            </div>
                            <div style={{textAlign:'center',marginBottom:8}}>
                                <span style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1}}>Term:</span>
                                <span style={{fontSize:18,fontWeight:700,fontFamily:'monospace',color:'var(--accent)',marginLeft:8}}>{s.term}</span>
                            </div>
                            <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12}}>
                                <input ref={sentSuggestRef} value={s._edited ?? s.sentence}
                                    onChange={e => setSentSuggestions(prev => prev.map((x, j) => j === sentSuggestIdx ? {...x, _edited: e.target.value} : x))}
                                    onKeyDown={e => {
                                        if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); doAccept(); }
                                        else if (e.key === 'Enter') { e.preventDefault(); doPlaySent(); }
                                        else if (e.key === 'Escape') { e.preventDefault(); doSkipSent(); }
                                    }}
                                    autoFocus
                                    style={{flex:1,padding:'8px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontSize:14,fontFamily:'Jost,sans-serif'}} />
                                <button onClick={doPlaySent} style={{background:'none',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',cursor:'pointer',padding:'4px 10px',fontSize:13}}>&#9654;</button>
                            </div>
                            <div style={{display:'flex',gap:8,justifyContent:'center'}}>
                                <button className="btn btn-primary" onClick={doAccept}>Accept ({'\u2318\u23CE'})</button>
                                <button className="btn" onClick={doSkipSent}>Skip (Esc)</button>
                                <span style={{fontSize:10,color:'var(--text-muted)',marginLeft:8}}>Enter = play</span>
                            </div>
                        </div>
                        );
                    })()}

                    <div className="card" style={{marginBottom:12}}>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:12,marginBottom:10,flexWrap:'wrap'}}>
                            <div>
                                <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>Counterexample drill</div>
                                <div style={{fontSize:13,color:'var(--text-muted)'}}>Review one ambiguous surface at a time. If it is a legitimate word, speak a sentence using it, inspect the ASR transcript, then confirm to save it as a counterexample.</div>
                            </div>
                            <button className="btn btn-sm" onClick={loadCounterexampleReview} disabled={counterexampleReviewBusy || counterexampleSpeakBusy}>Refresh</button>
                        </div>
                        {counterexampleReviewError && <div className="pipeline-error" style={{marginBottom:12}}>{counterexampleReviewError}</div>}
                        {counterexampleSpeakError && <div className="pipeline-error" style={{marginBottom:12}}>{counterexampleSpeakError}</div>}
                        {!counterexampleReview ? (
                            <div style={{fontSize:13,color:'var(--text-muted)'}}>No unreviewed ambiguous surfaces right now.</div>
                        ) : (
                            <div style={{display:'grid',gap:12}}>
                                <div style={{display:'grid',gap:6,justifyItems:'center',textAlign:'center'}}>
                                    <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1}}>Should this surface ever stay unchanged?</div>
                                    <div style={{fontSize:30,fontFamily:'monospace',color:'var(--warning)',fontWeight:700}}>{counterexampleReview.surface_form}</div>
                                    <div style={{fontSize:13,color:'var(--text-muted)'}}>
                                        {counterexampleReview.hit_count} hits across {counterexampleReview.distinct_terms || (counterexampleReview.terms || []).length || 1} term{((counterexampleReview.distinct_terms || (counterexampleReview.terms || []).length || 1) === 1) ? '' : 's'}
                                    </div>
                                </div>
                                <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
                                    <button className="btn btn-primary btn-sm" onClick={() => decideCounterexampleReview('keep')} disabled={counterexampleReviewBusy || counterexampleSpeakBusy}>Keep sometimes</button>
                                    <button className="btn btn-sm" onClick={() => decideCounterexampleReview('garbage')} disabled={counterexampleReviewBusy || counterexampleSpeakBusy}>Just garbage</button>
                                    <button className="btn btn-sm" onClick={() => decideCounterexampleReview('skip')} disabled={counterexampleReviewBusy || counterexampleSpeakBusy}>Skip</button>
                                    <button className="btn btn-sm" onClick={async () => {
                                        setAuthorMode('counterexample');
                                        setCounterSurface(counterexampleReview.surface_form || '');
                                        setTermPicker((counterexampleReview.terms && counterexampleReview.terms[0]) || '');
                                        setTermLocked(true);
                                        setError(null);
                                        if ((counterexampleReview.terms && counterexampleReview.terms[0])) {
                                            await focusTermByName(counterexampleReview.terms[0], stats);
                                        }
                                        setCounterSurface(counterexampleReview.surface_form || '');
                                        setTimeout(() => inputRef.current?.focus(), 50);
                                    }} disabled={counterexampleReviewBusy || counterexampleSpeakBusy}>Manual</button>
                                </div>

                                <div style={{display:'grid',gap:12,paddingTop:12,borderTop:'1px solid var(--border)'}}>

                                    <div style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.5}}>
                                        Say any sentence where <span style={{fontFamily:'monospace',color:'var(--warning)'}}>{counterexampleReview.surface_form}</span> is actually correct and should stay unchanged.
                                    </div>
                                    {counterexampleSavedCount > 0 && (
                                        <div style={{display:'flex',gap:8,alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',padding:'8px 10px',border:'1px solid var(--border)',borderRadius:8,background:'rgba(63,185,80,0.08)'}}>

                                            </div>
                                            <button className="btn btn-sm" onClick={loadCounterexampleReview} disabled={counterexampleSpeakBusy || counterexampleReviewBusy}>
                                                Next surface
                                            </button>
                                        </div>
                                    )}

                                        <button className={`record-btn ${counterexampleSpeakRecording ? 'active' : ''}`} onClick={counterexampleSpeakRecording ? () => stopCounterexampleRecording() : startCounterexampleRecording} disabled={counterexampleSpeakBusy || counterexampleReviewBusy}

                                                    ? 'Transcribing or saving...'
                                                    : 'Record, inspect the transcript, then confirm if ASR heard it correctly'}
                                        </span>
                                    </div>
                                    {counterexampleDraft && (
                                        <div style={{display:'grid',gap:8,padding:'10px 12px',border:'1px solid var(--border)',borderRadius:8,background:'rgba(255,255,255,0.02)'}}>
                                            <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1}}>ASR heard</div>
                                            <div style={{fontSize:15,lineHeight:1.5}}>{counterexampleDraft.sentence || <span style={{color:'var(--text-muted)'}}>(empty)</span>}</div>
                                            <div style={{fontSize:12,color:counterexampleDraft.containsSurface ? 'var(--success)' : 'var(--warning)'}}>
                                                {counterexampleDraft.containsSurface

                                            </div>
                                            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>

                                                <button className="btn btn-sm" onClick={() => { setCounterexampleDraft(null); setCounterexampleSpeakError(null); }} disabled={counterexampleSpeakBusy}>Discard</button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>

                    {error && <div className="pipeline-error" style={{marginBottom:12}}>{error}</div>}

                    {!term ? (
                        <div className="card" style={{textAlign:'center',padding:32}}>
                            <p style={{color:'var(--text-muted)',fontSize:16}}>No vocab terms available. Add terms with overrides on the Vocab tab first.</p>
                        </div>
                    ) : (
                        <div className="card">
                            <div style={{textAlign:'center',marginBottom:16}}>
                                <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1,marginBottom:4}}>Write a sentence using</div>
                                <div style={{fontSize:32,fontWeight:700,fontFamily:'monospace',color:'var(--accent)'}}>{term.term}</div>
                                {term.spoken !== term.term && <div style={{fontSize:13,color:'var(--text-muted)',marginTop:4}}>pronounced "{term.spoken}"</div>}
                                <div style={{fontSize:11,color:'var(--text-muted)',marginTop:8}}>{sentenceCount} sentence{sentenceCount !== 1 ? 's' : ''} so far</div>
                            </div>
                            <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:12}}>
                                <button className={`btn btn-sm ${authorMode === 'term' ? 'btn-primary' : ''}`} onClick={() => setAuthorMode('term')}>Term sentence</button>
                                <button className={`btn btn-sm ${authorMode === 'counterexample' ? 'btn-primary' : ''}`} onClick={() => setAuthorMode('counterexample')}>Counterexample</button>
                            </div>
                            {authorMode === 'counterexample' && (
                                <div style={{display:'grid',gap:8,marginBottom:12}}>
                                    <div style={{fontSize:12,color:'var(--text-muted)',textAlign:'center'}}>
                                        Write a sentence where the ambiguous ASR surface is correct and should not be rewritten to <span style={{color:'var(--accent)',fontFamily:'monospace'}}>{term.term}</span>.
                                    </div>
                                    <div style={{fontSize:11,color:'var(--text-muted)',textAlign:'center'}}>
                                        Example: canonical <span style={{fontFamily:'monospace',color:'var(--accent)'}}>reqwest</span>, surface form <span style={{fontFamily:'monospace'}}>request</span>, sentence: <span style={{fontStyle:'italic'}}>I put in a request for vacation time.</span>
                                    </div>
                                    <div style={{display:'grid',gap:6}}>
                                        <label style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1}}>Ambiguous surface form</label>
                                        <input
                                            value={counterSurface}
                                            onChange={e => setCounterSurface(e.target.value)}
                                            placeholder={`What should stay unchanged here? e.g. dwarf`}
                                            style={{padding:'8px 12px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontFamily:'Jost,sans-serif',fontSize:14}}
                                        />
                                    </div>
                                    <input
                                        readOnly
                                        value={counterSurface
                                            ? `This sentence must contain "${counterSurface}" and must not contain "${term.term}".`
                                            : `Enter the ambiguous surface form first.`}
                                        style={{padding:'8px 12px',background:'rgba(255,255,255,0.03)',border:'1px dashed var(--border)',borderRadius:6,color:'var(--text-muted)',fontFamily:'Jost,sans-serif',fontSize:13}}
                                    />
                                </div>
                            )}
                            <div style={{display:'grid',gap:6}}>
                                <label style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1}}>
                                    {authorMode === 'counterexample' ? 'Counterexample sentence' : 'Sentence'}
                                </label>
                                <div style={{display:'flex',gap:8}}>
                                    <input ref={inputRef} type="text" value={sentence} onChange={e => setSentence(e.target.value)}
                                        placeholder={authorMode === 'counterexample'
                                            ? (counterSurface.trim()
                                                ? `Type a sentence containing "${counterSurface.trim()}" but not "${term.term}"...`
                                                : `Enter the ambiguous surface form above first...`)
                                            : `Type a sentence containing "${term.term}"...`}
                                        onKeyDown={e => {
                                            if (e.key === 'Enter' && (e.metaKey || e.ctrlKey) && sentence.trim()) { e.preventDefault(); submit(); }
                                        }}
                                        disabled={authorMode === 'counterexample' && !counterSurface.trim()}
                                        style={{flex:1,padding:'10px 14px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontFamily:'Jost,sans-serif',fontSize:15}} />
                                    <button className="btn btn-primary" onClick={submit} disabled={saving || !sentence.trim() || (authorMode === 'counterexample' && !counterSurface.trim())}>Save ({'\u2318\u23CE'})</button>
                                    <button className="btn" onClick={skip} style={{color:'var(--text-muted)'}}>Skip</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {stats?.terms?.length > 0 && (
                        <div style={{marginTop:24}}>
                            <h3>Coverage</h3>
                            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                                {stats.terms.map(([term, count]) => (
                                    <span key={term} style={{fontSize:12,padding:'2px 8px',borderRadius:10,cursor:'pointer',
                                        background: count >= 3 ? 'rgba(126,231,135,0.15)' : count >= 1 ? 'rgba(88,166,255,0.15)' : 'rgba(255,255,255,0.05)',
                                        color: count >= 3 ? 'var(--success)' : count >= 1 ? 'var(--accent)' : 'var(--text-muted)',
                                        border: `1px solid ${count >= 3 ? 'rgba(126,231,135,0.3)' : count >= 1 ? 'rgba(88,166,255,0.3)' : 'var(--border)'}`,
                                    }} onClick={() => { setSentenceFilter(term); if (!sentences) api('/api/author/sentences').then(setSentences); }}>{term} <b>{count}</b></span>
                                ))}
                            </div>
                        </div>
                    )}

                    <div style={{marginTop:24}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                            <h3 style={{margin:0}}>Sentences</h3>
                            {!sentences && <button className="btn btn-sm" onClick={() => api('/api/author/sentences').then(setSentences)}>Show</button>}
                            {sentences && <>
                                <span style={{fontSize:12,color:'var(--text-muted)'}}>{sentences.length} total</span>
                                <input type="text" placeholder="Filter by term..." value={sentenceFilter} onChange={e => setSentenceFilter(e.target.value)}
                                    style={{marginLeft:8,padding:'3px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontSize:12,fontFamily:'Jost,sans-serif'}} />
                            </>}
                        </div>
                        {sentences && (() => {
                            const f = sentenceFilter.toLowerCase();

                                <div style={{maxHeight:400,overflow:'auto',border:'1px solid var(--border)',borderRadius:8,background:'var(--bg)'}}>
                                    {filtered.map(s => (
                                        <div key={s.id} style={{padding:'6px 10px',borderBottom:'1px solid rgba(255,255,255,0.04)',fontSize:12,display:'flex',alignItems:'center',gap:8}}>

                                            <span style={{
                                                fontSize:10,
                                                padding:'2px 6px',
                                                borderRadius:999,
                                                border:'1px solid var(--border)',
                                                color:s.kind === 'counterexample' ? 'var(--warning)' : 'var(--text-muted)'
                                            }}>
                                                {s.kind === 'counterexample' ? `counterexample${s.surface_form ? `: ${s.surface_form}` : ''}` : 'term'}
                                            </span>
                                            {editingId === s.id ? (
                                                <input value={editValue} onChange={e => setEditValue(e.target.value)} autoFocus

                                                            await api(`/api/author/sentences/${s.id}`, {method:'POST', body: JSON.stringify({sentence: editValue})});
                                                            setEditingId(null); api('/api/author/sentences').then(setSentences); loadStats();

                                                        if (e.key === 'Escape') setEditingId(null);

                                    {filtered.length === 0 && <div style={{padding:16,textAlign:'center',color:'var(--text-muted)'}}>No sentences{f ? ' matching filter' : ''}</div>}

                                    <div className="term" style={{flex:1,textAlign:'left'}}>{recordingSentence.term}</div>

                                        <span style={{fontSize:11,color:'var(--warning)',border:'1px solid var(--border)',borderRadius:999,padding:'2px 8px'}}>

                                    <button onClick={closeRecordings} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:18}}>&times;</button>
                                </div>
                                <div style={{color:'var(--text-muted)',fontSize:13,marginBottom:12,lineHeight:1.5}}>
                                    Record multiple takes of the same sentence. These recordings are stored separately and eval will use them instead of synthetic TTS audio.
                                </div>
                                <div style={{fontSize:18,lineHeight:1.6,marginBottom:12,textAlign:'center'}}>{recordingSentence.sentence}</div>
                                {recordingError && <div className="pipeline-error" style={{marginBottom:12}}>{recordingError}</div>}
                                <div style={{display:'flex',gap:8,alignItems:'center',justifyContent:'center',marginBottom:12}}>
                                    <button className={`record-btn ${recording ? 'active' : ''}`} onClick={recording ? stopSentenceRecording : startSentenceRecording} disabled={recordingBusy}

                                        {recordingBusy ? '…' : recording ? '\u25A0' : '\u25CF'}
                                    </button>
                                    <span style={{fontSize:12,color:'var(--text-muted)'}}>
                                        {recording ? 'Recording... press the button again to stop' : recordingBusy ? 'Saving take...' : 'Press the button to record another take'}

                                </div>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
                                    <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1}}>Takes</div>
                                    <div style={{fontSize:11,color:'var(--text-muted)'}}>{recordings.length} saved</div>
                                </div>
                                <div style={{maxHeight:320,overflow:'auto',border:'1px solid var(--border)',borderRadius:8,background:'var(--bg)'}}>
                                    {recordings.length === 0 ? (
                                        <div style={{padding:16,textAlign:'center',color:'var(--text-muted)'}}>No takes yet.</div>
                                    ) : recordings.map(r => (
                                        <div key={r.id} style={{padding:'8px 10px',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                                            <div style={{display:'flex',alignItems:'center',gap:8}}>
                                                <span style={{minWidth:70,fontFamily:'monospace',color:'var(--accent)',fontWeight:600}}>Take {r.take_no}</span>
