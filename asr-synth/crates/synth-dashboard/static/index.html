        // ==================== SHARED: Alignment Timeline ====================

        function AlignmentView({data}) {
            if (!data) return null;
            const ex = data.extraction || {};
            const al = data.alignments || {};
            const spokenItems = al.spoken || [];
            const origItems = al.original || [];
            const qwenItems = al.qwen || [];
            const paraItems = al.parakeet || [];
            const allItems = [...spokenItems, ...origItems, ...qwenItems, ...paraItems];
            const maxTime = allItems.length ? Math.max(...allItems.map(a => a.e)) : 1;
            const pct = t => (t / maxTime * 100).toFixed(2) + '%';

            const [playbackTime, setPlaybackTime] = useState(-1);
            const audioRef = useRef(null);
            const animRef = useRef(null);

            const rangeIndices = (items, range) => {
                if (!range || range.length < 2) return new Set();
                const [lo, hi] = range;
                const indices = new Set();
                for (let i = 0; i < items.length; i++) {
                    if (items[i].e > lo && items[i].s < hi) indices.add(i);
                }
                return indices;
            };
            const consRange = ex.cons_range;
            const origIdx = rangeIndices(origItems, consRange);
            const qwenIdx = rangeIndices(qwenItems, consRange);
            const paraIdx = rangeIndices(paraItems, consRange);

            // Build trimmed-word index sets from trim_info
            const ti = data.trim_info;
            const trimmedIndices = (preWords, items) => {
                if (!ti || !preWords || !preWords.length) return new Set();
                const s = new Set();
                // Match pre-trim words to timeline items by position within the consensus range
                const inRange = [];
                for (let i = 0; i < items.length; i++) {
                    if (consRange && items[i].e > consRange[0] && items[i].s < consRange[1]) inRange.push(i);
                }
                // trimmed_left from start, trimmed_right from end
                for (let i = 0; i < (ti.trimmed_left || 0) && i < inRange.length; i++) s.add(inRange[i]);
                for (let i = 0; i < (ti.trimmed_right || 0) && i < inRange.length; i++) s.add(inRange[inRange.length - 1 - i]);
                return s;
            };
            const origTrimmed = trimmedIndices(ti?.pre_orig, origItems);
            const qwenTrimmed = trimmedIndices(ti?.pre_qwen, qwenItems);
            const paraTrimmed = trimmedIndices(ti?.pre_para, paraItems);

            const renderTimeline = (label, items, color, highlighted, trimmed) => items.length > 0 && (
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>
                    <span style={{fontSize:9,color:'var(--text-muted)',width:55,textAlign:'right',flexShrink:0,fontWeight:600}}>{label}</span>
                    <div style={{position:'relative',flex:1,height:22,background:'rgba(255,255,255,0.03)',borderRadius:3,overflow:'hidden'}}>
                        {items.map((a, j) => {
                            const hl = highlighted.has(j);
                            const tr = trimmed.has(j);
                            const playing = playbackTime >= 0 && playbackTime >= a.s && playbackTime < a.e;
                            return (<div key={j} title={`${a.w} (${a.s}s\u2013${a.e}s)${tr ? ' [trimmed]' : ''}`} style={{
                                position:'absolute', left:pct(a.s), width:pct(Math.max(a.e - a.s, 0.02)), top:2, bottom:2, borderRadius:2,
                                background: playing ? '#fff3' : tr ? 'rgba(255,100,100,0.15)' : hl ? color : 'rgba(255,255,255,0.08)',
                                border:`1px solid ${playing ? '#fff8' : tr ? 'rgba(255,100,100,0.4)' : hl ? color : 'rgba(255,255,255,0.12)'}`,
                                display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden',
                                transition: 'background 0.05s',
                            }}><span style={{fontSize:8, color: playing ? '#fff' : tr ? 'rgba(255,100,100,0.6)' : hl ? '#fff' : 'var(--text-muted)', whiteSpace:'nowrap', padding:'0 2px',
                                fontWeight: playing ? 700 : 400, textDecoration: tr ? 'line-through' : 'none'}}>{a.w}</span></div>);
                        })}
                        {consRange && <div style={{position:'absolute',left:pct(consRange[0]),width:pct(consRange[1]-consRange[0]),top:0,bottom:0,border:'1px dashed rgba(255,255,255,0.3)',borderRadius:2,pointerEvents:'none'}} />}
                        {playbackTime >= 0 && <div style={{position:'absolute',left:pct(playbackTime),top:0,bottom:0,width:1,background:'#fff',zIndex:10,pointerEvents:'none'}} />}
                    </div>
                </div>
            );

            const playWav = () => {
                if (!data.wav_b64) return;
                if (audioRef.current) { audioRef.current.pause(); }
                const bin = atob(data.wav_b64);
                const buf = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
                const blob = new Blob([buf], {type: 'audio/wav'});
                const url = URL.createObjectURL(blob);
                const a = new Audio(url);
                audioRef.current = a;
                const tick = () => {
                    if (!a.paused) {
                        setPlaybackTime(a.currentTime);
                        animRef.current = requestAnimationFrame(tick);
                    }
                };
                a.onplay = () => { animRef.current = requestAnimationFrame(tick); };
                a.onended = () => { setPlaybackTime(-1); URL.revokeObjectURL(url); cancelAnimationFrame(animRef.current); };
                a.onpause = () => { cancelAnimationFrame(animRef.current); };
                a.play();
            };

            const origMatch = ex.original?.toLowerCase().replace(/[.,!?]/g,'').trim();
            const qwenMatch = ex.qwen?.toLowerCase().replace(/[.,!?]/g,'').trim() === origMatch;
            const paraMatch = ex.parakeet?.toLowerCase().replace(/[.,!?]/g,'').trim() === origMatch;

            return (
                <div style={{fontSize:12,lineHeight:1.6}}>
                    <div style={{display:'flex',gap:16,padding:'6px 10px',background:'rgba(0,0,0,0.2)',borderRadius:4,fontFamily:'monospace',fontSize:13,marginBottom:6,alignItems:'center'}}>
                        <div><span style={{color:'rgba(88,166,255,0.7)',fontWeight:600}}>{ex.original||'—'}</span><span style={{color:'var(--text-muted)',fontSize:10,marginLeft:4}}>orig</span></div>
                        <div style={{color:'var(--text-muted)'}}>&rarr;</div>
                        <div><span style={{color:qwenMatch?'var(--success)':'var(--error)',fontWeight:600}}>{ex.qwen||'—'}</span><span style={{color:'var(--text-muted)',fontSize:10,marginLeft:4}}>Q</span></div>
                        <div><span style={{color:paraMatch?'var(--success)':'var(--error)',fontWeight:600}}>{ex.parakeet||'—'}</span><span style={{color:'var(--text-muted)',fontSize:10,marginLeft:4}}>P</span></div>
                        {ex.clean === false && <span style={{color:'var(--warning)',fontSize:11}}>noisy</span>}
                        {ex.clean === true && <span style={{color:'var(--success)',fontSize:11}}>clean</span>}
                        <div style={{flex:1}} />
                        {data.wav_b64 && <button onClick={playWav} style={{background:'none',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',cursor:'pointer',padding:'2px 10px',fontSize:11}}>&#9654;</button>}
                    </div>
                    <div style={{marginBottom:4}}>
                        {renderTimeline('Spoken', spokenItems, 'rgba(126,231,135,0.5)', new Set(), new Set())}
                        {renderTimeline('Original', origItems, 'rgba(88,166,255,0.6)', origIdx, origTrimmed)}
                        {renderTimeline('Qwen', qwenItems, 'rgba(210,153,34,0.7)', qwenIdx, qwenTrimmed)}
                        {renderTimeline('Parakeet', paraItems, 'rgba(163,113,247,0.7)', paraIdx, paraTrimmed)}
                        <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--text-muted)',marginTop:1,paddingLeft:61}}>
                            <span>0s</span><span>{maxTime.toFixed(1)}s</span>
                        </div>
                    </div>
                    <div style={{fontSize:10,color:'var(--text-muted)',lineHeight:1.6}}>
                        {data.sentence && <div><b>Written:</b> {data.sentence}</div>}
                        {data.spoken_sentence && data.spoken_sentence !== data.sentence && <div><b>Spoken:</b> {data.spoken_sentence}</div>}
                        {ex.cons_range && <div>
                            Consensus: {ex.cons_range[0]?.toFixed(3)}s – {ex.cons_range[1]?.toFixed(3)}s
                            {data.term_range && <span> | Term: {data.term_range[0]?.toFixed(3)}s – {data.term_range[1]?.toFixed(3)}s</span>}
                            {data.term_found === false && <span style={{color:'var(--error)',fontWeight:700,marginLeft:8}}>TERM NOT FOUND</span>}
                            {data.term_found === true && <span style={{color:'var(--success)',marginLeft:8}}>found</span>}
                            {data.attempts > 1 && <span style={{marginLeft:8}}>({data.attempts} attempts)</span>}
                        </div>}
                    </div>
                </div>
            );
        }

        // ==================== CORPUS PAGE ====================
        function CorpusPage() {
            const [status, setStatus] = useState(null);
            const [vocabRows, setVocabRows] = useState([]);
            const [authoredRows, setAuthoredRows] = useState([]);
            const [reviewedConfusions, setReviewedConfusions] = useState([]);
            const [scanConfusionCandidates, setScanConfusionCandidates] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [vocabDraft, setVocabDraft] = useState('');
            const [vocabSpokenDraft, setVocabSpokenDraft] = useState('');
            const [vocabIpaDraft, setVocabIpaDraft] = useState('');
            const [vocabDescDraft, setVocabDescDraft] = useState('');
            const [vocabSaving, setVocabSaving] = useState(false);
            const [vocabPreviewing, setVocabPreviewing] = useState(false);
            const [vocabSpokenQueueDrafts, setVocabSpokenQueueDrafts] = useState({});
            const [vocabIpaDrafts, setVocabIpaDrafts] = useState({});
            const [vocabIpaSaving, setVocabIpaSaving] = useState({});
            const [sentenceTermDraft, setSentenceTermDraft] = useState('');
            const [sentenceDraft, setSentenceDraft] = useState('');
            const [sentenceSaving, setSentenceSaving] = useState(false);
            const [counterTermsDraft, setCounterTermsDraft] = useState('');
            const [counterSurfaceDraft, setCounterSurfaceDraft] = useState('');
            const [counterSentenceDraft, setCounterSentenceDraft] = useState('');
            const [counterSaving, setCounterSaving] = useState(false);
            const [confusionTermDraft, setConfusionTermDraft] = useState('');
            const [confusionSurfaceDraft, setConfusionSurfaceDraft] = useState('');
            const [confusionIpaDraft, setConfusionIpaDraft] = useState('');
            const [confusionSaving, setConfusionSaving] = useState(false);
            const [reviewedConfusionDrafts, setReviewedConfusionDrafts] = useState({});
            const [reviewedConfusionSaving, setReviewedConfusionSaving] = useState({});
            const [scanConfusionDrafts, setScanConfusionDrafts] = useState({});
            const [scanConfusionSpokenDrafts, setScanConfusionSpokenDrafts] = useState({});
            const [scanConfusionSaving, setScanConfusionSaving] = useState({});
            const [recordingSentence, setRecordingSentence] = useState(null);
            const [recordings, setRecordings] = useState([]);
            const [recording, setRecording] = useState(false);
            const [recordingBusy, setRecordingBusy] = useState(false);
            const [recordingError, setRecordingError] = useState(null);
            const [recordingPhonesOpen, setRecordingPhonesOpen] = useState({});
            const [recordingPhonesById, setRecordingPhonesById] = useState({});
            const [recordingPhonesLoading, setRecordingPhonesLoading] = useState({});
            const [recordingPhonesError, setRecordingPhonesError] = useState({});
            const [corpusSection, setCorpusSection] = useState('ipa-queue');
            const recordingRecorderRef = useRef(null);

            const load = async () => {
                setLoading(true);
                setError(null);
                try {
                    const [s, vocab, authored, confusionData] = await Promise.all([
                        api('/api/pipeline/status'),
                        api('/api/vocab?limit=5000&sort=alpha'),
                        api('/api/author/sentences'),
                        api('/api/corpus/confusion-surfaces'),
                    ]);
                    setStatus(s);
                    setVocabRows(Array.isArray(vocab) ? vocab : []);
                    setAuthoredRows(Array.isArray(authored) ? authored : []);
                    setReviewedConfusions(Array.isArray(confusionData?.reviewed) ? confusionData.reviewed : []);
                    setScanConfusionCandidates(Array.isArray(confusionData?.scan_candidates) ? confusionData.scan_candidates : []);
                    setVocabSpokenQueueDrafts(Object.fromEntries((Array.isArray(vocab) ? vocab : []).map(row => [row.id, row.spoken_override || ''])));
                    setVocabIpaDrafts(Object.fromEntries((Array.isArray(vocab) ? vocab : []).map(row => [row.id, row.reviewed_ipa || ''])));
                    setReviewedConfusionDrafts(Object.fromEntries((Array.isArray(confusionData?.reviewed) ? confusionData.reviewed : []).map(row => [`${row.term}::${row.surface_form}`, row.reviewed_ipa || ''])));
                    setScanConfusionSpokenDrafts(Object.fromEntries((Array.isArray(confusionData?.scan_candidates) ? confusionData.scan_candidates : []).map(row => [`${row.term}::${row.surface_form}`, row.surface_form || ''])));
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            };
            useEffect(() => { load(); }, []);

            if (loading || !status) return <div className="container"><p>Loading...</p></div>;
            const inputStyle = {
                padding:'8px 10px',
                background:'var(--bg)',
                border:'1px solid var(--border)',
                borderRadius:8,
                color:'var(--text)',
                fontFamily:'Jost,sans-serif',
                fontSize:14,
            };
            const smallHelpStyle = {fontSize:12,color:'var(--text-muted)',lineHeight:1.45};

            const readyVocab = vocabRows.filter(row => row.reviewed && row.spoken_override);
            const vocabNeedingIpa = readyVocab.filter(row => !row.reviewed_ipa);
            const vocabNeedingOverrides = vocabRows.filter(row => !row.spoken_override);
            const cleanRows = authoredRows.filter(row => row.kind !== 'counterexample');
            const counterexampleRows = authoredRows.filter(row => row.kind === 'counterexample');
            const cleanTerms = new Set(cleanRows.map(row => row.term.toLowerCase()));
            const acceptedReviewedConfusions = reviewedConfusions.filter(row => row.status === 'accepted');
            const reviewedConfusionsNeedingIpa = acceptedReviewedConfusions.filter(row => !row.reviewed_ipa);
            const confusionTerms = new Set(acceptedReviewedConfusions.map(row => row.term.toLowerCase()));
            const missingCleanTerms = readyVocab.filter(row => !cleanTerms.has(row.term.toLowerCase()));
            const missingConfusionTerms = readyVocab.filter(row => !confusionTerms.has(row.term.toLowerCase()));
            const noCounterexampleTerms = readyVocab.filter(row =>
                !counterexampleRows.some(counter => counter.term.toLowerCase() === row.term.toLowerCase())
            );
            const phoneTraceCount = Number(status.phone_traces || 0);
            const humanRecordingCount = Number(status.human_recordings || 0);
            const missingPhoneTraces = Math.max(humanRecordingCount - phoneTraceCount, 0);

            const previewTerms = items => items.slice(0, 10);
            const previewSentences = items => items.slice(0, 8);
            const previewReviewedConfusions = acceptedReviewedConfusions
                .slice()
                .sort((a, b) => a.term.localeCompare(b.term) || a.surface_form.localeCompare(b.surface_form))
                .slice(0, 20);
            const reviewedConfusionKeySet = new Set(acceptedReviewedConfusions.map(row => `${row.term.toLowerCase()}::${row.surface_form.toLowerCase()}`));
            const previewScanCandidates = scanConfusionCandidates
                .filter(row => !reviewedConfusionKeySet.has(`${row.term.toLowerCase()}::${row.surface_form.toLowerCase()}`))
                .slice(0, 20);
            const ipaQueueCount = vocabNeedingIpa.length + reviewedConfusionsNeedingIpa.length + previewScanCandidates.length;
            const vocabWorkQueue = readyVocab
                .slice()
                .sort((a, b) => {
                    const aMissing = a.reviewed_ipa ? 1 : 0;
                    const bMissing = b.reviewed_ipa ? 1 : 0;
                    return aMissing - bMissing || a.term.localeCompare(b.term);
                });
            const reviewedConfusionWorkQueue = acceptedReviewedConfusions
                .slice()
                .sort((a, b) => {
                    const aMissing = a.reviewed_ipa ? 1 : 0;
                    const bMissing = b.reviewed_ipa ? 1 : 0;
                    return aMissing - bMissing || a.term.localeCompare(b.term) || a.surface_form.localeCompare(b.surface_form);
                });
            const reviewedIpaForTerm = (term) => {
                const target = String(term || '').trim().toLowerCase();
                if (!target) return '';
                const row = vocabRows.find(item => String(item.term || '').trim().toLowerCase() === target);
                return String(row?.reviewed_ipa || '').trim();
            };

            const readiness = [
                {
                    title: 'Prepare',
                    value: status.prepare_ready ? 'Ready' : 'Blocked',
                    tone: status.prepare_ready ? 'var(--success)' : 'var(--warning)',
                    detail: status.prepare_ready
                        ? 'You have enough corpus inputs to build the applied-mistake dataset.'
                        : 'Need authored sentences and mined confusion evidence before prepare.',
                    sectionId: 'corpus-readiness',
                    action: 'Why',
                },
                {
                    title: 'Prepared Dataset',
                    value: `${status.train_count || 0} / ${status.valid_count || 0}`,
                    tone: 'var(--text)',
                    detail: 'Current train / valid rows built from clean sentence + one applied known mistake.',
                    sectionId: 'corpus-readiness',
                    action: 'Details',
                },
                {
                    title: 'Held-out Eval',
                    value: status.applied_eval_exists ? (status.applied_eval_count || 0) : 'Missing',
                    tone: status.applied_eval_exists ? 'var(--accent)' : 'var(--warning)',
                    detail: status.applied_eval_exists
                        ? 'Held-out applied-mistake rows ready for evaluation.'
                        : 'Run Prepare to build the held-out applied evaluation set.',
                    sectionId: 'corpus-readiness',
                    action: 'Details',
                },
            ];
            const needsWork = [
                {
                    title: 'Missing spoken overrides',
                    count: vocabNeedingOverrides.length,
                    body: 'Vocabulary terms without an explicit spoken form. These terms are not stable enough for the corpus contract yet.',
                    items: previewTerms(vocabNeedingOverrides).map(row => row.term),
                    empty: 'No override gaps.',
                    sectionId: 'corpus-vocabulary',
                    action: 'Fix below',
                },
                {
                    title: 'Missing reviewed IPA',
                    count: vocabNeedingIpa.length,
                    body: 'Reviewed terms without corpus IPA truth. These still fall back to legacy pronunciation logic.',
                    items: previewTerms(vocabNeedingIpa).map(row => row.term),
                    empty: 'Every ready term has reviewed IPA.',
                    sectionId: 'corpus-vocabulary',
                    action: 'Fix below',
                },
                {
                    title: 'Missing clean sentences',
                    count: missingCleanTerms.length,
                    body: 'Reviewed terms with no clean authored sentence. These cannot produce applied-mistake rows yet.',
                    items: previewTerms(missingCleanTerms).map(row => row.term),
                    empty: 'Every ready term has at least one clean sentence.',
                    sectionId: 'corpus-sentences',
                    action: 'Write below',
                },
                {
                    title: 'Missing confusion evidence',
                    count: missingConfusionTerms.length,
                    body: 'Reviewed terms with no observed ASR confusion surface. These terms cannot generate realistic corruptions yet.',
                    items: previewTerms(missingConfusionTerms).map(row => row.term),
                    empty: 'Every ready term has at least one confusion surface.',
                    sectionId: 'corpus-confusions',
                    action: 'Review below',
                },
                {
                    title: 'Missing counterexamples',
                    count: noCounterexampleTerms.length,
                    body: 'Reviewed terms with no authored counterexample. These are still vulnerable to over-correction drift.',
                    items: previewTerms(noCounterexampleTerms).map(row => row.term),
                    empty: 'Every ready term has at least one counterexample.',
                    sectionId: 'corpus-sentences',
                    action: 'Write below',
                },
                {
                    title: 'Missing timed phones',
                    count: missingPhoneTraces,
                    body: 'Every human recording now needs a persisted timed phone trace and grouped IPA lanes. This is part of the corpus contract.',
                    items: [],
                    empty: 'Every human recording already has persisted timed phones.',
                    sectionId: 'corpus-recordings',
                    action: 'Inspect below',
                },
            ];
            const saveVocab = async () => {
                const term = vocabDraft.trim();
                if (!term) return;
                setVocabSaving(true);
                setError(null);
                try {
                    const res = await api('/api/vocab', {
                        method: 'POST',
                        body: JSON.stringify({
                            term,
                            spoken_override: vocabSpokenDraft.trim() || undefined,
                            reviewed_ipa: vocabIpaDraft.trim() || undefined,
                            description: vocabDescDraft.trim() || undefined,
                        }),
                    });
                    if (res?.error) throw new Error(res.error);
                    setVocabDraft('');
                    setVocabSpokenDraft('');
                    setVocabIpaDraft('');
                    setVocabDescDraft('');
                    setVocabPreviewing(false);
                    await load();
                } catch (e) {
                    setError(e.message);
                } finally {
                    setVocabSaving(false);
                }
            };
            const saveVocabIpa = async (row) => {
                const spoken_override = (vocabSpokenQueueDrafts[row.id] ?? row.spoken_override ?? '').trim();
                const reviewed_ipa = (vocabIpaDrafts[row.id] || '').trim();
                setVocabIpaSaving(prev => ({...prev, [row.id]: true}));
                setError(null);
                try {
                    const res = await api(`/api/vocab/${row.id}`, {
                        method: 'POST',
                        body: JSON.stringify({ spoken_override, reviewed_ipa }),
                    });
                    if (res?.error) throw new Error(res.error);
                    setVocabRows(prev => prev.map(item => item.id === row.id ? {...item, spoken_override, reviewed_ipa} : item));
                    setVocabSpokenQueueDrafts(prev => ({...prev, [row.id]: spoken_override}));
                    setVocabIpaDrafts(prev => ({...prev, [row.id]: reviewed_ipa}));
                } catch (e) {
                    setError(e.message);
                } finally {
                    setVocabIpaSaving(prev => ({...prev, [row.id]: false}));
                }
            };
            const previewVocab = async () => {
                const text = vocabSpokenDraft.trim() || vocabDraft.trim();
                if (!text) return;
                setVocabPreviewing(true);
                setError(null);
                try {
                    const buf = await fetchTtsBuffer(text);
                    playBuffer(buf, () => setVocabPreviewing(false));
                } catch (e) {
                    setError(e.message);
                    setVocabPreviewing(false);
                }
            };
            const corpusQueueRowStyle = {
                display:'grid',
                gridTemplateColumns:'minmax(220px, 280px) minmax(0, 1fr)',
                gap:16,
                alignItems:'start',
                padding:'12px 14px',
                border:'1px solid rgba(255,255,255,0.06)',
                borderRadius:8,
            };
            const corpusQueueMetaStyle = {
                display:'grid',
                gap:6,
                minWidth:0,
            };
            const corpusQueueWorkStyle = {
                display:'grid',
                gap:10,
                minWidth:0,
            };
            const saveSentence = async () => {
                const term = sentenceTermDraft.trim();
                const sentence = sentenceDraft.trim();
                if (!term || !sentence) return;
                setSentenceSaving(true);
                setError(null);
                try {
                    const res = await api('/api/author/submit', {
                        method:'POST',
                        body: JSON.stringify({
                            term,
                            sentence,
                        }),
                    });
                    if (res?.error) throw new Error(res.error);
                    setSentenceDraft('');
                    await load();
                } catch (e) {
                    setError(e.message);
                } finally {
                    setSentenceSaving(false);
                }
            };
            const saveCounterexample = async () => {
                const terms = counterTermsDraft
                    .split(',')
                    .map(t => t.trim())
                    .filter(Boolean);
                const surface_form = counterSurfaceDraft.trim();
                const sentence = counterSentenceDraft.trim();
                if (terms.length === 0 || !surface_form || !sentence) return;
                setCounterSaving(true);
                setError(null);
                try {
                    const res = await api('/api/author/submit', {
                        method:'POST',
                        body: JSON.stringify({
                            term: terms[0],
                            terms,
                            sentence,
                            kind: 'counterexample',
                            surface_form,
                        }),
                    });
                    if (res?.error) throw new Error(res.error);
                    setCounterTermsDraft('');
                    setCounterSurfaceDraft('');
                    setCounterSentenceDraft('');
                    await load();
                } catch (e) {
                    setError(e.message);
                } finally {
                    setCounterSaving(false);
                }
            };
            const saveConfusion = async () => {
                const term = confusionTermDraft.trim();
                const surface_form = confusionSurfaceDraft.trim();
                const reviewed_ipa = confusionIpaDraft.trim();
                if (!term || !surface_form) return;
                setConfusionSaving(true);
                setError(null);
                try {
                    const res = await api('/api/corpus/confusion-surfaces', {
                        method:'POST',
                        body: JSON.stringify({term, surface_form, reviewed_ipa, status: 'accepted', source: 'manual'}),
                    });
                    if (res?.error) throw new Error(res.error);
                    setConfusionSurfaceDraft('');
                    setConfusionIpaDraft('');
                    await load();
                } catch (e) {
                    setError(e.message);
                } finally {
                    setConfusionSaving(false);
                }
            };
            const saveReviewedConfusion = async (row) => {
                const key = `${row.term}::${row.surface_form}`;
                const reviewed_ipa = (reviewedConfusionDrafts[key] || '').trim();
                setReviewedConfusionSaving(prev => ({...prev, [key]: true}));
                setError(null);
                try {
                    const res = await api('/api/corpus/confusion-surfaces', {
                        method:'POST',
                        body: JSON.stringify({
                            term: row.term,
                            surface_form: row.surface_form,
                            reviewed_ipa,
                            status: row.status || 'accepted',
                            source: row.source || 'reviewed',
                        }),
                    });
                    if (res?.error) throw new Error(res.error);
                    setReviewedConfusions(prev => prev.map(item =>
                        item.term === row.term && item.surface_form === row.surface_form
                            ? {...item, reviewed_ipa}
                            : item
                    ));
                    setReviewedConfusionDrafts(prev => ({...prev, [key]: reviewed_ipa}));
                } catch (e) {
                    setError(e.message);
                } finally {
                    setReviewedConfusionSaving(prev => ({...prev, [key]: false}));
                }
            };
            const acceptScanCandidate = async (row, reviewedIpaOverride = null) => {
                const key = `${row.term}::${row.surface_form}`;
                const reviewed_ipa = String(reviewedIpaOverride ?? scanConfusionDrafts[key] ?? '').trim();
                setScanConfusionSaving(prev => ({...prev, [key]: true}));
                setError(null);
                try {
                    const res = await api('/api/corpus/confusion-surfaces', {
                        method:'POST',
                        body: JSON.stringify({
                            term: row.term,
                            surface_form: row.surface_form,
                            reviewed_ipa,
                            status: 'accepted',
                            source: 'scan',
                        }),
                    });
                    if (res?.error) throw new Error(res.error);
                    const acceptedRow = {
                        term: row.term,
                        surface_form: row.surface_form,
                        reviewed_ipa,
                        status: 'accepted',
                        source: 'scan',
                    };
                    setReviewedConfusions(prev => {
                        const exists = prev.some(item =>
                            item.term.toLowerCase() === row.term.toLowerCase() &&
                            item.surface_form.toLowerCase() === row.surface_form.toLowerCase()
                        );
                        if (exists) {
                            return prev.map(item =>
                                item.term.toLowerCase() === row.term.toLowerCase() &&
                                item.surface_form.toLowerCase() === row.surface_form.toLowerCase()
                                    ? {...item, reviewed_ipa, status: 'accepted', source: 'scan'}
                                    : item
                            );
                        }
                        return [acceptedRow, ...prev];
                    });
                    setScanConfusionCandidates(prev => prev.filter(item =>
                        !(item.term.toLowerCase() === row.term.toLowerCase() &&
                          item.surface_form.toLowerCase() === row.surface_form.toLowerCase())
                    ));
                    setReviewedConfusionDrafts(prev => ({...prev, [key]: reviewed_ipa}));
                    setScanConfusionDrafts(prev => ({...prev, [key]: reviewed_ipa}));
                    setScanConfusionSpokenDrafts(prev => {
                        const next = {...prev};
                        delete next[key];
                        return next;
                    });
                } catch (e) {
                    setError(e.message);
                } finally {
                    setScanConfusionSaving(prev => ({...prev, [key]: false}));
                }
            };
            const rejectScanCandidate = async (row) => {
                const key = `${row.term}::${row.surface_form}`;
                setScanConfusionSaving(prev => ({...prev, [key]: true}));
                setError(null);
                try {
                    const res = await api('/api/corpus/confusion-surfaces', {
                        method:'POST',
                        body: JSON.stringify({
                            term: row.term,
                            surface_form: row.surface_form,
                            reviewed_ipa: null,
                            status: 'rejected',
                            source: 'scan',
                        }),
                    });
                    if (res?.error) throw new Error(res.error);
                    const rejectedRow = {
                        term: row.term,
                        surface_form: row.surface_form,
                        reviewed_ipa: null,
                        status: 'rejected',
                        source: 'scan',
                    };
                    setReviewedConfusions(prev => {
                        const exists = prev.some(item =>
                            item.term.toLowerCase() === row.term.toLowerCase() &&
                            item.surface_form.toLowerCase() === row.surface_form.toLowerCase()
                        );
                        if (exists) {
                            return prev.map(item =>
                                item.term.toLowerCase() === row.term.toLowerCase() &&
                                item.surface_form.toLowerCase() === row.surface_form.toLowerCase()
                                    ? {...item, reviewed_ipa: null, status: 'rejected', source: 'scan'}
                                    : item
                            );
                        }
                        return [rejectedRow, ...prev];
                    });
                    setScanConfusionCandidates(prev => prev.filter(item =>
                        !(item.term.toLowerCase() === row.term.toLowerCase() &&
                          item.surface_form.toLowerCase() === row.surface_form.toLowerCase())
                    ));
                    setScanConfusionDrafts(prev => {
                        const next = {...prev};
                        delete next[key];
                        return next;
                    });
                    setScanConfusionSpokenDrafts(prev => {
                        const next = {...prev};
                        delete next[key];
                        return next;
                    });
                } catch (e) {
                    setError(e.message);
                } finally {
                    setScanConfusionSaving(prev => ({...prev, [key]: false}));
                }
            };

            const loadRecordings = async (row) => {
                const res = await api(`/api/author/sentences/${row.id}/recordings`);
                setRecordings(res.recordings || []);
            };
            const openRecordings = async (row) => {
                setRecordingSentence(row);
                setRecordingError(null);
                setRecordings([]);
                setRecordingPhonesOpen({});
                setRecordingPhonesById({});
                setRecordingPhonesLoading({});
                setRecordingPhonesError({});
                try {
                    await loadRecordings(row);
                } catch (e) {
                    setRecordingError(e.message);
                }
            };
            const stopSentenceRecording = async (options = {}) => {
                if (recordingRecorderRef.current && recordingRecorderRef.current.state !== 'inactive') {
                    const recorder = recordingRecorderRef.current;
                    recordingRecorderRef.current = null;
                    await recorder.stop(options);
                }
                setRecording(false);
            };
            const closeRecordings = () => {
                stopSentenceRecording();
                setRecordingSentence(null);
                setRecordings([]);
                setRecordingPhonesOpen({});
                setRecordingPhonesById({});
                setRecordingPhonesLoading({});
                setRecordingPhonesError({});
                setRecordingError(null);
            };
            const uploadSentenceTake = async (row, wavBytes) => {
                const res = await fetch(`/api/author/sentences/${row.id}/recordings`, {
                    method: 'POST',
                    headers: {'Content-Type': 'audio/wav'},
                    body: wavBytes,
                });
                if (!res.ok) {
                    const text = await res.text();
                    throw new Error(text || 'failed to save recording');
                }
                return res.json();
            };
            const startSentenceRecording = async () => {
                if (!recordingSentence) return;
                try {
                    const recorder = await startMonoWavRecording(async ({wavBytes}) => {
                        try {
                            setRecordingBusy(true);
                            const data = await uploadSentenceTake(recordingSentence, wavBytes);
                            setRecordings(data.recordings || []);
                            await load();
                            setRecordingError(null);
                        } catch (e) {
                            setRecordingError(e.message);
                        } finally {
                            setRecording(false);
                            setRecordingBusy(false);
                        }
                    });
                    recordingRecorderRef.current = recorder;
                    setRecording(true);
                } catch (e) {
                    setRecordingError('Microphone access denied');
                }
            };
            const loadRecordingPhones = async (recordingId) => {
                setRecordingPhonesLoading(prev => ({...prev, [recordingId]: true}));
                setRecordingPhonesError(prev => ({...prev, [recordingId]: null}));
                try {
                    const res = await api(`/api/author/recordings/${recordingId}/phones`);
                    setRecordingPhonesById(prev => ({...prev, [recordingId]: res.trace || null}));
                } catch (e) {
                    setRecordingPhonesError(prev => ({...prev, [recordingId]: e.message}));
                } finally {
                    setRecordingPhonesLoading(prev => ({...prev, [recordingId]: false}));
                }
            };
            const toggleRecordingPhones = async (recordingId) => {
                const nextOpen = !recordingPhonesOpen[recordingId];
                setRecordingPhonesOpen(prev => ({...prev, [recordingId]: nextOpen}));
                if (nextOpen && !(recordingId in recordingPhonesById) && !recordingPhonesLoading[recordingId]) {
                    await loadRecordingPhones(recordingId);
                }
            };
            const recordingsNeedingAttention = authoredRows
                .filter(row => (row.recording_count || 0) === 0 || (row.phone_trace_count || 0) < (row.recording_count || 0))
                .slice(0, 12);
            const needsWorkTotal = needsWork.reduce((sum, item) => sum + Number(item.count || 0), 0);
            const openCorpusSection = (sectionId) => {
                const normalized = String(sectionId || '').replace(/^corpus-/, '').trim();
                if (normalized) setCorpusSection(normalized);
            };
            const corpusSections = [
                { id: 'ipa-queue', label: 'IPA Queue', count: ipaQueueCount, detail: 'Backfill reviewed IPA and pending scans.' },
                { id: 'readiness', label: 'Readiness', count: status.prepare_ready ? 'Ready' : 'Blocked', detail: 'Prepare and dataset status.' },
                { id: 'needs-work', label: 'Needs Work', count: needsWorkTotal, detail: 'Concrete gaps blocking quality.' },
                { id: 'vocabulary', label: 'Vocabulary', count: readyVocab.length, detail: 'Terms, overrides, reviewed IPA.' },
                { id: 'sentences', label: 'Sentences', count: authoredRows.length, detail: 'Clean rows and counterexamples.' },
                { id: 'recordings', label: 'Recordings', count: recordingsNeedingAttention.length, detail: 'Human takes and grouped IPA.' },
                { id: 'confusions', label: 'Confusions', count: previewScanCandidates.length, detail: 'Reviewed surfaces and pending scans.' },
            ];

            return (
                <div className="container">
                    <div style={{display:'flex',alignItems:'baseline',gap:12,marginBottom:8}}>
                        <h2 style={{margin:0}}>Corpus</h2>
                        <span style={{fontSize:13,color:'var(--text-muted)'}}>
                            Define the correction universe, then build applied-mistake train and eval data from it.
                        </span>
                    </div>
                    {error && <div className="pipeline-error" style={{marginBottom:16}}>{error}</div>}

                    <div style={{display:'grid',gridTemplateColumns:'240px minmax(0, 1fr)',gap:16,alignItems:'start'}}>
                        <div className="card" style={{padding:'12px',position:'sticky',top:16}}>
                            <div style={{fontSize:12,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:10}}>
                                Corpus Sections
                            </div>
                            <div style={{display:'grid',gap:8}}>
                                {corpusSections.map(section => {
                                    const active = section.id === corpusSection;
                                    return (
                                        <button
                                            key={section.id}
                                            type="button"
                                            className="btn"
                                            onClick={() => setCorpusSection(section.id)}
                                            style={{
                                                justifyContent:'space-between',
                                                textAlign:'left',
                                                padding:'10px 12px',
                                                background: active ? 'rgba(88,166,255,0.14)' : 'transparent',
                                                borderColor: active ? 'rgba(88,166,255,0.5)' : 'var(--border)',
                                            }}
                                        >
                                            <span style={{display:'grid',gap:2}}>
                                                <span style={{fontWeight:600,color:'var(--text)'}}>{section.label}</span>
                                                <span style={{fontSize:11,color:'var(--text-muted)',whiteSpace:'normal'}}>{section.detail}</span>
                                            </span>
                                            <span style={{fontSize:12,color:active ? 'var(--accent)' : 'var(--text-muted)',marginLeft:8,flex:'0 0 auto'}}>{section.count}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        <div style={{display:'grid',gap:12}}>
                    {corpusSection === 'ipa-queue' && (
                    <div id="corpus-ipa-queue" className="card" style={{marginBottom:16,padding:'14px 16px'}}>
                        <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',gap:12,marginBottom:12,flexWrap:'wrap'}}>
                            <div>
                                <h3 style={{margin:'0 0 4px 0'}}>IPA Queue</h3>
                                <div style={{fontSize:13,color:'var(--text-muted)',lineHeight:1.45}}>
                                    This is the corpus backfill loop now: save reviewed IPA for ready vocab terms, reviewed confusion surfaces, and accepted scan candidates.
                                </div>
                            </div>
                            <div style={{fontSize:28,fontWeight:700,color:ipaQueueCount > 0 ? 'var(--warning)' : 'var(--success)'}}>
                                {ipaQueueCount}
                            </div>
                        </div>
                        <div className="stats-grid" style={{marginBottom:12}}>
                            <div className="stat-card"><div className="value">{vocabNeedingIpa.length}</div><div className="label">Terms Missing IPA</div></div>
                            <div className="stat-card"><div className="value">{reviewedConfusionsNeedingIpa.length}</div><div className="label">Reviewed Surfaces Missing IPA</div></div>
                            <div className="stat-card"><div className="value">{previewScanCandidates.length}</div><div className="label">Pending Scan Candidates</div></div>
                        </div>
                        <div style={{display:'grid',gap:12}}>
                            {vocabNeedingIpa.length > 0 && (
                                <div className="card" style={{padding:'12px 14px',background:'rgba(255,255,255,0.03)'}}>
                                    <div style={{fontSize:12,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:8}}>
                                        Terms missing reviewed IPA
                                    </div>
                                    <div style={{display:'grid',gap:8}}>
                                        {vocabNeedingIpa.map(row => (
                                            <div key={`queue-vocab-${row.id}`} style={corpusQueueRowStyle}>
                                                <div style={corpusQueueMetaStyle}>
                                                    <div style={{fontFamily:'monospace',fontWeight:700,color:'var(--text)'}}>{row.term}</div>
                                                    {row.description && <div style={{fontSize:12,color:'var(--text-muted)',marginTop:2}}>{row.description}</div>}
                                                </div>
                                                <div style={corpusQueueWorkStyle}>
                                                    <div style={{display:'grid',gap:6}}>
                                                        <div style={{fontSize:12,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em'}}>
                                                            Pronunciation override
                                                        </div>
                                                        <input
                                                            value={vocabSpokenQueueDrafts[row.id] ?? ''}
                                                            onChange={e => setVocabSpokenQueueDrafts(prev => ({...prev, [row.id]: e.target.value}))}
                                                            placeholder="spoken form"
                                                            style={inputStyle}
                                                        />
                                                    </div>
                                                    <IpaWorkbench
                                                        value={vocabIpaDrafts[row.id] ?? ''}
                                                        onChange={value => setVocabIpaDrafts(prev => ({...prev, [row.id]: value}))}
                                                        previewText={(vocabSpokenQueueDrafts[row.id] ?? row.spoken_override) || row.term}
                                                    />
                                                    <div style={{display:'flex',justifyContent:'flex-end'}}>
                                                        <button type="button" className="btn btn-sm" disabled={!!vocabIpaSaving[row.id]} onClick={(e) => { e.preventDefault(); e.stopPropagation(); saveVocabIpa(row); }}>
                                                            {vocabIpaSaving[row.id] ? 'Saving...' : 'Save IPA'}
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                            {reviewedConfusionsNeedingIpa.length > 0 && (
                                <div className="card" style={{padding:'12px 14px',background:'rgba(255,255,255,0.03)'}}>
                                    <div style={{fontSize:12,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:8}}>
                                        Reviewed confusion surfaces missing IPA
                                    </div>
                                    <div style={{display:'grid',gap:8}}>
                                        {reviewedConfusionsNeedingIpa.map(row => {
                                            const key = `${row.term}::${row.surface_form}`;
                                            return (
                                                <div key={`queue-reviewed-${key}`} style={{display:'grid',gridTemplateColumns:'180px 220px minmax(420px, 1.8fr) auto',gap:10,alignItems:'start',padding:'10px 12px',border:'1px solid rgba(255,255,255,0.06)',borderRadius:8}}>
                                                    <div style={{fontFamily:'monospace',fontWeight:700}}>{row.term}</div>
                                                    <div style={{fontFamily:'monospace',color:'var(--accent)'}}>{row.surface_form}</div>
                                                    <IpaWorkbench
                                                        value={reviewedConfusionDrafts[key] ?? ''}
                                                        onChange={value => setReviewedConfusionDrafts(prev => ({...prev, [key]: value}))}
                                                        previewText={row.surface_form}
                                                    />
                                                    <button type="button" className="btn btn-sm" disabled={!!reviewedConfusionSaving[key]} onClick={(e) => { e.preventDefault(); e.stopPropagation(); saveReviewedConfusion(row); }}>
                                                        {reviewedConfusionSaving[key] ? 'Saving...' : 'Save IPA'}
                                                    </button>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                            {previewScanCandidates.length > 0 && (
                                <div className="card" style={{padding:'12px 14px',background:'rgba(255,255,255,0.03)'}}>
                                    <div style={{fontSize:12,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em',marginBottom:8}}>
                                        Pending scan candidates
                                    </div>

                                                        <div style={{fontFamily:'monospace',color:'var(--text)'}}>{row.surface_form}</div>
                                                        <div style={{fontSize:12,color:'var(--text-muted)'}}>{row.qwen_count}x</div>
                                                    </div>
                                                    <div style={{display:'grid',gap:6}}>
                                                        <div style={{fontSize:12,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em'}}>
                                                            TTS phrase
                                                        </div>
                                                        <input
                                                            value={scanConfusionSpokenDrafts[key] ?? row.surface_form ?? ''}
                                                            onChange={e => setScanConfusionSpokenDrafts(prev => ({...prev, [key]: e.target.value}))}
                                                            placeholder="Phrase sent to TTS for silent suggestions"
                                                            style={{...inputStyle, width:'100%'}}
                                                            title="Edit the phrase sent to TTS for silent suggestions"
                                                        />
                                                    </div>
                                                    <div style={{display:'grid',gridTemplateColumns:'minmax(420px, 1fr) auto',gap:10,alignItems:'start'}}>
                                                        <IpaWorkbench
                                                            value={scanConfusionDrafts[key] ?? ''}
                                                            onChange={value => setScanConfusionDrafts(prev => ({...prev, [key]: value}))}
                                                            previewText={(scanConfusionSpokenDrafts[key] ?? row.surface_form ?? '').trim()}
                                                        />
                                                        <div style={{display:'grid',gap:8}}>
                                                            <button
                                                                type="button"
                                                                className="btn btn-sm"
                                                                disabled={!termReviewedIpa}
                                                                title={termReviewedIpa ? `Copy ${row.term}'s reviewed IPA into this field` : `No reviewed IPA saved yet for ${row.term}`}
                                                                onClick={() => setScanConfusionDrafts(prev => ({...prev, [key]: termReviewedIpa}))}
                                                            >
                                                                Same as term
                                                            </button>
                                                            <button type="button" className="btn btn-sm" disabled={!!scanConfusionSaving[key]} onClick={() => rejectScanCandidate(row)}>
                                                                {scanConfusionSaving[key] ? 'Saving...' : 'No'}
                                                            </button>
                                                            <button type="button" className="btn btn-sm" disabled={!!scanConfusionSaving[key]} onClick={() => acceptScanCandidate(row)}>
                                                                {scanConfusionSaving[key] ? 'Adding...' : 'Accept'}
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                        {previewScanCandidates.length === 0 && (
                                            <div style={{fontSize:12,color:'var(--text-muted)'}}>No pending scan candidates in the preview set.</div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                        </div>
                    </div>

                    {recordingSentence && (
                        <div className="vocab-overlay" onClick={e => { if (e.target === e.currentTarget) closeRecordings(); }}>
                            <div className="vocab-editor" style={{maxWidth: 860, width: '92vw'}}>
                                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                                    <div className="term" style={{flex:1,textAlign:'left'}}>{recordingSentence.term}</div>
                                    {recordingSentence.kind === 'counterexample' && (
                                        <span style={{fontSize:11,color:'var(--warning)',border:'1px solid var(--border)',borderRadius:999,padding:'2px 8px'}}>
                                            counterexample{recordingSentence.surface_form ? `: ${recordingSentence.surface_form}` : ''}
                                        </span>
                                    )}
                                    <button onClick={closeRecordings} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:18}}>&times;</button>
                                </div>
                                <div style={{color:'var(--text-muted)',fontSize:13,marginBottom:12,lineHeight:1.5}}>
                                    Record multiple takes of the same sentence and inspect grouped IPA for each take directly here.
                                </div>
                                <div style={{fontSize:18,lineHeight:1.6,marginBottom:12,textAlign:'center'}}>{recordingSentence.sentence}</div>
                                {recordingError && <div className="pipeline-error" style={{marginBottom:12}}>{recordingError}</div>}
                                <div style={{display:'flex',gap:8,alignItems:'center',justifyContent:'center',marginBottom:12}}>
                                    <button className={`record-btn ${recording ? 'active' : ''}`} onClick={recording ? stopSentenceRecording : startSentenceRecording} disabled={recordingBusy}
                                        title={recording ? 'Stop recording' : 'Record another take'}>
                                        {recordingBusy ? '…' : recording ? '\u25A0' : '\u25CF'}
                                    </button>
                                    <span style={{fontSize:12,color:'var(--text-muted)'}}>
                                        {recording ? 'Recording... press the button again to stop' : recordingBusy ? 'Saving take...' : 'Press the button to record another take'}
                                    </span>
                                </div>
                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:8}}>
                                    <div style={{fontSize:11,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:1}}>Takes</div>
                                    <div style={{fontSize:11,color:'var(--text-muted)'}}>{recordings.length} saved</div>
                                </div>
                                <div style={{maxHeight:320,overflow:'auto',border:'1px solid var(--border)',borderRadius:8,background:'var(--bg)'}}>
                                    {recordings.length === 0 ? (
                                        <div style={{padding:16,textAlign:'center',color:'var(--text-muted)'}}>No takes yet.</div>
                                    ) : recordings.map(r => (
                                        <div key={r.id} style={{padding:'8px 10px',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                                            <div style={{display:'flex',alignItems:'center',gap:8}}>
                                                <span style={{minWidth:70,fontFamily:'monospace',color:'var(--accent)',fontWeight:600}}>Take {r.take_no}</span>
                                                <span style={{flex:1,color:'var(--text-muted)',fontSize:12}}>{r.created_at}</span>
                                                <span style={{fontSize:11,color:r.has_phone_trace ? 'var(--success)' : 'var(--text-muted)',border:'1px solid var(--border)',borderRadius:999,padding:'2px 8px'}}>
                                                    {r.has_phone_trace ? `IPA v${r.phone_trace_grouping_version || '?'}` : 'IPA pending'}
                                                </span>
                                                <button className="btn btn-sm" onClick={async () => {
                                                    if (!r.audio_b64) return;
                                                    const mime = r.audio_mime || 'audio/ogg';
                                                    const a = new Audio(`data:${mime};base64,${r.audio_b64}`);
                                                    a.play();
                                                }}>Play</button>
                                                <button className="btn btn-sm" onClick={() => toggleRecordingPhones(r.id)} disabled={recordingPhonesLoading[r.id]}>
                                                    {recordingPhonesOpen[r.id] ? 'Hide IPA' : 'Show IPA'}
                                                </button>
                                            </div>
                                            {recordingPhonesOpen[r.id] && (
                                                <div style={{marginTop:10,padding:10,border:'1px solid var(--border)',borderRadius:8,background:'rgba(255,255,255,0.02)',display:'grid',gap:10}}>
                                                    {recordingPhonesLoading[r.id] ? (
                                                        <div style={{fontSize:12,color:'var(--text-muted)'}}>Loading IPA trace…</div>
                                                    ) : recordingPhonesError[r.id] ? (
                                                        <div className="pipeline-error">{recordingPhonesError[r.id]}</div>
                                                    ) : !recordingPhonesById[r.id] ? (
                                                        <div style={{fontSize:12,color:'var(--text-muted)'}}>No IPA trace cached yet for this take.</div>
                                                    ) : (
                                                        <>
                                                            <div style={{display:'flex',flexWrap:'wrap',gap:8,fontSize:11,color:'var(--text-muted)'}}>
                                                                <span>decoder {recordingPhonesById[r.id].decoder || '—'}</span>
                                                                <span>grouping v{recordingPhonesById[r.id].grouping_version || '?'}</span>
                                                                <span>updated {recordingPhonesById[r.id].updated_at || '—'}</span>
                                                            </div>
                                                            <GroupedPhoneLane label="Sentence-grouped IPA" raw={recordingPhonesById[r.id].sentence_grouped_json} />
                                                            <GroupedPhoneLane label="Qwen-grouped IPA" raw={recordingPhonesById[r.id].qwen_grouped_json} />
                                                            <TimedPhoneTraceSummary raw={recordingPhonesById[r.id].raw_trace_json} />
                                                        </>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                <div className="actions" style={{marginTop:12}}>
                                    <button className="btn btn-sm" onClick={closeRecordings}>Close</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <datalist id="corpus-vocab-terms">
                        {readyVocab.map(row => <option key={row.id} value={row.term} />)}
                    </datalist>
                </div>
            );
        }

        const TRAIN_PRESETS = [
            { id: 'qwen3-reranker', label: 'Qwen3 Reranker', data: 'training/prototype-reranker', adapters: 'training/prototype-reranker-qwen3-adapters', model: 'Qwen/Qwen3-Reranker-0.6B', iters: 2000, batch: 4, layers: 8 },
            { id: 'qwen3-reranker-smoke', label: 'Qwen3 Smoke', data: 'training/prototype-reranker', adapters: 'training/prototype-reranker-qwen3-adapters', model: 'Qwen/Qwen3-Reranker-0.6B', iters: 400, batch: 1, layers: 2 },
        ];

        // ==================== TRAIN PAGE ====================
        function TrainPage() {
            const [status, setStatus] = useState(null);
            const [jobs, setJobs] = useState([]);
            const [runningJob, setRunningJob] = useState(null);
            const [jobLog, setJobLog] = useState('');
            const [error, setError] = useState(null);
            const [trainDataDir, setTrainDataDir] = useState('training/prototype-reranker');
            const [trainAdaptersDir, setTrainAdaptersDir] = useState('training/prototype-reranker-qwen3-adapters');
            const [model, setModel] = useState('Qwen/Qwen3-Reranker-0.6B');
            const [iters, setIters] = useState(2000);
            const [batch, setBatch] = useState(4);
            const [layers, setLayers] = useState(8);
            const [patience, setPatience] = useState(10);
            const [stepsPerEval, setStepsPerEval] = useState(500);
            const [totalExamples, setTotalExamples] = useState(12000);
            const [errorRate, setErrorRate] = useState(80);
            const [previewData, setPreviewData] = useState(null);
            const [previewLoading, setPreviewLoading] = useState(false);
            const [templateCoverage, setTemplateCoverage] = useState(null);
            const [templateDetail, setTemplateDetail] = useState(null);
            const [templateDetailLoading, setTemplateDetailLoading] = useState(false);
            const [stopping, setStopping] = useState(false);
            const pollRef = useRef(null);
            const logRef = useRef(null);

            const load = () => Promise.all([
                api('/api/pipeline/status'),
                api('/api/pipeline/template-coverage').catch(() => null),
                api('/api/jobs').catch(() => []),
            ]).then(([s, coverage, jobList]) => {
                setStatus(s);
                setTemplateCoverage(coverage);
                setJobs(Array.isArray(jobList) ? jobList : []);
                if (s.running_job && !runningJob) setRunningJob(s.running_job);
            });
            useEffect(() => { load(); }, []);
            useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [jobLog]);
            useEffect(() => {
                if (!runningJob) return;
                const poll = async () => {
                    const job = await api(`/api/jobs/${runningJob.id}`);
                    setJobLog(job.log);
                    setJobs(prev => {
                        const rest = prev.filter(j => j.id !== job.id);
                        return [job, ...rest].sort((a, b) => b.id - a.id).slice(0, 50);
                    });
                    if (job.status !== 'running') { setRunningJob(null); load(); }
                };
                poll(); pollRef.current = setInterval(poll, 2000);
                return () => clearInterval(pollRef.current);
            }, [runningJob?.id]);

            const startJob = async (type, config) => {
                setError(null); setJobLog('');
                try {
                    const res = await api(`/api/jobs/${type}`, {method: 'POST', body: JSON.stringify(config)});
                    if (res.job_id) setRunningJob({id: res.job_id, job_type: type});
                    else if (res.error) setError(res.error);
                } catch (e) { setError(e.message); }
            };
            const stopJob = async () => { setStopping(true); try { await api('/api/jobs/stop', {method: 'POST'}); } catch (e) {} setStopping(false); };

            if (!status) return <div className="container"><p>Loading...</p></div>;
            const isRunning = !!runningJob;
            const isDefaultTrainDataset = trainDataDir === 'training/data';
            const trainDatasetReady = !isDefaultTrainDataset || !!status.training_data_exists;

            const trainExamples = status.train_count || 0;
            const epochSteps = batch > 0 ? Math.ceil(trainExamples / batch) : 0;
            const epochs = epochSteps > 0 ? (iters / epochSteps).toFixed(1) : '?';

            const inputStyle = {padding:'4px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontFamily:'Jost,sans-serif',fontSize:13};
            const helpStyle = {fontSize:11,color:'var(--text-muted)',lineHeight:1.4,marginTop:2};
            const paramRow = {display:'flex',gap:12,alignItems:'flex-start',marginBottom:12};
            const paramLabel = {fontSize:12,color:'var(--text-muted)',fontWeight:600,minWidth:90,paddingTop:6};
            const subtleCard = {padding:'10px 12px',background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.06)',borderRadius:10};

            const parseJobConfig = job => {
                if (!job?.config) return null;
                try { return JSON.parse(job.config); } catch (_) { return null; }
            };
            const formatTrainConfig = cfg => {
                if (!cfg) return [];
                return [
                    ['Data', cfg.data || 'training/data'],
                    ['Adapters', cfg.adapters || 'training/adapters'],
                    ['Model', cfg.model || ''],
                    ['Batch', cfg.batch_size ?? ''],
                    ['Layers', cfg.num_layers ?? ''],
                    ['Iters', cfg.iters ?? ''],
                    ['Patience', cfg.patience ?? cfg.early_stop_patience ?? ''],
                    ['Eval interval', cfg.steps_per_eval ?? ''],
                ].filter(([, value]) => value !== '' && value !== null && value !== undefined);
            };
            const renderTrainConfigCard = (title, job, tone) => {
                const cfg = parseJobConfig(job);
                if (!cfg) return null;
                const valueColor = tone === 'running' ? 'var(--warning)' : 'var(--text)';
                return (
                    <div style={subtleCard}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                            <b style={{fontSize:12}}>{title}</b>
                            <span style={{fontSize:11,color:'var(--text-muted)'}}>job #{job.id}</span>
                            {job.status === 'running' && <span style={{display:'inline-block',width:8,height:8,borderRadius:'50%',background:'var(--warning)'}} />}
                        </div>
                        <div style={{display:'grid',gridTemplateColumns:'repeat(3, minmax(0, 1fr))',gap:'6px 12px',fontSize:12}}>
                            {formatTrainConfig(cfg).map(([label, value]) => (
                                <div key={label}>
                                    <div style={{fontSize:10,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em'}}>{label}</div>
                                    <div style={{color:valueColor,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{String(value)}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const trainMetrics = (() => {
                const lines = (jobLog || '').split('\n');
                const train = [];
                const val = [];
                const resources = [];
                let totalIters = null;
                for (const line of lines) {
                    const start = line.match(/Starting training: .*iters=(\d+)/);
                    if (start) totalIters = parseInt(start[1], 10) || totalIters;
                    if (line.startsWith('RESOURCE ')) {
                        try { resources.push(JSON.parse(line.slice('RESOURCE '.length))); } catch (_) {}
                        continue;
                    }
                    const trainMatch = line.match(/^Iter\s+(\d+):\s+Train loss\s+([0-9.]+),\s+Learning Rate\s+([0-9.eE+-]+),\s+It\/sec\s+([0-9.]+),\s+Tokens\/sec\s+([0-9.]+),\s+Trained Tokens\s+([0-9,]+),\s+Peak mem\s+([0-9.]+)\s+GB/);
                    if (trainMatch) {
                        train.push({
                            iter: parseInt(trainMatch[1], 10),
                            loss: parseFloat(trainMatch[2]),
                            lr: parseFloat(trainMatch[3]),
                            itPerSec: parseFloat(trainMatch[4]),
                            tokPerSec: parseFloat(trainMatch[5]),
                            trainedTokens: parseInt(trainMatch[6].replace(/,/g, ''), 10),
                            peakMemGb: parseFloat(trainMatch[7]),
                        });
                        continue;
                    }
                    const valMatch = line.match(/^Iter\s+(\d+):\s+Val loss\s+([0-9.]+),\s+Val took\s+([0-9.]+)s/);
                    if (valMatch) {
                        val.push({
                            iter: parseInt(valMatch[1], 10),
                            loss: parseFloat(valMatch[2]),
                            tookSec: parseFloat(valMatch[3]),
                        });
                    }
                }
                const latestTrain = train[train.length - 1] || null;
                const latestVal = val[val.length - 1] || null;
                const latestResource = resources[resources.length - 1] || null;
                const bestVal = val.length ? val.reduce((best, p) => p.loss < best.loss ? p : best, val[0]) : null;
                const currentIter = Math.max(latestTrain?.iter || 0, latestVal?.iter || 0);
                const peakProcessTreeRssMb = resources.reduce((best, sample) => Math.max(best, sample.process_tree_rss_mb || 0), 0);
                const peakGpuUtilPercent = resources.reduce((best, sample) => Math.max(best, sample.gpu_device_util_percent || 0), 0);
                return {train, val, resources, latestTrain, latestVal, latestResource, bestVal, totalIters, currentIter, peakProcessTreeRssMb, peakGpuUtilPercent};
            })();

            const pressureMetrics = (() => {
                const r = trainMetrics.latestResource;
                if (!r) return null;
                const totalMb = r.system_total_memory_mb || 0;
                const freeGb = (r.system_free_memory_mb || 0) / 1024;
                const rssGb = (r.process_tree_rss_mb || 0) / 1024;
                const gpuInUseGb = (r.gpu_in_use_system_memory_mb || 0) / 1024;
                const gpuAllocGb = (r.gpu_alloc_system_memory_mb || 0) / 1024;
                const util = Number.isFinite(r.gpu_device_util_percent) ? r.gpu_device_util_percent : null;
                const clamp01 = v => Math.max(0, Math.min(1, v || 0));
                const freeRatio = totalMb > 0 ? clamp01((r.system_free_memory_mb || 0) / totalMb) : 0;
                const rssRatio = totalMb > 0 ? clamp01((r.process_tree_rss_mb || 0) / totalMb) : 0;
                const gpuInUseRatio = totalMb > 0 ? clamp01((r.gpu_in_use_system_memory_mb || 0) / totalMb) : 0;
                const gpuAllocRatio = totalMb > 0 ? clamp01((r.gpu_alloc_system_memory_mb || 0) / totalMb) : 0;
                const gpuUtilRatio = util == null ? null : clamp01(util / 100);
                const pressureState = freeGb < 1.5 || gpuInUseGb > 10 || (util || 0) > 97
                    ? {label: 'Danger', color: 'var(--danger)'}
                    : freeGb < 3 || gpuInUseGb > 8 || (util || 0) > 90
                        ? {label: 'Tight', color: 'var(--warning)'}
                        : {label: 'OK', color: 'var(--success)'};
                return {
                    freeGb, rssGb, gpuInUseGb, gpuAllocGb, util,
                    freeRatio, rssRatio, gpuInUseRatio, gpuAllocRatio, gpuUtilRatio,
                    pressureState,
                };
            })();

            const formatGb = value => `${value.toFixed(value >= 10 ? 1 : 2)}GB`;

            const renderDonut = ({label, ratio, value, subtitle, color, invert=false}) => {
                const size = 112;
                const stroke = 9;
