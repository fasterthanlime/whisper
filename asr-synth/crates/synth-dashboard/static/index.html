                            </button>
                            <div style={{display:'flex', alignItems:'center', gap:6, fontSize:12, color:'var(--text-muted)'}}>
                                <span>train</span>
                                <select value={selectedTrainId ?? ''} onChange={e => setSelectedTrainId(Number(e.target.value) || null)} style={{minWidth:320}}>
                                    {rerankerTrains.map(train => (
                                        <option key={train.id} value={train.id}>{formatRerankerTrainOption(train)}</option>
                                    ))}
                                </select>
                            </div>
                            <label style={{display:'flex', alignItems:'center', gap:6, fontSize:12, color:'var(--text-muted)'}}>
                                eval rows
                                <input
                                    type="number"
                                    min="1"
                                    max="250"
                                    step="1"
                                    value={bakeoffLimit}
                                    onChange={e => setBakeoffLimit(e.target.value)}
                                    style={{width:72}}
                                />
                            </label>
                            <button className="stage-launch-btn" onClick={runBakeoff} disabled={!selectedTrainId || runningBakeoff || correcting || transcribing}>
                                {runningBakeoff ? 'Evaluating…' : 'Evaluate'}
                            </button>
                        </div>
                        {selectedTrain && (
                            <div style={{fontSize:12,color:'var(--text-muted)'}}>
                                Using train #{selectedTrain.id}: <code>{selectedTrain.model}</code>
                                {selectedTrain.num_layers != null && <> · {selectedTrain.num_layers} layers</>}
                                {selectedTrain.batch_size != null && <> · batch {selectedTrain.batch_size}</>}
                                {selectedTrain.val_loss != null && <> · val {Number(selectedTrain.val_loss).toFixed(3)}</>}
                            </div>
                        )}
                        {result && (
                            <div style={{padding: '14px 16px', background: 'rgba(0,0,0,0.3)', borderRadius: 6, border: '1px solid rgba(88,166,255,0.1)', fontSize: 13, lineHeight: 1.8, overflowX:'auto'}}>
                                {[
                                    {key:'parakeet', label:'Parakeet raw', color:'#7ee787', value: result.parakeet},
                                    {key:'qwen', label:'Qwen raw', color:'#58a6ff', value: result.qwen},
                                    {key:'cohere', label:'Cohere raw', color:'#f78166', value: result.cohere},
                                ].map(row => (
                                    <div key={row.key} style={demoRowStyle}>
                                        <span style={{...demoRowLabelStyle, color: row.color}}>{row.label}</span>
                                        <div style={{flex: 1}}>
                                            {row.value || <span style={{color:'var(--text-muted)'}}>—</span>}
                                            {!!result.asrErrors?.[row.key] && (
                                                <div style={{marginTop:4, fontSize:11, color:'var(--danger)'}}>
                                                    {result.asrErrors[row.key]}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                ))}
                                {result.error ? (
                                    <div style={{marginTop: 8, paddingTop: 8, borderTop: '1px solid rgba(88,166,255,0.1)', color: 'var(--danger)'}}>
                                        {result.error}
                                    </div>
                                ) : (
                                    <div style={{marginTop: 8, paddingTop: 8, borderTop: '1px solid rgba(88,166,255,0.1)', display:'grid', gap:10}}>
                                        <div style={demoRowStyle}>
                                            <span style={{...demoRowLabelStyle, color: '#e3b341'}}>Reranker</span>
                                            <div style={{flex: 1}}>
                                                {renderRerankerSummary(result)}
                                            </div>
                                        </div>
                                        {result.prototype?.accepted?.length > 0 && (
                                            <div style={demoRowStyle}>
                                                <span style={{...demoRowLabelStyle, color: '#e3b341'}}>Accepted</span>
                                                <div style={{flex:1, display:'flex', flexWrap:'wrap', gap:8}}>
                                                    {result.prototype.accepted.map((edit, idx) => (
                                                        <span key={idx} style={{padding:'2px 8px', borderRadius:999, background:'rgba(227,179,65,0.12)', border:'1px solid rgba(227,179,65,0.25)'}}>
                                                            {edit.from} → {edit.to}
                                                            {edit.acoustic_score != null && (
                                                                <span style={{marginLeft:6, color:'#7ee787'}}>a {edit.acoustic_score.toFixed(2)}</span>
                                                            )}
                                                            {edit.acoustic_delta != null && (
                                                                <span style={{marginLeft:6, color: edit.acoustic_delta >= 0 ? '#7ee787' : '#ff7b72'}}>
                                                                    Δ {edit.acoustic_delta.toFixed(2)}
                                                                </span>
                                                            )}
                                                        </span>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        {result.prototype?.proposals?.length > 0 && (
                                            <div style={demoRowStyle}>
                                                <span style={{...demoRowLabelStyle, color: '#58a6ff'}}>Top proposals</span>
                                                <div style={{flex:1, display:'grid', gap:6, minWidth:0, overflowX:'auto'}}>
                                                    {result.prototype.proposals.slice(0, 5).map((proposal, idx) => (
                                                        <div key={idx} style={{padding:'8px 10px', borderRadius:6, background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.06)', overflowX:'auto'}}>
                                                            <div><strong>{proposal.raw_text}</strong></div>
                                                            {proposal.phonemes && (
                                                                <div style={{fontSize:12, color:'#c297ff', marginTop:2}}>
                                                                    observed / {proposal.phonemes} /
                                                                </div>
                                                            )}
                                                            <div style={{fontSize:12, color:'var(--text-muted)'}}>
                                                                {proposal.candidates.slice(0, 3).map((candidate, cidx) => (
                                                                    <span key={cidx} style={{display:'inline-block', marginRight:12, marginTop:4}}>
                                                                        <span>{candidate.term} ({candidate.via}, {candidate.score.toFixed(2)})</span>
                                                                        {candidate.phonetic_score != null && (
                                                                            <span style={{marginLeft:6, color:'#c297ff'}}>IPA {candidate.phonetic_score.toFixed(2)}</span>
                                                                        )}
                                                                        {candidate.acoustic_score != null && Math.abs(Number(candidate.acoustic_score) - Number(candidate.phonetic_score ?? candidate.acoustic_score)) > 0.02 && (
                                                                            <span style={{marginLeft:6, color:'#7ee787'}}>rescue {candidate.acoustic_score.toFixed(2)}</span>
                                                                        )}
                                                                        {candidate.acoustic_delta != null && (
                                                                            <span style={{marginLeft:6, color: candidate.acoustic_delta >= 0 ? '#7ee787' : '#ff7b72'}}>
                                                                                Δ {candidate.acoustic_delta.toFixed(2)}
                                                                            </span>
                                                                        )}
                                                                        {candidate.phonemes && (
                                                                            <span style={{display:'block', color:'#c297ff'}}>/ {candidate.phonemes} /</span>
                                                                        )}
                                                                    </span>
                                                                ))}
                                                            </div>
                                                            {renderLiveProposalLanes(result, proposal)}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                        {result.prototype?.reranker && (
                                            <div style={demoRowStyle}>
                                                <span style={{...demoRowLabelStyle, color: '#c297ff'}}>Reranker</span>
                                                <div style={{flex:1}}>
                                                    chose {result.prototype.reranker.chosen_index != null ? String.fromCharCode(65 + result.prototype.reranker.chosen_index) : '(unparsed)'}
                                                    {result.prototype.reranker?.chosen_label && (
                                                        <span style={{marginLeft:8, color:'var(--text-muted)'}}>
                                                            {result.prototype.reranker.chosen_label}
                                                        </span>
                                                    )}
                                                    {result.prototype.reranker?.chosen_text && (
                                                        <div style={{fontSize:12, marginTop:4}}>
                                                            {result.prototype.reranker.chosen_text}
                                                        </div>
                                                    )}
                                                    {Array.isArray(result.prototype.reranker?.candidates) && (
                                                        <div style={{fontSize:12, color:'var(--text-muted)', marginTop:4}}>
                                                            {result.prototype.reranker.candidates.map(c => (
                                                                <div key={c.index}>
                                                                    {String.fromCharCode(65 + c.index)} yes {Number(c.yes_prob ?? 0).toFixed(3)} no {Number(c.no_prob ?? 0).toFixed(3)}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                        {bakeoff && (
                            <div style={{padding: '14px 16px', background: 'rgba(0,0,0,0.3)', borderRadius: 6, border: '1px solid rgba(88,166,255,0.1)', fontSize: 13, lineHeight: 1.6, width:'100%', maxWidth:'100%', overflowX:'hidden', boxSizing:'border-box'}}>
                                <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, marginBottom:12}}>
                                    <div>
                                        <div style={{fontSize:12, textTransform:'uppercase', letterSpacing:'0.5px', color:'var(--text-muted)'}}>
                                            {bakeoff?.source === 'human' || (!bakeoff?.source && bakeoffSource === 'human')
                                                ? 'Human Audio Eval'
                                                : 'Applied Eval'}
                                        </div>
                                        <div style={{fontSize:13, color:'var(--text-muted)'}}>
                                            {(bakeoff?.source === 'human' || (!bakeoff?.source && bakeoffSource === 'human'))
                                                ? 'Authored recordings: Qwen transcript in, exact clean sentence out.'
                                                : 'Held-out applied rows: corrupted sentence in, exact clean sentence out.'}
                                        </div>
                                    </div>
                                    {runningBakeoff && (
                                        <div style={{fontSize:12, color:'var(--text-muted)'}}>
                                            {`${bakeoff?.processed || 0} / ${bakeoff?.summary?.n || Number(bakeoffLimit) || 0}`}
                                        </div>
                                    )}
                                </div>
                                {bakeoff.error ? (
                                    <div style={{color:'var(--danger)'}}>{bakeoff.error}</div>
                                ) : (
                                    <>
                                        <div style={{display:'grid', gridTemplateColumns:'repeat(3, minmax(0, 1fr))', gap:10, marginBottom:14}}>
                                            {[
                                                ['Total', bakeoff.summary?.n, '#8b949e'],
                                                ['Correct', bakeoff.summary?.prototype, '#e3b341'],
                                                ['Wrong', bakeoff.summary?.prototype_wrong, 'var(--danger)'],
                                            ].map(([label, value, color]) => (
                                                <div key={label} style={{padding:'10px 12px', borderRadius:8, background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.06)'}}>
                                                    <div style={{fontSize:11, textTransform:'uppercase', letterSpacing:'0.5px', color:'var(--text-muted)'}}>{label}</div>
                                                    <div style={{fontSize:28, fontWeight:800, color, lineHeight:1.1, marginTop:4}}>{value ?? 0}</div>
                                                </div>
                                            ))}
                                        </div>
                                        <div style={{display:'grid', gap:8, width:'100%', minWidth:0}}>
                                            {bakeoff.entries?.map((entry, idx) => {
                                                const entryKey = `${bakeoff.source || bakeoffSource}:${entry.recording_id || `${entry.term}:${idx}`}`;
                                                const detail = bakeoffDetails[entryKey];
                                                const sentenceVerdict = entry.prototype_ok
                                                    ? {label:'full ok', color:'#58a6ff'}
                                                    : {label:'full wrong', color:'var(--danger)'};
                                                const playbackLabel = bakeoffPlayback?.entryKey === entryKey
                                                    ? (bakeoffPlayback.playing ? 'Pause' : 'Resume')
                                                    : 'Play';
                                                return (
                                                    <div key={idx} style={{padding:'10px 12px', borderRadius:8, background:'rgba(255,255,255,0.03)', border:'1px solid rgba(255,255,255,0.06)', width:'100%', maxWidth:'100%', minWidth:0, overflowX:'hidden', boxSizing:'border-box'}}>
                                                        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, marginBottom:6}}>
                                                            <div style={{display:'flex', alignItems:'center', gap:10, flexWrap:'wrap'}}>
                                                                <div style={{fontWeight:700}}>{entry.term} <span style={{fontWeight:400, color:'var(--text-muted)'}}>({entry.hit_count} hits)</span></div>
                                                                {entry.recording_id && !detail && (
                                                                    <button
                                                                        className="btn"
                                                                        onClick={() => playBakeoffRecording(entryKey, entry)}
                                                                        style={bakeoffActionBtnStyle}
                                                                    >
                                                                        {playbackLabel}
                                                                    </button>
                                                                )}
                                                                <button
                                                                    className="btn"
                                                                    onClick={() => loadBakeoffDetail(entryKey, entry)}
                                                                    style={bakeoffActionBtnStyle}
                                                                    disabled={!!loadingBakeoffDetails[entryKey]}
                                                                >
                                                                    {detail ? 'Reload' : loadingBakeoffDetails[entryKey] ? 'Loading…' : 'Details'}
                                                                </button>
                                                            </div>
                                                            <span style={{padding:'2px 8px', borderRadius:999, border:`1px solid ${sentenceVerdict.color}55`, color:sentenceVerdict.color, background:`${sentenceVerdict.color}12`, fontSize:12}}>{sentenceVerdict.label}</span>
                                                        </div>
                                                        <div style={{display:'grid', gap:8, fontSize:13, width:'100%', minWidth:0}}>
                                                            {entry.template_sentence && (
                                                                <div><span style={{color:'var(--text-muted)', width:80, display:'inline-block'}}>Template</span>{entry.template_sentence}</div>
                                                            )}
                                                            {entry.qwen_fragment && (
                                                                <div style={{padding:'8px 10px', borderRadius:6, background:'rgba(255,255,255,0.02)', border:'1px solid rgba(255,255,255,0.05)'}}>
                                                                    <div><span style={{color:'var(--text-muted)', width:80, display:'inline-block'}}>Fragment</span>{entry.qwen_fragment} → {entry.expected_fragment}</div>
                                                                    {(entry.qwen_fragment_phonemes || entry.expected_fragment_phonemes) && (
                                                                        <div style={{fontSize:12, color:'#c297ff', marginTop:4, paddingLeft:80}}>
                                                                            {entry.qwen_fragment_phonemes && <div>{entry.qwen_fragment} / {entry.qwen_fragment_phonemes} /</div>}
                                                                            {entry.expected_fragment_phonemes && (
                                                                                <div>
                                                                                    {entry.expected_fragment}
                                                                                    {entry.expected_fragment_preview && entry.expected_fragment_preview !== entry.expected_fragment ? ` (${entry.expected_fragment_preview})` : ''}
                                                                                    {' / '}
                                                                                    {entry.expected_fragment_phonemes}
                                                                                    {' /'}
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            )}
                                                            <div>
                                                                <div style={{color:'var(--text-muted)', marginBottom:2}}>Qwen</div>
                                                                <div>{entry.qwen}</div>
                                                            </div>
                                                            <div>
                                                                <div style={{color:'var(--text-muted)', marginBottom:2}}>Expected</div>
                                                                <div>{renderCorrectedDiff(entry.qwen, entry.expected)}</div>
                                                            </div>
                                                            <div>
                                                                <div style={{color:'#e3b341', marginBottom:2}}>Reranker</div>
                                                                <div>{renderCorrectedDiff(entry.qwen, entry.prototype)}</div>
                                                            </div>
                                                            {entry.prototype_accepted?.length > 0 && (
                                                                <div style={{padding:'8px 10px', borderRadius:6, background:'rgba(255,255,255,0.02)', border:'1px solid rgba(255,255,255,0.05)'}}>
                                                                    <div style={{color:'#e3b341', marginBottom:6}}>Prototype accepted edits</div>
                                                                    <div style={{display:'grid', gap:6}}>
                                                                        {entry.prototype_accepted.map((edit, eidx) => (
                                                                            <div key={eidx}>
                                                                                <div>

            const loadStatus = () => api('/api/pipeline/status').then(s => {
                setStatus(s);
                if (s.running_job && !runningJob) setRunningJob(s.running_job);
            });
            useEffect(() => {loadStatus();}, []);

            useEffect(() => {
                if (!runningJob) return;
                const poll = async () => {
                    try {
                        const job = await api(`/api/jobs/${runningJob.id}`);
                        setJobLog(job.log);
                        if (job.status !== 'running') {setRunningJob(null); loadStatus();}
                    } catch (e) { }
                };
                poll();
                pollRef.current = setInterval(poll, 2000);
                return () => clearInterval(pollRef.current);
            }, [runningJob?.id]);

            const startJob = async (type, config = {}) => {
                setError(null);
                try {
                    const res = await api(`/api/jobs/${type}`, {method: 'POST', body: JSON.stringify(config)});
                    if (res.job_id) setRunningJob({id: res.job_id, job_type: type});
                    else if (res.error) setError(res.error);
                } catch (e) {setError(e.message);}
            };

            const stopJob = async () => {
                try {
                    await api('/api/jobs/stop', {method: 'POST'});
                } catch (e) {setError(e.message);}
            };

            const logRef = useRef(null);
            useEffect(() => {if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;}, [jobLog]);

            const trainMetrics = (() => {
                const lines = (jobLog || '').split('\n');
                const train = [];
                const val = [];
                const resources = [];
                let totalIters = null;
                for (const line of lines) {
                    const start = line.match(/Starting training: .*iters=(\d+)/);
                    if (start) totalIters = parseInt(start[1], 10) || totalIters;
                    if (line.startsWith('RESOURCE ')) {
                        try { resources.push(JSON.parse(line.slice('RESOURCE '.length))); } catch (_) {}
                        continue;
                    }
                    const trainMatch = line.match(/^Iter\s+(\d+):\s+Train loss\s+([0-9.]+),\s+Learning Rate\s+([0-9.eE+-]+),\s+It\/sec\s+([0-9.]+),\s+Tokens\/sec\s+([0-9.]+),\s+Trained Tokens\s+([0-9,]+),\s+Peak mem\s+([0-9.]+)\s+GB/);
                    if (trainMatch) {
                        train.push({
                            iter: parseInt(trainMatch[1], 10),
                            loss: parseFloat(trainMatch[2]),
                            itPerSec: parseFloat(trainMatch[4]),
                            tokPerSec: parseFloat(trainMatch[5]),
                            peakMemGb: parseFloat(trainMatch[7]),
                        });
                        continue;
                    }
                    const valMatch = line.match(/^Iter\s+(\d+):\s+Val loss\s+([0-9.]+),\s+Val took\s+([0-9.]+)s/);
                    if (valMatch) {
                        val.push({
                            iter: parseInt(valMatch[1], 10),
                            loss: parseFloat(valMatch[2]),
                            tookSec: parseFloat(valMatch[3]),
                        });
                    }
                }
                const latestTrain = train[train.length - 1] || null;
                const latestVal = val[val.length - 1] || null;
                const latestResource = resources[resources.length - 1] || null;
                const bestVal = val.length ? val.reduce((best, p) => p.loss < best.loss ? p : best, val[0]) : null;
                const currentIter = Math.max(latestTrain?.iter || 0, latestVal?.iter || 0);
                const peakProcessTreeRssMb = resources.reduce((best, sample) => Math.max(best, sample.process_tree_rss_mb || 0), 0);
                const peakGpuUtilPercent = resources.reduce((best, sample) => Math.max(best, sample.gpu_device_util_percent || 0), 0);
                return {train, val, resources, latestTrain, latestVal, latestResource, bestVal, totalIters, currentIter, peakProcessTreeRssMb, peakGpuUtilPercent};
            })();

            const pressureMetrics = (() => {
                const r = trainMetrics.latestResource;
                if (!r) return null;
                const totalMb = r.system_total_memory_mb || 0;
                const freeGb = (r.system_free_memory_mb || 0) / 1024;
                const rssGb = (r.process_tree_rss_mb || 0) / 1024;
                const gpuInUseGb = (r.gpu_in_use_system_memory_mb || 0) / 1024;
                const gpuAllocGb = (r.gpu_alloc_system_memory_mb || 0) / 1024;
                const util = Number.isFinite(r.gpu_device_util_percent) ? r.gpu_device_util_percent : null;
                const clamp01 = v => Math.max(0, Math.min(1, v || 0));
                const freeRatio = totalMb > 0 ? clamp01((r.system_free_memory_mb || 0) / totalMb) : 0;
                const rssRatio = totalMb > 0 ? clamp01((r.process_tree_rss_mb || 0) / totalMb) : 0;
                const gpuInUseRatio = totalMb > 0 ? clamp01((r.gpu_in_use_system_memory_mb || 0) / totalMb) : 0;
                const gpuAllocRatio = totalMb > 0 ? clamp01((r.gpu_alloc_system_memory_mb || 0) / totalMb) : 0;
                const gpuUtilRatio = util == null ? null : clamp01(util / 100);
                const pressureState = freeGb < 1.5 || gpuInUseGb > 10 || (util || 0) > 97
                    ? {label: 'Danger', color: 'var(--danger)'}
                    : freeGb < 3 || gpuInUseGb > 8 || (util || 0) > 90
                        ? {label: 'Tight', color: 'var(--warning)'}
                        : {label: 'OK', color: 'var(--success)'};
                return {
                    freeGb, rssGb, gpuInUseGb, gpuAllocGb, util,
                    freeRatio, rssRatio, gpuInUseRatio, gpuAllocRatio, gpuUtilRatio,
                    pressureState,
                };
            })();

            const formatGb = value => `${value.toFixed(value >= 10 ? 1 : 2)}GB`;
            const formatEta = seconds => {
                if (!Number.isFinite(seconds) || seconds <= 0) return null;
                const total = Math.round(seconds);
                const h = Math.floor(total / 3600);
                const m = Math.floor((total % 3600) / 60);
                const s = total % 60;
                if (h > 0) return `${h}h ${m}m`;
                if (m > 0) return `${m}m ${s}s`;
                return `${s}s`;
            };

            const renderDonut = ({label, ratio, value, subtitle, color, invert=false}) => {
                const size = 88;
                const stroke = 7;
                const radius = (size - stroke) / 2;
                const circumference = 2 * Math.PI * radius;
                const progress = Math.max(0, Math.min(1, ratio));
                const visual = invert ? 1 - progress : progress;
                const dashOffset = circumference * (1 - visual);
                return (
                    <div key={label} className="stat-card" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'12px 10px',gap:8}}>
                        <div style={{position:'relative',width:size,height:size}}>
                            <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
                                <circle cx={size / 2} cy={size / 2} r={radius} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth={stroke} />
                                <circle
                                    cx={size / 2}
                                    cy={size / 2}
                                    r={radius}
                                    fill="none"
                                    stroke={color}
                                    strokeWidth={stroke}
                                    strokeLinecap="round"
                                    strokeDasharray={circumference}
                                    strokeDashoffset={dashOffset}
                                    transform={`rotate(-90 ${size / 2} ${size / 2})`}
                                />
                            </svg>
                            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
                                <div style={{fontSize:18,fontWeight:700,color}}>{value}</div>
                                <div style={{fontSize:10,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em'}}>{subtitle}</div>
                            </div>
                        </div>
                        <div style={{fontSize:12,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em'}}>{label}</div>
                    </div>
                );
            };

            const renderLossChart = () => {
                const series = [...trainMetrics.train, ...trainMetrics.val];
                if (!series.length) return null;
                const width = 760;
                const height = 220;
                const pad = 24;
                const maxIter = Math.max(trainMetrics.totalIters || 0, trainMetrics.currentIter || 1, 1);
                const losses = series.map(p => p.loss).filter(Number.isFinite);
                const maxLoss = Math.max(...losses);
                const positiveLosses = losses.filter(loss => loss > 0);
                const lossFloor = positiveLosses.length
                    ? Math.min(1e-2, Math.max(Math.min(...positiveLosses) / 2, 1e-4))
                    : 1e-4;
                const logMin = Math.log10(lossFloor);
                const logMax = Math.log10(Math.max(maxLoss, lossFloor * 10));
                const logSpan = Math.max(logMax - logMin, 1);
                const etaSeconds = trainMetrics.totalIters && trainMetrics.latestTrain?.itPerSec
                    ? Math.max(0, (trainMetrics.totalIters - trainMetrics.currentIter) / trainMetrics.latestTrain.itPerSec)
                    : null;
                const eta = formatEta(etaSeconds);
                const formatLossTick = loss => (loss < 0.01 ? loss.toFixed(4) : loss.toFixed(3));
                const x = iter => pad + (iter / maxIter) * (width - pad * 2);
                const y = loss => {
                    const clamped = Math.max(loss, lossFloor);
                    return height - pad - ((Math.log10(clamped) - logMin) / logSpan) * (height - pad * 2);
                };
                const pts = arr => arr.map(p => `${x(p.iter).toFixed(1)},${y(p.loss).toFixed(1)}`).join(' ');
                const grid = [0, 0.25, 0.5, 0.75, 1].map(t => {
                    const loss = 10 ** (logMin + logSpan * t);
                    const yy = y(loss);
                    return {loss, yy};
                });
                return (
                    <div className="card" style={{marginTop:16,padding:'12px 14px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8,flexWrap:'wrap'}}>
                            <h3 style={{margin:0,flex:1}}>Live Training Curve</h3>
                            <span style={{fontSize:12,color:'var(--text-muted)'}}>
                                iter {trainMetrics.currentIter.toLocaleString()}{trainMetrics.totalIters ? ` / ${trainMetrics.totalIters.toLocaleString()}` : ''}
                            </span>
                            {eta && (
                                <span style={{fontSize:12,color:'var(--text-muted)'}}>
                                    ETA {eta}
                                </span>
                            )}
                        </div>
                        <svg viewBox={`0 0 ${width} ${height}`} style={{width:'100%',height:'auto',display:'block',background:'rgba(255,255,255,0.02)',borderRadius:8,border:'1px solid var(--border)'}}>
                            {grid.map((g, i) => (
                                <g key={i}>
                                    <line x1={pad} y1={g.yy} x2={width - pad} y2={g.yy} stroke="rgba(255,255,255,0.08)" strokeWidth="1" />
                                    <text x={8} y={g.yy + 4} fill="var(--text-muted)" fontSize="10">{formatLossTick(g.loss)}</text>
                                </g>
                            ))}
                            <line x1={pad} y1={height - pad} x2={width - pad} y2={height - pad} stroke="rgba(255,255,255,0.12)" strokeWidth="1" />
                            <line x1={pad} y1={pad} x2={pad} y2={height - pad} stroke="rgba(255,255,255,0.12)" strokeWidth="1" />
                            {trainMetrics.train.length > 1 && <polyline fill="none" stroke="rgba(88,166,255,0.95)" strokeWidth="2" points={pts(trainMetrics.train)} />}
                            {trainMetrics.val.length > 0 && <polyline fill="none" stroke="rgba(126,231,135,0.95)" strokeWidth="2" points={pts(trainMetrics.val)} />}
                            {trainMetrics.bestVal && <circle cx={x(trainMetrics.bestVal.iter)} cy={y(trainMetrics.bestVal.loss)} r="3.5" fill="rgba(126,231,135,1)" />}
                        </svg>
                    </div>
                );
            };

            const applyTrainPreset = preset => {
                setTrainDataDir(preset.data);
                setTrainAdaptersDir(preset.adapters);
                setTrainModel(preset.model);
                setTrainIters(preset.iters);
                setTrainBatch(preset.batch);
                setTrainLayers(preset.layers);
            };

            if (!status) return <div className="pipeline-wrap"><p style={{textAlign: 'center', color: 'var(--text-muted)'}}>Initializing pipeline...</p></div>;

            const isRunning = !!runningJob;
            const rt = runningJob?.job_type;

            const stageState = (type, exists, prereq) => {
                if (rt === type) return 'running';
                if (exists) return 'complete';
                if (prereq) return 'ready';
                return 'idle';
            };
            const s1 = stageState('corpus', status.corpus_exists, status.approved_count > 0);
            const s2 = stageState('prepare', status.training_data_exists, status.prepare_ready);
            const s3 = stageState('train', status.adapters_exist, status.training_data_exists);
            const s4 = stageState('eval', !!status.last_eval, status.adapters_exist && status.applied_eval_exists);
            const pipelineTrainDatasetReady = trainDataDir !== 'training/data' || !!status.training_data_exists;

            const cardClass = (state, type) => {
                let c = 'stage-card';
                if (state === 'complete') c += ' complete';
                else if (state === 'running') c += ' running';
                else if (state === 'ready') c += ' ready';
                if (rt && rt !== type) c += ' dimmed';
                return c;
            };

            const badgeClass = (state) => {
                if (state === 'running') return 'stage-status-badge active';
                if (state === 'complete') return 'stage-status-badge done';
                if (state === 'ready') return 'stage-status-badge ready';
                return 'stage-status-badge idle';
            };

            const badgeText = (state, completeText) => {
                if (state === 'running') return 'Processing';
                if (state === 'complete') return completeText;
                if (state === 'ready') return 'Ready';
                return 'Waiting';
            };

            return (
                <div className="pipeline-wrap">
                    <div className="pipeline-header">
                        <h2>Train</h2>
                        <div className="subtitle">Qwen3 reranker only</div>
                    </div>

                    {error && <div className="pipeline-error">{error}</div>}
                    {isRunning && (
                        <div style={{textAlign: 'right', marginBottom: 8}}>
                            <button className="stage-launch-btn" style={{borderColor: 'var(--warning)', color: 'var(--warning)', background: 'rgba(210,153,34,0.1)'}} onClick={stopJob}>Stop</button>
                        </div>
                    )}

                    {(trainMetrics.latestTrain || trainMetrics.latestVal || pressureMetrics || status.last_train) && (
                        <div style={{marginBottom:16}}>
                            {status.last_train && (
                                <div className="stats-grid" style={{marginBottom:16}}>
                                    <div className="stat-card"><div className="value" style={{color:'var(--success)'}}>Ready</div><div className="label">Adapters</div></div>
                                    {status.last_train.adapter_mb && <div className="stat-card"><div className="value">{status.last_train.adapter_mb}MB</div><div className="label">Size</div></div>}
                                    {status.last_train.val_loss && <div className="stat-card"><div className="value">{Number(status.last_train.val_loss).toFixed(4)}</div><div className="label">Val Loss</div></div>}
                                    {trainMetrics.latestTrain && <div className="stat-card"><div className="value">{trainMetrics.latestTrain.loss.toFixed(3)}</div><div className="label">Latest Train</div></div>}
                                    {trainMetrics.latestVal && <div className="stat-card"><div className="value">{trainMetrics.latestVal.loss.toFixed(3)}</div><div className="label">Latest Val</div></div>}
                                    {trainMetrics.bestVal && <div className="stat-card"><div className="value">{trainMetrics.bestVal.loss.toFixed(3)}</div><div className="label">Best Val</div></div>}
                                    {trainMetrics.latestTrain?.peakMemGb && <div className="stat-card"><div className="value">{trainMetrics.latestTrain.peakMemGb.toFixed(2)}GB</div><div className="label">Peak Mem</div></div>}
                                    {trainMetrics.latestTrain?.tokPerSec && <div className="stat-card"><div className="value">{Math.round(trainMetrics.latestTrain.tokPerSec)}</div><div className="label">Tok/Sec</div></div>}
                                </div>
                            )}

                            {pressureMetrics && (
                                <div className="card" style={{marginBottom:16,padding:'12px 14px'}}>
                                    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12,flexWrap:'wrap'}}>
                                        <h3 style={{margin:0,flex:1}}>Pressure</h3>
                                        <span style={{fontSize:12,color:pressureMetrics.pressureState.color,fontWeight:700}}>
                                            {pressureMetrics.pressureState.label}
                                        </span>
                                    </div>
                                    <div className="stats-grid" style={{marginBottom:12}}>
                                        {renderDonut({
                                            label: 'System Free',
                                            ratio: pressureMetrics.freeRatio,
                                            value: formatGb(pressureMetrics.freeGb),
                                            subtitle: `${Math.round(pressureMetrics.freeRatio * 100)}% free`,
                                            color: pressureMetrics.freeGb < 1.5 ? 'var(--danger)' : pressureMetrics.freeGb < 3 ? 'var(--warning)' : 'var(--success)',
                                        })}
                                        {renderDonut({
                                            label: 'MLX RSS',
                                            ratio: pressureMetrics.rssRatio,
                                            value: formatGb(pressureMetrics.rssGb),
                                            subtitle: `${Math.round(pressureMetrics.rssRatio * 100)}% of RAM`,
                                            color: pressureMetrics.rssRatio > 0.2 ? 'var(--warning)' : 'var(--accent)',
                                        })}
                                        {renderDonut({
                                            label: 'GPU In Use',
                                            ratio: pressureMetrics.gpuInUseRatio,
                                            value: formatGb(pressureMetrics.gpuInUseGb),
                                            subtitle: `${Math.round(pressureMetrics.gpuInUseRatio * 100)}% of RAM`,
                                            color: pressureMetrics.gpuInUseGb > 10 ? 'var(--danger)' : pressureMetrics.gpuInUseGb > 8 ? 'var(--warning)' : 'var(--accent)',
                                        })}
                                        {pressureMetrics.gpuUtilRatio != null && renderDonut({
                                            label: 'GPU Util',
                                            ratio: pressureMetrics.gpuUtilRatio,
                                            value: `${Math.round(pressureMetrics.util)}%`,
                                            subtitle: 'current',
                                            color: pressureMetrics.util > 97 ? 'var(--danger)' : pressureMetrics.util > 90 ? 'var(--warning)' : 'var(--success)',
                                        })}
                                        {pressureMetrics.gpuAllocGb > 0 && renderDonut({
                                            label: 'GPU Alloc',
                                            ratio: pressureMetrics.gpuAllocRatio,
                                            value: formatGb(pressureMetrics.gpuAllocGb),
                                            subtitle: `${Math.round(pressureMetrics.gpuAllocRatio * 100)}% of RAM`,
                                            color: pressureMetrics.gpuAllocGb > 10 ? 'var(--danger)' : pressureMetrics.gpuAllocGb > 8 ? 'var(--warning)' : 'var(--success)',
                                        })}
                                    </div>
                                </div>
                            )}

                            {renderLossChart()}
                        </div>
                    )}

                    <div className="pipeline-stages">
                        {/* Stage 1: Prepare */}
                        <div className={cardClass(s2, 'prepare')}>
                            <div className="stage-top">
                                <div className="stage-icon" style={{color: s2 === 'complete' ? 'var(--success)' : 'var(--accent)'}}>{PipelineIcons.prepare}</div>
                                <div className="stage-title">
                                    <div className="stage-num">Stage 01</div>
                                    <h3>Prepare Training Data</h3>
                                </div>
                                <span className={badgeClass(s2)}>{badgeText(s2, `${status.train_count?.toLocaleString()} examples`)}</span>
                            </div>
                            <div className="stage-desc">
                                Build train / valid from clean authored sentences plus exactly one applied known mistake per error example. Also writes a held-out applied eval set from disjoint clean sentences.
                            </div>
                            <div className="stage-controls">
                                <label>Total</label>
                                <input type="number" value={prepareTotalExamples} onChange={e => setPrepareTotalExamples(parseInt(e.target.value) || 12000)} style={{width: 80}} />
                                <label>Error %</label>
                                <input type="number" min="0" max="100" step="1" value={prepareErrorRate} onChange={e => setPrepareErrorRate(parseInt(e.target.value) || 25)} style={{width: 60}} />
                                <div style={{flex: 1}} />
                                <button className="stage-launch-btn" disabled={isRunning || !status.prepare_ready}
                                    onClick={() => startJob('prepare', {total_examples: prepareTotalExamples, error_rate: Math.max(0, Math.min(100, prepareErrorRate)) / 100})}>
                                    {rt === 'prepare' ? 'Running\u2026' : 'Prepare'}
                                </button>
                            </div>
                            {rt === 'prepare' && jobLog && <pre ref={logRef} className="stage-log">{jobLog}</pre>}
                        </div>

                        <div className={`pipeline-connector${s2 === 'complete' || s2 === 'running' ? ' active' : ''}`} />

                        {/* Stage 2: Train */}
                        <div className={cardClass(s3, 'train')}>
                            <div className="stage-top">
                                <div className="stage-icon" style={{color: s3 === 'complete' ? 'var(--success)' : 'var(--accent)'}}>{PipelineIcons.train}</div>
                                <div className="stage-title">
                                    <div className="stage-num">Stage 02</div>
                                    <h3>Train LoRA Adapters</h3>
                                </div>
                                <span className={badgeClass(s3)}>{badgeText(s3, 'Adapters ready')}</span>
                            </div>
                            <div className="stage-desc">
                                Fine-tune <code>Qwen/Qwen3-Reranker-0.6B</code> on the applied-mistake reranker dataset via MLX-LM.
                            </div>
                            <div className="stage-controls">
                                <label>Preset</label>
                                <div style={{display:'flex',gap:6,flexWrap:'wrap',marginRight:10}}>
                                    {TRAIN_PRESETS.map(preset => (
                                        <button
                                            key={preset.id}
                                            type="button"
                                            className="stage-launch-btn"
                                            style={{
                                                padding:'6px 10px',
                                                background: trainDataDir === preset.data && trainAdaptersDir === preset.adapters && trainModel === preset.model && trainIters === preset.iters && trainBatch === preset.batch && trainLayers === preset.layers
                                                    ? 'rgba(88,166,255,0.14)'
                                                    : 'rgba(255,255,255,0.02)',
                                            }}
                                            onClick={() => applyTrainPreset(preset)}
                                            disabled={isRunning}
                                        >
                                            {preset.label}
                                        </button>
                                    ))}
                                </div>
                                <label>Iters</label>
                                <input type="number" value={trainIters} onChange={e => setTrainIters(parseInt(e.target.value) || defaultTrainPreset.iters)} style={{width: 60}} />
                                <label>Batch</label>
                                <input type="number" value={trainBatch} onChange={e => setTrainBatch(parseInt(e.target.value) || defaultTrainPreset.batch)} style={{width: 40}} />
                                <label>Layers</label>
                                <input type="number" value={trainLayers} onChange={e => setTrainLayers(parseInt(e.target.value) || defaultTrainPreset.layers)} style={{width: 40}} />
                                <div style={{flex: 1}} />
                                <button className="stage-launch-btn" disabled={isRunning || !pipelineTrainDatasetReady}
                                    onClick={() => startJob('train', {data: trainDataDir, adapters: trainAdaptersDir, model: trainModel, iters: trainIters, batch_size: trainBatch, num_layers: trainLayers})}>
                                    {rt === 'train' ? 'Running\u2026' : 'Train'}
                                </button>
                            </div>
                            <div style={{display:'flex',gap:12,flexWrap:'wrap',marginTop:10,fontSize:12,color:'var(--text-muted)'}}>
                                <span>model: <code>{trainModel}</code></span>
                                <span>data: <code>{trainDataDir}</code></span>
                                <span>adapters: <code>{trainAdaptersDir}</code></span>
                            </div>
                            {rt === 'train' && jobLog && <pre ref={logRef} className="stage-log" style={{maxHeight: 300}}>{jobLog}</pre>}
                        </div>

                    </div>

                </div>
            );
        }

        // ==================== SCAN RESULTS ====================
        function ScanResultsPage() {
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                api('/api/pipeline/scan-results').then(setResults).finally(() => setLoading(false));
            }, []);

            if (loading) return <div className="container"><p>Loading...</p></div>;

            const totalTerms = results.length;
            const errorTerms = results.filter(r => r.qwen_errors > 0 || r.parakeet_errors > 0).length;

            return (
                <div className="container">
                    <div style={{display: 'flex', alignItems: 'center', gap: 16, marginBottom: 24}}>
                        <a href="#/vocab" className="btn btn-sm">&larr; Vocab</a>
                        <h2 style={{margin: 0}}>Vocab Scan Results</h2>
                        <span style={{fontSize: 13, color: 'var(--text-muted)'}}>{errorTerms} / {totalTerms} terms with ASR errors</span>
                    </div>
                    {results.length === 0 ? (
                        <div className="empty-state"><h3>No scan results yet</h3><p>Run a vocab scan from the Pipeline page.</p></div>
                    ) : (
                        <div className="card" style={{padding: 0, overflow: 'hidden'}}>
                            <table>
                                <thead><tr>
                                    <th>Term</th>
                                    <th style={{color: '#58a6ff'}}>Qwen heard</th>
                                    <th style={{color: '#7ee787'}}>Parakeet heard</th>
                                </tr></thead>
                                <tbody>{results.map(r => {
                                    const hasErrors = r.qwen_errors > 0 || r.parakeet_errors > 0;
                                    if (!hasErrors) return null;
                                    const qHeard = [...new Set(r.qwen_heard || [])].filter(h => h.toLowerCase() !== r.term.toLowerCase());
                                    const pHeard = [...new Set(r.parakeet_heard || [])].filter(h => h.toLowerCase() !== r.term.toLowerCase());
                                    return (
                                        <tr key={r.term}>
                                            <td style={{fontWeight: 600}}>{r.term}</td>
                                            <td>{qHeard.length > 0
                                                ? qHeard.map((h, i) => <span key={i} style={{color: '#58a6ff', marginRight: 8}}>{h}</span>)
                                                : <span style={{color: 'var(--text-muted)'}}>—</span>}
                                            </td>
                                            <td>{pHeard.length > 0
                                                ? pHeard.map((h, i) => <span key={i} style={{color: '#7ee787', marginRight: 8}}>{h}</span>)
                                                : <span style={{color: 'var(--text-muted)'}}>—</span>}
                                            </td>
                                        </tr>
                                    );
                                })}</tbody>
                            </table>
                        </div>
                    )}
                </div>
            );
        }

        // ==================== JOBS ====================
        function JobsPage() {
            const [jobs, setJobs] = useState([]);
            const [selected, setSelected] = useState(null);
            useEffect(() => {api('/api/jobs').then(setJobs);}, []);
            const viewJob = async (id) => {setSelected(await api(`/api/jobs/${id}`));};
            return (
                <div className="container">
                    <h2>Jobs</h2>
                    {jobs.length === 0 ? <div className="empty-state"><h3>No jobs yet</h3></div> : (
                        <div className="card" style={{padding: 0, overflow: 'hidden'}}>
                            <table>
                                <thead><tr><th>ID</th><th>Type</th><th>Status</th><th>Created</th><th></th></tr></thead>
                                <tbody>{jobs.map(j => (
                                    <tr key={j.id}><td>{j.id}</td><td>{j.job_type}</td><td><span className={`badge badge-${j.status}`}>{j.status}</span></td><td style={{color: 'var(--text-muted)', fontSize: 13}}>{j.created_at}</td><td><button className="btn btn-sm" onClick={() => viewJob(j.id)}>View</button></td></tr>
                                ))}</tbody>
                            </table>
                        </div>
                    )}
                    {selected && (
                        <div className="card" style={{marginTop: 16}}>

                            {selected.log && <pre style={{marginTop: 12, background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 6, padding: 12, fontFamily: 'monospace', fontSize: 12, maxHeight: 300, overflowY: 'auto', color: 'var(--text-muted)', whiteSpace: 'pre-wrap'}}>{selected.log}</pre>}
                        </div>
                    )}
                </div>
            );
