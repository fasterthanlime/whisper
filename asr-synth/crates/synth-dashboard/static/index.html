                const radius = (size - stroke) / 2;
                const circumference = 2 * Math.PI * radius;
                const progress = Math.max(0, Math.min(1, ratio));
                const visual = invert ? 1 - progress : progress;
                const dashOffset = circumference * (1 - visual);
                return (
                    <div key={label} className="stat-card" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'14px 10px',gap:8}}>
                        <div style={{position:'relative',width:size,height:size}}>
                            <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block'}}>
                                <circle
                                    cx={size / 2}
                                    cy={size / 2}
                                    r={radius}
                                    fill="none"
                                    stroke="rgba(255,255,255,0.08)"
                                    strokeWidth={stroke}
                                />
                                <circle
                                    cx={size / 2}
                                    cy={size / 2}
                                    r={radius}
                                    fill="none"
                                    stroke={color}
                                    strokeWidth={stroke}
                                    strokeLinecap="round"
                                    strokeDasharray={circumference}
                                    strokeDashoffset={dashOffset}
                                    transform={`rotate(-90 ${size / 2} ${size / 2})`}
                                />
                            </svg>
                            <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',pointerEvents:'none'}}>
                                <div style={{fontSize:22,fontWeight:700,color}}>{value}</div>
                                <div style={{fontSize:10,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em'}}>{subtitle}</div>
                            </div>
                        </div>
                        <div style={{fontSize:12,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em'}}>{label}</div>
                    </div>
                );
            };

            const renderLossChart = () => {
                const series = [...trainMetrics.train, ...trainMetrics.val];
                if (!series.length) return null;
                const width = 760;
                const height = 220;
                const pad = 24;
                const maxIter = Math.max(trainMetrics.totalIters || 0, trainMetrics.currentIter || 1, 1);
                const losses = series.map(p => p.loss).filter(Number.isFinite);
                const maxLoss = Math.max(...losses);
                const positiveLosses = losses.filter(loss => loss > 0);
                const lossFloor = positiveLosses.length
                    ? Math.min(1e-2, Math.max(Math.min(...positiveLosses) / 2, 1e-4))
                    : 1e-4;
                const logMin = Math.log10(lossFloor);
                const logMax = Math.log10(Math.max(maxLoss, lossFloor * 10));
                const logSpan = Math.max(logMax - logMin, 1);
                const formatLossTick = loss => (loss < 0.01 ? loss.toFixed(4) : loss.toFixed(3));
                const x = iter => pad + (iter / maxIter) * (width - pad * 2);
                const y = loss => {
                    const clamped = Math.max(loss, lossFloor);
                    return height - pad - ((Math.log10(clamped) - logMin) / logSpan) * (height - pad * 2);
                };
                const pts = arr => arr.map(p => `${x(p.iter).toFixed(1)},${y(p.loss).toFixed(1)}`).join(' ');
                const grid = [0, 0.25, 0.5, 0.75, 1].map(t => {
                    const loss = 10 ** (logMin + logSpan * t);
                    const yy = y(loss);
                    return {loss, yy};
                });
                return (
                    <div className="card" style={{marginBottom:16,padding:'12px 14px'}}>
                        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8,flexWrap:'wrap'}}>
                            <h3 style={{margin:0,flex:1}}>Live Training Curve</h3>
                            <span style={{fontSize:12,color:'var(--text-muted)'}}>
                                iter {trainMetrics.currentIter.toLocaleString()}{trainMetrics.totalIters ? ` / ${trainMetrics.totalIters.toLocaleString()}` : ''}
                            </span>
                        </div>
                        <svg viewBox={`0 0 ${width} ${height}`} style={{width:'100%',height:'auto',display:'block',background:'rgba(255,255,255,0.02)',borderRadius:8,border:'1px solid var(--border)'}}>
                            {grid.map((g, i) => (
                                <g key={i}>
                                    <line x1={pad} y1={g.yy} x2={width - pad} y2={g.yy} stroke="rgba(255,255,255,0.08)" strokeWidth="1" />
                                    <text x={8} y={g.yy + 4} fill="var(--text-muted)" fontSize="10">{formatLossTick(g.loss)}</text>
                                </g>
                            ))}
                            <line x1={pad} y1={height - pad} x2={width - pad} y2={height - pad} stroke="rgba(255,255,255,0.12)" strokeWidth="1" />
                            <line x1={pad} y1={pad} x2={pad} y2={height - pad} stroke="rgba(255,255,255,0.12)" strokeWidth="1" />
                            {trainMetrics.train.length > 1 && <polyline fill="none" stroke="rgba(88,166,255,0.95)" strokeWidth="2" points={pts(trainMetrics.train)} />}
                            {trainMetrics.val.length > 0 && <polyline fill="none" stroke="rgba(126,231,135,0.95)" strokeWidth="2" points={pts(trainMetrics.val)} />}
                            {trainMetrics.bestVal && (
                                <circle cx={x(trainMetrics.bestVal.iter)} cy={y(trainMetrics.bestVal.loss)} r="3.5" fill="rgba(126,231,135,1)" />
                            )}
                        </svg>
                        <div style={{display:'flex',gap:14,marginTop:8,flexWrap:'wrap',fontSize:12,color:'var(--text-muted)'}}>
                            <span><span style={{display:'inline-block',width:10,height:10,background:'rgba(88,166,255,0.95)',borderRadius:2,marginRight:6,verticalAlign:'middle'}} />Train loss</span>
                            <span><span style={{display:'inline-block',width:10,height:10,background:'rgba(126,231,135,0.95)',borderRadius:2,marginRight:6,verticalAlign:'middle'}} />Val loss</span>
                            <span>Log scale</span>
                            {trainMetrics.bestVal && <span>Best val at iter {trainMetrics.bestVal.iter.toLocaleString()}</span>}
                        </div>
                    </div>
                );
            };

            const rt = runningJob?.job_type;
            const prepareRunning = rt === 'prepare';
            const runningTrainJob = jobs.find(j => j.job_type === 'train' && j.status === 'running') || null;
            const lastCompletedTrainJob = jobs.find(j => j.job_type === 'train' && j.status === 'completed') || null;

            return (
                <div className="container">
                    <h2>Train</h2>
                    {error && <div className="pipeline-error" style={{marginBottom:12}}>{error}</div>}

                    <div className="card" style={{marginBottom:16}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                            <h3 style={{margin:0,flex:1}}>1. Prepare Training Data</h3>
                            {status.training_data_exists && <>
                                <a href="#" style={{color:'var(--success)',fontSize:13,fontWeight:600}} onClick={async e => {
                                    e.preventDefault();
                                    setPreviewData(null); setPreviewLoading(true);
                                    try { setPreviewData(await api('/api/pipeline/preview-training')); } catch (err) { setError(err.message); }
                                    setPreviewLoading(false);
                                }}>{status.train_count?.toLocaleString()} train / {status.valid_count?.toLocaleString()} valid</a>
                                <a href="#" style={{color:'var(--text-muted)',fontSize:11}} onClick={async e => {
                                    e.preventDefault();
                                    if (confirm('Delete training data?')) { await api('/api/pipeline/reset-training', {method:'POST'}); setPreviewData(null); load(); }
                                }}>reset</a>
                            </>}
                        </div>
                        <div style={{display:'flex',gap:16,alignItems:'flex-start',marginBottom:8,flexWrap:'wrap'}}>
                            <div>
                                <label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:2}}>Total examples</label>
                                <input type="number" value={totalExamples} onChange={e => setTotalExamples(parseInt(e.target.value)||12000)} disabled={prepareRunning} style={{...inputStyle,width:80}} />
                                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>How many training prompts to generate total.</div>
                            </div>
                            <div>
                                <label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:2}}>Error rate %</label>
                                <input type="number" value={errorRate} onChange={e => setErrorRate(Math.min(100,Math.max(0,parseInt(e.target.value)||80)))} disabled={prepareRunning} min="0" max="100" style={{...inputStyle,width:60}} />
                                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>% with real ASR errors. Default is 80 so the model is not overtrained to keep bad ASR unchanged.</div>
                            </div>
                            <div style={{flex:1,display:'flex',alignItems:'flex-end',justifyContent:'flex-end',paddingTop:16}}>
                                {prepareRunning
                                    ? <button className="btn btn-sm" style={{borderColor:'var(--warning)',color:'var(--warning)',background:'rgba(210,153,34,0.1)'}} onClick={stopJob} disabled={stopping}>{stopping ? 'Stopping...' : 'Stop'}</button>
                                    : <button className="btn btn-primary btn-sm" disabled={isRunning || !status.prepare_ready} onClick={() => startJob('prepare', {total_examples: totalExamples, error_rate: errorRate / 100})}>Prepare</button>
                                }
                            </div>
                        </div>
                        {status.prepare_ready && !prepareRunning && (
                            <div style={{fontSize:12,color:'var(--text-muted)',padding:'6px 0',borderTop:'1px solid var(--border)',marginTop:4}}>
                                {Math.round(totalExamples * errorRate / 100).toLocaleString()} applied-mistake + {Math.round(totalExamples * (100 - errorRate) / 100).toLocaleString()} no-change = {totalExamples.toLocaleString()} total. 90% train / 10% valid, plus a held-out applied eval set.
                            </div>
                        )}
                        {templateCoverage && (
                            <div style={{marginTop:12,borderTop:'1px solid var(--border)',paddingTop:12}}>
                                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8,flexWrap:'wrap'}}>
                                    <b style={{fontSize:13}}>Template Coverage</b>
                                    <span style={{fontSize:11,color:'var(--text-muted)'}}>
                                        {templateCoverage.ready_terms?.toLocaleString() || 0} / {templateCoverage.total_terms?.toLocaleString() || 0} terms at target {templateCoverage.target}
                                    </span>
                                </div>
                                <div style={{display:'grid',gap:6,maxHeight:220,overflow:'auto'}}>
                                    {(templateCoverage.terms || []).slice(0, 24).map((row, i) => {
                                        const ratio = Math.max(0, Math.min(1, row.coverage_ratio || 0));
                                        return (
                                            <div key={row.term} style={{display:'grid',gridTemplateColumns:'160px 1fr auto auto',gap:10,alignItems:'center',fontSize:12,padding:'4px 0',borderTop:i?'1px solid rgba(255,255,255,0.04)':'none'}}>
                                                <div>
                                                    <div style={{fontWeight:600}}>{row.term}</div>
                                                    {row.description && <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>{row.description}</div>}
                                                </div>
                                                <div>
                                                    <div style={{height:8,borderRadius:999,background:'rgba(255,255,255,0.08)',overflow:'hidden'}}>
                                                        <div style={{width:`${(ratio*100).toFixed(1)}%`,height:'100%',background: ratio >= 1 ? 'var(--success)' : 'var(--accent)'}} />
                                                    </div>
                                                    <div style={{display:'flex',gap:10,marginTop:4,fontSize:10,color:'var(--text-muted)'}}>
                                                        <span>{row.authored_count} authored</span>
                                                        <span>{row.template_count} cached</span>
                                                        <span>{row.total_count} total</span>
                                                    </div>
                                                </div>
                                                <div style={{fontSize:11,color:'var(--text-muted)',whiteSpace:'nowrap'}}>
                                                    {row.total_count}/{row.target}
                                                </div>
                                                <button
                                                    className="btn btn-sm"
                                                    style={{padding:'3px 8px',fontSize:11}}
                                                    onClick={async () => {
                                                        setTemplateDetailLoading(true);
                                                        try {
                                                            setTemplateDetail(await api(`/api/pipeline/template-coverage/${encodeURIComponent(row.term)}`));
                                                        } catch (err) {
                                                            setError(err.message);
                                                        }
                                                        setTemplateDetailLoading(false);
                                                    }}
                                                >
                                                    View
                                                </button>
                                            </div>
                                        );
                                    })}
                                </div>
                                {(templateCoverage.total_terms || 0) > 24 && (
                                    <div style={{fontSize:11,color:'var(--text-muted)',marginTop:8}}>
                                        Showing 24 least-covered terms first.
                                    </div>
                                )}
                                {templateDetailLoading && (
                                    <div style={{fontSize:11,color:'var(--text-muted)',marginTop:8}}>Loading sentences...</div>
                                )}
                                {templateDetail && (
                                    <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid var(--border)'}}>
                                        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                                            <b style={{fontSize:13}}>Sentences for {templateDetail.term}</b>
                                            <span style={{fontSize:11,color:'var(--text-muted)'}}>
                                                {templateDetail.authored?.length || 0} authored, {templateDetail.cached?.length || 0} cached
                                            </span>
                                            <div style={{flex:1}} />
                                            <button onClick={() => setTemplateDetail(null)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:14}}>&times;</button>
                                        </div>
                                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                                            <div>
                                                <div style={{fontSize:11,fontWeight:600,color:'var(--accent)',marginBottom:4}}>Authored</div>
                                                <div style={{maxHeight:220,overflow:'auto',fontSize:11}}>
                                                    {(templateDetail.authored || []).map((s, i) => (
                                                        <div key={i} style={{padding:'4px 8px',background:i%2?'transparent':'rgba(255,255,255,0.02)',lineHeight:1.5}}>{s}</div>
                                                    ))}
                                                    {(!templateDetail.authored || templateDetail.authored.length === 0) && <div style={{color:'var(--text-muted)'}}>No authored sentences.</div>}
                                                </div>
                                            </div>
                                            <div>
                                                <div style={{fontSize:11,fontWeight:600,color:'var(--success)',marginBottom:4}}>Cached Templates</div>
                                                <div style={{maxHeight:220,overflow:'auto',fontSize:11}}>
                                                    {(templateDetail.cached || []).map((s, i) => (
                                                        <div key={i} style={{padding:'4px 8px',background:i%2?'transparent':'rgba(255,255,255,0.02)',lineHeight:1.5}}>{s}</div>
                                                    ))}
                                                    {(!templateDetail.cached || templateDetail.cached.length === 0) && <div style={{color:'var(--text-muted)'}}>No cached templates yet.</div>}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                        {jobLog && prepareRunning && <pre ref={logRef} className="stage-log" style={{marginTop:10,maxHeight:150}}>{jobLog}</pre>}
                        {previewLoading && <div style={{fontSize:12,color:'var(--text-muted)',marginTop:8}}>Loading preview...</div>}
                        {previewData && (
                            <div style={{marginTop:12,borderTop:'1px solid var(--border)',paddingTop:12}}>
                                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                                    <b style={{fontSize:13}}>Training Data Preview</b>
                                    <span style={{fontSize:11,color:'var(--text-muted)'}}>{previewData.correction_count?.toLocaleString()} error + {previewData.identity_count?.toLocaleString()} identity = {previewData.total?.toLocaleString()} total</span>
                                    <div style={{flex:1}} />
                                    <button onClick={() => setPreviewData(null)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:14}}>&times;</button>
                                </div>
                                {previewData.correction_samples?.length > 0 && <>
                                    <div style={{fontSize:11,fontWeight:600,color:'var(--success)',marginBottom:4}}>Error examples:</div>
                                    <div style={{maxHeight:200,overflow:'auto',marginBottom:12}}>
                                        {previewData.correction_samples.map((s, i) => (
                                            <div key={i} style={{fontSize:11,fontFamily:'monospace',padding:'4px 8px',background:i%2?'transparent':'rgba(255,255,255,0.02)',lineHeight:1.6,whiteSpace:'pre-wrap'}}>
                                                {s.prompt}{'\n'}<span style={{color:'var(--success)'}}>{s.completion}</span>
                                            </div>
                                        ))}
                                    </div>
                                </>}
                                {previewData.identity_samples?.length > 0 && <>
                                    <div style={{fontSize:11,fontWeight:600,color:'var(--accent)',marginBottom:4}}>Identity examples:</div>
                                    <div style={{maxHeight:200,overflow:'auto'}}>
                                        {previewData.identity_samples.map((s, i) => (
                                            <div key={i} style={{fontSize:11,fontFamily:'monospace',padding:'4px 8px',background:i%2?'transparent':'rgba(255,255,255,0.02)',lineHeight:1.6,whiteSpace:'pre-wrap'}}>
                                                {s.prompt}{'\n'}<span style={{color:'var(--accent)'}}>{s.completion}</span>
                                            </div>
                                        ))}
                                    </div>
                                </>}
                            </div>
                        )}
                    </div>

                    {status.adapters_exist && (
                        <div className="stats-grid" style={{marginBottom:16}}>
                            <div className="stat-card"><div className="value" style={{color:'var(--success)'}}>Ready</div><div className="label">Adapters</div></div>
                            {status.last_train?.adapter_mb && <div className="stat-card"><div className="value">{status.last_train.adapter_mb}MB</div><div className="label">Size</div></div>}
                            {status.last_train?.val_loss && <div className="stat-card"><div className="value">{Number(status.last_train.val_loss).toFixed(4)}</div><div className="label">Val Loss</div></div>}
                        </div>
                    )}

                    {(trainMetrics.latestTrain || trainMetrics.latestVal) && (
                        <div className="stats-grid" style={{marginBottom:16}}>
                            {trainMetrics.latestTrain && <div className="stat-card"><div className="value" style={{color:'var(--accent)'}}>{trainMetrics.latestTrain.loss.toFixed(3)}</div><div className="label">Latest Train</div></div>}
                            {trainMetrics.latestVal && <div className="stat-card"><div className="value" style={{color:'var(--success)'}}>{trainMetrics.latestVal.loss.toFixed(3)}</div><div className="label">Latest Val</div></div>}
                            {trainMetrics.bestVal && <div className="stat-card"><div className="value" style={{color:'var(--success)'}}>{trainMetrics.bestVal.loss.toFixed(3)}</div><div className="label">Best Val</div></div>}
                            {trainMetrics.latestTrain?.peakMemGb && <div className="stat-card"><div className="value">{trainMetrics.latestTrain.peakMemGb.toFixed(2)}GB</div><div className="label">Peak Mem</div></div>}
                            {trainMetrics.latestTrain?.tokPerSec && <div className="stat-card"><div className="value">{Math.round(trainMetrics.latestTrain.tokPerSec)}</div><div className="label">Tok/sec</div></div>}
                        </div>
                    )}

                    {pressureMetrics && (
                        <div className="card" style={{marginBottom:16,padding:'12px 14px'}}>
                            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12,flexWrap:'wrap'}}>
                                <h3 style={{margin:0,flex:1}}>Pressure</h3>
                                <span style={{fontSize:12,color:pressureMetrics.pressureState.color,fontWeight:700}}>
                                    {pressureMetrics.pressureState.label}
                                </span>
                            </div>
                            <div className="stats-grid" style={{marginBottom:12}}>
                                {renderDonut({
                                    label: 'System Free',
                                    ratio: pressureMetrics.freeRatio,
                                    value: formatGb(pressureMetrics.freeGb),
                                    subtitle: `${Math.round(pressureMetrics.freeRatio * 100)}% free`,
                                    color: pressureMetrics.freeGb < 1.5 ? 'var(--danger)' : pressureMetrics.freeGb < 3 ? 'var(--warning)' : 'var(--success)',
                                })}
                                {renderDonut({
                                    label: 'MLX RSS',
                                    ratio: pressureMetrics.rssRatio,
                                    value: formatGb(pressureMetrics.rssGb),
                                    subtitle: `${Math.round(pressureMetrics.rssRatio * 100)}% of RAM`,
                                    color: pressureMetrics.rssRatio > 0.2 ? 'var(--warning)' : 'var(--accent)',
                                })}
                                {renderDonut({
                                    label: 'GPU In Use',
                                    ratio: pressureMetrics.gpuInUseRatio,
                                    value: formatGb(pressureMetrics.gpuInUseGb),
                                    subtitle: `${Math.round(pressureMetrics.gpuInUseRatio * 100)}% of RAM`,
                                    color: pressureMetrics.gpuInUseGb > 10 ? 'var(--danger)' : pressureMetrics.gpuInUseGb > 8 ? 'var(--warning)' : 'var(--accent)',
                                })}
                                {pressureMetrics.gpuUtilRatio != null && renderDonut({
                                    label: 'GPU Util',
                                    ratio: pressureMetrics.gpuUtilRatio,
                                    value: `${Math.round(pressureMetrics.util)}%`,
                                    subtitle: 'current',
                                    color: pressureMetrics.util > 97 ? 'var(--danger)' : pressureMetrics.util > 90 ? 'var(--warning)' : 'var(--success)',
                                })}
                                {pressureMetrics.gpuAllocGb > 0 && renderDonut({
                                    label: 'GPU Alloc',
                                    ratio: pressureMetrics.gpuAllocRatio,
                                    value: formatGb(pressureMetrics.gpuAllocGb),
                                    subtitle: `${Math.round(pressureMetrics.gpuAllocRatio * 100)}% of RAM`,
                                    color: 'rgba(126,231,135,0.95)',
                                })}
                            </div>
                            <div style={{display:'flex',gap:14,flexWrap:'wrap',fontSize:12,color:'var(--text-muted)'}}>
                                <span>System free is the best cliff-warning signal.</span>
                                <span>GPU in use is actual GPU-managed memory.</span>
                                <span>GPU alloc is reserved footprint, not necessarily active use.</span>
                            </div>
                        </div>
                    )}

                    {trainMetrics.latestResource && (
                        <div className="stats-grid" style={{marginBottom:16}}>
                            {trainMetrics.peakProcessTreeRssMb > 0 && <div className="stat-card"><div className="value">{(trainMetrics.peakProcessTreeRssMb / 1024).toFixed(2)}GB</div><div className="label">Peak MLX RSS</div></div>}
                            <div className="stat-card"><div className="value">{(trainMetrics.latestResource.system_used_memory_mb / 1024).toFixed(1)}GB</div><div className="label">System Used</div></div>
                            <div className="stat-card"><div className="value">{(trainMetrics.latestResource.system_total_memory_mb / 1024).toFixed(1)}GB</div><div className="label">System Total</div></div>
                            {trainMetrics.peakGpuUtilPercent > 0 && <div className="stat-card"><div className="value">{Math.round(trainMetrics.peakGpuUtilPercent)}%</div><div className="label">Peak GPU</div></div>}
                            {Number.isFinite(trainMetrics.latestResource.launcher_rss_mb) && <div className="stat-card"><div className="value">{(trainMetrics.latestResource.launcher_rss_mb / 1024).toFixed(2)}GB</div><div className="label">Launcher RSS</div></div>}
                            {Number.isFinite(trainMetrics.latestResource.gpu_driver_system_memory_mb) && trainMetrics.latestResource.gpu_driver_system_memory_mb > 0.01 && <div className="stat-card"><div className="value">{(trainMetrics.latestResource.gpu_driver_system_memory_mb / 1024).toFixed(2)}GB</div><div className="label">GPU Driver</div></div>}
                        </div>
                    )}

                    {renderLossChart()}

                    {trainExamples > 0 && (
                        <div className="card" style={{marginBottom:16,padding:'10px 14px',background:'rgba(255,255,255,0.03)'}}>
                            <span style={{fontSize:13}}>
                                Training data: <b>{trainExamples.toLocaleString()}</b> examples.
                                {' '}At batch={batch}, 1 epoch = <b>{epochSteps.toLocaleString()}</b> steps.
                                {' '}{iters} iters = <b>{epochs} epochs</b>.
                            </span>
                        </div>
                    )}

                    {(runningTrainJob || lastCompletedTrainJob) && (
                        <div className="card" style={{marginBottom:16}}>
                            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10,flexWrap:'wrap'}}>
                                <h3 style={{margin:0,flex:1}}>Train Config Reality Check</h3>
                                <span style={{fontSize:11,color:'var(--text-muted)'}}>Form fields below are editable defaults. These cards show the actual persisted job configs.</span>
                            </div>
                            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit, minmax(280px, 1fr))',gap:12}}>
                                {renderTrainConfigCard('Running train', runningTrainJob, 'running')}
                                {renderTrainConfigCard('Last completed train', lastCompletedTrainJob, 'completed')}
                            </div>
                        </div>
                    )}

                    <div className="card">
                        <div style={paramRow}>
                            <div style={paramLabel}>Data</div>
                            <div style={{flex:1}}>
                                <input value={trainDataDir} onChange={e => setTrainDataDir(e.target.value)} disabled={isRunning} style={{...inputStyle,width:'100%',maxWidth:320}} />
                                <div style={helpStyle}>Dataset directory containing `train.jsonl` and `valid.jsonl`. Use `training/data` for the normal corrector or `training/prototype-reranker` for the learned reranker.</div>
                            </div>
                        </div>
                        <div style={paramRow}>
                            <div style={paramLabel}>Adapters</div>
                            <div style={{flex:1}}>
                                <input value={trainAdaptersDir} onChange={e => setTrainAdaptersDir(e.target.value)} disabled={isRunning} style={{...inputStyle,width:'100%',maxWidth:320}} />
                                <div style={helpStyle}>Output directory for LoRA adapters. Keep reranker adapters separate from the main correction adapters.</div>
                            </div>
                        </div>
                        <div style={paramRow}>
                            <div style={paramLabel}>Model</div>
                            <div style={{flex:1}}>
                                <input value={model} onChange={e => setModel(e.target.value)} disabled={isRunning} style={{...inputStyle,width:'100%',maxWidth:260}} />
                                <div style={helpStyle}>HuggingFace model ID. The base model whose weights are frozen; only LoRA adapters are trained.</div>
                            </div>
                        </div>
                        <div style={paramRow}>
                            <div style={paramLabel}>Iters</div>
                            <div style={{flex:1}}>
                                <input type="number" value={iters} onChange={e => setIters(parseInt(e.target.value)||2000)} disabled={isRunning} style={{...inputStyle,width:80}} />
                                <div style={helpStyle}>Total gradient steps. Each step processes one batch. For 3 full passes over your data, set to ~{(epochSteps * 3).toLocaleString() || '?'}.</div>
                            </div>
                        </div>
                        <div style={paramRow}>
                            <div style={paramLabel}>Batch</div>
                            <div style={{flex:1}}>
                                <input type="number" value={batch} onChange={e => setBatch(parseInt(e.target.value)||1)} disabled={isRunning} style={{...inputStyle,width:60}} />
                                <div style={helpStyle}>Examples per gradient update. Larger = smoother learning, more memory. 1 is noisy, 4-8 recommended.</div>
                            </div>
                        </div>
                        <div style={paramRow}>
                            <div style={paramLabel}>Layers</div>
                            <div style={{flex:1}}>
                                <input type="number" value={layers} onChange={e => setLayers(parseInt(e.target.value)||4)} disabled={isRunning} style={{...inputStyle,width:60}} />
                                <div style={helpStyle}>Transformer layers with LoRA adapters. 4 = smoke test, 8-12 = realistic, 16 = thorough. More layers = more capacity + memory.</div>
                            </div>
                        </div>
                        <div style={paramRow}>
                            <div style={paramLabel}>Patience</div>
                            <div style={{flex:1}}>
                                <input type="number" value={patience} onChange={e => setPatience(parseInt(e.target.value)||10)} disabled={isRunning} style={{...inputStyle,width:60}} />
                                <div style={helpStyle}>Consecutive evals without val loss improvement before early stopping fires. Set to 0 to disable early stopping entirely. With noisy batches, use 8-10+.</div>
                            </div>
                        </div>
                        <div style={paramRow}>
                            <div style={paramLabel}>Eval interval</div>
                            <div style={{flex:1}}>
                                <input type="number" value={stepsPerEval} onChange={e => setStepsPerEval(parseInt(e.target.value)||500)} disabled={isRunning} style={{...inputStyle,width:80}} />
                                <div style={helpStyle}>Steps between validation runs. Lower = more frequent checks but noisier signal. 500-1000 recommended for large datasets.</div>
                            </div>
                        </div>

                        <div style={{display:'flex',gap:8,alignItems:'center',marginTop:8,borderTop:'1px solid var(--border)',paddingTop:12}}>
                            <div style={{flex:1}} />
                            {!trainDatasetReady && <span style={{fontSize:12,color:'var(--text-muted)'}}>Prepare training data first (see above).</span>}
                            {isRunning
                                ? <button className="btn" style={{borderColor:'var(--warning)',color:'var(--warning)',background:'rgba(210,153,34,0.1)'}} onClick={stopJob}>Stop</button>
                                : <button className="btn btn-primary" disabled={!trainDatasetReady}
                                    onClick={() => startJob('train', {data: trainDataDir, adapters: trainAdaptersDir, model, iters, batch_size: batch, num_layers: layers, patience, steps_per_eval: stepsPerEval})}>Train</button>
                            }
                        </div>
                        {jobLog && <pre ref={logRef} className="stage-log" style={{marginTop:12,maxHeight:400}}>{jobLog}</pre>}
                    </div>
                </div>
            );
        }

        // ==================== EVAL PAGE ====================
        function EvalPage() {
            const [status, setStatus] = useState(null);
            const [error, setError] = useState(null);

            const load = () => api('/api/pipeline/status').then(setStatus).catch(e => setError(e.message));
            useEffect(() => { load(); }, []);

            if (!status) return <div className="container"><p>Loading...</p></div>;

            return (
                <div className="container">
                    <h2>Evaluate</h2>
                    {error && <div className="pipeline-error" style={{marginBottom:12}}>{error}</div>}
                    <div style={{fontSize:12,color:'var(--text-muted)',maxWidth:760,lineHeight:1.5,marginBottom:16}}>
                        This page evaluates the held-out applied task only:
                        clean sentence, one known applied corruption, exact clean-sentence recovery.
                        Current held-out size: <b>{status.applied_eval_count || 0}</b>.
                    </div>
                    {!status.adapters_exist && <div style={{fontSize:12,color:'var(--text-muted)'}}>Train a reranker first.</div>}
                    {status.adapters_exist && !status.applied_eval_exists && <div style={{fontSize:12,color:'var(--text-muted)'}}>Run Prepare first.</div>}
                    {status.adapters_exist && status.applied_eval_exists && <LiveCorrection rerankerTrains={status.recent_prototype_reranker_trains || []} />}
                </div>
            );
        }

        // ==================== PIPELINE (legacy, hidden from nav) ====================

        // SVG icons for each stage
        const PipelineIcons = {
            corpus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v4a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" /><path d="M19 10v1a7 7 0 0 1-14 0v-1" /><line x1="12" y1="18" x2="12" y2="22" />
                <path d="M8 22h8" opacity="0.5" />
            </svg>,
            prepare: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="3" width="7" height="7" rx="1" /><rect x="14" y="3" width="7" height="7" rx="1" /><rect x="3" y="14" width="7" height="7" rx="1" /><rect x="14" y="14" width="7" height="7" rx="1" />
                <circle cx="6.5" cy="6.5" r="1" fill="currentColor" stroke="none" opacity="0.5" /><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none" opacity="0.5" />
            </svg>,
            train: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="6" cy="6" r="2" /><circle cx="18" cy="6" r="2" /><circle cx="6" cy="18" r="2" /><circle cx="18" cy="18" r="2" /><circle cx="12" cy="12" r="2.5" strokeWidth="2" />
                <line x1="7.5" y1="7.5" x2="10" y2="10" opacity="0.4" /><line x1="16.5" y1="7.5" x2="14" y2="10" opacity="0.4" />
                <line x1="7.5" y1="16.5" x2="10" y2="14" opacity="0.4" /><line x1="16.5" y1="16.5" x2="14" y2="14" opacity="0.4" />
            </svg>,
            eval: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
            </svg>,
        };

        function LiveCorrection({rerankerTrains = []}) {
            const [input, setInput] = useState('');
            const [correcting, setCorrecting] = useState(false);
            const [result, setResult] = useState(null);
            const [bakeoff, setBakeoff] = useState(null);
            const [runningBakeoff, setRunningBakeoff] = useState(false);
            const [runningBakeoffJob, setRunningBakeoffJob] = useState(null);
            const bakeoffSource = 'human';
            const [bakeoffLimit, setBakeoffLimit] = useState(150);
            const [bakeoffDetails, setBakeoffDetails] = useState({});
            const [loadingBakeoffDetails, setLoadingBakeoffDetails] = useState({});
            const [bakeoffTimelineZoom, setBakeoffTimelineZoom] = useState({});
            const [bakeoffPlayback, setBakeoffPlayback] = useState(null);
            const [liveTimelineZoom, setLiveTimelineZoom] = useState({});
            const [recording, setRecording] = useState(false);
            const [transcribing, setTranscribing] = useState(false);
            const [selectedTrainId, setSelectedTrainId] = useState(rerankerTrains[0]?.id ?? null);
            const mediaRef = useRef(null);
            const bakeoffAudioRef = useRef(null);
            const bakeoffPollRef = useRef(null);
            const rerankerMode = 'trained';

            useEffect(() => {
                if (!rerankerTrains.length) {
                    setSelectedTrainId(null);
                    return;
                }
                setSelectedTrainId(prev => (
                    rerankerTrains.some(train => train.id === prev) ? prev : rerankerTrains[0].id
                ));
            }, [rerankerTrains]);

            const selectedTrain = rerankerTrains.find(train => train.id === selectedTrainId) || rerankerTrains[0] || null;
            const formatRerankerTrainOption = train => {
                const parts = [];
                if (train.model) parts.push(train.model.replace(/^.*\//, ''));
                if (train.num_layers != null) parts.push(`${train.num_layers}L`);
                if (train.batch_size != null) parts.push(`b${train.batch_size}`);
                if (train.val_loss != null) parts.push(`val ${Number(train.val_loss).toFixed(3)}`);
                return `#${train.id} · ${parts.join(' · ')}`;
            };

            const demoRowLabelStyle = {
                fontSize: 11,
                letterSpacing: '0.5px',
                textTransform: 'uppercase',
                opacity: 0.7,
                width: 132,
                flexShrink: 0,
                paddingTop: 2,
            };

            const demoRowStyle = {
                display: 'flex',
                gap: 12,
                alignItems: 'flex-start',
            };

            const bakeoffActionBtnStyle = {
                padding:'2px 8px',
                minHeight:'auto',
                fontSize:11,
                lineHeight:1.4,
            };

            const renderCorrectedDiff = (baseline, corrected) => {
                const segments = diffSegments(corrected || '', baseline || '');
                return segments.map((seg, idx) => {
                    if (seg.same) {
                        return <React.Fragment key={idx}>{seg.written}{' '}</React.Fragment>;
                    }
                    if (!seg.written || seg.written === '\u2014') {
                        return null;
                    }
                    return (
                        <React.Fragment key={idx}>
                            <span style={{
                                textDecorationLine: 'underline',
                                textDecorationThickness: '2px',
                                textUnderlineOffset: '0.18em',
                                textDecorationColor: 'rgba(126,231,135,0.8)',
                            }}>{seg.written}</span>{' '}
                        </React.Fragment>
                    );
                });
            };

            const renderTiming = timing => {
                if (!timing) return null;
                return (
                    <div style={{marginTop: 6, fontSize: 11, color: 'var(--text-muted)'}}>
                        {timing.total_ms != null && <span>total {(timing.total_ms/1000).toFixed(2)}s </span>}
                        {timing.prefill_ms != null && <span>prefill {(timing.prefill_ms/1000).toFixed(2)}s </span>}
                        {timing.decode_ms != null && <span>decode {(timing.decode_ms/1000).toFixed(2)}s </span>}
                        {timing.output_tokens != null && <span>{timing.output_tokens} toks</span>}
                    </div>
                );
            };

            const renderInlineProposalLane = (label, items, color, windowStart, windowEnd, pxPerSec, highlightedIndices, highlightedRange) => {
                if (!items?.length) return null;
                const visibleItems = items.filter(a => Number(a.e || 0) > windowStart && Number(a.s || 0) < windowEnd);
                if (!visibleItems.length) return null;
                const windowDuration = Math.max(0.2, windowEnd - windowStart);
                const timelineWidth = Math.max(560, Math.ceil(windowDuration * pxPerSec));
                const px = v => `${Math.max(0, (Number(v || 0) - windowStart) * pxPerSec).toFixed(1)}px`;
                return (
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                        <span style={{fontSize:10,color:'var(--text-muted)',width:72,textAlign:'right',flexShrink:0,fontWeight:600}}>{label}</span>
                        <div style={{position:'relative',height:24,width:timelineWidth,background:'rgba(255,255,255,0.03)',borderRadius:4,overflow:'hidden',flexShrink:0}}>
                            {highlightedRange && (
                                <div style={{
                                    position:'absolute',
                                    left:px(highlightedRange[0]),
                                    width:px(Math.max((highlightedRange[1] - highlightedRange[0]) || 0, 0.03)),
                                    top:0,
                                    bottom:0,
                                    border:'1px dashed rgba(255,255,255,0.45)',
                                    borderRadius:4,
                                    background:'rgba(255,255,255,0.03)',
                                    pointerEvents:'none',
                                    zIndex:2,
                                }} />
                            )}
                            {visibleItems.map((a, j) => {
                                const originalIndex = items.indexOf(a);
                                const isHighlighted = highlightedIndices?.has?.(originalIndex) || false;
                                return (
                                    <div
                                        key={`${originalIndex}:${a.s}:${a.e}`}
                                        title={a.t || `${a.w} (${Number(a.s || 0).toFixed(3)}s–${Number(a.e || 0).toFixed(3)}s)`}
                                        style={{
                                            position:'absolute',
                                            left:px(a.s),
                                            width:px(Math.max((a.e - a.s) || 0, 0.03)),
                                            top:2,
                                            bottom:2,
                                            borderRadius:3,
                                            background: isHighlighted ? color.replace(/[\d.]+\)$/,'0.95)') : color,
                                            border:`1px solid ${isHighlighted ? color.replace(/[\d.]+\)$/,'1)') : color.replace(/[\d.]+\)$/,'0.85)')}`,
                                            display:'flex',
                                            alignItems:'center',
                                            justifyContent:'center',
                                            overflow:'hidden',
                                            boxShadow: isHighlighted ? `0 0 0 1px rgba(255,255,255,0.22), 0 0 0 2px ${color.replace(/[\d.]+\)$/,'0.35)')}` : 'none',
                                            zIndex:isHighlighted ? 3 : 1,
                                        }}
                                    >
                                        <span style={{fontSize:10,color:'#fff',whiteSpace:'nowrap',padding:'0 4px'}}>{a.w}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const renderLiveProposalLanes = (result, proposal) => {
                const prototype = result?.prototype;
                const al = prototype?.alignments || {};
                const qwenItems = al.qwen || [];
                const parakeetItems = result?.parakeet_alignment || [];
                const zipaQwenItems = al.zipa_qwen || [];
                const zipaItems = al.zipa || [];
                const zipaParakeetItems = parakeetItems.length
                    ? buildGroupedPhoneLane(zipaItems, parakeetItems, 'Parakeet')
                    : [];
                const timingSource = al.timing_source || 'unknown';
                if (!qwenItems.length && !parakeetItems.length && !zipaQwenItems.length && !zipaItems.length) return null;
                const tokenHighlight = new Set(
                    Array.from(
                        {length: Math.max(0, (proposal?.token_end || 0) - (proposal?.token_start || 0))},
                        (_, idx) => (proposal?.token_start || 0) + idx
                    )
                );
                const highlightedRange =
                    proposal?.acoustic_window_start_sec != null && proposal?.acoustic_window_end_sec != null
                        ? [Number(proposal.acoustic_window_start_sec), Number(proposal.acoustic_window_end_sec)]
                        : null;
                let windowStart = 0;
                let windowEnd = 1;
                if (highlightedRange) {
                    const margin = 0.45;
                    windowStart = Math.max(0, highlightedRange[0] - margin);
                    windowEnd = highlightedRange[1] + margin;
                } else {
                    const tokenItems = qwenItems.slice(proposal?.token_start || 0, proposal?.token_end || 0);
                    if (tokenItems.length) {
                        const margin = 0.45;
                        windowStart = Math.max(0, Number(tokenItems[0].s || 0) - margin);
                        windowEnd = Number(tokenItems[tokenItems.length - 1].e || 0) + margin;
                    } else {
                        const allItems = [...qwenItems, ...parakeetItems, ...zipaParakeetItems, ...zipaQwenItems, ...zipaItems];
                        windowStart = 0;
                        windowEnd = allItems.length ? Math.min(1.5, Math.max(...allItems.map(a => Number(a.e || 0)))) : 1;
                    }
                }
                const cropLane = items => (items || [])
                    .filter(a => Number(a.e || 0) > windowStart && Number(a.s || 0) < windowEnd)
                    .map(a => ({
                        ...a,
                        s: Math.max(0, Number(a.s || 0) - windowStart),
                        e: Math.max(0, Math.min(Number(a.e || 0), windowEnd) - windowStart),
                    }));
                const windowDuration = Math.max(0.2, windowEnd - windowStart);
                const zoomKey = `${proposal?.raw_text || 'proposal'}:${proposal?.token_start || 0}:${proposal?.token_end || 0}`;
                const pxPerSec = liveTimelineZoom[zoomKey] || 260;
                const qwenLane = cropLane(qwenItems);
                const parakeetLane = cropLane(parakeetItems);
                const zipaParakeetLane = cropLane(zipaParakeetItems);
                const zipaQwenLane = cropLane(zipaQwenItems);
                const zipaLane = cropLane(zipaItems);
                const zoomLevels = [160, 260, 380, 540];
                const timelineWidth = Math.max(720, Math.ceil(windowDuration * pxPerSec));
                return (
                    <div style={{marginTop:8, padding:'8px 10px', borderRadius:6, background:'rgba(255,255,255,0.02)', border:'1px solid rgba(255,255,255,0.05)', overflowX:'auto'}}>
                        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', gap:12, marginBottom:8, flexWrap:'wrap'}}>
                            <div style={{fontSize:10, color:'var(--text-muted)'}}>
                                timing source: <span style={{color:'var(--accent)'}}>{timingSource}</span>
                            </div>
                            <div style={{display:'flex', alignItems:'center', gap:6, flexWrap:'wrap'}}>
                                <span style={{fontSize:11, color:'var(--text-muted)'}}>zoom</span>
                                {zoomLevels.map(level => (
                                    <button
                                        key={level}
                                        type="button"
                                        onClick={() => setLiveTimelineZoom(prev => ({...prev, [zoomKey]: level}))}
                                        style={{
                                            padding:'2px 8px',
                                            borderRadius:999,
                                            border:'1px solid rgba(255,255,255,0.12)',
                                            background: pxPerSec === level ? 'rgba(88,166,255,0.16)' : 'rgba(255,255,255,0.03)',
                                            color: pxPerSec === level ? '#58a6ff' : 'var(--text-muted)',
                                            fontSize:11,
                                        }}
                                    >
                                        {Math.round(level / 100 * 10) / 10}x
                                    </button>
                                ))}
                            </div>
                        </div>
                        <div style={{width:'100%', minWidth:0, overflowX:'auto', overflowY:'hidden', paddingBottom:4}}>
                            {renderBakeoffTL('Qwen', qwenLane, 'rgba(210,153,34,0.70)', windowDuration, pxPerSec, null)}
                            {renderBakeoffTL('Parakeet', parakeetLane, 'rgba(126,231,135,0.72)', windowDuration, pxPerSec, null)}
                            {renderBakeoffTL('ZIPA@Par', zipaParakeetLane, 'rgba(78,201,176,0.72)', windowDuration, pxPerSec, null)}
                            {renderBakeoffTL(timingSource === 'parakeet_words' ? 'ZIPA@Map' : 'ZIPA/Q', zipaQwenLane, 'rgba(126,231,135,0.65)', windowDuration, pxPerSec, null)}
                            {renderBakeoffTL('ZIPA', zipaLane, 'rgba(88,166,255,0.60)', windowDuration, pxPerSec, null)}
                            <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--text-muted)',marginTop:3,paddingLeft:71,width:timelineWidth}}>
                                <span>{windowStart.toFixed(2)}s</span><span>{windowEnd.toFixed(2)}s</span>
                            </div>
                        </div>
                    </div>
                );
            };

            const renderRerankerSummary = result => {
                const prototype = result?.prototype;
                if (!prototype) {
                    return <span style={{color:'var(--text-muted)'}}>No prototype result.</span>;
                }
                const corrected = prototype.corrected || '';
                const baseline =
                    result?.correctionInput === 'cohere' ? (result?.cohere || '') :
                    result?.correctionInput === 'parakeet' ? (result?.parakeet || '') :
                    (result?.qwen || '');
                const reranker = prototype.reranker || null;
                const chosenText = reranker?.chosen_text || corrected || '';
                const chosenLabel = reranker?.chosen_label || null;
                const mode = reranker?.mode || null;
                if (!chosenText) {
                    return <span style={{color:'var(--text-muted)'}}>No reranker output.</span>;
                }
                return (
                    <div>
                        <div>
                            {baseline ? renderCorrectedDiff(baseline, chosenText) : chosenText}
                        </div>
                        <div style={{marginTop: 6, fontSize: 11, color: 'var(--text-muted)'}}>
                            {mode && <span>{mode}</span>}
                            {chosenLabel && <span>{mode ? ' · ' : ''}{chosenLabel}</span>}
                            {reranker?.candidate_count != null && <span>{(mode || chosenLabel) ? ' · ' : ''}{reranker.candidate_count} candidates</span>}
                            {result?.correctionInput && <span>{((mode || chosenLabel || reranker?.candidate_count != null) ? ' · ' : '')}input {result.correctionInput}</span>}
                            {!baseline && <span>{((mode || chosenLabel || reranker?.candidate_count != null || result?.correctionInput) ? ' · ' : '')}ASR transcript missing</span>}
                        </div>
                        {renderTiming(reranker?.result?.timing || reranker?.timing || reranker?.timing_ms)}
                    </div>
                );
            };

            const formatMs = ms => {
                if (ms == null) return '—';
                const n = Number(ms);
                if (!Number.isFinite(n)) return '—';
                if (n >= 1000) return `${(n / 1000).toFixed(2)}s`;
                return `${Math.round(n)}ms`;
            };

            useEffect(() => () => {
                if (bakeoffAudioRef.current) {
                    bakeoffAudioRef.current.pause();
                    bakeoffAudioRef.current.src = '';
                    bakeoffAudioRef.current = null;
                }
            }, []);

            useEffect(() => {
                if (!runningBakeoffJob?.id) return;
                const poll = async () => {
                    try {
                        const job = await api(`/api/jobs/${runningBakeoffJob.id}`);
                        let partial = null;
                        if (job.result) {
                            try {
                                partial = JSON.parse(job.result);
                            } catch (_) {}
                        }
                        if (partial) setBakeoff(partial);
                        if (job.status !== 'running') {
                            setRunningBakeoff(false);
                            setRunningBakeoffJob(null);
                            if (job.status === 'failed') {
                                setBakeoff(partial || {error: 'Eval job failed'});
                            }
                        }
                    } catch (e) {
                        setRunningBakeoff(false);
                        setRunningBakeoffJob(null);
                        setBakeoff({error: e.message});
                    }
                };
                poll();
                bakeoffPollRef.current = setInterval(poll, 1000);
                return () => clearInterval(bakeoffPollRef.current);
            }, [runningBakeoffJob?.id]);

            const renderBakeoffTL = (label, items, color, maxTime, pxPerSec, activeTime) => {
                if (!items || !items.length) return null;
                const timelineWidth = Math.max(720, Math.ceil(Math.max(maxTime || 1, 0.001) * pxPerSec));
                const px = v => `${Math.max(0, Number(v || 0) * pxPerSec).toFixed(1)}px`;
                const playheadLeft = activeTime == null ? null : Math.max(0, Number(activeTime || 0) * pxPerSec);
                return (
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                        <span style={{fontSize:10,color:'var(--text-muted)',width:65,textAlign:'right',flexShrink:0,fontWeight:600}}>{label}</span>
                        <div style={{position:'relative',height:28,width:timelineWidth,background:'rgba(255,255,255,0.03)',borderRadius:4,overflow:'hidden',flexShrink:0}}>
                            {playheadLeft != null && (
                                <div style={{
                                    position:'absolute',
                                    left:`${playheadLeft.toFixed(1)}px`,
                                    top:0,
                                    bottom:0,
                                    width:2,
                                    background:'rgba(255,255,255,0.9)',
                                    boxShadow:'0 0 0 1px rgba(0,0,0,0.35), 0 0 8px rgba(255,255,255,0.25)',
                                    zIndex:3,
                                    pointerEvents:'none',
                                }} />
                            )}
                            {items.map((a, j) => {
                                const isActive = activeTime != null && Number(activeTime) >= Number(a.s || 0) && Number(activeTime) < Number(a.e || 0);
                                const conf = a.c == null ? null : Number(a.c);
                                const opacity = conf == null ? 1 : Math.max(0.28, Math.min(1, conf));
                                return (
                                    <div
                                        key={j}
                                        title={a.t || `${a.w} (${Number(a.s).toFixed(3)}s–${Number(a.e).toFixed(3)}s)${a.avg_logprob != null ? ` lp=${Number(a.avg_logprob).toFixed(2)}` : ''}${conf == null ? '' : ` conf=${conf.toFixed(2)}`}`}
                                        style={{
                                            position:'absolute',
                                            left:px(a.s),
                                            width:px(Math.max((a.e - a.s) || 0, 0.03)),
                                            top:2,
                                            bottom:2,
                                            borderRadius:3,
                                            background: isActive ? color.replace(/[\d.]+\)$/, '0.95)') : color,
                                            border:`1px solid ${color.replace(/[\d.]+\)$/,'0.9)')}`,
                                            display:'flex',
                                            alignItems:'center',
                                            justifyContent:'center',
                                            overflow:'hidden',
                                            boxShadow: isActive ? `0 0 0 2px ${color.replace(/[\d.]+\)$/, '0.55)')}, inset 0 0 0 1px rgba(255,255,255,0.25)` : 'none',
                                            opacity,
                                            zIndex: isActive ? 2 : 1,
                                        }}
                                    >
                                        <span style={{fontSize:10,color:'#fff',whiteSpace:'nowrap',padding:'0 4px'}}>{a.w}</span>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const buildOwnershipRanges = scaffoldItems => {
                if (!scaffoldItems?.length) return [];
                return scaffoldItems.map((word, idx) => {
                    const start = Number(word.s || 0);
                    const end = Math.max(start, Number(word.e || 0));
                    const prevEnd = idx > 0 ? Math.max(Number(scaffoldItems[idx - 1].e || 0), Number(scaffoldItems[idx - 1].s || 0)) : start;
                    const nextStart = idx + 1 < scaffoldItems.length ? Number(scaffoldItems[idx + 1].s || 0) : end;
                    const ownStart = idx > 0 ? (prevEnd + start) * 0.5 : start;
                    const ownEnd = idx + 1 < scaffoldItems.length ? (end + nextStart) * 0.5 : end;
                    return { start, end, ownStart, ownEnd };
                });
            };

            const intervalOverlapSec = (aStart, aEnd, bStart, bEnd) => Math.max(0, Math.min(aEnd, bEnd) - Math.max(aStart, bStart));

            const buildGroupedPhoneLane = (phoneItems, scaffoldItems, labelPrefix) => {
                if (!phoneItems?.length || !scaffoldItems?.length) return [];
                const ownership = buildOwnershipRanges(scaffoldItems);
                const grouped = scaffoldItems.map(() => []);
                for (const phone of phoneItems) {
                    const ps = Number(phone.s || 0);
                    const pe = Math.max(ps, Number(phone.e || 0));
                    if (!(pe > ps)) continue;
                    const mid = (ps + pe) * 0.5;
                    let bestIdx = -1;
                    let bestOverlap = 0;
                    let bestDistance = Infinity;
                    for (let idx = 0; idx < ownership.length; idx += 1) {
                        const own = ownership[idx];
                        const overlap = intervalOverlapSec(ps, pe, own.ownStart, own.ownEnd);
                        if (overlap <= 0) continue;
                        const wordMid = (own.ownStart + own.ownEnd) * 0.5;
                        const distance = Math.abs(mid - wordMid);
                        if (overlap > bestOverlap + 1e-9 || (Math.abs(overlap - bestOverlap) <= 1e-9 && distance < bestDistance)) {
                            bestIdx = idx;
                            bestOverlap = overlap;
                            bestDistance = distance;
                        }
                    }
                    if (bestIdx >= 0) grouped[bestIdx].push(phone);
                }
                return scaffoldItems.map((word, idx) => {
                    const ws = Number(word.s || 0);
                    const we = Math.max(ws, Number(word.e || 0));
                    const phones = grouped[idx].map(phone => phone.w).filter(Boolean);
                    return {
                        s: ws,
                        e: we,
                        w: phones.length ? phones.join(' ') : '∅',
                        t: `${labelPrefix} ${word.w}: ${phones.length ? phones.join(' ') : '∅'} (${ws.toFixed(3)}s–${we.toFixed(3)}s)`,
                    };
                });
            };

            const playBakeoffRecording = async (entryKey, entry) => {
                if (!entry.recording_id) return;
                if (!bakeoffDetails[entryKey] && !loadingBakeoffDetails[entryKey]) {
                    loadBakeoffDetail(entryKey, entry);
                }
                let audio = bakeoffAudioRef.current;
                if (audio && bakeoffPlayback?.entryKey === entryKey) {
                    if (audio.paused) {
                        await audio.play();
                    } else {
                        audio.pause();
                    }
                    return;
                }
                if (audio) {
                    audio.pause();
                    audio.src = '';
                }
                audio = new Audio(`/api/author/recordings/${entry.recording_id}/audio`);
                bakeoffAudioRef.current = audio;
                const sync = playing => setBakeoffPlayback(prev => ({
                    entryKey,
                    time: Number.isFinite(audio.currentTime) ? audio.currentTime : (prev?.entryKey === entryKey ? prev.time : 0),
                    duration: Number.isFinite(audio.duration) ? audio.duration : (prev?.entryKey === entryKey ? prev.duration : null),
                    playing,
                }));
                audio.addEventListener('loadedmetadata', () => sync(false));
                audio.addEventListener('timeupdate', () => sync(!audio.paused));
                audio.addEventListener('play', () => sync(true));
                audio.addEventListener('pause', () => sync(false));
                audio.addEventListener('ended', () => {
                    setBakeoffPlayback(prev => prev?.entryKey === entryKey ? {...prev, time: 0, playing: false} : prev);
                });
                audio.addEventListener('error', () => {
                    setBakeoffPlayback(prev => prev?.entryKey === entryKey ? {...prev, playing: false} : prev);
                });
                setBakeoffPlayback({entryKey, time: 0, duration: null, playing: false});
                await audio.play();
            };

            const loadBakeoffDetail = async (entryKey, entry) => {
                if (bakeoffDetails[entryKey] || loadingBakeoffDetails[entryKey]) return;
                setLoadingBakeoffDetails(prev => ({...prev, [entryKey]: true}));
                try {
                    const detail = await api('/api/correct-prototype/bakeoff/detail', {
                        method: 'POST',
                        body: JSON.stringify({
                            source: bakeoff?.source || bakeoffSource,
                            recording_id: entry.recording_id,
                            qwen: entry.qwen,
                            expected: entry.expected,
                            current: entry.current || entry.qwen,
                            prototype: entry.prototype,
                            use_model_reranker: rerankerMode !== 'off',
                            use_prototype_adapters: rerankerMode === 'trained',
                            reranker_mode: rerankerMode,
                            prototype_reranker_train_id: selectedTrainId,
                        }),
                    });
                    setBakeoffDetails(prev => ({...prev, [entryKey]: detail}));
                    setBakeoffTimelineZoom(prev => ({...prev, [entryKey]: prev[entryKey] || 220}));
                } catch (e) {
                    setBakeoffDetails(prev => ({...prev, [entryKey]: {error: e.message}}));
                }
                setLoadingBakeoffDetails(prev => ({...prev, [entryKey]: false}));
            };

            const correct = async (parakeet, qwen, cohere = '', audioWavBase64 = null, correctionInput = 'qwen', asrErrors = null, parakeetAlignment = null) => {
                const chosenInput =
                    correctionInput === 'cohere' ? (cohere || qwen || parakeet || '') :
                    correctionInput === 'parakeet' ? (parakeet || qwen || cohere || '') :
                    (qwen || cohere || parakeet || '');
                setCorrecting(true);
                try {
                    const prototype = await api('/api/correct-prototype', {
                        method: 'POST',
                        body: JSON.stringify({
                            qwen: chosenInput,
                            audio_wav_base64: audioWavBase64,
                            use_model_reranker: rerankerMode !== 'off',
                            use_adapters: false,
                            use_prototype_adapters: rerankerMode === 'trained',
                            reranker_mode: rerankerMode,
                            prototype_reranker_train_id: selectedTrainId,
                        }),
                    });
                    setResult({
                        parakeet,
                        qwen,
                        cohere,
                        parakeet_alignment: parakeetAlignment || [],
                        correctionInput,
                        asrErrors,
                        prototype,
                    });
                } catch (e) {
                    setResult({parakeet, qwen, cohere, parakeet_alignment: parakeetAlignment || [], correctionInput, asrErrors, error: `(error: ${e.message})`});
                }
                setCorrecting(false);
            };

            const startRec = async () => {
                try {
                    const stream = await getRecordingStream();
                    const mr = new MediaRecorder(stream, {mimeType: 'audio/webm'});
                    const chunks = [];
                    mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                    mr.onstop = async () => {
                        stream.getTracks().forEach(t => t.stop());
                        setRecording(false);
                        setTranscribing(true);
                        try {
                            const blob = new Blob(chunks, {type: 'audio/webm'});
                            const arrayBuf = await blob.arrayBuffer();
                            const decoded = await audioCtx.decodeAudioData(arrayBuf);
                            const wavBytes = audioBufferToWav(decoded);
                            // Run both ASR models
                            const res = await fetch('/api/asr/dual', {
                                method: 'POST', headers: {'Content-Type': 'audio/wav'}, body: wavBytes,
                            });
                            if (res.ok) {
                                const asr = await res.json();
                                setTranscribing(false);
                                await correct(
                                    asr.parakeet || '',
                                    asr.qwen || '',
                                    asr.cohere || '',
                                    bytesToBase64(new Uint8Array(wavBytes)),
                                    asr.correction_input || 'qwen',
                                    {
                                        qwen: asr.qwen_error || null,
                                        parakeet: asr.parakeet_error || null,
                                        cohere: asr.cohere_error || null,
                                    },
                                    asr.parakeet_alignment || [],
                                );
                            } else { setTranscribing(false); }
                        } catch (e) { console.error(e); setTranscribing(false); }
                    };
                    mediaRef.current = mr;
                    mr.start();
                    setRecording(true);
                    setResult(null);
                } catch (e) { console.error(e); }
            };

            const stopRec = () => {
                if (mediaRef.current && mediaRef.current.state !== 'inactive') mediaRef.current.stop();
                setRecording(false);
            };

            const manualCorrect = () => {
                if (!input.trim()) return;
                correct('', input.trim(), '');
            };

            const runBakeoff = async () => {
                setRunningBakeoff(true);
                setBakeoff({source: bakeoffSource, limit: Math.max(1, Math.min(250, Number(bakeoffLimit) || 150)), processed: 0, summary: {n: 0, prototype: 0, prototype_wrong: 0}, entries: []});
                setBakeoffDetails({});
                setLoadingBakeoffDetails({});
                try {
                    const res = await api('/api/correct-prototype/bakeoff', {
                        method: 'POST',
                        body: JSON.stringify({
                            source: bakeoffSource,
                            limit: Math.max(1, Math.min(250, Number(bakeoffLimit) || 150)),
                            use_model_reranker: rerankerMode !== 'off',
                            use_current_adapters: false,
                            use_prototype_adapters: rerankerMode === 'trained',
                            reranker_mode: rerankerMode,
                            prototype_reranker_train_id: selectedTrainId,
                        }),
                    });
                    if (res.job_id) {
                        setRunningBakeoffJob({id: res.job_id});
                    } else {
                        setBakeoff(res);
                        setRunningBakeoff(false);
                    }
                } catch (e) {
                    setBakeoff({error: e.message});
                    setRunningBakeoffJob(null);
                    setRunningBakeoff(false);
                }
            };

            return (
                <div className="stage-card ready" style={{marginTop: 24}}>
                    <div className="stage-top">
                        <div className="stage-icon" style={{color: 'var(--accent)'}}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                            </svg>
                        </div>
                        <div className="stage-title">
                            <div className="stage-num">Live</div>
                            <h3>Reranker Eval</h3>
                        </div>
                    </div>
                    <div className="stage-desc">
                        Speak or type text to inspect the selected trained reranker path directly. Records your voice, runs ASR, then applies the reranker-backed correction path to the Qwen transcript.
                    </div>
                    <div className="stage-controls" style={{flexDirection: 'column', alignItems: 'stretch', gap: 12}}>
                        <div style={{display: 'flex', gap: 8, alignItems: 'center'}}>
                            <button className="stage-launch-btn" onClick={recording ? stopRec : startRec}
                                style={recording ? {borderColor: 'var(--danger)', color: 'var(--danger)', background: 'rgba(248,81,73,0.1)'} : {}}>
                                {recording ? 'Stop' : transcribing ? 'Transcribing\u2026' : correcting ? 'Correcting\u2026' : 'Record'}
                            </button>
                                <span style={{color: 'var(--text-muted)', fontSize: 11}}>or</span>
                            <input value={input} onChange={e => setInput(e.target.value)} placeholder="Type ASR text to correct..."
                                style={{flex: 1}} onKeyDown={e => { if (e.key === 'Enter') manualCorrect(); }} />
                            <button className="stage-launch-btn" onClick={manualCorrect} disabled={!input.trim() || correcting}>
                                Correct
