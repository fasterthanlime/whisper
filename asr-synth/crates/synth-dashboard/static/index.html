        // ==================== WAVEFORM ====================
        function Waveform({audioBuffer, playing, alignment, onActiveWord, onWordClick, playOffset}) {
            const canvasRef = useRef(null);
            const animRef = useRef(null);
            const startTimeRef = useRef(null);
            const lastActiveRef = useRef(null);

            useEffect(() => {
                if (!audioBuffer || !canvasRef.current) return;
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * dpr;
                canvas.height = rect.height * dpr;
                ctx.scale(dpr, dpr);

                const data = audioBuffer.getChannelData(0);
                const w = rect.width;
                const h = rect.height;
                const step = Math.max(1, Math.floor(data.length / w));
                const dur = audioBuffer.duration;

                const draw = (playbackPos) => {
                    ctx.clearRect(0, 0, w, h);

                    // Draw word region backgrounds from alignment
                    if (alignment && alignment.length > 0) {
                        for (let i = 0; i < alignment.length; i++) {
                            const a = alignment[i];
                            const x0 = (a.start / dur) * w;
                            const x1 = (a.end / dur) * w;
                            // Alternating subtle tint for word regions
                            const isActive = playbackPos != null && playbackPos >= a.start && playbackPos < a.end;
                            if (isActive) {
                                ctx.fillStyle = 'rgba(88, 166, 255, 0.12)';
                                ctx.fillRect(x0, 0, x1 - x0, h);
                            }
                        }
                    }

                    // Draw waveform
                    const mid = h / 2;
                    for (let x = 0; x < w; x++) {
                        const start = x * step;
                        let min = 0, max = 0;
                        for (let j = 0; j < step && start + j < data.length; j++) {
                            const v = data[start + j];
                            if (v < min) min = v;
                            if (v > max) max = v;
                        }
                        const topY = mid + min * mid * 0.9;
                        const botY = mid + max * mid * 0.9;

                        const samplePos = playbackPos != null ? (playbackPos / dur) * w : -1;
                        if (x < samplePos) {
                            ctx.fillStyle = 'rgba(88, 166, 255, 0.7)';
                        } else {
                            ctx.fillStyle = 'rgba(88, 166, 255, 0.25)';
                        }
                        ctx.fillRect(x, topY, 1, botY - topY || 1);
                    }

                    // Draw word boundary lines and labels
                    if (alignment && alignment.length > 0) {
                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                        ctx.lineWidth = 1;
                        for (const a of alignment) {
                            const bx = (a.start / dur) * w;
                            ctx.beginPath();
                            ctx.moveTo(bx, 0);
                            ctx.lineTo(bx, h);
                            ctx.stroke();
                        }

                        // Word labels at bottom
                        ctx.font = '12px Jost, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                        for (const a of alignment) {
                            const cx = ((a.start + a.end) / 2 / dur) * w;
                            const regionW = ((a.end - a.start) / dur) * w;
                            if (regionW > 15) { // only draw if there's room
                                ctx.fillText(a.word, cx, h - 3);
                            }
                        }
                    }

                    // Playback cursor
                    if (playbackPos != null && playbackPos >= 0) {
                        const cx = (playbackPos / dur) * w;
                        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
                        ctx.lineWidth = 1.5;
                        ctx.beginPath();
                        ctx.moveTo(cx, 0);
                        ctx.lineTo(cx, h);
                        ctx.stroke();
                    }

                    // Notify active word (by index into alignment array, not by word text)
                    if (onActiveWord && alignment) {
                        let active = null;
                        if (playbackPos != null) {
                            for (let ai = 0; ai < alignment.length; ai++) {
                                const a = alignment[ai];
                                if (playbackPos >= a.start && playbackPos < a.end) {active = ai; break;}
                            }
                        }
                        if (active !== lastActiveRef.current) {
                            lastActiveRef.current = active;
                            onActiveWord(active);
                        }
                    }
                };

                if (playing) {
                    startTimeRef.current = audioCtx.currentTime;
                    const offset = playOffset || 0;
                    const animate = () => {
                        const elapsed = offset + (audioCtx.currentTime - startTimeRef.current);
                        if (elapsed <= dur) {
                            draw(elapsed);
                            animRef.current = requestAnimationFrame(animate);
                        } else {
                            draw(null);
                        }
                    };
                    animate();
                } else {
                    draw(null);
                }

                return () => {
                    if (animRef.current) cancelAnimationFrame(animRef.current);
                    lastActiveRef.current = null;
                    if (onActiveWord) onActiveWord(null);
                };
            }, [audioBuffer, playing, alignment, playOffset]);

            // Click on waveform to play a specific word
            const handleClick = (e) => {
                if (!alignment || !audioBuffer || !onWordClick) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const t = (x / rect.width) * audioBuffer.duration;
                for (const a of alignment) {
                    if (t >= a.start && t < a.end) {
                        onWordClick(a);
                        return;
                    }
                }
            };

            return (
                <div className="waveform-container">
                    <canvas ref={canvasRef} className="waveform-canvas" onClick={handleClick}
                        style={{cursor: alignment ? 'pointer' : 'default'}} />
                </div>
            );
        }

        // ==================== ALIGNED SENTENCE ====================
        // Shows the written form as flowing text. Where the spoken form differs,
        // the written word(s) get a pill border with the spoken alternative below.
        // Clicking any word opens a vocab override editor.
        function AlignedSentence({text, spoken, onWordClick, unknownWords, resolvedWords, activeWordIndex, alignment}) {
            const segments = useMemo(() => diffSegments(text, spoken), [text, spoken]);
            const unknownSet = useMemo(() => {
                const s = new Set();
                if (unknownWords) unknownWords.forEach(w => s.add(canonicalWord(w)));
                return s;
            }, [unknownWords]);
            // Map from canonical unknown word → 1-based number, ordered by appearance in text (left-to-right)
            const unknownNum = useMemo(() => {
                const m = new Map();
                if (!unknownWords || unknownWords.length === 0) return m;
                let n = 1;
                // Walk through text words left-to-right, assign numbers to unknown ones
                for (const w of text.split(/\s+/)) {
                    const clean = canonicalWord(w);
                    if (clean && unknownSet.has(clean) && !m.has(clean)) {
                        m.set(clean, n++);
                    }
                }
                return m;
            }, [unknownWords, text, unknownSet]);
            const resolvedSet = useMemo(() => {
                const s = new Set();
                if (resolvedWords) resolvedWords.forEach(w => s.add(canonicalWord(w)));
                return s;
            }, [resolvedWords]);

            // Map alignment index → written word index for active highlighting
            const activeWrittenIdx = useMemo(() => {
                if (activeWordIndex == null || !alignment || !alignment.length) return -1;
                const activeAlignWord = canonicalWord(alignment[activeWordIndex]?.word || '');
                if (!activeAlignWord) return -1;
                // Walk written words and alignment words in parallel to find the matching position
                const writtenWords = text.split(/\s+/).map(w => canonicalWord(w));
                let alignIdx = 0;
                for (let wi = 0; wi < writtenWords.length && alignIdx < alignment.length; wi++) {
                    if (canonicalWord(alignment[alignIdx]?.word || '') === writtenWords[wi]) {
                        if (alignIdx === activeWordIndex) return wi;
                        alignIdx++;
                    }
                }
                return -1;
            }, [activeWordIndex, alignment, text]);

            // Track written word index during render
            let writtenWordCounter = -1;

            const wordClass = (word) => {
                writtenWordCounter++;
                const clean = canonicalWord(word);
                let cls = '';
                if (resolvedSet.has(clean)) cls = 'resolved';
                else if (unknownSet.has(clean)) cls = 'unknown';
                if (writtenWordCounter === activeWrittenIdx) cls += ' word-active';
                return cls;
            };

            const numBadgeBelow = (word) => {
                const n = unknownNum.get(canonicalWord(word));
                if (!n || n > 9) return null;
                return <span className="unknown-num-badge">{n}</span>;
            };

            // Flatten all segments into a flat list of whitespace-delimited tokens
            const allWords = useMemo(() => {
                const words = [];
                for (const seg of segments) {
                    if (seg.same) {
                        for (const w of seg.written.split(/\s+/)) {
                            if (w) words.push({text: w, spokenAlt: null});
                        }
                    } else {
                        // Diff segment: the written form may be multiple words
                        words.push({text: seg.written, spokenAlt: seg.spoken});
                    }
                }
                return words;
            }, [segments]);

            return (
                <div className="sentence-display">
                    {allWords.map((w, j) => {
                        const cls = wordClass(w.text);
                        const badge = numBadgeBelow(w.text);
                        return <span key={j} className={`word ${cls}`}
                            onClick={() => onWordClick && onWordClick(w.text)}
                            style={{cursor: onWordClick ? 'pointer' : 'default'}}>
                            {w.text}
                            {w.spokenAlt && <span className="spoken-alt">{w.spokenAlt}</span>}
                            {badge}
                        </span>;
                    })}
                </div>
            );
        }

        // Diff the written and spoken forms into segments.
        // Each segment is either { same: true, written } or { same: false, written, spoken }.
        function diffSegments(written, spoken) {
            if (written === spoken) {
                return [{same: true, written}];
            }

            const wWords = written.split(/\s+/);
            const sWords = spoken.split(/\s+/);

            // LCS to find matching words (case-insensitive)
            const m = wWords.length, n = sWords.length;
            const dp = Array.from({length: m + 1}, () => new Uint16Array(n + 1));
            for (let i = 1; i <= m; i++) {
                for (let j = 1; j <= n; j++) {
                    if (wWords[i - 1].toLowerCase() === sWords[j - 1].toLowerCase()) {
                        dp[i][j] = dp[i - 1][j - 1] + 1;
                    } else {
                        dp[i][j] = Math.max(dp[i - 1][j], dp[i][j - 1]);
                    }
                }
            }

            // Backtrack to find which words match
            const wMatched = new Array(m).fill(false);
            const sMatched = new Array(n).fill(false);
            let i = m, j = n;
            while (i > 0 && j > 0) {
                if (wWords[i - 1].toLowerCase() === sWords[j - 1].toLowerCase()) {
                    wMatched[i - 1] = true;
                    sMatched[j - 1] = true;
                    i--; j--;
                } else if (dp[i - 1][j] >= dp[i][j - 1]) {
                    i--;
                } else {
                    j--;
                }
            }

            // Build segments: walk both arrays, grouping matched (same) and unmatched (diff)
            const segments = [];
            let wi = 0, si = 0;
            while (wi < m || si < n) {
                // Collect a run of matched words
                let sameRun = [];
                while (wi < m && wMatched[wi] && si < n && sMatched[si]) {
                    sameRun.push(wWords[wi]);
                    wi++; si++;
                }
                if (sameRun.length > 0) {
                    segments.push({same: true, written: sameRun.join(' ')});
                }

                // Collect a run of unmatched words from both sides
                let wRun = [], sRun = [];
                while (wi < m && !wMatched[wi]) {wRun.push(wWords[wi]); wi++;}
                while (si < n && !sMatched[si]) {sRun.push(sWords[si]); si++;}
                if (wRun.length > 0 || sRun.length > 0) {
                    segments.push({
                        same: false,
                        written: wRun.join(' ') || '\u2014',
                        spoken: sRun.join(' ') || '\u2014',
                    });
                }
            }
            return segments;
        }

        // ==================== UNIFIED TRANSCRIPT GRID ====================
        // 3-way word alignment: original, Qwen, Parakeet in a CSS grid.
        // Matching words dimmed, diffs highlighted in model color.
        // Scrolls horizontally, syncs with playback.

        function cleanWord(w) {return w.replace(/[^a-zA-Z0-9']/g, '').toLowerCase();}

        function editDist(a, b) {
            if (a === b) return 0;
            const m = a.length, n = b.length;
            if (m === 0) return n;
            if (n === 0) return m;
            const dp = Array.from({length: m + 1}, (_, i) => {
                const row = new Uint8Array(n + 1); row[0] = i; return row;
            });
            for (let j = 1; j <= n; j++) dp[0][j] = j;
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    dp[i][j] = a[i - 1] === b[j - 1] ? dp[i - 1][j - 1]
                        : 1 + Math.min(dp[i - 1][j - 1], dp[i - 1][j], dp[i][j - 1]);
            return dp[m][n];
        }

        function wordsMatch(a, b) {
            const ca = cleanWord(a), cb = cleanWord(b);
            if (ca === cb) return true;
            if (!ca || !cb) return false;
            const maxLen = Math.max(ca.length, cb.length);
            const threshold = Math.min(2, Math.ceil(maxLen * 0.3));
            return editDist(ca, cb) <= threshold;
        }

        // Pre-process: merge adjacent ASR words that together match a reference word
        function mergeAdjacentWords(refWords, asrWords) {
            const refSet = new Set(refWords.map(w => cleanWord(w)));
            const merged = [];
            let i = 0;
            while (i < asrWords.length) {
                // Try merging current + next
                if (i + 1 < asrWords.length) {
                    const combined = cleanWord(asrWords[i]) + cleanWord(asrWords[i + 1]);
                    if (refSet.has(combined) || [...refSet].some(r => wordsMatch(combined, r))) {
                        merged.push(asrWords[i] + asrWords[i + 1]);
                        i += 2;
                        continue;
                    }
                }
                merged.push(asrWords[i]);
                i++;
            }
            return merged;
        }

        function lcsAlign(refWords, asrWords) {
            // Pre-merge split ASR words that together match a ref word (e.g. "front end" → "frontend")
            asrWords = mergeAdjacentWords(refWords, asrWords);
            const m = refWords.length, n = asrWords.length;
            const dp = Array.from({length: m + 1}, () => new Uint16Array(n + 1));
            for (let i = 1; i <= m; i++)
                for (let j = 1; j <= n; j++)
                    dp[i][j] = wordsMatch(refWords[i - 1], asrWords[j - 1])
                        ? dp[i - 1][j - 1] + 1
                        : Math.max(dp[i - 1][j], dp[i][j - 1]);
            const cols = [];
            let i = m, j = n;
            while (i > 0 || j > 0) {
                if (i > 0 && j > 0 && wordsMatch(refWords[i - 1], asrWords[j - 1])) {
                    cols.push({ref: i - 1, asr: j - 1, match: true}); i--; j--;
                } else if (i > 0 && (j === 0 || dp[i - 1][j] >= dp[i][j - 1])) {
                    cols.push({ref: i - 1, asr: null, match: false}); i--;
                } else {
                    cols.push({ref: null, asr: j - 1, match: false}); j--;
                }
            }
            cols.reverse();
            return cols;
        }

        function mergeAlignments(refWords, qCols, pCols) {
            // Build unified columns: each column has {ref, qwen, parakeet} (word index or null)
            // Walk both alignments in parallel, merging on shared ref positions
            const unified = [];
            let qi = 0, pi = 0;
            while (qi < qCols.length || pi < pCols.length) {
                const qc = qi < qCols.length ? qCols[qi] : null;
                const pc = pi < pCols.length ? pCols[pi] : null;
                if (qc && pc && qc.ref != null && pc.ref != null && qc.ref === pc.ref) {
                    unified.push({ref: qc.ref, qwen: qc.asr, parakeet: pc.asr, qMatch: qc.match, pMatch: pc.match});
                    qi++; pi++;
                } else if (qc && pc && qc.ref != null && pc.ref != null) {
                    if (qc.ref < pc.ref) {
                        unified.push({ref: qc.ref, qwen: qc.asr, parakeet: null, qMatch: qc.match, pMatch: false});
                        qi++;
                    } else {
                        unified.push({ref: pc.ref, qwen: null, parakeet: pc.asr, qMatch: false, pMatch: pc.match});
                        pi++;
                    }
                } else if (qc && qc.ref == null) {
                    unified.push({ref: null, qwen: qc.asr, parakeet: null, qMatch: false, pMatch: false});
                    qi++;
                } else if (pc && pc.ref == null) {
                    unified.push({ref: null, qwen: null, parakeet: pc.asr, qMatch: false, pMatch: false});
                    pi++;
                } else if (qc) {
                    unified.push({ref: qc.ref, qwen: qc.asr, parakeet: null, qMatch: qc.match, pMatch: false});
                    qi++;
                } else {
                    unified.push({ref: pc.ref, qwen: null, parakeet: pc.asr, qMatch: false, pMatch: pc.match});
                    pi++;
                }
            }
            return unified;
        }

        function TranscriptGrid({original, asr, humanAsr, activeWordIndex, alignment, writtenAlignment, unknownWords, onWordClick}) {
            const scrollRef = useRef(null);
            const qColor = '#58a6ff';
            const pColor = '#7ee787';
            const cColor = '#f78166';
            const dimStyle = {opacity: 0.2};

            // Unknown word set + left-to-right numbering
            const unknownSet = useMemo(() => new Set((unknownWords || []).map(w => cleanWord(w))), [unknownWords]);
            const unknownNum = useMemo(() => {
                const m = new Map();
                if (!unknownWords?.length) return m;
                let n = 1;
                for (const w of original.split(/\s+/)) {
                    const c = cleanWord(w);
                    if (c && unknownSet.has(c) && !m.has(c)) m.set(c, n++);
                }
                return m;
            }, [unknownWords, original, unknownSet]);

            // Get all four alignments (timed word lists)
            // When human recording exists, all alignments are against the human audio
            const spokenAlign = humanAsr?.alignment || alignment || [];
            const refAlign = humanAsr?.written_alignment || writtenAlignment || alignment || [];
            const qAlign = humanAsr?.qwen_alignment || asr?.qwen_alignment || [];
            const pAlign = humanAsr?.parakeet_alignment || asr?.parakeet_alignment || [];
            const cAlign = humanAsr?.cohere_alignment || asr?.cohere_alignment || [];

            // Build time-based groups: collect all boundaries, find overlapping words
            const groups = useMemo(() => {
                if (!refAlign.length) return [];

                // Collect all time boundaries
                const boundaries = new Set();
                for (const list of [spokenAlign, refAlign, qAlign, pAlign, cAlign]) {
                    for (const w of list) {
                        boundaries.add(w.start);
                        boundaries.add(w.end);
                    }
                }
                const times = [...boundaries].sort((a, b) => a - b);

                // For each time slot, find the word with the tightest fit.
                // This ensures dropped words (tiny 50ms slots) win over real words
                // that happen to overlap at boundaries.
                const findWordAt = (list, t) => {
                    let best = null, bestDur = Infinity;
                    for (const w of list) {
                        if (t >= w.start && t < w.end) {
                            const dur = w.end - w.start;
                            if (dur < bestDur) { best = w; bestDur = dur; }
                        }
                    }
                    if (best) return best;
                    // Tolerance-based fallback
                    for (const w of list) {
                        if (t >= w.start - 0.01 && t < w.end + 0.01) {
                            const dur = w.end - w.start;
                            if (dur < bestDur) { best = w; bestDur = dur; }
                        }
                    }
                    return best;
                };

                // Walk time slots and build columns (each column = a unique combination change)
                const cols = [];
                let lastSpoken = null, lastRef = null, lastQ = null, lastP = null, lastC = null;
                for (let i = 0; i < times.length - 1; i++) {
                    const t = (times[i] + times[i + 1]) / 2;
                    const spoken = findWordAt(spokenAlign, t);
                    const ref = findWordAt(refAlign, t);
                    const q = findWordAt(qAlign, t);
                    const p = findWordAt(pAlign, t);
                    const c = findWordAt(cAlign, t);
                    if (!spoken && !ref && !q && !p && !c) continue;
                    if (spoken === lastSpoken && ref === lastRef && q === lastQ && p === lastP && c === lastC) continue;
                    cols.push({spoken, ref, q, p, c, start: times[i]});
                    lastSpoken = spoken; lastRef = ref; lastQ = q; lastP = p; lastC = c;
                }
                return cols;
            }, [spokenAlign, refAlign, qAlign, pAlign, cAlign]);

            // Compute per-row spans: for each row, find runs of same word object
            const rowSpans = useMemo(() => {
                const computeSpans = (getWord) => {
                    const spans = []; // [{word, colStart, colSpan, wordObj}]
                    let i = 0;
                    while (i < groups.length) {
                        const obj = getWord(groups[i]);
                        let span = 1;
                        while (i + span < groups.length && getWord(groups[i + span]) === obj) span++;
                        spans.push({wordObj: obj, word: obj?.word || null, colStart: i, colSpan: span});
                        i += span;
                    }
                    return spans;
                };
                return {
                    spoken: computeSpans(g => g.spoken),
                    ref: computeSpans(g => g.ref),
                    q: computeSpans(g => g.q),
                    p: computeSpans(g => g.p),
                    c: computeSpans(g => g.c),
                };
            }, [groups]);

            // Map alignment index → column RANGE for active word tracking.
            // activeWordIndex is an index into spokenAlign (from the Waveform),
            // so we find that spoken word's column range, then extend to cover all
            // rows that overlap with those columns.
            const activeColRange = useMemo(() => {
                if (activeWordIndex == null || !spokenAlign[activeWordIndex]) return null;
                const activeObj = spokenAlign[activeWordIndex];
                // Find the spoken row span that contains this word
                for (const span of rowSpans.spoken) {
                    if (span.wordObj === activeObj) {
                        return {start: span.colStart, end: span.colStart + span.colSpan};
                    }
                }
                return null;
            }, [activeWordIndex, spokenAlign, rowSpans.spoken]);

            const activeColIdx = activeColRange ? activeColRange.start : -1; // for scroll target

            const isSpanActive = (s) => {
                if (!activeColRange) return false;
                // Check if span overlaps with active range
                const spanEnd = s.colStart + s.colSpan;
                return s.colStart < activeColRange.end && spanEnd > activeColRange.start;
            };
            const activeBg = 'rgba(88,166,255,0.15)';

            // Auto-scroll to active column
            useEffect(() => {
                if (activeColIdx < 0 || !scrollRef.current) return;
                const cell = scrollRef.current.querySelector(`[data-col="${activeColIdx}"]`);
                if (cell) cell.scrollIntoView({behavior: 'smooth', inline: 'center', block: 'nearest'});
            }, [activeColIdx]);

            if (!groups.length) return null;

            return (
                <div style={{fontFamily: 'Jost, sans-serif', fontSize: 17, display: 'flex', alignItems: 'center', flexDirection: 'column'}}>
                    {/* Legend on top */}
                    <div style={{display: 'flex', gap: 16, marginBottom: 4, fontSize: 11}}>
                        <span style={{color: '#d2a8ff'}}>Spoken</span>
                        <span style={{color: 'var(--text-muted)'}}>Original</span>
                        <span style={{color: qColor}}>Qwen</span>
                        <span style={{color: pColor}}>Parakeet</span>
                        <span style={{color: cColor}}>Cohere</span>
                    </div>
                    {/* Scrolling grid */}
                    <div ref={scrollRef} style={{overflowX: 'auto', paddingBottom: 4}} className="transcript-grid-scroll">
                        <div style={{
                            display: 'inline-grid',
                            gridTemplateColumns: `repeat(${groups.length}, max-content)`,
                            gridTemplateRows: 'auto auto auto auto auto',
                            gap: '1px 0',
                            padding: '.5em .2em',
                            whiteSpace: 'nowrap',
                        }}>
                            {/* Row 1: Spoken (vocab overrides) — always show, dim if same as written */}
                            {rowSpans.spoken.map((s, i) => {
                                const isLast = s.colStart + s.colSpan >= groups.length;
                                if (!s.word) return <div key={`s${i}`} style={{gridRow: 1, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em'}} />;
                                let sameAsRef = false;
                                for (let c = s.colStart; c < s.colStart + s.colSpan; c++) {
                                    const r = groups[c]?.ref;
                                    if (r && cleanWord(s.word) === cleanWord(r.word)) {sameAsRef = true; break;}
                                }
                                return <div key={`s${i}`} style={{gridRow: 1, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em', padding: '0 4px', borderRight: !isLast ? '1px solid rgba(48,54,61,0.4)' : undefined, background: isSpanActive(s) ? activeBg : undefined, borderRadius: isSpanActive(s) ? 3 : undefined}}>
                                    <span style={{color: '#d2a8ff', opacity: sameAsRef ? 0.2 : 1}}>{s.word}</span>
                                </div>;
                            })}
                            {/* Row 2: Original (written text) */}
                            {rowSpans.ref.map((s, i) => {
                                if (!s.word) return <div key={`r${i}`} style={{gridRow: 2, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em'}} />;
                                const isActive = isSpanActive(s);
                                const c = cleanWord(s.word);
                                const isUnknown = unknownSet.has(c);
                                const num = unknownNum.get(c);
                                // Check if this unknown word has an override (spoken differs from written)
                                let hasOverride = false;
                                if (isUnknown) {
                                    for (let ci = s.colStart; ci < s.colStart + s.colSpan; ci++) {
                                        const sp = groups[ci]?.spoken;
                                        const rf = groups[ci]?.ref;
                                        if (sp && rf && cleanWord(sp.word) !== cleanWord(rf.word)) { hasOverride = true; break; }
                                    }
                                }
                                const outlineColor = hasOverride ? 'var(--success)' : 'var(--warning)';
                                const style = {
                                    ...(isActive ? {color: '#fff'} : {}),
                                    ...(isUnknown ? {outline: `1px solid ${outlineColor}`, outlineOffset: '1px', borderRadius: '3px', cursor: 'pointer'} : {}),
                                };
                                const isLast = s.colStart + s.colSpan >= groups.length;
                                return <div key={`r${i}`} data-col={s.colStart} style={{gridRow: 2, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em', padding: '0 4px', borderRight: !isLast ? '1px solid rgba(48,54,61,0.4)' : undefined, background: isActive ? activeBg : undefined, borderRadius: isActive ? 3 : undefined}}>
                                    <span style={style} onClick={isUnknown && onWordClick ? () => onWordClick(s.word) : undefined}>
                                        {s.word}{num && num <= 9 ? <span className="unknown-num-badge" style={{marginLeft: 2, verticalAlign: 'super'}}>{num}</span> : null}
                                    </span>
                                </div>;
                            })}
                            {/* Row 3: Qwen */}
                            {rowSpans.q.map((s, i) => {
                                const isLast = s.colStart + s.colSpan >= groups.length;
                                if (!s.word) return <div key={`q${i}`} style={{gridRow: 3, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em'}} />;
                                let isMatch = false;
                                for (let c = s.colStart; c < s.colStart + s.colSpan; c++) {
                                    const r = groups[c]?.ref;
                                    if (r && cleanWord(s.word) === cleanWord(r.word)) {isMatch = true; break;}
                                }
                                return <div key={`q${i}`} style={{gridRow: 3, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em', padding: '0 4px', borderRight: !isLast ? '1px solid rgba(48,54,61,0.4)' : undefined, background: isSpanActive(s) ? activeBg : undefined, borderRadius: isSpanActive(s) ? 3 : undefined}}>
                                    <span style={{color: qColor, opacity: isMatch ? 0.2 : 1}}>{s.word}</span>
                                </div>;
                            })}
                            {/* Row 4: Parakeet */}
                            {rowSpans.p.map((s, i) => {
                                const isLast = s.colStart + s.colSpan >= groups.length;
                                if (!s.word) return <div key={`p${i}`} style={{gridRow: 4, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em'}} />;
                                let isMatch = false;
                                for (let c = s.colStart; c < s.colStart + s.colSpan; c++) {
                                    const r = groups[c]?.ref;
                                    if (r && cleanWord(s.word) === cleanWord(r.word)) {isMatch = true; break;}
                                }
                                return <div key={`p${i}`} style={{gridRow: 4, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em', padding: '0 4px', borderRight: !isLast ? '1px solid rgba(48,54,61,0.4)' : undefined, background: isSpanActive(s) ? activeBg : undefined, borderRadius: isSpanActive(s) ? 3 : undefined}}>
                                    <span style={{color: pColor, opacity: isMatch ? 0.2 : 1}}>{s.word}</span>
                                </div>;
                            })}
                            {/* Row 5: Cohere */}
                            {rowSpans.c.map((s, i) => {
                                const isLast = s.colStart + s.colSpan >= groups.length;
                                if (!s.word) return <div key={`c${i}`} style={{gridRow: 5, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em'}} />;
                                let isMatch = false;
                                for (let c = s.colStart; c < s.colStart + s.colSpan; c++) {
                                    const r = groups[c]?.ref;
                                    if (r && cleanWord(s.word) === cleanWord(r.word)) {isMatch = true; break;}
                                }
                                return <div key={`c${i}`} style={{gridRow: 5, gridColumn: `${s.colStart + 1} / span ${s.colSpan}`, lineHeight: '1.5em', padding: '0 4px', borderRight: !isLast ? '1px solid rgba(48,54,61,0.4)' : undefined, background: isSpanActive(s) ? activeBg : undefined, borderRadius: isSpanActive(s) ? 3 : undefined}}>
                                    <span style={{color: cColor, opacity: isMatch ? 0.2 : 1}}>{s.word}</span>
                                </div>;
                            })}
                        </div>
                    </div>

                </div>
            );
        }

        // ==================== VOCAB ====================
        function VocabPage() {
            const [vocab, setVocab] = useState([]);
            const [altSpellings, setAltSpellings] = useState({});
            const [altInputs, setAltInputs] = useState({});
            const [altBusyTerm, setAltBusyTerm] = useState(null);
            const [search, setSearch] = useState('');
            const [filter, setFilter] = useState('overrides'); // 'all' | 'overrides'
            const [sort, setSort] = useState('recent'); // 'alpha' | 'recent'
            const [loading, setLoading] = useState(true);
            const [page, setPage] = useState(0);
            const pageSize = 50;
            const [editingId, setEditingId] = useState(null);
            const [editValue, setEditValue] = useState('');
            const [editDescription, setEditDescription] = useState('');
            const [newTerm, setNewTerm] = useState('');
            const [newOverride, setNewOverride] = useState('');
            const [newDescription, setNewDescription] = useState('');
            const [newPreviewed, setNewPreviewed] = useState(false);
            const [newTermExists, setNewTermExists] = useState(false);
            const newTermRef = useRef(null);
            const [curating, setCurating] = useState(false);
            const [curateLog, setCurateLog] = useState('');
            const curateRef = useRef(null);
            const curatePollRef = useRef(null);

            const load = useCallback(() => {
                const p = new URLSearchParams();
                if (search) p.set('search', search);
                if (filter === 'overrides') p.set('has_override', 'true');
                if (sort === 'recent') p.set('sort', 'recent');
                p.set('limit', String(pageSize));
                p.set('offset', String(page * pageSize));
                Promise.all([
                    api(`/api/vocab?${p}`),
                    api('/api/vocab/alt-spellings'),
                ]).then(([list, alts]) => {
                    setVocab(list);
                    setAltSpellings(alts || {});
                }).finally(() => setLoading(false));
            }, [search, filter, sort, page]);
            useEffect(() => {load();}, [load]);
            // Reset page when filter/search changes
            useEffect(() => { setPage(0); }, [search, filter, sort]);

            const startEdit = (row) => {
                setEditingId(row.id);
                setEditValue(row.spoken_override || row.spoken_auto);
                setEditDescription(row.description || '');
            };
            const saveEdit = async (id) => {
                await api(`/api/vocab/${id}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        spoken_override: editValue,
                        description: editDescription,
                    }),
                });
                setEditingId(null); load();
            };
            const toggleReviewed = async (row) => {
                await api(`/api/vocab/${row.id}`, {method: 'POST', body: JSON.stringify({reviewed: !row.reviewed})});
                load();
            };
            const previewNewTerm = () => {
                const text = newOverride.trim() || newTerm.trim();
                if (!text) return;
                fetchTtsBuffer(text).then(buf => playBuffer(buf)).catch(() => { });
                setNewPreviewed(true);
            };
            const addTerm = async () => {
                if (!newTerm.trim()) return;
                if (!newPreviewed) {previewNewTerm(); return;}
                await api('/api/vocab', {
                    method: 'POST',
                    body: JSON.stringify({
                        term: newTerm.trim(),
                        spoken_override: newOverride.trim() || undefined,
                        description: newDescription.trim() || undefined,
                    }),
                });
                setNewTerm(''); setNewOverride(''); setNewDescription(''); setNewPreviewed(false); setNewTermExists(false); load();
                setTimeout(() => newTermRef.current?.focus(), 50);
            };
            const altListFor = (term) => altSpellings[term.toLowerCase()] || [];
            const addAltSpelling = async (term) => {
                const value = (altInputs[term] || '').trim();
                if (!value) return;
                setAltBusyTerm(term);
                try {
                    await api('/api/vocab/alt-spellings', {method: 'POST', body: JSON.stringify({term, alt_spelling: value})});
                    setAltInputs(prev => ({...prev, [term]: ''}));
                    load();
                } finally {
                    setAltBusyTerm(null);
                }
            };
            const deleteAltSpelling = async (term, altSpelling) => {
                setAltBusyTerm(term);
                try {
                    await api('/api/vocab/alt-spellings/delete', {method: 'POST', body: JSON.stringify({term, alt_spelling: altSpelling})});
                    load();
                } finally {
                    setAltBusyTerm(null);
                }
            };

            const startCurate = async () => {
                setCurating(true); setCurateLog('');
                try {
                    const res = await api('/api/jobs/curate', {method: 'POST', body: JSON.stringify({batch_size: 100})});
                    if (res.job_id) {
                        const poll = async () => {
                            const job = await api(`/api/jobs/${res.job_id}`);
                            setCurateLog(job.log);
                            if (curateRef.current) curateRef.current.scrollTop = curateRef.current.scrollHeight;
                            load(); // refresh vocab list as GPT curates
                            if (job.status !== 'running') {
                                setCurating(false);
                                clearInterval(curatePollRef.current);
                                load();
                            }
                        };
                        poll();
                        curatePollRef.current = setInterval(poll, 2000);
                    }
                } catch (e) { setCurating(false); alert(e.message); }
            };

        // ==================== HELPERS ====================
        async function decodeAudioB64(b64) {
            const binaryStr = atob(b64);
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
            return audioCtx.decodeAudioData(bytes.buffer);
        }

        function addNoiseToAudioBuffer(buffer, noiseLevel) {
            if (!buffer || noiseLevel <= 0) return buffer;
            const out = audioCtx.createBuffer(buffer.numberOfChannels, buffer.length, buffer.sampleRate);
            for (let ch = 0; ch < buffer.numberOfChannels; ch++) {
                const src = buffer.getChannelData(ch);
                const dst = out.getChannelData(ch);
                for (let i = 0; i < src.length; i++) {
                    const noisy = src[i] + ((Math.random() * 2) - 1) * noiseLevel;
                    dst[i] = Math.max(-1, Math.min(1, noisy));
                }
            }
            return out;
        }

        function audioBufferToWav(buffer) {
            const sampleRate = buffer.sampleRate, samples = buffer.getChannelData(0);
            const dataLen = samples.length * 2, buf = new ArrayBuffer(44 + dataLen), v = new DataView(buf);
            const ws = (o, s) => {for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i));};
            ws(0, 'RIFF'); v.setUint32(4, 36 + dataLen, true); ws(8, 'WAVE'); ws(12, 'fmt ');
            v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
            v.setUint32(24, sampleRate, true); v.setUint32(28, sampleRate * 2, true);
            v.setUint16(32, 2, true); v.setUint16(34, 16, true); ws(36, 'data'); v.setUint32(40, dataLen, true);
            for (let i = 0; i < samples.length; i++) {
                const s = Math.max(-1, Math.min(1, samples[i]));
                v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            return buf;
        }

        function monoSamplesToWav(samples, sampleRate) {
            const dataLen = samples.length * 2, buf = new ArrayBuffer(44 + dataLen), v = new DataView(buf);
            const ws = (o, s) => {for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i));};
            ws(0, 'RIFF'); v.setUint32(4, 36 + dataLen, true); ws(8, 'WAVE'); ws(12, 'fmt ');
            v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
            v.setUint32(24, sampleRate, true); v.setUint32(28, sampleRate * 2, true);
            v.setUint16(32, 2, true); v.setUint16(34, 16, true); ws(36, 'data'); v.setUint32(40, dataLen, true);
            for (let i = 0; i < samples.length; i++) {
                const s = Math.max(-1, Math.min(1, samples[i]));
                v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
            }
            return buf;
        }

        function bytesToBase64(bytes) {
            const chunkSize = 0x8000;
            let out = '';
            for (let i = 0; i < bytes.length; i += chunkSize) {
                const chunk = bytes.subarray(i, i + chunkSize);
                out += String.fromCharCode(...chunk);
            }
            return btoa(out);
        }

        const rawMicAudioConstraints = {
            channelCount: 1,
            sampleRate: 48000,
            sampleSize: 16,
            echoCancellation: false,
            noiseSuppression: false,
            autoGainControl: false,
        };

        async function getRecordingStream() {
            const stream = await navigator.mediaDevices.getUserMedia({audio: rawMicAudioConstraints});
            const [track] = stream.getAudioTracks();
            if (track?.applyConstraints) {
                try {
                    await track.applyConstraints(rawMicAudioConstraints);
                } catch (e) {
                    console.warn('applyConstraints failed', e);
                }
            }
            return stream;
        }

        async function startMonoWavRecording(onStop) {
            const stream = await getRecordingStream();
            const recordingCtx = new (window.AudioContext || window.webkitAudioContext)();
            await recordingCtx.resume();
            const source = recordingCtx.createMediaStreamSource(stream);
            const processor = recordingCtx.createScriptProcessor(4096, source.channelCount || 1, 1);
            const sink = recordingCtx.createGain();
            sink.gain.value = 0;
            const chunks = [];
            let state = 'recording';

            processor.onaudioprocess = (event) => {
                if (state !== 'recording') return;
                const input = event.inputBuffer;
                const len = input.length;
                const channels = input.numberOfChannels || 1;
                const mono = new Float32Array(len);
                for (let ch = 0; ch < channels; ch++) {
                    const data = input.getChannelData(ch);
                    for (let i = 0; i < len; i++) mono[i] += data[i];
                }
                const scale = 1 / channels;
                for (let i = 0; i < len; i++) mono[i] *= scale;
                chunks.push(mono);
            };

            source.connect(processor);
            processor.connect(sink);
            sink.connect(recordingCtx.destination);

            return {
                get state() { return state; },
                async stop(options = {}) {
                    if (state !== 'recording') return;
                    state = 'inactive';
                    processor.disconnect();
                    source.disconnect();
                    sink.disconnect();
                    stream.getTracks().forEach(t => t.stop());
                    const sampleRate = recordingCtx.sampleRate;
                    await recordingCtx.close();
                    if (options.discard) return;
                    const total = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
                    const mono = new Float32Array(total);
                    let offset = 0;
                    for (const chunk of chunks) {
                        mono.set(chunk, offset);
                        offset += chunk.length;
                    }
                    await onStop({
                        wavBytes: monoSamplesToWav(mono, sampleRate),
                        sampleRate,
                        samples: mono,
                    });
                },
            };
        }

        async function createWarmMonoRecorder() {
            const stream = await getRecordingStream();
            const recordingCtx = new (window.AudioContext || window.webkitAudioContext)();
            await recordingCtx.resume();
            const source = recordingCtx.createMediaStreamSource(stream);
            const processor = recordingCtx.createScriptProcessor(4096, source.channelCount || 1, 1);
            const sink = recordingCtx.createGain();
            sink.gain.value = 0;
            const chunks = [];
            let state = 'idle';
            let segmentStartChunk = 0;

            processor.onaudioprocess = (event) => {
                if (state === 'closed') return;
                const input = event.inputBuffer;
                const len = input.length;
                const channels = input.numberOfChannels || 1;
                const mono = new Float32Array(len);
                for (let ch = 0; ch < channels; ch++) {
                    const data = input.getChannelData(ch);
                    for (let i = 0; i < len; i++) mono[i] += data[i];
                }
                const scale = 1 / channels;
                for (let i = 0; i < len; i++) mono[i] *= scale;
                chunks.push(mono);
            };

            source.connect(processor);
            processor.connect(sink);
            sink.connect(recordingCtx.destination);

            const buildSegment = (segmentChunks) => {
                const total = segmentChunks.reduce((sum, chunk) => sum + chunk.length, 0);
                const mono = new Float32Array(total);
                let offset = 0;
                for (const chunk of segmentChunks) {
                    mono.set(chunk, offset);
                    offset += chunk.length;
                }
                return {
                    wavBytes: monoSamplesToWav(mono, recordingCtx.sampleRate),
                    sampleRate: recordingCtx.sampleRate,
                    samples: mono,
                };
            };

            return {
                get state() { return state; },
                start() {
                    if (state === 'closed') throw new Error('recorder closed');
                    if (state === 'recording') return;
                    segmentStartChunk = chunks.length;
                    state = 'recording';
                },
                async stop(options = {}) {
                    if (state !== 'recording') return null;
                    const segmentChunks = chunks.slice(segmentStartChunk);
                    chunks.splice(0, chunks.length);
                    segmentStartChunk = 0;
                    state = 'idle';
                    if (options.discard || segmentChunks.length === 0) return null;
                    return buildSegment(segmentChunks);
                },
                async shutdown() {
                    state = 'closed';
                    processor.disconnect();
                    source.disconnect();
                    sink.disconnect();
                    stream.getTracks().forEach(t => t.stop());
                    await recordingCtx.close();
                },
            };
        }

        // ==================== FULL-SCREEN SENTENCE REVIEW ====================
        function SentenceReview({mode = 'sentence'}) {
            const isVocab = mode === 'vocab';
            const apiBase = isVocab ? '/api/review/vocab' : '/api/review/current';
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [busy, setBusy] = useState(null); // null or string describing what's happening
            const [editingText, setEditingText] = useState(null); // non-null = editing sentence text
            const [audioBuf, setAudioBuf] = useState(null);
            const [activeWord, setActiveWord] = useState(null);
            const [playing, setPlaying] = useState(false);
            const sourceRef = useRef(null);
            const playStartTimeRef = useRef(null); // audioCtx.currentTime when playback started
            const playOffsetRef = useRef(0);       // offset into buffer (seconds) where we started

            const [editingWord, setEditingWord] = useState(null);
            const [editSpoken, setEditSpoken] = useState('');
            const editManualRef = useRef(false); // true when user typed in the input field
            const [editPreviewed, setEditPreviewed] = useState(false); // true after first Enter (TTS preview)
            const [previewBuf, setPreviewBuf] = useState(null);
            const [previewPlaying, setPreviewPlaying] = useState(false);
            const previewSourceRef = useRef(null);

            const [recording, setRecording] = useState(false);     // recording for vocab word
            const [sentenceRec, setSentenceRec] = useState(false); // recording the full sentence
            const [recordedBuf, setRecordedBuf] = useState(null);
            const [transcribing, setTranscribing] = useState(false);
            const [humanAsr, setHumanAsr] = useState(null); // {qwen, parakeet, cohere} from human recording
            const mediaRecorderRef = useRef(null);

            // Play audio buffer from a given offset (seconds)
            const playFrom = (buf, offset) => {
                if (sourceRef.current) try {sourceRef.current.stop();} catch (e) { }
                const source = audioCtx.createBufferSource();
                source.buffer = buf;
                source.connect(audioCtx.destination);
                source.onended = () => {
                    // Only mark as not-playing if this source is still the current one
                    if (sourceRef.current === source) {
                        setPlaying(false);
                        playOffsetRef.current = 0; // finished — reset to start
                        playStartTimeRef.current = null;
                    }
                };
                source.start(0, offset);
                sourceRef.current = source;
                playStartTimeRef.current = audioCtx.currentTime;
                playOffsetRef.current = offset;
                setPlaying(true);
            };

            // --- Load and apply review data from server ---
            const loadReview = async () => {
                setLoading(true);
                try {
                    const d = await api(`${apiBase}${isVocab ? '/current' : ''}`);
                    setData(d);
                    if (d.audio_b64) {
                        const buf = await decodeAudioB64(d.audio_b64);
                        setAudioBuf(buf);
                        playFrom(buf, 0);
                    } else {setAudioBuf(null);}
                } catch (e) {setError(e.message);}
                setLoading(false); setEditingWord(null); setActiveWord(null);
            };

            const applyReviewData = async (d) => {
                stopAudio(true); setData(d); setEditingWord(null); setActiveWord(null); setHumanAsr(null);
                if (d.audio_b64) {
                    const buf = await decodeAudioB64(d.audio_b64);
                    setAudioBuf(buf);
                    playFrom(buf, 0);
                } else {setAudioBuf(null);}
            };

            useEffect(() => {loadReview();}, []);

            const stopAudio = (resetPosition) => {
                if (playing && playStartTimeRef.current != null && !resetPosition) {
                    // Save current position for resume
                    playOffsetRef.current += audioCtx.currentTime - playStartTimeRef.current;
                }
                if (resetPosition) playOffsetRef.current = 0;
                if (sourceRef.current) try {sourceRef.current.stop();} catch (e) { }
                sourceRef.current = null;
                playStartTimeRef.current = null;
                setPlaying(false);
            };

            const stopPreview = () => {
                if (previewSourceRef.current) try {previewSourceRef.current.stop();} catch (e) { }
                setPreviewPlaying(false);
            };

            const togglePlayback = () => {
                if (!audioBuf) return;
                if (playing) {
                    // Pause
                    stopAudio(false);
                } else {
                    // Resume from saved position (or replay from start if at end)
                    const offset = playOffsetRef.current;
                    if (offset >= audioBuf.duration || offset <= 0) {
                        playFrom(audioBuf, 0); // replay from start
                    } else {
                        playFrom(audioBuf, offset); // resume
                    }
                }
            };

            // --- Actions: all server-side ---
            const act = async (action) => {
                if (busy) return;
                stopAudio();
                setBusy('Loading next...');
                try {
                    const body = isVocab ? JSON.stringify({id: data?.sentence?.id}) : undefined;
                    await api(`${apiBase}/${action}`, {method: 'POST', body});
                    const d = await api(`${apiBase}${isVocab ? '/current' : ''}`);
                    await applyReviewData(d);
                } catch (e) {setError(e.message); setTimeout(() => setError(null), 5000);}
                setBusy(null);
            };

            const switchBackend = async (backend) => {
                if (busy) return;
                setBusy(`Switching to ${backend}...`);
                stopAudio();
                try {
                    const d = await api(`${apiBase}/backend`, {
                        method: 'POST', body: JSON.stringify({backend}),
                    });
                    await applyReviewData(d);
                } catch (e) {setError(e.message); setTimeout(() => setError(null), 5000);}
                setBusy(null);
            };

            // --- Vocab editor ---
            const onWordClick = (word) => {
                const term = canonicalWord(word);
                if (term.length < 2) return;
                const original = word.replace(/^[^a-zA-Z0-9]+/, '').replace(/[^a-zA-Z0-9]+$/, '');
                setEditingWord(original);
                // In vocab mode, use the current spoken form (which includes any existing override)
                // In sentence mode, start from the lowercased word
                const currentSpoken = isVocab && sentence?.spoken ? sentence.spoken : original.toLowerCase();
                setEditSpoken(currentSpoken);
                setEditPreviewed(false);
                setPreviewBuf(null); setRecordedBuf(null);
                editManualRef.current = false;
                // Auto-start recording
                setTimeout(() => startRecording(), 50);
            };

            const saveVocabOverride = async () => {
                if (!editingWord) return;
                setBusy('Saving pronunciation...');
                stopAudio();
                try {
                    const d = await api(`${apiBase}/pronunciation`, {
                        method: 'POST', body: JSON.stringify({word: editingWord, spoken: editSpoken}),
                    });
                    await applyReviewData(d);
                } catch (e) {setError(`Save failed: ${e.message}`); setTimeout(() => setError(null), 5000);}
                setBusy(null);
            };

            const saveEditedText = async () => {
                if (editingText == null) return;
                setBusy('Updating sentence...');
                try {
                    const d = await api(`${apiBase}/text`, {
                        method: 'POST', body: JSON.stringify({text: editingText}),
                    });
                    setEditingText(null);
                    await applyReviewData(d);
                } catch (e) {setError(`Save failed: ${e.message}`); setTimeout(() => setError(null), 5000);}
                setBusy(null);
            };

            const previewVocabWord = () => {
                if (!editSpoken) return;
                stopPreview();
                fetchTtsBuffer(editSpoken, data?.backend).then(buf => {
                    setPreviewBuf(buf); setPreviewPlaying(true);
                    previewSourceRef.current = playBuffer(buf, () => setPreviewPlaying(false));
                }).catch(() => { });
            };

            // --- Recording ---
            const startRecording = async () => {
                try {
                    const stream = await getRecordingStream();
                    const mediaRecorder = new MediaRecorder(stream, {mimeType: 'audio/webm'});
                    const chunks = [];
                    mediaRecorder.ondataavailable = (e) => {if (e.data.size > 0) chunks.push(e.data);};
                    mediaRecorder.onstop = async () => {
                        stream.getTracks().forEach(t => t.stop());
                        const blob = new Blob(chunks, {type: 'audio/webm'});
                        const arrayBuf = await blob.arrayBuffer();
                        try {
                            const decoded = await audioCtx.decodeAudioData(arrayBuf);
                            setRecordedBuf(decoded);
                            // Send to server ASR
                            setTranscribing(true);
                            const wavBytes = audioBufferToWav(decoded);
                            const res = await fetch('/api/asr/transcribe', {
                                method: 'POST',
                                headers: {'Content-Type': 'audio/wav'},
                                body: wavBytes,
                            });
                            if (res.ok) {
                                const {text} = await res.json();
                                if (text && !editManualRef.current) {
                                    setEditSpoken(text.trim().toLowerCase());
                                    // Auto-preview via TTS and mark as previewed so next Enter saves
                                    try {
                                        const buf = await fetchTtsBuffer(text.trim().toLowerCase(), data?.backend);
                                        stopPreview();
                                        setPreviewBuf(buf);
                                        setPreviewPlaying(true);
                                        previewSourceRef.current = playBuffer(buf, () => setPreviewPlaying(false));
                                        setEditPreviewed(true);
                                    } catch (e) { /* TTS preview failed, not critical */}
                                } else if (text && editManualRef.current) {
                                    // User typed something manually — don't overwrite, just mark ready to preview
                                    setEditPreviewed(false);
                                }
                            }
                            setTranscribing(false);
                        } catch (e) {
                            console.error('decode/transcribe error:', e);
                            setTranscribing(false);
                        }
                    };
                    mediaRecorderRef.current = mediaRecorder;
                    mediaRecorder.start();
                    setRecording(true);
                    setRecordedBuf(null);
                } catch (e) {
                    setError('Microphone access denied');
                    setTimeout(() => setError(null), 3000);
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {
                    mediaRecorderRef.current.stop();
                }
                setRecording(false);
                setSentenceRec(false);
            };

            // Record yourself saying the sentence → run both ASR models on your voice
            const startSentenceRecording = async () => {
                stopAudio(true);
                try {
                    const stream = await getRecordingStream();
                    const mediaRecorder = new MediaRecorder(stream, {mimeType: 'audio/webm'});
                    const chunks = [];
                    mediaRecorder.ondataavailable = (e) => {if (e.data.size > 0) chunks.push(e.data);};
                    mediaRecorder.onstop = async () => {
                        stream.getTracks().forEach(t => t.stop());
                        setSentenceRec(false);
                        const blob = new Blob(chunks, {type: 'audio/webm'});
                        const arrayBuf = await blob.arrayBuffer();
                        try {
                            const decoded = await audioCtx.decodeAudioData(arrayBuf);
                            setTranscribing(true);
                            const wavBytes = audioBufferToWav(decoded);
                            const res = await fetch('/api/review/current/asr', {
                                method: 'POST', headers: {'Content-Type': 'audio/wav'}, body: wavBytes,
                            });
                            if (res.ok) {
                                const asr = await res.json();
                                setHumanAsr(asr);
                                // Switch to human audio for playback
                                if (asr.audio_b64) {
                                    const buf = await decodeAudioB64(asr.audio_b64);
                                    setAudioBuf(buf);
                                    playFrom(buf, 0);
                                }
                            }
                            setTranscribing(false);
                        } catch (e) {console.error(e); setTranscribing(false);}
                    };
                    mediaRecorderRef.current = mediaRecorder;
                    mediaRecorder.start();
                    setSentenceRec(true);
                } catch (e) {
                    setError('Microphone access denied');
                    setTimeout(() => setError(null), 3000);
                }
            };

            const toggleSentenceRecording = () => {
                if (sentenceRec) {stopRecording();}
                else {startSentenceRecording();}
            };

            // --- Derived state from server data ---
            const sentence = data?.sentence;
            const unknownWords = sentence?.unknown_words || [];
            const alignment = humanAsr?.alignment || data?.alignment || null;
            const backends = data?.backends || [];
            const activeBackend = data?.backend || 'pocket-hq';
            const progress = data?.progress || {};

            const orderedUnknowns = useMemo(() => {
                if (!unknownWords.length || !sentence) return [];
                const unknownSet = new Set(unknownWords.map(w => canonicalWord(w)));
                const ordered = [], seen = new Set();
                for (const w of sentence.text.split(/\s+/)) {
                    const clean = canonicalWord(w);
                    if (clean && unknownSet.has(clean) && !seen.has(clean)) {
                        seen.add(clean); ordered.push(w);
                    }
                }
                return ordered;
            }, [unknownWords, sentence]);

            // --- Keyboard ---
            useEffect(() => {
                const handler = (e) => {
                    if (e.target.tagName === 'INPUT') return;
                    if (busy && e.key !== 'r' && e.key !== 'R') return;
                    if (e.key === 'ArrowRight' || e.key === 'o') {e.preventDefault(); act('approve');}
                    else if (e.key === 'ArrowLeft' || e.key === 'n') {e.preventDefault(); act('reject');}
                    else if (e.key === ' ') {e.preventDefault(); togglePlayback();}
                    else if ((e.key === 'r' || e.key === 'R') && !e.metaKey && !e.ctrlKey && !e.altKey) {e.preventDefault(); toggleSentenceRecording();}
                    else if ((e.key === 's' || e.key === 'S') && !e.metaKey && !e.ctrlKey && !e.altKey && !editingWord) {e.preventDefault(); switchBackend('pocket-hq');}
                    else if ((e.key === 'e' || e.key === 'E') && !e.metaKey && !e.ctrlKey && !e.altKey && !editingText && !editingWord) {
                        e.preventDefault(); setEditingText(sentence?.text || '');
                    }
                    else if (e.key >= '1' && e.key <= '9') {
                        const i = parseInt(e.key) - 1;
                        if (orderedUnknowns[i]) {
                            e.preventDefault();
                            if (recording && editingWord) {
                                // Already recording for a word — stop recording
                                stopRecording();
                            } else {
                                onWordClick(orderedUnknowns[i]);
                            }
                        }
                    }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, [data, audioBuf, playing, busy, sentenceRec, recording, editingText, editingWord, orderedUnknowns]);

            if (loading) return <div className="review-fullscreen"><div className="review-body"><p>Loading...</p></div></div>;

            if (!sentence) return (
                <div className="review-fullscreen">
                    <div className="review-body">
                        <div className="empty-state">
                            <h3>All done!</h3>
                            <p>No pending sentences to review.</p>
                            <a href="#/review" className="btn" style={{marginTop: 16}}>Back</a>
                        </div>
                    </div>
                </div>
            );

            const pct = progress.total > 0 ? (progress.reviewed / progress.total * 100) : 0;

            return (
                <div className="review-fullscreen">
                    <div className="review-topbar">
                        <div style={{display: 'flex', alignItems: 'center', gap: 16}}>
                            <a href="#/review" className="btn btn-sm">&larr; Exit</a>
                            <span style={{color: 'var(--text-muted)', fontSize: 14}}>{(progress.reviewed || 0) + 1} / {progress.total || 0}</span>
                        </div>
                        <div style={{flex: 1, maxWidth: 400, margin: '0 24px'}}>
                            <div className="progress-bar"><div className="fill" style={{width: `${pct}%`}}></div></div>
                        </div>
                        <span className="badge badge-pending">{progress.remaining || 0} remaining</span>
                        <div style={{display: 'flex', gap: 4, marginLeft: 16}}>
                            {backends.map(b => (
                                <button key={b}
                                    className={`btn btn-sm ${b === activeBackend ? 'btn-primary' : ''}`}
                                    onClick={() => switchBackend(b)}
                                    style={{minWidth: 60, fontSize: 12, padding: '2px 8px'}}>
                                    {b}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="review-body">
                        <div className="review-card">
                            <div style={{marginBottom: 24}}>
                                {editingText != null ? (
                                    <div style={{textAlign: 'center'}}>
                                        <input value={editingText} onChange={e => setEditingText(e.target.value)} autoFocus
                                            style={{width: '100%', maxWidth: 700, padding: '8px 12px', fontSize: 18, background: 'var(--bg)', border: '1px solid var(--accent)', borderRadius: 6, color: 'var(--text)', fontFamily: 'Jost,sans-serif', textAlign: 'center', outline: 'none'}}
                                            onKeyDown={e => {
                                                if (e.key === 'Enter') {e.preventDefault(); saveEditedText();}
                                                if (e.key === 'Escape') setEditingText(null);
                                            }} />
                                        <div style={{fontSize: 11, color: 'var(--text-muted)', marginTop: 4}}>Enter to save, Escape to cancel</div>
                                    </div>
                                ) : (
                                    <TranscriptGrid
                                        original={sentence.text}
                                        asr={data?.asr}
                                        humanAsr={humanAsr}
                                        activeWordIndex={activeWord}
                                        alignment={alignment}
                                        writtenAlignment={data?.written_alignment}
                                        unknownWords={unknownWords}
                                        onWordClick={onWordClick} />
                                )}
                                {sentenceRec && (
                                    <div style={{marginTop: 12, padding: '12px 16px', background: 'rgba(255,0,0,0.05)', border: '1px solid var(--danger)', borderRadius: 8, textAlign: 'center'}}>
                                        <div style={{fontSize: 18, lineHeight: 1.6, marginBottom: 8}}>{sentence.text}</div>
                                        <div style={{fontSize: 12, color: 'var(--danger)'}}>Recording... press R to stop</div>
                                    </div>
                                )}
                                {transcribing && <div style={{fontSize: 12, color: 'var(--accent)', marginTop: 4}}>Transcribing...</div>}
                            </div>

                            {audioBuf && <Waveform audioBuffer={audioBuf} playing={playing} alignment={alignment} onActiveWord={setActiveWord} playOffset={playOffsetRef.current} />}
                            {!audioBuf && <div style={{height: 80, display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-muted)'}}>Loading audio...</div>}
                        </div>
                    </div>

                    <div className="review-actions">
                        <button className="review-action-btn reject" onClick={() => act('reject')} disabled={!!busy}>
                            Reject<kbd>n</kbd>
                        </button>
                        <button className="review-action-btn replay" onClick={togglePlayback}>
                            {playing ? 'Pause' : 'Play'}<kbd>space</kbd>
                        </button>
                        <button className="review-action-btn approve" onClick={() => act('approve')} disabled={!!busy}>
                            Approve<kbd>o</kbd>
                        </button>
                    </div>

                    {busy && <div style={{
                        position: 'fixed', top: 60, left: '50%', transform: 'translateX(-50%)',
                        background: 'var(--accent)', color: 'var(--bg)', padding: '6px 16px', borderRadius: 6, fontSize: 13, fontWeight: 600, zIndex: 300
                    }}>
                        {busy}
                    </div>}
                    {error && <div className="error-toast">{error}</div>}

                    {editingWord && (
                        <div className="vocab-overlay" onClick={e => {if (e.target === e.currentTarget) {stopPreview(); stopRecording(); setEditingWord(null);} }}>
                            <div className="vocab-editor">
                                <div className="term">{editingWord}</div>
                                <div className="status">
                                    {recording ? <span style={{color: 'var(--danger)'}}>Recording... press Enter to stop</span>
                                        : transcribing ? <span style={{color: 'var(--accent)'}}>Transcribing...</span>
                                            : editPreviewed ? 'Press Enter to save, Escape to cancel'
                                                : editSpoken ? 'Press Enter to preview'
                                                    : 'Say the pronunciation or type it'}
                                </div>
                                <div className="spoken-display">{editSpoken || '\u00A0'}</div>
                                <div className="row">
                                    <input value={editSpoken} onChange={e => {setEditSpoken(e.target.value); setEditPreviewed(false); setPreviewBuf(null); editManualRef.current = true;}} autoFocus
                                        placeholder="pronunciation"
                                        onKeyDown={e => {
                                            if (e.key === 'Enter') {
                                                e.preventDefault();
                                                if (recording && !editManualRef.current) {stopRecording();}
                                                else {
                                                    if (recording) stopRecording(); // stop in background, don't wait
                                                    if (editPreviewed) {saveVocabOverride();}
                                                    else {previewVocabWord(); setEditPreviewed(true);}
                                                }
                                            }
                                            if (e.key === 'Escape') {stopPreview(); stopRecording(); setEditingWord(null);}
                                        }} />
                                    <button className={`record-btn ${recording ? 'active' : ''}`}
                                        onClick={recording ? stopRecording : startRecording}
                                        title={recording ? 'Stop recording' : 'Record pronunciation'}>
                                        {recording ? '\u25A0' : '\u25CF'}
                                    </button>
                                </div>
                                <div className="actions">
