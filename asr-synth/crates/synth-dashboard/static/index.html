                                    .catch(e => { setError(e.message); setTestLoading(false); });
                            }}>{testLoading ? 'Running...' : 'Test'}</button>
                        </div>
                        <div style={{fontSize:10,color:'var(--text-muted)',marginTop:4}}>Run one corpus pass for a term: TTS {'\u2192'} ASR {'\u2192'} alignment {'\u2192'} extraction.</div>
                        {testResult && (
                            <div style={{marginTop:12,borderTop:'1px solid var(--border)',paddingTop:12}}>
                                {testResult.error
                                    ? <div style={{color:'var(--error)'}}>{testResult.error}</div>
                                    : <AlignmentView data={testResult} />
                                }
                            </div>
                        )}
                    </div>

                    <dialog ref={dialogRef} style={{
                        background:'var(--card-bg)', color:'var(--text)', border:'1px solid var(--border)',
                        borderRadius:12, padding:0, width:'min(90vw, 900px)', maxHeight:'80vh',
                    }} onClick={e => { if (e.target === dialogRef.current) dialogRef.current.close(); }}>
                        <div style={{padding:'16px 20px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:12}}>
                            <h3 style={{margin:0, flex:1}}>Corpus Pairs {corpusData && <span style={{fontWeight:300,fontSize:14,color:'var(--text-muted)'}}>({corpusData.length})</span>}</h3>
                            <input type="text" placeholder="Filter by term..." value={corpusFilter} onChange={e => setCorpusFilter(e.target.value)}
                                style={{padding:'4px 10px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:6,color:'var(--text)',fontFamily:'Jost,sans-serif',fontSize:13,width:200}} />
                            <button onClick={() => dialogRef.current.close()} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:18}}>&times;</button>
                        </div>
                        <div style={{overflow:'auto', maxHeight:'calc(80vh - 60px)', padding:'0 20px 16px'}}>
                            {corpusData && (() => {
                                const f = corpusFilter.toLowerCase();
                                let filtered = corpusData;
                                if (f) filtered = filtered.filter(p =>
                                    (p.term||'').toLowerCase().includes(f) ||
                                    (p.original||'').toLowerCase().includes(f) ||
                                    (p.qwen||'').toLowerCase().includes(f)
                                );

                                return (
                                    <div>
                                        {filtered.map((p, i) => {
                                            const expanded = expandedTerm === p.id;
                                            const tt = p.cons_time;
                                            return (
                                                <div key={p.id || i} style={{borderBottom:'1px solid var(--border)'}}>
                                                    <div onClick={() => setExpandedTerm(expanded ? null : p.id)}
                                                        style={{display:'flex',alignItems:'center',gap:10,padding:'8px 4px',cursor:'pointer',userSelect:'none'}}>
                                                        <span style={{fontSize:11,color:'var(--text-muted)',width:12}}>{expanded ? '\u25BC' : '\u25B6'}</span>
                                                        <span style={{fontWeight:600,fontSize:12,minWidth:80,color:'var(--text-muted)'}}>{p.term}</span>
                                                        <span style={{color:'rgba(88,166,255,0.8)',fontFamily:'monospace',fontSize:13}}>{p.original}</span>
                                                        <span style={{color:'var(--text-muted)'}}>{'\u2192'}</span>
                                                        <span style={{color: p.is_mistake ? 'rgba(210,153,34,0.9)' : 'var(--success)', fontFamily:'monospace',fontSize:13}}>{p.qwen}</span>
                                                        <div style={{flex:1}} />
                                                        <span style={{fontSize:11,color:'var(--text-muted)',fontFamily:'monospace'}}>{'\u00d7'}{p.hit_count}</span>
                                                    </div>
                                                    {expanded && (
                                                        <div style={{padding:'4px 4px 12px 26px',fontSize:12,lineHeight:1.6}}>
                                                            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                                                                {p.has_audio && <button onClick={e => { e.stopPropagation(); const a = new Audio(`/api/pipeline/corpus/${p.id}/audio`); a.play(); }}
                                                                    style={{background:'none',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',cursor:'pointer',padding:'2px 10px',fontSize:11}}>{'\u25B6 Play'}</button>}
                                                                <span style={{color:'var(--text-muted)',fontSize:11}}>
                                                                    {p.sentence}
                                                                </span>
                                                            </div>
                                                            {p.spoken && p.spoken !== p.sentence && <div style={{color:'var(--text-muted)'}}><b>Spoken:</b> {p.spoken}</div>}
                                                            {(p.orig_alignment || p.qwen_alignment) && (() => {
                                                                const allItems = [...(p.orig_alignment||[]),...(p.qwen_alignment||[]),...(p.parakeet_alignment||[])];
                                                                const maxTime = allItems.length ? Math.max(...allItems.map(a=>a.e)) : 1;
                                                                const pct = t => (t/maxTime*100).toFixed(2)+'%';
                                                                const ti = p.trim_info;
                                                                const tl = ti?.trimmed_left || 0;
                                                                const tr = ti?.trimmed_right || 0;
                                                                const classify = (items) => {
                                                                    if (!tt) return {kept: new Set(), trimmed: new Set()};
                                                                    const inRange = [];
                                                                    for (let j=0;j<items.length;j++) if (items[j].e>tt[0]&&items[j].s<tt[1]) inRange.push(j);
                                                                    const kept = new Set(), trimmed = new Set();
                                                                    for (let j=0;j<inRange.length;j++) {
                                                                        if (j < tl || j >= inRange.length - tr) trimmed.add(inRange[j]);
                                                                        else kept.add(inRange[j]);
                                                                    }
                                                                    return {kept, trimmed};
                                                                };
                                                                const renderTL = (label, items, color, fullText) => items && items.length > 0 && (() => {
                                                                    const {kept, trimmed} = classify(items);
                                                                    return (<div style={{marginBottom:4}}>
                                                                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:1}}>
                                                                        <span style={{fontSize:9,color:'var(--text-muted)',width:55,textAlign:'right',flexShrink:0,fontWeight:600}}>{label}</span>
                                                                        <span style={{fontSize:10,color:color,opacity:0.7,fontFamily:'monospace',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fullText}</span>
                                                                    </div>
                                                                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                                                                        <span style={{width:55,flexShrink:0}} />
                                                                        <div style={{position:'relative',flex:1,height:22,background:'rgba(255,255,255,0.03)',borderRadius:3,overflow:'hidden'}}>
                                                                            {items.map((a,j) => {
                                                                                const isKept = kept.has(j);
                                                                                const isTrimmed = trimmed.has(j);
                                                                                return (<div key={j} title={`${a.w} (${a.s.toFixed(2)}s\u2013${a.e.toFixed(2)}s)${isTrimmed?' [trimmed]':''}`} style={{
                                                                                    position:'absolute',left:pct(a.s),width:pct(Math.max(a.e-a.s,0.02)),top:2,bottom:2,borderRadius:2,
                                                                                    background: isKept ? color : isTrimmed ? color.replace(/[\d.]+\)$/,'0.2)') : 'rgba(255,255,255,0.08)',
                                                                                    border:`1px solid ${isKept ? color : isTrimmed ? color.replace(/[\d.]+\)$/,'0.3)') : 'rgba(255,255,255,0.12)'}`,
                                                                                    display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',
                                                                                }}><span style={{fontSize:8,color: isKept?'#fff':isTrimmed?'rgba(255,255,255,0.4)':'var(--text-muted)',whiteSpace:'nowrap',padding:'0 2px',
                                                                                    textDecoration:isTrimmed?'line-through':'none'}}>{a.w}</span></div>);
                                                                            })}
                                                                        </div>
                                                                    </div>
                                                                    </div>);
                                                                })();
                                                                const origText = (p.orig_alignment||[]).map(a=>a.w).join(' ');
                                                                const qwenText = (p.qwen_alignment||[]).map(a=>a.w).join(' ');
                                                                const paraText = (p.parakeet_alignment||[]).map(a=>a.w).join(' ');
                                                                return (<div style={{marginTop:6}}>
                                                                    {renderTL('Original', p.orig_alignment, 'rgba(88,166,255,0.6)', origText)}
                                                                    {renderTL('Qwen', p.qwen_alignment, 'rgba(210,153,34,0.7)', qwenText)}
                                                                    {renderTL('Parakeet', p.parakeet_alignment, 'rgba(163,113,247,0.7)', paraText)}
                                                                    <div style={{display:'flex',justifyContent:'space-between',fontSize:9,color:'var(--text-muted)',marginTop:1,paddingLeft:61}}>
                                                                        <span>0s</span><span>{maxTime.toFixed(1)}s</span>
                                                                    </div>
                                                                </div>);
                                                            })()}
                                                        </div>
                                                    )}
                                                </div>
                                            );
                                        })}
                                        <div style={{textAlign:'center',padding:8,color:'var(--text-muted)',fontSize:12}}>{filtered.length} pairs shown</div>
                                    </div>
                                );
                            })()}
                        </div>
                    </dialog>
                </div>
            );
        }

        // ==================== TRAIN PAGE ====================
        function TrainPage() {
            const [status, setStatus] = useState(null);
            const [runningJob, setRunningJob] = useState(null);
            const [jobLog, setJobLog] = useState('');
            const [error, setError] = useState(null);
            const [model, setModel] = useState('Qwen/Qwen2.5-0.5B');
            const [iters, setIters] = useState(2000);
            const [batch, setBatch] = useState(4);
            const [layers, setLayers] = useState(8);
            const [patience, setPatience] = useState(10);
            const [stepsPerEval, setStepsPerEval] = useState(500);
            const [totalExamples, setTotalExamples] = useState(12000);
            const [errorRate, setErrorRate] = useState(50);
            const [previewData, setPreviewData] = useState(null);
            const [previewLoading, setPreviewLoading] = useState(false);
            const [stopping, setStopping] = useState(false);
            const pollRef = useRef(null);
            const logRef = useRef(null);

            const load = () => api('/api/pipeline/status').then(s => {
                setStatus(s);
                if (s.running_job && !runningJob) setRunningJob(s.running_job);
            });
            useEffect(() => { load(); }, []);
            useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [jobLog]);
            useEffect(() => {
                if (!runningJob) return;
                const poll = async () => {
                    const job = await api(`/api/jobs/${runningJob.id}`);
                    setJobLog(job.log);
                    if (job.status !== 'running') { setRunningJob(null); load(); }
                };
                poll(); pollRef.current = setInterval(poll, 2000);
                return () => clearInterval(pollRef.current);
            }, [runningJob?.id]);

            const startJob = async (type, config) => {
                setError(null); setJobLog('');
                try {
                    const res = await api(`/api/jobs/${type}`, {method: 'POST', body: JSON.stringify(config)});
                    if (res.job_id) setRunningJob({id: res.job_id, job_type: type});
                    else if (res.error) setError(res.error);
                } catch (e) { setError(e.message); }
            };
            const stopJob = async () => { setStopping(true); try { await api('/api/jobs/stop', {method: 'POST'}); } catch (e) {} setStopping(false); };

            if (!status) return <div className="container"><p>Loading...</p></div>;
            const isRunning = !!runningJob;

            const trainExamples = status.train_count || 0;
            const epochSteps = batch > 0 ? Math.ceil(trainExamples / batch) : 0;
            const epochs = epochSteps > 0 ? (iters / epochSteps).toFixed(1) : '?';

            const inputStyle = {padding:'4px 8px',background:'var(--bg)',border:'1px solid var(--border)',borderRadius:4,color:'var(--text)',fontFamily:'Jost,sans-serif',fontSize:13};
            const helpStyle = {fontSize:11,color:'var(--text-muted)',lineHeight:1.4,marginTop:2};
            const paramRow = {display:'flex',gap:12,alignItems:'flex-start',marginBottom:12};
            const paramLabel = {fontSize:12,color:'var(--text-muted)',fontWeight:600,minWidth:90,paddingTop:6};

            const rt = runningJob?.job_type;
            const prepareRunning = rt === 'prepare';

            return (
                <div className="container">
                    <h2>Train</h2>
                    {error && <div className="pipeline-error" style={{marginBottom:12}}>{error}</div>}

                    <div className="card" style={{marginBottom:16}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>
                            <h3 style={{margin:0,flex:1}}>1. Prepare Training Data</h3>
                            {status.training_data_exists && <>
                                <a href="#" style={{color:'var(--success)',fontSize:13,fontWeight:600}} onClick={async e => {
                                    e.preventDefault();
                                    setPreviewData(null); setPreviewLoading(true);
                                    try { setPreviewData(await api('/api/pipeline/preview-training')); } catch (err) { setError(err.message); }
                                    setPreviewLoading(false);
                                }}>{status.train_count?.toLocaleString()} train / {status.valid_count?.toLocaleString()} valid</a>
                                <a href="#" style={{color:'var(--text-muted)',fontSize:11}} onClick={async e => {
                                    e.preventDefault();
                                    if (confirm('Delete training data?')) { await api('/api/pipeline/reset-training', {method:'POST'}); setPreviewData(null); load(); }
                                }}>reset</a>
                            </>}
                        </div>
                        <div style={{display:'flex',gap:16,alignItems:'flex-start',marginBottom:8,flexWrap:'wrap'}}>
                            <div>
                                <label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:2}}>Total examples</label>
                                <input type="number" value={totalExamples} onChange={e => setTotalExamples(parseInt(e.target.value)||12000)} disabled={prepareRunning} style={{...inputStyle,width:80}} />
                                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>How many training prompts to generate total.</div>
                            </div>
                            <div>
                                <label style={{fontSize:12,color:'var(--text-muted)',display:'block',marginBottom:2}}>Error rate %</label>
                                <input type="number" value={errorRate} onChange={e => setErrorRate(Math.min(100,Math.max(0,parseInt(e.target.value)||50)))} disabled={prepareRunning} min="0" max="100" style={{...inputStyle,width:60}} />
                                <div style={{fontSize:10,color:'var(--text-muted)',marginTop:2}}>% with real ASR errors. Rest are identity.</div>
                            </div>
                            <div style={{flex:1,display:'flex',alignItems:'flex-end',justifyContent:'flex-end',paddingTop:16}}>
                                {prepareRunning
                                    ? <button className="btn btn-sm" style={{borderColor:'var(--warning)',color:'var(--warning)',background:'rgba(210,153,34,0.1)'}} onClick={stopJob} disabled={stopping}>{stopping ? 'Stopping...' : 'Stop'}</button>
                                    : <button className="btn btn-primary btn-sm" disabled={isRunning || !status.corpus_exists} onClick={() => startJob('prepare', {total_examples: totalExamples, error_rate: errorRate / 100})}>Prepare</button>
                                }
                            </div>
                        </div>
                        {status.corpus_exists && !prepareRunning && (
                            <div style={{fontSize:12,color:'var(--text-muted)',padding:'6px 0',borderTop:'1px solid var(--border)',marginTop:4}}>
                                {Math.round(totalExamples * errorRate / 100).toLocaleString()} error + {Math.round(totalExamples * (100 - errorRate) / 100).toLocaleString()} identity = {totalExamples.toLocaleString()} total. 90% train / 10% valid.
                            </div>
                        )}
                        {jobLog && prepareRunning && <pre ref={logRef} className="stage-log" style={{marginTop:10,maxHeight:150}}>{jobLog}</pre>}
                        {previewLoading && <div style={{fontSize:12,color:'var(--text-muted)',marginTop:8}}>Loading preview...</div>}
                        {previewData && (
                            <div style={{marginTop:12,borderTop:'1px solid var(--border)',paddingTop:12}}>
                                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                                    <b style={{fontSize:13}}>Training Data Preview</b>
                                    <span style={{fontSize:11,color:'var(--text-muted)'}}>{previewData.correction_count?.toLocaleString()} error + {previewData.identity_count?.toLocaleString()} identity = {previewData.total?.toLocaleString()} total</span>
                                    <div style={{flex:1}} />
                                    <button onClick={() => setPreviewData(null)} style={{background:'none',border:'none',color:'var(--text-muted)',cursor:'pointer',fontSize:14}}>&times;</button>
                                </div>
                                {previewData.correction_samples?.length > 0 && <>
                                    <div style={{fontSize:11,fontWeight:600,color:'var(--success)',marginBottom:4}}>Error examples:</div>
                                    <div style={{maxHeight:200,overflow:'auto',marginBottom:12}}>
                                        {previewData.correction_samples.map((s, i) => (
                                            <div key={i} style={{fontSize:11,fontFamily:'monospace',padding:'4px 8px',background:i%2?'transparent':'rgba(255,255,255,0.02)',lineHeight:1.6,whiteSpace:'pre-wrap'}}>
                                                {s.prompt}{'\n'}<span style={{color:'var(--success)'}}>{s.completion}</span>
                                            </div>
                                        ))}
                                    </div>
                                </>}
                                {previewData.identity_samples?.length > 0 && <>
                                    <div style={{fontSize:11,fontWeight:600,color:'var(--accent)',marginBottom:4}}>Identity examples:</div>
                                    <div style={{maxHeight:200,overflow:'auto'}}>
                                        {previewData.identity_samples.map((s, i) => (
                                            <div key={i} style={{fontSize:11,fontFamily:'monospace',padding:'4px 8px',background:i%2?'transparent':'rgba(255,255,255,0.02)',lineHeight:1.6,whiteSpace:'pre-wrap'}}>
                                                {s.prompt}{'\n'}<span style={{color:'var(--accent)'}}>{s.completion}</span>
                                            </div>
                                        ))}
                                    </div>
                                </>}
                            </div>
                        )}
                    </div>

                    {status.adapters_exist && (
                        <div className="stats-grid" style={{marginBottom:16}}>
                            <div className="stat-card"><div className="value" style={{color:'var(--success)'}}>Ready</div><div className="label">Adapters</div></div>
                            {status.last_train?.adapter_mb && <div className="stat-card"><div className="value">{status.last_train.adapter_mb}MB</div><div className="label">Size</div></div>}
                            {status.last_train?.val_loss && <div className="stat-card"><div className="value">{Number(status.last_train.val_loss).toFixed(4)}</div><div className="label">Val Loss</div></div>}
                        </div>
                    )}

                    {trainExamples > 0 && (
                        <div className="card" style={{marginBottom:16,padding:'10px 14px',background:'rgba(255,255,255,0.03)'}}>
                            <span style={{fontSize:13}}>
                                Training data: <b>{trainExamples.toLocaleString()}</b> examples.
                                {' '}At batch={batch}, 1 epoch = <b>{epochSteps.toLocaleString()}</b> steps.
                                {' '}{iters} iters = <b>{epochs} epochs</b>.
                            </span>
                        </div>
                    )}

                    <div className="card">
                        <div style={paramRow}>
                            <div style={paramLabel}>Model</div>
                            <div style={{flex:1}}>
                                <input value={model} onChange={e => setModel(e.target.value)} disabled={isRunning} style={{...inputStyle,width:'100%',maxWidth:260}} />
                                <div style={helpStyle}>HuggingFace model ID. The base model whose weights are frozen; only LoRA adapters are trained.</div>
                            </div>
                        </div>
                        <div style={paramRow}>
                            <div style={paramLabel}>Iters</div>
                            <div style={{flex:1}}>
                                <input type="number" value={iters} onChange={e => setIters(parseInt(e.target.value)||2000)} disabled={isRunning} style={{...inputStyle,width:80}} />
                                <div style={helpStyle}>Total gradient steps. Each step processes one batch. For 3 full passes over your data, set to ~{(epochSteps * 3).toLocaleString() || '?'}.</div>
                            </div>
                        </div>
                        <div style={paramRow}>
                            <div style={paramLabel}>Batch</div>
                            <div style={{flex:1}}>
                                <input type="number" value={batch} onChange={e => setBatch(parseInt(e.target.value)||1)} disabled={isRunning} style={{...inputStyle,width:60}} />
                                <div style={helpStyle}>Examples per gradient update. Larger = smoother learning, more memory. 1 is noisy, 4-8 recommended.</div>
                            </div>
                        </div>
                        <div style={paramRow}>
                            <div style={paramLabel}>Layers</div>
                            <div style={{flex:1}}>
                                <input type="number" value={layers} onChange={e => setLayers(parseInt(e.target.value)||4)} disabled={isRunning} style={{...inputStyle,width:60}} />
                                <div style={helpStyle}>Transformer layers with LoRA adapters. 4 = smoke test, 8-12 = realistic, 16 = thorough. More layers = more capacity + memory.</div>
                            </div>
                        </div>
                        <div style={paramRow}>
                            <div style={paramLabel}>Patience</div>
                            <div style={{flex:1}}>
                                <input type="number" value={patience} onChange={e => setPatience(parseInt(e.target.value)||10)} disabled={isRunning} style={{...inputStyle,width:60}} />
                                <div style={helpStyle}>Consecutive evals without val loss improvement before early stopping fires. Set to 0 to disable early stopping entirely. With noisy batches, use 8-10+.</div>
                            </div>
                        </div>
                        <div style={paramRow}>
                            <div style={paramLabel}>Eval interval</div>
                            <div style={{flex:1}}>
                                <input type="number" value={stepsPerEval} onChange={e => setStepsPerEval(parseInt(e.target.value)||500)} disabled={isRunning} style={{...inputStyle,width:80}} />
                                <div style={helpStyle}>Steps between validation runs. Lower = more frequent checks but noisier signal. 500-1000 recommended for large datasets.</div>
                            </div>
                        </div>

                        <div style={{display:'flex',gap:8,alignItems:'center',marginTop:8,borderTop:'1px solid var(--border)',paddingTop:12}}>
                            <div style={{flex:1}} />
                            {!status.training_data_exists && <span style={{fontSize:12,color:'var(--text-muted)'}}>Prepare training data first (see above).</span>}
                            {isRunning
                                ? <button className="btn" style={{borderColor:'var(--warning)',color:'var(--warning)',background:'rgba(210,153,34,0.1)'}} onClick={stopJob}>Stop</button>
                                : <button className="btn btn-primary" disabled={!status.training_data_exists}
                                    onClick={() => startJob('train', {model, iters, batch_size: batch, num_layers: layers, patience, steps_per_eval: stepsPerEval})}>Train</button>
                            }
                        </div>
                        {jobLog && <pre ref={logRef} className="stage-log" style={{marginTop:12,maxHeight:400}}>{jobLog}</pre>}
                    </div>
                </div>
            );
        }

        // ==================== EVAL PAGE ====================
        function EvalPage() {
            const [status, setStatus] = useState(null);
            const [runningJob, setRunningJob] = useState(null);
            const [jobLog, setJobLog] = useState('');
            const [liveEval, setLiveEval] = useState(null);
            const [error, setError] = useState(null);
            const [filter, setFilter] = useState('all');
            const pollRef = useRef(null);
            const logRef = useRef(null);

            const load = () => api('/api/pipeline/status').then(s => {
                setStatus(s);
                if (s.running_job && !runningJob) setRunningJob(s.running_job);
            });
            useEffect(() => { load(); }, []);
            useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [jobLog]);
            useEffect(() => {
                if (!runningJob) { setLiveEval(null); return; }
                const poll = async () => {
                    const job = await api(`/api/jobs/${runningJob.id}`);
                    setJobLog(job.log);
                    if (job.result) try { setLiveEval(JSON.parse(job.result)); } catch {}
                    if (job.status !== 'running') { setRunningJob(null); load(); }
                };
                poll(); pollRef.current = setInterval(poll, 1000);
                return () => clearInterval(pollRef.current);
            }, [runningJob?.id]);

            const startEval = async () => {
                setError(null); setJobLog('');
                try {
                    const res = await api('/api/jobs/eval', {method: 'POST', body: JSON.stringify({})});
                    if (res.job_id) setRunningJob({id: res.job_id, job_type: 'eval'});
                    else if (res.error) setError(res.error);
                } catch (e) { setError(e.message); }
            };
            const stopJob = async () => { try { await api('/api/jobs/stop', {method: 'POST'}); } catch (e) {} };

            if (!status) return <div className="container"><p>Loading...</p></div>;
            const isRunning = !!runningJob;
            const ev = liveEval || status.last_eval;

            // Parse log lines into structured entries for display
            const entries = jobLog ? jobLog.split('\n').filter(l => l.match(/^\[\d+\/\d+\]/)).map(line => {
                const m = line.match(/^\[(\d+)\/(\d+)\]\s*\[(\w+)\]\s*(.+?):\s*<keet>\s*(.+?)\s*<qwen>\s*(.+?)\s*=>\s*"(.*?)"(.*)$/);
                if (!m) return null;
                const expected = m[8]?.match(/\(expected "(.+?)"\)/)?.[1];
                return { i: +m[1], total: +m[2], cat: m[3], term: m[4], keet: m[5], qwen: m[6], output: m[7], expected };
            }).filter(Boolean) : [];

            const catColors = {fixed:'#7ee787', kept:'#58a6ff', broken:'#f85149', wrong_fix:'#d29922', blank:'#8b949e', timeout:'#8b949e'};
            const catLabels = {fixed:'Fixed', kept:'Kept', broken:'Broken', wrong_fix:'Wrong fix', blank:'Blank', timeout:'Timeout'};
            const filtered = filter === 'all' ? entries : entries.filter(e => e.cat === filter);

            const progress = ev ? (ev.total || 0) : 0;
            const totalTriplets = entries.length > 0 ? entries[entries.length - 1].total : 0;

            return (
                <div className="container">
                    <h2>Evaluate</h2>
                    {error && <div className="pipeline-error" style={{marginBottom:12}}>{error}</div>}

                    <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:16}}>
                        {isRunning
                            ? <button className="btn" style={{borderColor:'var(--warning)',color:'var(--warning)',background:'rgba(210,153,34,0.1)'}} onClick={stopJob}>Stop</button>
                            : <button className="btn btn-primary" disabled={!status.adapters_exist || !status.corpus_exists}
                                onClick={startEval}>{ev ? 'Re-evaluate' : 'Evaluate'}</button>
                        }
                        {!status.adapters_exist && <span style={{fontSize:12,color:'var(--text-muted)'}}>Train adapters first.</span>}
                        {!status.corpus_exists && <span style={{fontSize:12,color:'var(--text-muted)'}}>Generate corpus first.</span>}
                        {isRunning && totalTriplets > 0 && <span style={{fontSize:12,color:'var(--text-muted)',marginLeft:8}}>{progress}/{totalTriplets}</span>}
                    </div>

                    {ev && (
                        <div style={{marginBottom:16}}>
                            <div className="stats-grid" style={{marginBottom:8}}>
                                <div className="stat-card"><div className="value" style={{color:'var(--success)',fontSize:28}}>{ev.accuracy?.toFixed(1)}%</div><div className="label">Accuracy</div></div>
                                <div className="stat-card"><div className="value" style={{color:catColors.fixed}}>{ev.fixed||0}</div><div className="label">Fixed</div></div>
                                <div className="stat-card"><div className="value" style={{color:catColors.kept}}>{ev.kept||0}</div><div className="label">Kept</div></div>
                                <div className="stat-card"><div className="value" style={{color:catColors.broken}}>{ev.broken||0}</div><div className="label">Broken</div></div>
                                <div className="stat-card"><div className="value" style={{color:catColors.wrong_fix}}>{ev.wrong_fix||0}</div><div className="label">Wrong fix</div></div>
                                <div className="stat-card"><div className="value" style={{color:catColors.blank}}>{ev.blank||0}</div><div className="label">Blank</div></div>
                            </div>
                            {ev.total > 0 && (() => {
                                const total = ev.total;
                                const segments = ['fixed','kept','broken','wrong_fix','blank','timeout'].filter(k => ev[k] > 0);
                                return <div style={{display:'flex',height:6,borderRadius:3,overflow:'hidden',marginBottom:4}}>
                                    {segments.map(k => <div key={k} style={{width:`${ev[k]/total*100}%`,background:catColors[k]}} title={`${catLabels[k]}: ${ev[k]}`} />)}
                                </div>;
                            })()}
                        </div>
                    )}

                    {entries.length > 0 && (
                        <div>
                            <div style={{display:'flex',gap:4,marginBottom:8,flexWrap:'wrap'}}>
                                {['all','fixed','kept','broken','wrong_fix','blank'].map(cat => {
                                    const count = cat === 'all' ? entries.length : entries.filter(e => e.cat === cat).length;
                                    if (count === 0 && cat !== 'all') return null;
                                    return <button key={cat} onClick={() => setFilter(cat)}
                                        style={{padding:'2px 10px',fontSize:11,borderRadius:12,border:'1px solid',cursor:'pointer',
                                            background: filter === cat ? (catColors[cat]||'var(--text)')+'22' : 'transparent',
                                            borderColor: filter === cat ? (catColors[cat]||'var(--border)') : 'var(--border)',
                                            color: catColors[cat] || 'var(--text)'}}>
                                        {cat === 'all' ? 'All' : catLabels[cat]} ({count})
                                    </button>;
                                })}
                            </div>
                            <div ref={logRef} style={{maxHeight:500,overflow:'auto',border:'1px solid var(--border)',borderRadius:8,background:'var(--bg)'}}>
                                {filtered.map((e, i) => (
                                    <div key={i} style={{padding:'6px 10px',borderBottom:'1px solid rgba(255,255,255,0.04)',fontSize:12,fontFamily:'monospace',lineHeight:1.6}}>
                                        <span style={{color:catColors[e.cat],fontWeight:700,display:'inline-block',width:70}}>[{e.cat}]</span>
                                        <span style={{color:'var(--text)',fontWeight:600}}>{e.term}</span>
                                        <br/>
                                        <span style={{color:'#7ee787'}}>keet:</span> {e.keet}
                                        {'  '}<span style={{color:'#58a6ff'}}>qwen:</span> {e.qwen}
                                        {'  '}<span style={{color:'var(--text-muted)'}}>{'=> '}</span>
                                        <span style={{color: e.cat === 'fixed' || e.cat === 'kept' ? 'var(--success)' : e.cat === 'blank' ? 'var(--text-muted)' : 'var(--error)',
                                            fontWeight: e.cat === 'fixed' ? 700 : 400}}>
                                            {e.output || '(empty)'}
                                        </span>
                                        {e.expected && <span style={{color:'var(--text-muted)'}}> (expected: {e.expected})</span>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {status.adapters_exist && (
                        <div style={{marginTop:24}}>
                            <h3>Live Correction Demo</h3>
                            <LiveCorrection />
                        </div>
                    )}
                </div>
            );
        }

        // ==================== PIPELINE (legacy, hidden from nav) ====================

        // SVG icons for each stage
        const PipelineIcons = {
            corpus: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v4a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z" /><path d="M19 10v1a7 7 0 0 1-14 0v-1" /><line x1="12" y1="18" x2="12" y2="22" />
                <path d="M8 22h8" opacity="0.5" />
            </svg>,
            prepare: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <rect x="3" y="3" width="7" height="7" rx="1" /><rect x="14" y="3" width="7" height="7" rx="1" /><rect x="3" y="14" width="7" height="7" rx="1" /><rect x="14" y="14" width="7" height="7" rx="1" />
                <circle cx="6.5" cy="6.5" r="1" fill="currentColor" stroke="none" opacity="0.5" /><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none" opacity="0.5" />
            </svg>,
            train: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <circle cx="6" cy="6" r="2" /><circle cx="18" cy="6" r="2" /><circle cx="6" cy="18" r="2" /><circle cx="18" cy="18" r="2" /><circle cx="12" cy="12" r="2.5" strokeWidth="2" />
                <line x1="7.5" y1="7.5" x2="10" y2="10" opacity="0.4" /><line x1="16.5" y1="7.5" x2="14" y2="10" opacity="0.4" />
                <line x1="7.5" y1="16.5" x2="10" y2="14" opacity="0.4" /><line x1="16.5" y1="16.5" x2="14" y2="14" opacity="0.4" />
            </svg>,
            eval: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2" />
            </svg>,
        };

        function LiveCorrection() {
            const [input, setInput] = useState('');
            const [correcting, setCorrecting] = useState(false);
            const [result, setResult] = useState(null);
            const [recording, setRecording] = useState(false);
            const [transcribing, setTranscribing] = useState(false);
            const mediaRef = useRef(null);

            const correct = async (parakeet, qwen) => {
                setCorrecting(true);
                try {
                    const res = await api('/api/correct', {
                        method: 'POST', body: JSON.stringify({parakeet, qwen}),
                    });
                    setResult({parakeet, qwen, corrected: res.corrected});
                } catch (e) { setResult({parakeet, qwen, corrected: `(error: ${e.message})`}); }
                setCorrecting(false);
            };

            const startRec = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
                    const mr = new MediaRecorder(stream, {mimeType: 'audio/webm'});
                    const chunks = [];
                    mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                    mr.onstop = async () => {
                        stream.getTracks().forEach(t => t.stop());
                        setRecording(false);
                        setTranscribing(true);
                        try {
                            const blob = new Blob(chunks, {type: 'audio/webm'});
                            const arrayBuf = await blob.arrayBuffer();
                            const decoded = await audioCtx.decodeAudioData(arrayBuf);
                            const wavBytes = audioBufferToWav(decoded);
                            // Run both ASR models
                            const res = await fetch('/api/asr/dual', {
                                method: 'POST', headers: {'Content-Type': 'audio/wav'}, body: wavBytes,
                            });
                            if (res.ok) {
                                const asr = await res.json();
                                setTranscribing(false);
                                await correct(asr.parakeet || '', asr.qwen || '');
                            } else { setTranscribing(false); }
                        } catch (e) { console.error(e); setTranscribing(false); }
                    };
                    mediaRef.current = mr;
                    mr.start();
                    setRecording(true);
                    setResult(null);
                } catch (e) { console.error(e); }
            };

            const stopRec = () => {
                if (mediaRef.current && mediaRef.current.state !== 'inactive') mediaRef.current.stop();
                setRecording(false);
            };

            const manualCorrect = () => {
                if (!input.trim()) return;
                // Treat the input as both parakeet and qwen (simulating identical ASR output)
                correct(input.trim(), input.trim());
            };

            return (
                <div className="stage-card ready" style={{marginTop: 24}}>
                    <div className="stage-top">
                        <div className="stage-icon" style={{color: 'var(--accent)'}}>
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                            </svg>
                        </div>
                        <div className="stage-title">
                            <div className="stage-num">Live</div>
                            <h3>Correction Demo</h3>
                        </div>
                    </div>
                    <div className="stage-desc">
                        Speak or type text to see the correction model in action. Records your voice, runs both ASR models, then corrects the output.
                    </div>
                    <div className="stage-controls" style={{flexDirection: 'column', alignItems: 'stretch', gap: 12}}>
                        <div style={{display: 'flex', gap: 8, alignItems: 'center'}}>
                            <button className="stage-launch-btn" onClick={recording ? stopRec : startRec}
                                style={recording ? {borderColor: 'var(--danger)', color: 'var(--danger)', background: 'rgba(248,81,73,0.1)'} : {}}>
                                {recording ? 'Stop' : transcribing ? 'Transcribing\u2026' : correcting ? 'Correcting\u2026' : 'Record'}
                            </button>
                            <span style={{color: 'var(--text-muted)', fontSize: 11}}>or</span>
                            <input value={input} onChange={e => setInput(e.target.value)} placeholder="Type ASR text to correct..."
                                style={{flex: 1}} onKeyDown={e => { if (e.key === 'Enter') manualCorrect(); }} />
                            <button className="stage-launch-btn" onClick={manualCorrect} disabled={!input.trim() || correcting}>
                                Correct
                            </button>
                        </div>
                        {result && (
                            <div style={{padding: '12px 16px', background: 'rgba(0,0,0,0.3)', borderRadius: 6, border: '1px solid rgba(88,166,255,0.1)', fontSize: 13, lineHeight: 1.8}}>
                                {result.parakeet !== result.qwen ? (<>
                                    <div><span style={{color: '#7ee787', opacity: 0.6, fontSize: 11, letterSpacing: '0.5px', textTransform: 'uppercase'}}>Parakeet</span> {result.parakeet}</div>
                                    <div><span style={{color: '#58a6ff', opacity: 0.6, fontSize: 11, letterSpacing: '0.5px', textTransform: 'uppercase'}}>Qwen</span> {result.qwen}</div>
                                </>) : (
                                    <div><span style={{opacity: 0.6, fontSize: 11, letterSpacing: '0.5px', textTransform: 'uppercase'}}>Input</span> {result.parakeet}</div>
                                )}
                                <div style={{marginTop: 4, paddingTop: 4, borderTop: '1px solid rgba(88,166,255,0.1)'}}>
                                    <span style={{color: 'var(--success)', fontSize: 11, letterSpacing: '0.5px', textTransform: 'uppercase'}}>Corrected</span>{' '}
                                    <span style={{fontWeight: 600}}>{result.corrected}</span>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function PipelinePage() {
            const [status, setStatus] = useState(null);
            const [runningJob, setRunningJob] = useState(null);
            const [jobLog, setJobLog] = useState('');
            const [error, setError] = useState(null);
            const pollRef = useRef(null);

            const [corpusBackend, setCorpusBackend] = useState('pocket-hq');
            const [trainIters, setTrainIters] = useState(1000);
            const [trainBatch, setTrainBatch] = useState(1);
            const [trainLayers, setTrainLayers] = useState(4);
            const [trainModel, setTrainModel] = useState('Qwen/Qwen2.5-0.5B');
            const [identityCount, setIdentityCount] = useState(95000);
            // Vocab scan config
            const [scanBatch, setScanBatch] = useState(20);
            const [scanLimit, setScanLimit] = useState(250);

            const loadStatus = () => api('/api/pipeline/status').then(s => {
                setStatus(s);
                if (s.running_job && !runningJob) setRunningJob(s.running_job);
            });
            useEffect(() => {loadStatus();}, []);

            useEffect(() => {
                if (!runningJob) return;
                const poll = async () => {
                    try {
                        const job = await api(`/api/jobs/${runningJob.id}`);
                        setJobLog(job.log);
                        if (job.status !== 'running') {setRunningJob(null); loadStatus();}
                    } catch (e) { }
                };
                poll();
                pollRef.current = setInterval(poll, 2000);
                return () => clearInterval(pollRef.current);
            }, [runningJob?.id]);

            const startJob = async (type, config = {}) => {
                setError(null);
                try {
                    const res = await api(`/api/jobs/${type}`, {method: 'POST', body: JSON.stringify(config)});
                    if (res.job_id) setRunningJob({id: res.job_id, job_type: type});
                    else if (res.error) setError(res.error);
                } catch (e) {setError(e.message);}
            };

            const stopJob = async () => {
                try {
                    await api('/api/jobs/stop', {method: 'POST'});
                } catch (e) {setError(e.message);}
            };

            const logRef = useRef(null);
            useEffect(() => {if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;}, [jobLog]);

            if (!status) return <div className="pipeline-wrap"><p style={{textAlign: 'center', color: 'var(--text-muted)'}}>Initializing pipeline...</p></div>;

            const isRunning = !!runningJob;
            const rt = runningJob?.job_type;

            const stageState = (type, exists, prereq) => {
                if (rt === type) return 'running';
                if (exists) return 'complete';
                if (prereq) return 'ready';
                return 'idle';

            const s1 = stageState('corpus', status.corpus_exists, status.approved_count > 0);
            const s2 = stageState('prepare', status.training_data_exists, status.corpus_exists);
            const s3 = stageState('train', status.adapters_exist, status.training_data_exists);
            const s4 = stageState('eval', false, status.adapters_exist && status.corpus_exists);

            const cardClass = (state, type) => {
                let c = 'stage-card';
                if (state === 'complete') c += ' complete';
                else if (state === 'running') c += ' running';
                else if (state === 'ready') c += ' ready';
                if (rt && rt !== type) c += ' dimmed';
                return c;
            };

            const badgeClass = (state) => {
                if (state === 'running') return 'stage-status-badge active';
                if (state === 'complete') return 'stage-status-badge done';
                if (state === 'ready') return 'stage-status-badge ready';
                return 'stage-status-badge idle';
            };

            const badgeText = (state, completeText) => {
                if (state === 'running') return 'Processing';
                if (state === 'complete') return completeText;
                if (state === 'ready') return 'Ready';
                return 'Waiting';
            };

            return (
                <div className="pipeline-wrap">
                    <div className="pipeline-header">
                        <h2>Training Pipeline</h2>
                        <div className="subtitle">ASR Error Correction Model</div>
                    </div>

                    {error && <div className="pipeline-error">{error}</div>}
                    {isRunning && (
                        <div style={{textAlign: 'right', marginBottom: 8}}>
                            <button className="stage-launch-btn" style={{borderColor: 'var(--warning)', color: 'var(--warning)', background: 'rgba(210,153,34,0.1)'}} onClick={stopJob}>Stop</button>
                        </div>

                    <div className="pipeline-stages">
                        {/* Stage 0: Vocab Scan */}
                        <div className={cardClass(status.vocab_scanned > 0 ? 'complete' : (rt === 'vocab-scan' ? 'running' : 'ready'), 'vocab-scan')}>

                                <div className="stage-icon" style={{color: status.vocab_scanned > 0 ? 'var(--success)' : 'var(--accent)'}}>
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                                    </svg>
                                </div>
                                <div className="stage-title">
                                    <div className="stage-num">Stage 00</div>
                                    <h3>Vocab Scan</h3>
                                </div>
                                <span className={status.vocab_scanned > 0 ? 'stage-status-badge done' : (rt === 'vocab-scan' ? 'stage-status-badge active' : 'stage-status-badge ready')}>
                                    {status.vocab_scanned > 0 ? `${status.vocab_scanned} terms scanned` : rt === 'vocab-scan' ? 'Scanning' : 'Ready'}
                                </span>
                            </div>
                            <div className="stage-desc">
                                TTS each vocab term in batches, run ASR, identify which terms get misheard. Prioritizes override work and builds the confusion table for synthetic corpus generation.
                            </div>
                            <div className="stage-controls">
                                <label>TTS</label>
                                <select value={corpusBackend} onChange={e => setCorpusBackend(e.target.value)}>

                                </select>
                                <label>Batch</label>
                                <input type="number" value={scanBatch} onChange={e => setScanBatch(parseInt(e.target.value) || 50)} style={{width: 50}} />
                                <label>Limit</label>
                                <input type="number" value={scanLimit} onChange={e => setScanLimit(parseInt(e.target.value) || 0)} style={{width: 60}} placeholder="0=all" />
                                <div style={{flex:1}} />
                                <button className="stage-launch-btn" disabled={isRunning}
                                    onClick={() => startJob('vocab-scan', {tts_backend: corpusBackend, batch_size: scanBatch, limit: scanLimit || undefined})}>
                                    {rt === 'vocab-scan' ? 'Scanning\u2026' : status.vocab_scanned > 0 ? 'Re-scan' : 'Scan'}
                                </button>
                            </div>
                            {rt === 'vocab-scan' && jobLog && <pre ref={logRef} className="stage-log">{jobLog}</pre>}
                            {status.vocab_scanned > 0 && rt !== 'vocab-scan' && (
                                <div style={{marginTop: 8}}>
                                    <a href="#/pipeline/scan" style={{fontSize: 12, color: 'var(--accent)'}}>View scan results →</a>
                                </div>
                            )}
                        </div>

                        <div className={`pipeline-connector${status.vocab_scanned > 0 ? ' active' : ''}`} />

                        {/* Stage 1: Corpus */}
                        <div className={cardClass(s1, 'corpus')}>
                            <div className="stage-top">
                                <div className="stage-icon" style={{color: s1 === 'complete' ? 'var(--success)' : 'var(--accent)'}}>{PipelineIcons.corpus}</div>
                                <div className="stage-title">
                                    <div className="stage-num">Stage 01</div>
                                    <h3>Generate Corpus</h3>
                                </div>
                                <span className={badgeClass(s1)}>{badgeText(s1, `${status.corpus_lines} pairs`)}</span>
                            </div>
                            <div className="stage-desc">
                                Synthesize speech via TTS, transcribe with dual ASR models. Each approved sentence becomes an (original, qwen, parakeet) training triple.
                            </div>
                            <div className="stage-controls">
                                <label>TTS</label>
                                <select value={corpusBackend} onChange={e => setCorpusBackend(e.target.value)}>
                                    {(status.backends || []).map(b => <option key={b} value={b}>{b}</option>)}
                                </select>
                                <span style={{fontSize: 11, color: 'var(--text-muted)'}}>{status.approved_count} approved</span>
                                <div style={{flex: 1}} />
                                <button className="stage-launch-btn" disabled={isRunning || status.approved_count === 0}
                                    onClick={() => startJob('corpus', {tts_backend: corpusBackend})}>
                                    {rt === 'corpus' ? 'Running\u2026' : 'Generate'}
                                </button>
                            </div>
                            {rt === 'corpus' && jobLog && <pre ref={logRef} className="stage-log">{jobLog}</pre>}
                        </div>

                        <div className={`pipeline-connector${s1 === 'complete' || s1 === 'running' ? ' active' : ''}`} />

                        {/* Stage 2: Prepare */}
                        <div className={cardClass(s2, 'prepare')}>
                            <div className="stage-top">
                                <div className="stage-icon" style={{color: s2 === 'complete' ? 'var(--success)' : 'var(--accent)'}}>{PipelineIcons.prepare}</div>
                                <div className="stage-title">
                                    <div className="stage-num">Stage 02</div>
                                    <h3>Prepare Training Data</h3>
                                </div>
                                <span className={badgeClass(s2)}>{badgeText(s2, `${status.train_count?.toLocaleString()} examples`)}</span>
                            </div>
                            <div className="stage-desc">
                                Generate identity examples from conversation history, merge with corpus triples, split into train / valid / test partitions.
                            </div>
                            <div className="stage-controls">
                                <label>Identity</label>
                                <input type="number" value={identityCount} onChange={e => setIdentityCount(parseInt(e.target.value) || 95000)} style={{width: 80}} />
                                <div style={{flex: 1}} />
                                <button className="stage-launch-btn" disabled={isRunning || !status.corpus_exists}
                                    onClick={() => startJob('prepare', {identity_count: identityCount})}>
                                    {rt === 'prepare' ? 'Running\u2026' : 'Prepare'}
                                </button>
                            </div>
                            {rt === 'prepare' && jobLog && <pre ref={logRef} className="stage-log">{jobLog}</pre>}
                        </div>

                        <div className={`pipeline-connector${s2 === 'complete' || s2 === 'running' ? ' active' : ''}`} />

                        {/* Stage 3: Train */}
                        <div className={cardClass(s3, 'train')}>
                            <div className="stage-top">
                                <div className="stage-icon" style={{color: s3 === 'complete' ? 'var(--success)' : 'var(--accent)'}}>{PipelineIcons.train}</div>
                                <div className="stage-title">
                                    <div className="stage-num">Stage 03</div>
                                    <h3>Train LoRA Adapters</h3>
                                </div>
                                <span className={badgeClass(s3)}>{badgeText(s3, 'Adapters ready')}</span>
                            </div>
                            <div className="stage-desc">
                                Fine-tune with Low-Rank Adaptation on Apple Silicon via MLX-LM. Prompt format: &lt;parakeet&gt; ... &lt;qwen&gt; ... &lt;correct&gt;
                            </div>
                            <div className="stage-controls">
                                <label>Model</label>
                                <input value={trainModel} onChange={e => setTrainModel(e.target.value)} style={{width: 170}} />
                                <label>Iters</label>
                                <input type="number" value={trainIters} onChange={e => setTrainIters(parseInt(e.target.value) || 1000)} style={{width: 60}} />
                                <label>Batch</label>
                                <input type="number" value={trainBatch} onChange={e => setTrainBatch(parseInt(e.target.value) || 1)} style={{width: 40}} />
                                <label>Layers</label>
                                <input type="number" value={trainLayers} onChange={e => setTrainLayers(parseInt(e.target.value) || 4)} style={{width: 40}} />
                                <div style={{flex: 1}} />
                                <button className="stage-launch-btn" disabled={isRunning || !status.training_data_exists}
                                    onClick={() => startJob('train', {model: trainModel, iters: trainIters, batch_size: trainBatch, num_layers: trainLayers})}>
                                    {rt === 'train' ? 'Running\u2026' : 'Train'}
                                </button>
                            </div>
                            {rt === 'train' && jobLog && <pre ref={logRef} className="stage-log" style={{maxHeight: 300}}>{jobLog}</pre>}
                        </div>

                        <div className={`pipeline-connector${s3 === 'complete' ? ' active' : ''}`} />

                        {/* Stage 4: Eval */}
                        <div className={cardClass(status.last_eval ? 'complete' : s4, 'eval')}>
                            <div className="stage-top">
                                <div className="stage-icon" style={{color: status.last_eval ? 'var(--success)' : s4 === 'ready' ? 'var(--accent)' : 'var(--text-muted)'}}>{PipelineIcons.eval}</div>
                                <div className="stage-title">
                                    <div className="stage-num">Stage 04</div>
                                    <h3>Evaluate</h3>
                                </div>
                                {status.last_eval ? (
                                    <span className="stage-status-badge done">{status.last_eval.correct}/{status.last_eval.total} correct ({status.last_eval.accuracy?.toFixed(1)}%)</span>

                                    <span className={badgeClass(s4)}>{badgeText(s4, 'Done')}</span>

                                <div style={{display: 'flex', gap: 16, margin: '8px 0', fontSize: 13}}>

                                        <div style={{fontSize: 11, color: 'var(--text-muted)', letterSpacing: '0.5px', textTransform: 'uppercase'}}>Sentence accuracy</div>
                                    </div>
                                    <div style={{padding: '8px 16px', background: 'rgba(88,166,255,0.08)', border: '1px solid rgba(88,166,255,0.15)', borderRadius: 6}}>
                                        <div style={{fontSize: 20, fontWeight: 600, color: 'var(--accent)'}}>{status.last_eval.word_accuracy?.toFixed(1)}%</div>
                                        <div style={{fontSize: 11, color: 'var(--text-muted)', letterSpacing: '0.5px', textTransform: 'uppercase'}}>Word accuracy</div>
                                    </div>
                                    <div style={{padding: '8px 16px', background: 'rgba(139,148,158,0.08)', border: '1px solid rgba(139,148,158,0.15)', borderRadius: 6}}>
                                        <div style={{fontSize: 20, fontWeight: 600}}>{status.last_eval.total}</div>
                                        <div style={{fontSize: 11, color: 'var(--text-muted)', letterSpacing: '0.5px', textTransform: 'uppercase'}}>Evaluated</div>
                                    </div>
                                </div>
                            )}
                            <div className="stage-controls">
                                <span style={{fontSize: 11, color: 'var(--text-muted)'}}>{status.human_recordings} human recordings</span>
                                <div style={{flex:1}} />
                                <button className="stage-launch-btn" disabled={isRunning || !status.adapters_exist || !status.corpus_exists}
                                    onClick={() => startJob('eval', {})}>
                                    {rt === 'eval' ? 'Running\u2026' : status.last_eval ? 'Re-evaluate' : 'Evaluate'}
                                </button>
                            </div>
                            {rt === 'eval' && jobLog && <pre ref={logRef} className="stage-log" style={{maxHeight: 400}}>{jobLog}</pre>}
                        </div>

                        {/* Live Correction Demo */}
                        {status.adapters_exist && <LiveCorrection />}
                    </div>
                </div>
            );
        }

        // ==================== SCAN RESULTS ====================
        function ScanResultsPage() {
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                api('/api/pipeline/scan-results').then(setResults).finally(() => setLoading(false));
            }, []);

            if (loading) return <div className="container"><p>Loading...</p></div>;

            const totalTerms = results.length;
            const errorTerms = results.filter(r => r.qwen_errors > 0 || r.parakeet_errors > 0).length;

            return (
                <div className="container">
                    <div style={{display: 'flex', alignItems: 'center', gap: 16, marginBottom: 24}}>
                        <a href="#/vocab" className="btn btn-sm">&larr; Vocab</a>
                        <h2 style={{margin: 0}}>Vocab Scan Results</h2>
                        <span style={{fontSize: 13, color: 'var(--text-muted)'}}>{errorTerms} / {totalTerms} terms with ASR errors</span>
                    </div>
                    {results.length === 0 ? (
                        <div className="empty-state"><h3>No scan results yet</h3><p>Run a vocab scan from the Pipeline page.</p></div>
                    ) : (
                        <div className="card" style={{padding: 0, overflow: 'hidden'}}>
                            <table>
                                <thead><tr>
                                    <th>Term</th>
                                    <th style={{color: '#58a6ff'}}>Qwen heard</th>
                                    <th style={{color: '#7ee787'}}>Parakeet heard</th>
                                </tr></thead>
                                <tbody>{results.map(r => {
                                    const hasErrors = r.qwen_errors > 0 || r.parakeet_errors > 0;
                                    if (!hasErrors) return null;
                                    const qHeard = [...new Set(r.qwen_heard || [])].filter(h => h.toLowerCase() !== r.term.toLowerCase());
                                    const pHeard = [...new Set(r.parakeet_heard || [])].filter(h => h.toLowerCase() !== r.term.toLowerCase());
                                    return (
                                        <tr key={r.term}>
                                            <td style={{fontWeight: 600}}>{r.term}</td>
                                            <td>{qHeard.length > 0
                                                ? qHeard.map((h, i) => <span key={i} style={{color: '#58a6ff', marginRight: 8}}>{h}</span>)
                                                : <span style={{color: 'var(--text-muted)'}}>—</span>}
                                            </td>
                                            <td>{pHeard.length > 0
                                                ? pHeard.map((h, i) => <span key={i} style={{color: '#7ee787', marginRight: 8}}>{h}</span>)
                                                : <span style={{color: 'var(--text-muted)'}}>—</span>}
                                            </td>
                                        </tr>
                                    );
                                })}</tbody>
                            </table>
                        </div>
                    )}
                </div>
            );
        }
