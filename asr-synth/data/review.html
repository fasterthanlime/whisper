<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sentence Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }
  #counter {
    position: fixed;
    top: 20px;
    right: 20px;
    font-size: 14px;
    color: #888;
  }
  #stats {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 14px;
    color: #888;
  }
  #card {
    max-width: 800px;
    width: 90%;
    background: #16213e;
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    transition: transform 0.3s, opacity 0.3s;
  }
  #card.good { animation: slideRight 0.3s; }
  #card.bad { animation: slideLeft 0.3s; }
  @keyframes slideRight {
    0% { transform: translateX(0); opacity: 1; }
    50% { transform: translateX(100px); opacity: 0; }
    51% { transform: translateX(-100px); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }
  @keyframes slideLeft {
    0% { transform: translateX(0); opacity: 1; }
    50% { transform: translateX(-100px); opacity: 0; }
    51% { transform: translateX(100px); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }
  .label { font-size: 12px; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .text { font-size: 20px; line-height: 1.5; margin-bottom: 24px; }
  .spoken { font-size: 16px; color: #f0c040; margin-bottom: 24px; font-style: italic; }
  .vocab { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .vocab span {
    background: #0f3460;
    color: #4cc9f0;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-family: monospace;
  }
  #controls {
    position: fixed;
    bottom: 30px;
    display: flex;
    gap: 40px;
    align-items: center;
  }
  .key {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .key kbd {
    background: #2a2a4a;
    border: 1px solid #444;
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 18px;
    font-family: monospace;
    color: #fff;
  }
  .key .hint { font-size: 12px; color: #888; }
  .bad-key kbd { border-color: #e74c3c; }
  .good-key kbd { border-color: #2ecc71; }
  #done {
    font-size: 24px;
    color: #2ecc71;
  }
</style>
</head>
<body>

<div id="stats"></div>
<div id="counter"></div>

<div id="card">
  <div class="label">Sentence</div>
  <div class="text" id="text"></div>
  <div class="label">Say it as</div>
  <div class="spoken" id="spoken"></div>
  <div class="label">Vocab terms</div>
  <div class="vocab" id="vocab"></div>
</div>

<div id="controls">
  <div class="key bad-key">
    <kbd>&larr;</kbd>
    <span class="hint">Bad / Skip</span>
  </div>
  <div class="key">
    <kbd>Space</kbd>
    <span class="hint">Unsure</span>
  </div>
  <div class="key good-key">
    <kbd>&rarr;</kbd>
    <span class="hint">Good</span>
  </div>
</div>

<div id="done" style="display:none">
  Done! <span id="summary"></span>
  <br><br>
  <button onclick="download()" style="font-size:18px;padding:10px 20px;cursor:pointer;">Download Results</button>
</div>

<script>
let sentences = [];
let current = 0;
let results = [];
let stats = { good: 0, bad: 0, unsure: 0 };

// Load sentences from embedded data (injected by Python)
const DATA_PLACEHOLDER = '__SENTENCES_JSON__';

async function init() {
  if (typeof DATA_PLACEHOLDER === 'string' && DATA_PLACEHOLDER.startsWith('__')) {
    // Try loading from file
    const resp = await fetch('focused_sentences.jsonl');
    const text = await resp.text();
    sentences = text.trim().split('\n').map(l => JSON.parse(l));
  } else {
    sentences = JSON.parse(DATA_PLACEHOLDER);
  }

  // Load any saved progress
  const saved = localStorage.getItem('review_progress');
  if (saved) {
    const data = JSON.parse(saved);
    results = data.results || [];
    current = results.length;
    stats = data.stats || { good: 0, bad: 0, unsure: 0 };
  }

  show();
}

function show() {
  if (current >= sentences.length) {
    document.getElementById('card').style.display = 'none';
    document.getElementById('controls').style.display = 'none';
    document.getElementById('done').style.display = 'block';
    document.getElementById('summary').textContent =
      `${stats.good} good, ${stats.bad} bad, ${stats.unsure} unsure out of ${sentences.length}`;
    return;
  }

  const s = sentences[current];
  document.getElementById('text').textContent = s.text;
  document.getElementById('spoken').textContent = s.spoken;
  document.getElementById('vocab').innerHTML =
    (s.vocab_terms || []).map(t => `<span>${t}</span>`).join('');
  document.getElementById('counter').textContent = `${current + 1} / ${sentences.length}`;
  document.getElementById('stats').textContent =
    `✓ ${stats.good}  ✗ ${stats.bad}  ? ${stats.unsure}`;
}

function rate(rating) {
  const card = document.getElementById('card');
  card.classList.remove('good', 'bad');

  results.push({
    index: current,
    text: sentences[current].text,
    rating: rating,
  });

  if (rating === 'good') {
    stats.good++;
    card.classList.add('good');
  } else if (rating === 'bad') {
    stats.bad++;
    card.classList.add('bad');
  } else {
    stats.unsure++;
  }

  // Save progress
  localStorage.setItem('review_progress', JSON.stringify({ results, stats }));

  current++;
  setTimeout(show, 150);
}

function download() {
  const blob = new Blob([JSON.stringify({ results, stats }, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'review_results.json';
  a.click();
}

document.addEventListener('keydown', (e) => {
  if (current >= sentences.length) return;
  if (e.key === 'ArrowRight') rate('good');
  else if (e.key === 'ArrowLeft') rate('bad');
  else if (e.key === ' ') { e.preventDefault(); rate('unsure'); }
});

init();
</script>
</body>
</html>
