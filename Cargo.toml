[workspace]
resolver = "2"
members = [
  "rust/peft-rs",
  "rust/synth-corrupt",
  "rust/synth-dashboard",
  "rust/synth-parakeet",
  "rust/synth-pipeline",
  "rust/synth-qwen",
  "rust/synth-recorder",
  "rust/synth-reviewer",
  "rust/synth-textgen",
  "rust/synth-train",
  "rust/synth-tts",
]
default-members = ["rust/synth-dashboard"]

[workspace.dependencies]
anyhow = "1"
clap = { version = "4.5", features = ["derive"] }
criterion = "0.5"
proptest = "1"
hound = "3.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
candle-core = "0.9.2"
candle-nn = "0.9.2"
safetensors = "0.6"
thiserror = "2"
tracing = "0.1"
qwen3-asr = "0.2.2"

[workspace.lints.rust]
rust_2018_idioms = "warn"
unsafe_op_in_unsafe_fn = "warn"
unused_lifetimes = "warn"
